    const thead=document.getElementById('kas-thead'); if(thead) thead.innerHTML=`<tr><th class="px-6 py-4">Tanggal</th><th class="px-6 py-4">Kategori</th><th class="px-6 py-4">Keterangan</th><th class="px-6 py-4 text-right">Nominal</th>${canEdit?'<th class="px-6 py-4 text-right">Aksi</th>':''}</tr>`;
    if(kas.length===0){const colspan=canEdit?5:4;tb.innerHTML=`<tr><td colspan="${colspan}" class="px-6 py-10 text-center text-gray-500">Belum ada transaksi.</td></tr>`;}
    else tb.innerHTML=kas.map(k=>{const isMasuk=k.Jenis==='Pemasukan';const aksiHtml=canEdit?`<td class="px-6 py-4 text-right space-x-1"><button onclick="window.ekas.kas.openModal(null,'${escHtml(k.KasID)}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit" aria-label="Edit Kas"><i class="ph ph-pencil-simple" aria-hidden="true"></i></button><button onclick="window.ekas.kas.delete('${escHtml(k.KasID)}')" class="text-danger bg-red-50 p-2 rounded-lg" title="Hapus" aria-label="Hapus Kas"><i class="ph ph-trash" aria-hidden="true"></i></button></td>`:'';return`<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50"><td class="px-6 py-4 text-xs text-gray-500">${formatDateTime(k.Tanggal)}</td><td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-bold ${isMasuk?'bg-emerald-100 text-success':'bg-red-100 text-danger'}">${escHtml(k.Kategori)}</span></td><td class="px-6 py-4 text-sm font-medium">${escHtml(k.Keterangan)}</td><td class="px-6 py-4 text-right font-black ${isMasuk?'text-success':'text-danger'}">${isMasuk?'+':'-'}${formatRupiah(k.Nominal)}</td>${aksiHtml}</tr>`;}).join('');
    let totalMasuk=0,totalKeluar=0; kas.forEach(k=>{const nom=Number(k.Nominal)||0;if(k.Jenis==='Pemasukan') totalMasuk+=nom;else totalKeluar+=nom;});
    const surplus=totalMasuk-totalKeluar;
    let saldoAkhir=0; const sampaiDate=sampai?new Date(sampai+'T23:59:59'):new Date();
    state.data.kas.forEach(k=>{if(!k.Tanggal)return;const t=new Date(k.Tanggal);if(t<=sampaiDate){const nom=Number(k.Nominal)||0;saldoAkhir+=(k.Jenis==='Pemasukan'?nom:-nom);}});
    const totalTunggakan=(state.data.tunggakan||[]).reduce((sum,t)=>sum+Number(t['Iuran']||0)+Number(t['Arisan']||0),0);
    tf.innerHTML=`<tr class="font-bold text-xs md:text-sm"><td class="px-6 py-3" colspan="3">Total Pemasukan</td><td class="px-6 py-3 text-right text-success">${formatRupiah(totalMasuk)}</td>${canEdit?'<td></td>':''}</tr><tr class="font-bold text-xs md:text-sm"><td class="px-6 py-3" colspan="3">Total Pengeluaran</td><td class="px-6 py-3 text-right text-danger">${formatRupiah(totalKeluar)}</td>${canEdit?'<td></td>':''}</tr><tr class="font-bold text-xs md:text-sm"><td class="px-6 py-3" colspan="3">Surplus/Defisit</td><td class="px-6 py-3 text-right ${surplus>=0?'text-success':'text-danger'}">${formatRupiah(surplus)}</td>${canEdit?'<td></td>':''}</tr><tr class="font-bold text-xs md:text-sm border-t border-gray-300 dark:border-gray-600"><td class="px-6 py-3" colspan="3">Saldo Akhir</td><td class="px-6 py-3 text-right text-primary">${formatRupiah(saldoAkhir)}</td>${canEdit?'<td></td>':''}</tr><tr class="font-bold text-xs md:text-sm"><td class="px-6 py-3" colspan="3">Total Saldo Tertunggak</td><td class="px-6 py-3 text-right text-warning">${formatRupiah(totalTunggakan)}</td>${canEdit?'<td></td>':''}</tr>`;
  },
  openModal(jenis,id=null){if(!['superadmin','admin_suami'].includes(state.user.role))return;const k=id?state.data.kas.find(x=>x.KasID===id):null;ModalHelper.open('tpl-modal-kas',()=>{document.getElementById('modal-kas-title').innerText=k?'Edit Kas':'Input Kas '+(k?k.Jenis:jenis);document.getElementById('k-id').value=k?k.KasID:'';document.getElementById('k-jenis').value=k?k.Jenis:jenis;document.getElementById('k-kategori').value=k?k.Kategori||'':'';document.getElementById('k-nominal').value=k?formatAngkaInput(k.Nominal):'';if(k)document.getElementById('k-nominal').dataset.value=k.Nominal;document.getElementById('k-ket').value=k?k.Keterangan||'':'';});},
  async submit(e){e.preventDefault();const nominalInput=document.getElementById('k-nominal');const nominal=toNumber(nominalInput.dataset?.value||nominalInput.value.replace(/\./g,'')||0);const payload={isEdit:!!document.getElementById('k-id').value,kasId:document.getElementById('k-id').value||'KAS-'+Date.now(),tgl:new Date().toISOString(),jenis:document.getElementById('k-jenis').value,kategori:document.getElementById('k-kategori').value,nominal,keterangan:document.getElementById('k-ket').value};showLoading();const res=await fetchAPI('save_kas',payload);hideLoading();if(res.success){window.closeAllModals();await loadData();showToast('Transaksi disimpan');}else showToast(res.message,'error');},
  async delete(id){if(!(await showConfirmDialog('Hapus transaksi ini? Data pembayaran terkait juga akan dihapus.')))return;const linkedPembayaran=state.data.pembayaran.find(p=>p.KasID===id);showLoading();if(linkedPembayaran){const resPay=await fetchAPI('delete_pembayaran',{id:linkedPembayaran.PayID});if(!resPay.success){hideLoading();showToast('Gagal menghapus pembayaran terkait: '+resPay.message,'error');return;}}const resKas=await fetchAPI('delete_kas',{id});hideLoading();if(resKas.success){await loadData();showToast('Transaksi dan pembayaran terkait dihapus (jika ada)');}else showToast(resKas.message,'error');},
  cetakPDF(){const printArea=document.getElementById('kas-print-area');if(!printArea)return;const timestamp=formatDateTime(new Date());const cloned=printArea.cloneNode(true);const table=cloned.querySelector('table');if(table){const rows=table.querySelectorAll('tr');rows.forEach(row=>{const cells=row.querySelectorAll('th, td');if(cells.length>4)row.removeChild(cells[cells.length-1]);});}const wrapper=document.createElement('div');wrapper.style.padding='20px';wrapper.style.background='white';wrapper.style.color='black';wrapper.style.fontFamily='sans-serif';wrapper.innerHTML=`<h2 style="text-align:center;margin-bottom:5px;">Laporan Buku Kas</h2><p style="text-align:center;font-size:12px;color:#666;margin-bottom:20px;">Dicetak pada: ${timestamp}</p>`;wrapper.appendChild(cloned);html2pdf().set({margin:10,filename:'Buku_Kas_'+new Date().toISOString().slice(0,10)+'.pdf',html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(wrapper).save();}
};

// BIAYA
window.ekas.biaya={render(){const tb=document.getElementById('table-biaya');if(!tb)return;const canEdit=['superadmin','admin_suami'].includes(state.user.role);document.getElementById('biaya-add-btn').innerHTML=canEdit?`<button onclick="window.ekas.biaya.openModal()" class="bg-warning hover:bg-amber-600 text-white p-2 rounded-lg font-medium shadow-sm transition-colors" aria-label="Tambah Biaya"><i class="ph ph-plus text-lg" aria-hidden="true"></i></button>`:'';if(state.data.biaya.length===0){tb.innerHTML='<tr><td colspan="4" class="px-5 py-8 text-center text-gray-500">Belum ada biaya tambahan.</td></tr>';return;}tb.innerHTML=state.data.biaya.map(b=>{const wName=state.data.warga.find(w=>w['ID Warga']===b.WargaID)?.['Nama Istri']||b.WargaID;return`<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50"><td class="px-5 py-3 font-bold">${escHtml(wName)}</td><td class="px-5 py-3">${escHtml(b.NamaBiaya)}</td><td class="px-5 py-3 text-right font-bold">${formatRupiah(b.Nominal)}</td><td class="px-5 py-3 text-right space-x-1">${canEdit?`<button onclick="window.ekas.biaya.openModal('${escHtml(b.BiayaID)}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit" aria-label="Edit Biaya"><i class="ph ph-pencil-simple" aria-hidden="true"></i></button><button onclick="window.ekas.biaya.delete('${escHtml(b.BiayaID)}')" class="text-danger bg-red-50 p-2 rounded-lg" title="Hapus" aria-label="Hapus Biaya"><i class="ph ph-trash" aria-hidden="true"></i></button>`:''}</td></tr>`;}).join('');},openModal(id=null){if(!['superadmin','admin_suami'].includes(state.user.role))return;const b=id?state.data.biaya.find(x=>x.BiayaID===id):null;ModalHelper.open('tpl-modal-biaya',()=>{document.getElementById('modal-biaya-title').innerText=id?'Edit Biaya':'Tambah Biaya';document.getElementById('b-id').value=id||'';// ✅ Hanya warga aktif
document.getElementById('b-warga').innerHTML = getWargaAktif()
  .sort((a, b) => (a['Nama Istri'] || '').localeCompare(b['Nama Istri'] || ''))
  .map(w => `<option value="${escHtml(w['ID Warga'])}" ${b&&b.WargaID===w['ID Warga']?'selected':''}>${escHtml(w['Nama Istri'])} (${escHtml(w['No Rumah'])})</option>`)
  .join('');document.getElementById('b-nama').value=b?b.NamaBiaya||'':'';document.getElementById('b-nominal').value=b?formatAngkaInput(b.Nominal):'';if(b)document.getElementById('b-nominal').dataset.value=b.Nominal;});},async submit(e){e.preventDefault();const id=document.getElementById('b-id').value;const nominalInput=document.getElementById('b-nominal');const nominal=toNumber(nominalInput.dataset?.value||nominalInput.value.replace(/\./g,'')||0);const payload={biayaId:id||undefined,wargaId:document.getElementById('b-warga').value,namaBiaya:document.getElementById('b-nama').value,nominal};showLoading();const res=await fetchAPI('save_biaya',payload);hideLoading();if(res.success){window.closeAllModals();await loadData();showToast(id?'Biaya diperbarui':'Biaya ditambahkan');}else showToast(res.message,'error');},async delete(id){if(!(await showConfirmDialog('Hapus biaya ini?')))return;showLoading();const res=await fetchAPI('delete_biaya',{id});hideLoading();if(res.success){await loadData();showToast('Dihapus');}else showToast(res.message,'error');}};

// SETTING
window.ekas.setting={async save(e){e.preventDefault();if(state.user.role!=='superadmin'){showToast("Akses ditolak","error");return;}const payload={'Iuran Wajib':Number(document.getElementById('set-iuran').value),'Arisan Per Slot':Number(document.getElementById('set-arisan').value)};showLoading();const res=await fetchAPI('update_settings',payload);hideLoading();if(res.success){state.data.settings['Iuran Wajib']=payload['Iuran Wajib'];state.data.settings['Arisan Per Slot']=payload['Arisan Per Slot'];showToast('Pengaturan disimpan');}else showToast(res.message,'error');}};

// BUKU TABUNGAN
function updateRingkasanTabungan(){const now=new Date();const todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());const todayEnd=new Date(todayStart.getTime()+24*60*60*1000);let totalSaldo=0;state.data.warga.forEach(w=>{totalSaldo+=getSaldo(w['ID Warga']);});let wargaNabungCount=0;state.data.warga.forEach(w=>{if(getSaldo(w['ID Warga'])>0)wargaNabungCount++;});const todayTrx=state.data.transaksi.filter(t=>{const tgl=new Date(t.Tanggal);return tgl>=todayStart&&tgl<todayEnd;});let totalHariIni=0;todayTrx.forEach(t=>{if(t['Jenis Transaksi']==='Setoran')totalHariIni+=Number(t['Nominal']);});const elTotal=document.getElementById('buku-total-saldo'),elWarga=document.getElementById('buku-warga-nabung'),elHariIni=document.getElementById('buku-total-hari-ini');if(elTotal)elTotal.textContent=formatRupiah(totalSaldo);if(elWarga)elWarga.textContent=wargaNabungCount;if(elHariIni)elHariIni.textContent=formatRupiah(totalHariIni);}

function setupBukuTabungan(){if(!state.user)return;let sel=document.getElementById('select-buku-anggota');if(!sel)return;sel.innerHTML='<option value="">-- Pilih Warga --</option>';if(state.user.role==='user'){sel.innerHTML=`<option value="${escHtml(state.user['ID Warga'])}">${escHtml(state.user['ID Warga'])} - ${escHtml(state.user['Nama Istri'])}</option>`;sel.value=state.user['ID Warga'];document.getElementById('buku-selector-wrapper').classList.add('hidden');renderBukuTabungan();}else{document.getElementById('buku-selector-wrapper').classList.remove('hidden');const dataWarga = state.user.role === 'admin_istri' ? getWargaAktif() : state.data.warga;
const sorted = [...dataWarga].sort((a, b) => (a['Nama Istri'] || '').localeCompare(b['Nama Istri'] || ''));sorted.forEach(w=>{const namaIstri=w['Nama Istri']||'Tanpa Nama';const noRumah=w['No Rumah']||'-';sel.innerHTML+=`<option value="${escHtml(w['ID Warga'])}">${escHtml(namaIstri)} (${escHtml(noRumah)})</option>`;});updateRingkasanTabungan();}}

window.renderBukuTabungan=()=>{let id=document.getElementById('select-buku-anggota')?.value||state.user['ID Warga'];let area=document.getElementById('passbook-area'),emp=document.getElementById('passbook-empty');if(!id){if(area)area.classList.add('hidden');if(emp)emp.classList.remove('hidden');return;}if(area)area.classList.remove('hidden');if(emp)emp.classList.add('hidden');if(area)area.classList.add('flex');updateRingkasanTabungan();let w=state.data.warga.find(x=>String(x['ID Warga'])===String(id));if(!w){if(area)area.classList.add('hidden');if(emp)emp.classList.remove('hidden');showToast("Warga tidak ditemukan","error");return;}document.getElementById('buku-nama').innerText=escHtml(w['Nama Istri']);document.getElementById('buku-id').innerText=escHtml(w['ID Warga']||'-');document.getElementById('buku-norumah').innerText=escHtml(w['No Rumah']||'-');document.getElementById('buku-saldo').innerText=formatRupiah(getSaldo(id));let tb=document.getElementById('table-buku');tb.innerHTML='';let trx=state.data.transaksi.filter(t=>String(t['ID Anggota'])===String(id)).sort((x,y)=>new Date(x['Tanggal'])-new Date(y['Tanggal']));let sld=0;const canEdit=['superadmin','admin_istri'].includes(state.user.role);if(trx.length===0)tb.innerHTML='<tr><td colspan="6" class="p-6 text-center text-gray-500 italic">Belum ada mutasi</td></tr>';else trx.forEach(t=>{let isS=t['Jenis Transaksi']==='Setoran';let n=Number(t['Nominal']);sld+=isS?n:-n;tb.innerHTML+=`<tr class="border-b border-gray-100"><td class="p-3 text-xs text-gray-600 w-40">${formatDateTime(t['Tanggal'])}</td><td class="p-3"><span class="text-[10px] font-bold uppercase ${isS?'text-success':'text-danger'}">${escHtml(t['Jenis Transaksi'])}</span><br><span class="text-xs truncate block max-w-[200px]">${escHtml(t['Keterangan']||'-')}</span></td><td class="p-3 text-right text-success text-sm">${isS?formatRupiah(n):'-'}</td><td class="p-3 text-right text-danger text-sm">${!isS?formatRupiah(n):'-'}</td><td class="p-3 text-right font-bold text-sm bg-gray-50 dark:bg-gray-800/30">${formatRupiah(sld)}</td><td class="p-3 text-center"><div class="flex gap-1 justify-center">${canEdit?`<button onclick="editTransaksi('${escHtml(t['ID Transaksi'])}')" class="text-blue-500 bg-blue-50 p-1.5 rounded" title="Edit" aria-label="Edit Mutasi"><i class="ph ph-pencil-simple text-sm" aria-hidden="true"></i></button><button onclick="deleteTransaksi('${escHtml(t['ID Transaksi'])}')" class="text-danger bg-red-50 p-1.5 rounded" title="Hapus" aria-label="Hapus Mutasi"><i class="ph ph-trash text-sm" aria-hidden="true"></i></button>`:''}</div></td></tr>`;});};

window.cetakBukuTabunganPDF=function(){const id=document.getElementById('select-buku-anggota')?.value||state.user['ID Warga'];if(!id){showToast('Pilih warga terlebih dahulu','error');return;}const warga=state.data.warga.find(x=>String(x['ID Warga'])===String(id));if(!warga){showToast('Data warga tidak ditemukan','error');return;}const saldoAkhir=getSaldo(id);const transaksi=state.data.transaksi.filter(t=>String(t['ID Anggota'])===String(id)).sort((a,b)=>new Date(a['Tanggal'])-new Date(b['Tanggal']));const div=document.createElement('div');div.style.padding='20px';div.style.background='white';div.style.color='black';div.style.fontFamily='sans-serif';div.innerHTML=`<div style="text-align:center;margin-bottom:20px;"><h2 style="margin:0;font-size:20px;">BUKU TABUNGAN</h2><h3 style="margin:5px 0 0;font-size:16px;font-weight:normal;">Tabungan Ibu-Ibu RT</h3><hr style="margin:10px 0;"></div><table style="width:100%;font-size:12px;margin-bottom:20px;"><tr><td style="width:30%;font-weight:bold;">ID Warga</td><td>: ${escHtml(warga['ID Warga'])}</td></tr><tr><td style="font-weight:bold;">Nama Istri</td><td>: ${escHtml(warga['Nama Istri'])}</td></tr><tr><td style="font-weight:bold;">No Rumah</td><td>: ${escHtml(warga['No Rumah']||'-')}</td></tr><tr><td style="font-weight:bold;">Status</td><td>: ${escHtml(warga['Status']||'-')}</td></tr><tr><td style="font-weight:bold;">Saldo Akhir</td><td>: ${formatRupiah(saldoAkhir)}</td></tr></table><h4 style="font-size:14px;margin-bottom:10px;">Riwayat Mutasi</h4><table style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr style="background:#0F766E;color:white;"><th style="border:1px solid #ccc;padding:6px;">Tanggal</th><th style="border:1px solid #ccc;padding:6px;">Keterangan</th><th style="border:1px solid #ccc;padding:6px;text-align:right;">Debit</th><th style="border:1px solid #ccc;padding:6px;text-align:right;">Kredit</th><th style="border:1px solid #ccc;padding:6px;text-align:right;">Saldo</th></tr></thead><tbody>${transaksi.length===0?'<tr><td colspan="5" style="text-align:center;padding:15px;">Belum ada mutasi</td></tr>':(()=>{let saldoBerjalan=0;return transaksi.map(t=>{const isSetoran=t['Jenis Transaksi']==='Setoran';const nominal=Number(t['Nominal']);saldoBerjalan+=isSetoran?nominal:-nominal;return`<tr><td style="border:1px solid #ddd;padding:6px;">${formatDateTime(t['Tanggal'])}</td><td style="border:1px solid #ddd;padding:6px;"><strong>${escHtml(t['Jenis Transaksi'])}</strong><br><span style="font-size:10px;">${escHtml(t['Keterangan']||'-')}</span></td><td style="border:1px solid #ddd;padding:6px;text-align:right;color:green;">${isSetoran?formatRupiah(nominal):'-'}</td><td style="border:1px solid #ddd;padding:6px;text-align:right;color:red;">${!isSetoran?formatRupiah(nominal):'-'}</td><td style="border:1px solid #ddd;padding:6px;text-align:right;font-weight:bold;">${formatRupiah(saldoBerjalan)}</td></tr>`;}).join('');})()}</tbody></table><p style="text-align:right;margin-top:20px;font-size:10px;">Dicetak pada: ${formatDateTime(new Date())}</p>`;html2pdf().set({margin:10,filename:'Buku_Tabungan_'+id+'_'+Date.now()+'.pdf',html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(div).save();};

// PROFILE
window.previewProfilePhoto=function(e){const file=e.target.files&&e.target.files[0];if(!file)return;if(!file.type.startsWith('image/')){showToast("File harus berupa gambar","error");e.target.value='';return;}const reader=new FileReader();reader.onload=()=>{const preview=document.getElementById('profile-photo-preview');if(preview)preview.innerHTML=`<img src="${reader.result}" class="h-24 w-24 rounded-2xl object-cover border border-gray-200 dark:border-gray-700 shadow-lg" alt="Preview Foto">`;};reader.readAsDataURL(file);};

function resizeProfilePhoto(file){return new Promise((resolve,reject)=>{if(!file){resolve(null);return;}if(!file.type.startsWith('image/')){reject(new Error("File harus gambar."));return;}const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{const size=512;const canvas=document.createElement('canvas');canvas.width=size;canvas.height=size;const ctx=canvas.getContext('2d');const scale=Math.max(size/img.width,size/img.height);ctx.drawImage(img,(size-img.width*scale)/2,(size-img.height*scale)/2,img.width*scale,img.height*scale);resolve({name:file.name,mimeType:'image/jpeg',data:canvas.toDataURL('image/jpeg',0.82)});};img.src=reader.result;};reader.readAsDataURL(file);});}

window.openProfileModal=function(){const user=state.user;ModalHelper.open('tpl-modal-profile',()=>{document.getElementById('profile-photo-preview').innerHTML=avatarMarkup(state.user,'h-24 w-24');document.getElementById('profile-name-display').innerText=escHtml(user['Nama Istri']||user['Nama Suami']||'-');document.getElementById('profile-id-display').innerText=escHtml(user['ID Warga']||'-');document.getElementById('profile-role-display').innerText=getRoleLabel(user.role);document.getElementById('p-suami').value=user['Nama Suami']||'';document.getElementById('p-istri').value=user['Nama Istri']||'';document.getElementById('p-rumah').value=user['No Rumah']||'';document.getElementById('p-hp-suami').value=user['No HP Suami']||'';document.getElementById('p-hp-istri').value=user['No HP Istri']||'';document.getElementById('f-p-password').value='';document.getElementById('f-p-password2').value='';});};

window.submitProfile=async(e)=>{e.preventDefault();const password=document.getElementById('f-p-password').value.trim();const password2=document.getElementById('f-p-password2').value.trim();const file=document.getElementById('f-p-photo').files[0];const namaSuami=document.getElementById('p-suami').value.trim();const namaIstri=document.getElementById('p-istri').value.trim();const noRumah=document.getElementById('p-rumah').value.trim();const noHpSuami=document.getElementById('p-hp-suami').value.trim();const noHpIstri=document.getElementById('p-hp-istri').value.trim();if(password||password2){if(password.length<4){showToast("Password minimal 4 karakter","error");return;}if(password!==password2){showToast("Konfirmasi password tidak sama","error");return;}}if(!namaIstri){showToast("Nama Istri tidak boleh kosong","error");return;}if(!noRumah){showToast("No Rumah tidak boleh kosong","error");return;}let photo=null;try{photo=file?await resizeProfilePhoto(file):null;}catch(err){showToast(err.message||"Gagal memproses foto","error");return;}const payload={namaSuami,namaIstri,noRumah,noHpSuami,noHpIstri,password:password||undefined,photo};showLoading();const res=await fetchAPI('update_profile',payload);hideLoading();if(!res.success){showToast(res.message||"Gagal memperbarui profil","error");return;}state.user={...state.user,...(res.data||{}),role:state.user.role||normalizeRole(res.data?.Role)};state.user['Nama Suami']=namaSuami;state.user['Nama Istri']=namaIstri;state.user['No Rumah']=noRumah;state.user['No HP Suami']=noHpSuami;state.user['No HP Istri']=noHpIstri;if(res.data&&res.data['Foto Profil'])state.user['Foto Profil']=res.data['Foto Profil'];persistSession();document.body.setAttribute('data-role',state.user.role);showToast("Profil diperbarui");window.closeAllModals();await loadData();};
</script>
