      if(role==='admin_istri') return `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50 dark:border-gray-800/50"><td class="p-2 md:p-4 font-medium">${escHtml(w['Nama Istri'])}</td><td class="p-2 md:p-4">${escHtml(w['No Rumah'])}</td><td class="p-2 md:p-4 font-bold text-gray-700 dark:text-gray-200">${formatRupiah(saldo)}</td><td class="p-2 md:p-4 text-center">${aksi}</td></tr>`;
      else if(role==='admin_suami') return `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50 dark:border-gray-800/50"><td class="p-2 md:p-4 font-medium">${escHtml(w['Nama Suami'])}</td><td class="p-2 md:p-4">${escHtml(w['No Rumah'])}</td><td class="p-2 md:p-4 text-xs">Iuran: <span class="${iuran==='YA'?'text-success':'text-danger'} font-bold">${escHtml(iuran)}</span><br>Arisan: <span class="text-primary">${arisan==='YA'? escHtml(slot)+' Slot' : 'TIDAK'}</span></td><td class="p-2 md:p-4 font-bold ${totalTunggakan > 0 ? 'text-danger' : 'text-success'}">${totalTunggakan > 0 ? formatRupiah(totalTunggakan) + ' (' + tunggakanList.length + ' bln)' : 'Lunas'}</td><td class="p-2 md:p-4 text-center">${aksi}</td></tr>`;
      else return `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50 dark:border-gray-800/50"><td class="p-2 md:p-4 text-xs font-mono text-primary">${escHtml(w['ID Warga'])}</td><td class="p-2 md:p-4 font-medium">${escHtml(w['Nama Suami'])}</td><td class="p-2 md:p-4 font-medium">${escHtml(w['Nama Istri'])}</td><td class="p-2 md:p-4">${escHtml(w['No Rumah'])}</td><td class="p-2 md:p-4 text-xs">Iuran: <span class="${iuran==='YA'?'text-success':'text-danger'} font-bold">${escHtml(iuran)}</span><br>Arisan: <span class="text-primary">${arisan==='YA'? escHtml(slot)+' Slot' : 'TIDAK'}</span></td><td class="p-2 md:p-4 font-bold text-gray-700 dark:text-gray-200">${formatRupiah(saldo)}</td><td class="p-2 md:p-4 font-bold ${totalTunggakan > 0 ? 'text-danger' : 'text-success'}">${totalTunggakan > 0 ? formatRupiah(totalTunggakan) + ' (' + tunggakanList.length + ' bln)' : 'Lunas'}</td><td class="p-2 md:p-4 text-center">${aksi}</td></tr>`;
    }).join('');
  },
  openModal(id=null) {
    if(!['superadmin','admin_istri','admin_suami'].includes(state.user.role)) return;
    const w = id ? state.data.warga.find(x=>x['ID Warga']===id) : null, isEdit = !!id, isSuperadmin = state.user.role==='superadmin';
    ModalHelper.open('tpl-modal-warga', () => {
      document.getElementById('modal-warga-title').innerText = isEdit ? 'Edit Warga' : 'Tambah Warga';
      document.getElementById('w-id').value = id||'';
      document.getElementById('w-suami').value = w?w['Nama Suami']||'':'';
      document.getElementById('w-istri').value = w?w['Nama Istri']||'':'';
      document.getElementById('w-rumah').value = w?w['No Rumah']||'':'';
      document.getElementById('w-hp-suami').value = w?w['No HP Suami']||'':'';
      document.getElementById('w-hp-istri').value = w?w['No HP Istri']||'':'';
      document.getElementById('w-iuran').value = w&&w['Bayar Iuran?']==='TIDAK'?'TIDAK':'YA';
      document.getElementById('w-arisan').value = w&&w['Ikut Arisan?']==='TIDAK'?'TIDAK':'YA';
      document.getElementById('w-slot').value = w?w['Slot Arisan']||'1':'1';
      document.getElementById('w-password').value = '';
      document.getElementById('w-role-container').style.display = isSuperadmin ? '' : 'none';
      document.getElementById('w-role').value = w?w['Role']||'user':'user';
      document.getElementById('w-status-container').style.display = (!isSuperadmin || isEdit) ? '' : 'none';
      document.getElementById('w-status').value = w&&w.Status==='Nonaktif'?'Nonaktif':'Aktif';
    });
  },
  async submit(e) {
    e.preventDefault();
    if(!['superadmin','admin_istri','admin_suami'].includes(state.user.role)) return;
    const isSuperadmin = state.user.role==='superadmin';
    const payload = { id: document.getElementById('w-id').value, namaSuami: document.getElementById('w-suami').value, namaIstri: document.getElementById('w-istri').value, noRumah: document.getElementById('w-rumah').value, noHpSuami: document.getElementById('w-hp-suami').value, noHpIstri: document.getElementById('w-hp-istri').value, bayarIuran: document.getElementById('w-iuran').value, ikutArisan: document.getElementById('w-arisan').value, slotArisan: Number(document.getElementById('w-slot').value), password: document.getElementById('w-password').value, role: isSuperadmin ? document.getElementById('w-role').value : 'user', status: document.getElementById('w-status') ? document.getElementById('w-status').value : 'Aktif' };
    showLoading();
    const res = await fetchAPI('save_warga', payload);
    hideLoading();
    if(res.success) { window.closeAllModals(); await loadData(); showToast(res.generatedPassword ? 'Data warga tersimpan. Password: ' + res.generatedPassword : 'Data warga tersimpan'); }
    else showToast(res.message, 'error');
  },
  async delete(id) {
    if(!['superadmin','admin_istri','admin_suami'].includes(state.user.role)) return;
    if(!(await showConfirmDialog('Hapus warga ini?'))) return;
    showLoading();
    const res = await fetchAPI('delete_warga', { id });
    hideLoading();
    if(res.success) { await loadData(); showToast('Dihapus'); }
    else showToast(res.message, 'error');
  }
};
</script>

<!-- ==================== JAVASCRIPT: TRANSAKSI ==================== -->
<script>
function renderTransaksi(filter='Semua') {
  const tb = document.getElementById('table-transaksi'); if(!tb) return; tb.innerHTML = '';
  const canEdit = ['superadmin','admin_istri'].includes(state.user.role);
  document.getElementById('trx-add-btn').innerHTML = canEdit ? `<button class="bg-primary hover:bg-primary-dark text-white px-3 py-2 rounded-xl flex items-center gap-1.5 shadow-sm whitespace-nowrap w-full sm:w-auto justify-center text-xs font-medium transition-colors" onclick="openModalTransaksi()" aria-label="Transaksi Baru"><i class="ph ph-plus-circle text-sm" aria-hidden="true"></i> <span>Transaksi Baru</span></button>` : '';
  
  const filterBtns = document.getElementById('trx-filter-btns');
  if(filterBtns) filterBtns.innerHTML = `<button class="px-4 py-1.5 rounded-full ${filter==='Semua'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300'} text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="renderTransaksi('Semua')">Semua</button><button class="px-4 py-1.5 rounded-full ${filter==='Setoran'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300'} text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="renderTransaksi('Setoran')">Setoran</button><button class="px-4 py-1.5 rounded-full ${filter==='Penarikan'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300'} text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="renderTransaksi('Penarikan')">Penarikan</button>`;
  
  const thead = document.getElementById('transaksi-thead'), showTrxId = state.user.role !== 'admin_istri';
  thead.innerHTML = `<tr><th class="p-2 md:p-4 w-28 md:w-40">Waktu</th>${showTrxId?'<th class="p-2 md:p-4 hidden md:table-cell">ID Trx</th>':''}<th class="p-2 md:p-4">Warga</th><th class="p-2 md:p-4">Jenis</th><th class="p-2 md:p-4">Nominal</th><th class="p-2 md:p-4 text-center">Aksi</th></tr>`;
  
  let d = state.data.transaksi; if(filter!=='Semua') d = d.filter(t=>t['Jenis Transaksi']===filter);
  d.sort((a,b)=>new Date(b['Tanggal'])-new Date(a['Tanggal']));
  
  if(d.length===0) { tb.innerHTML = `<tr><td colspan="${showTrxId?6:5}" class="p-8 text-center text-gray-500">Belum ada transaksi</td></tr>`; return; }
  
  d.forEach(t => { const isSetoran = t['Jenis Transaksi']==='Setoran', c = isSetoran?'text-success':'text-danger', ic = isSetoran?'ph-arrow-down-left':'ph-arrow-up-right'; tb.innerHTML += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50 dark:border-gray-800/50"><td class="p-2 md:p-4 text-gray-500 text-xs w-28 md:w-40">${formatDateTime(t['Tanggal'])}</td>${showTrxId?`<td class="p-2 md:p-4 font-mono text-[10px] md:text-xs hidden md:table-cell">${escHtml(t['ID Transaksi'])}</td>`:''}<td class="p-2 md:p-4 font-medium">${escHtml(t['Nama Anggota'])}</td><td class="p-2 md:p-4"><span class="flex items-center gap-1 text-xs font-bold ${c}"><i class="ph ${ic}" aria-hidden="true"></i> ${escHtml(t['Jenis Transaksi'])}</span></td><td class="p-2 md:p-4 font-bold ${c}">${formatRupiah(t['Nominal'])}</td><td class="p-2 md:p-4 text-center space-x-1">${canEdit?`<button onclick="editTransaksi('${escHtml(t['ID Transaksi'])}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit" aria-label="Edit Transaksi"><i class="ph ph-pencil-simple" aria-hidden="true"></i></button><button onclick="deleteTransaksi('${escHtml(t['ID Transaksi'])}')" class="text-danger bg-red-50 hover:bg-red-100 dark:bg-red-900/30 p-2 rounded-lg" title="Hapus" aria-label="Hapus Transaksi"><i class="ph ph-trash" aria-hidden="true"></i></button>`:''}</td></tr>`; });
}

function openModalTransaksi(editData=null) {
  if(!['superadmin','admin_istri'].includes(state.user.role)) return;
  ModalHelper.open('tpl-modal-transaksi', () => {
    const isEdit = !!editData;
    document.getElementById('modal-trx-title').innerText = isEdit ? 'Edit Transaksi' : 'Transaksi Baru';
    const sel = document.getElementById('f-t-warga');
    let opts = '<option value="">-- Pilih Warga --</option>';
    if(state.user.role==='admin_istri') { 
    getWargaAktif().sort((a,b)=>(a['Nama Istri']||'').localeCompare(b['Nama Istri']||'')).forEach(w=>opts+=`<option value="${escHtml(w['ID Warga'])}" ${editData&&editData['ID Anggota']===w['ID Warga']?'selected':''}>${escHtml(w['Nama Istri'])} (${escHtml(w['No Rumah'])})</option>`); 
    }
    else { state.data.warga.forEach(w=>opts+=`<option value="${escHtml(w['ID Warga'])}" ${editData&&editData['ID Anggota']===w['ID Warga']?'selected':''}>${escHtml(w['ID Warga'])} - ${escHtml(w['Nama Istri'])}</option>`); }
    sel.innerHTML = opts;
    
    const defaultJenis = editData?editData['Jenis Transaksi']:'Setoran';
    document.querySelector('input[name="f-t-jenis"][value="Setoran"]').checked = defaultJenis==='Setoran';
    document.querySelector('input[name="f-t-jenis"][value="Penarikan"]').checked = defaultJenis==='Penarikan';
    
    const nominalInput = document.getElementById('f-t-nominal');
    nominalInput.value = editData ? formatAngkaInput(editData['Nominal']) : '';
    nominalInput.dataset.value = editData ? editData['Nominal'] : '';
    nominalInput.addEventListener('input', formatInputRibuan);
    
    document.getElementById('f-t-ket').value = editData?(editData['Keterangan']||''):'';
    
    // Update form onsubmit
    const form = document.querySelector('#tpl-modal-transaksi form') || document.querySelector('#modals form');
    if (form) form.onsubmit = function(e) { submitTransaksi(e, editData?editData['ID Transaksi']:''); };
  });
}

function editTransaksi(idTransaksi) {
  if(!['superadmin','admin_istri'].includes(state.user.role)) return;
  const trx = state.data.transaksi.find(t=>t['ID Transaksi']===idTransaksi);
  if(!trx) return showToast('Transaksi tidak ditemukan', 'error');
  openModalTransaksi(trx);
}

async function submitTransaksi(e, editId='') {
  e.preventDefault();
  const idWarga = document.getElementById('f-t-warga').value;
  const warga = state.data.warga.find(w=>w['ID Warga']===idWarga);
  if(!warga) { showToast("Pilih warga", "error"); return; }
  const nominalInput = document.getElementById('f-t-nominal');
  const nominal = toNumber(nominalInput.dataset?.value || nominalInput.value.replace(/\./g,'') || '0');
  if(nominal<=0) { showToast("Nominal > 0", "error"); return; }
  const payload = { idTransaksi: editId||undefined, idAnggota: idWarga, namaAnggota: warga['Nama Istri'], jenis: document.querySelector('input[name="f-t-jenis"]:checked').value, nominal, keterangan: document.getElementById('f-t-ket').value };
  showLoading();
  const res = await fetchAPI('save_transaksi', payload);
  hideLoading();
  if(!res.success) { showToast(res.message||"Gagal", "error"); return; }
  showToast(editId?"Transaksi diperbarui":"Transaksi berhasil");
  window.closeAllModals();
  await loadData();
}

async function deleteTransaksi(id) {
  if(!(await showConfirmDialog("Hapus transaksi ini?"))) return;
  showLoading();
  const res = await fetchAPI('delete_transaksi', { id });
  hideLoading();
  if(res.success) { await loadData(); showToast('Transaksi dihapus'); }
  else showToast(res.message, "error");
}
</script>

<!-- ==================== JAVASCRIPT: PEMBAYARAN & TUNGGAKAN ==================== -->
<script>
window.ekas.pembayaran = {
render() {
    const sel = document.getElementById('pay-warga'); if(!sel) return;
    const tunggakanMap = {};
    state.data.tunggakan.forEach(t => { if(!tunggakanMap[t['ID Warga']]) tunggakanMap[t['ID Warga']]=0; tunggakanMap[t['ID Warga']]+=Number(t['Iuran']||0)+Number(t['Arisan']||0); });
    
    // ✅ Gunakan helper functions untuk konsistensi
    let wargaList;
    if (['admin_suami', 'superadmin'].includes(state.user.role)) {
        wargaList = getWargaWithKewajiban();
        wargaList.sort((a, b) => (a['Nama Suami'] || '').localeCompare(b['Nama Suami'] || ''));
    } else {
        wargaList = getWargaAktif();
        wargaList.sort((a, b) => (a['Nama Istri'] || '').localeCompare(b['Nama Istri'] || ''));
    }
    
    sel.innerHTML = '<option value="">-- Pilih Warga --</option>' + wargaList.map(w => {
        const adaTunggakan = tunggakanMap[w['ID Warga']] > 0;
        const namaTampil = ['admin_suami', 'superadmin'].includes(state.user.role) 
            ? `${w['Nama Suami']} (${w['No Rumah']})` 
            : `${w['Nama Istri']} (${w['No Rumah']})`;
        return `<option value="${escHtml(w['ID Warga'])}">${escHtml(namaTampil)}${adaTunggakan ? ' ⚠️ Nunggak' : ''}</option>`;
    }).join('');
    
    const tb = document.getElementById('table-pembayaran');
    let pay = [...(state.data.pembayaran||[])].sort((a,b)=>new Date(b.Tanggal)-new Date(a.Tanggal));
    const canEdit = ['superadmin','admin_suami'].includes(state.user.role);
    const saveBtn = document.getElementById('btn-save-pay'); if(saveBtn) { saveBtn.disabled=!canEdit; saveBtn.classList.toggle('opacity-50',!canEdit); }
    
    const thead = document.getElementById('pembayaran-thead');
    if(thead) thead.innerHTML = `<tr><th class="px-5 py-4">Warga</th><th class="px-5 py-4">Periode</th><th class="px-5 py-4">Rincian</th><th class="px-5 py-4">Total</th>${canEdit?'<th class="px-5 py-4 text-right">Aksi</th>':''}</tr>`;
    
    if(pay.length===0) { const colspan = canEdit?5:4; tb.innerHTML = `<tr><td colspan="${colspan}" class="px-5 py-10 text-center text-gray-500">Belum ada pembayaran.</td></tr>`; }
    else tb.innerHTML = pay.map(p=>{ const wName = state.data.warga.find(w=>w['ID Warga']===p.WargaID)?.['Nama Suami']||p.WargaID; return `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50"><td class="px-5 py-3"><div class="font-bold">${escHtml(wName)}</div><div class="text-xs text-gray-500">${formatDateTime(p.Tanggal)}</div></td><td class="px-5 py-3">${escHtml(p.Bulan)} ${escHtml(p.Tahun)}</td><td class="px-5 py-3 text-xs">Iur:${escHtml(p.Iuran)} Ars:${escHtml(p.Arisan)} Tmb:${escHtml(p.Tambahan)}</td><td class="px-5 py-3 font-black text-success">${formatRupiah(p.Total)}</td>${canEdit?`<td class="px-5 py-3 text-right space-x-1"><button onclick="window.ekas.pembayaran.openEdit('${escHtml(p.PayID)}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit" aria-label="Edit Pembayaran"><i class="ph ph-pencil-simple" aria-hidden="true"></i></button><button onclick="window.ekas.pembayaran.delete('${escHtml(p.PayID)}')" class="text-danger bg-red-50 p-2 rounded-lg" title="Hapus" aria-label="Hapus Pembayaran"><i class="ph ph-trash" aria-hidden="true"></i></button></td>`:''}</tr>`; }).join('');
    
    // Tiga tombol aksi tunggakan
    const btnsDiv = document.getElementById('pembayaran-tunggakan-btns');
    if(btnsDiv && ['superadmin','admin_suami'].includes(state.user.role)) {
      btnsDiv.innerHTML = `
        <button onclick="window.ekas.pembayaran.openTunggakanModal()" class="flex-1 bg-warning hover:bg-amber-600 text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors" aria-label="Catat Tunggakan Manual">
          <i class="ph ph-clock-counter-clockwise mr-1" aria-hidden="true"></i> Catat Tunggakan
        </button>
        <button onclick="window.ekas.pembayaran.openHapusTunggakanModal()" class="flex-1 bg-danger hover:bg-red-700 text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors" aria-label="Hapus Tunggakan">
          <i class="ph ph-trash mr-1" aria-hidden="true"></i> Hapus Tunggakan
        </button>
        <button onclick="window.ekas.pembayaran.updateSemuaTunggakan()" class="w-full bg-primary hover:bg-primary-dark text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors mt-1" aria-label="Update Tunggakan Bulan Ini">
          <i class="ph ph-arrows-clockwise mr-1" aria-hidden="true"></i> Update Tunggakan Bulan Ini
        </button>`;
    } else if(btnsDiv) btnsDiv.innerHTML = '';
  },
  openEdit(payId) {
    const p = state.data.pembayaran.find(x=>x.PayID===payId); if(!p) return;
    document.getElementById('pay-warga').value = p.WargaID;
    document.getElementById('pay-bulan').value = p.Bulan;
    document.getElementById('pay-tahun').value = p.Tahun;
    this.calculate();
    const btn = document.getElementById('btn-save-pay'); btn.innerText='Update Pembayaran'; btn.dataset.editId=payId;
  },
  calculate() {
    const wId = document.getElementById('pay-warga').value;
    const w = state.data.warga.find(x=>x['ID Warga']===wId);
    let iuran=0, arisan=0, tambahan=0;
    if(w) { if(w['Bayar Iuran?']==='YA') iuran = Number(state.data.settings['Iuran Wajib']||0); if(w['Ikut Arisan?']==='YA') arisan = (Number(w['Slot Arisan'])||0)*(Number(state.data.settings['Arisan Per Slot']||0)); state.data.biaya.forEach(b=>{ if(b.WargaID===wId) tambahan+=Number(b.Nominal); }); }
    document.getElementById('pay-iuran-val').innerText=formatRupiah(iuran);
    document.getElementById('pay-arisan-val').innerText=formatRupiah(arisan);
    document.getElementById('pay-tambahan-val').innerText=formatRupiah(tambahan);
    document.getElementById('pay-total-val').innerText=formatRupiah(iuran+arisan+tambahan);
    document.getElementById('pay-total-val').dataset.val=iuran+arisan+tambahan;
  },
  async submit(e) {
    e.preventDefault();
    const wId = document.getElementById('pay-warga').value; if(!wId) return showToast('Pilih warga!','error');
    const total = Number(document.getElementById('pay-total-val').dataset.val); if(total<=0) return showToast('Total Rp0','error');
    const btn = document.getElementById('btn-save-pay'), isEdit = btn.dataset.editId;
    const payload = { payId: isEdit||undefined, wargaId: wId, bulan: document.getElementById('pay-bulan').value, tahun: document.getElementById('pay-tahun').value, iuran: Number(document.getElementById('pay-iuran-val').innerText.replace(/\D/g,'')), arisan: Number(document.getElementById('pay-arisan-val').innerText.replace(/\D/g,'')), tambahan: Number(document.getElementById('pay-tambahan-val').innerText.replace(/\D/g,'')), total };
    showLoading();
    const res = await fetchAPI('save_pembayaran', payload);
    hideLoading();
    if(res.success) { await loadData(); document.getElementById('form-pembayaran').reset(); btn.innerText='Simpan Pembayaran'; delete btn.dataset.editId; window.ekas.pembayaran.render(); showToast(isEdit?'Pembayaran diperbarui':'Pembayaran disimpan!'); }
    else showToast(res.message,'error');
  },
  async delete(id) { if(!(await showConfirmDialog('Hapus pembayaran ini? Data terkait di Buku Kas juga akan dihapus.'))) return; showLoading(); const res = await fetchAPI('delete_pembayaran',{id}); hideLoading(); if(res.success){await loadData();showToast('Dihapus');}else showToast(res.message,'error'); },
  
  // ==================== TUNGGAKAN MANUAL ====================
openTunggakanModal() {
    if (!['superadmin', 'admin_suami'].includes(state.user.role)) return;
    
    ModalHelper.open('tpl-modal-tunggakan', () => {
      const sel = document.getElementById('tung-warga');
      
      // ✅ Gunakan helper function
      const wargaAktif = getWargaAktif().sort((a, b) => (a['Nama Suami'] || '').localeCompare(b['Nama Suami'] || ''));
      
      if (wargaAktif.length === 0) {
        sel.innerHTML = '<option value="">-- Tidak ada warga aktif --</option>';
        return;
      }
      
      sel.innerHTML = '<option value="">-- Pilih Warga --</option>' + 
        wargaAktif.map(w => {
          const namaSuami = w['Nama Suami'] || 'Tanpa Nama';
          const noRumah = w['No Rumah'] || '-';
          return `<option value="${escHtml(w['ID Warga'])}">${escHtml(namaSuami)} (${escHtml(noRumah)})</option>`;
        }).join('');
      
      // Set tahun default ke tahun sekarang
      const tahunInput = document.getElementById('tung-tahun');
      if (tahunInput) {
        tahunInput.value = new Date().getFullYear();
      }
      
      // Attach event listener untuk checkbox bulan
      const bulanContainer = document.getElementById('bulan-container');
      if (bulanContainer) {
        // Hapus listener lama jika ada
        const newBulanContainer = bulanContainer.cloneNode(true);
        bulanContainer.parentNode.replaceChild(newBulanContainer, bulanContainer);
        
        newBulanContainer.addEventListener('change', () => {
          window.ekas.pembayaran.updateTotalTunggakan();
        });
      }
      
      // Hitung nominal awal
      window.ekas.pembayaran.hitungNominalTunggakan();
    });
},
  
  hitungNominalTunggakan() {
    const wId = document.getElementById('tung-warga')?.value;
    const w = wId ? state.data.warga.find(x=>x['ID Warga']===wId) : null;
    let iuran = 0, arisan = 0, tambahan = 0;
    
    if(w) {
      if(w['Bayar Iuran?']==='YA') iuran = Number(state.data.settings['Iuran Wajib']||0);
      if(w['Ikut Arisan?']==='YA') arisan = (Number(w['Slot Arisan'])||0) * (Number(state.data.settings['Arisan Per Slot']||0));
      state.data.biaya.filter(b=>b.WargaID===wId).forEach(b=>tambahan+=Number(b.Nominal));
    }
    
    const iuranInput = document.getElementById('tung-iuran');
    const arisanInput = document.getElementById('tung-arisan');
    const tambahanContainer = document.getElementById('tung-tambahan-container');
    const tambahanInput = document.getElementById('tung-tambahan');
    
    if(iuranInput) { iuranInput.value = formatAngkaInput(iuran); iuranInput.dataset.value = iuran; }
    if(arisanInput) { arisanInput.value = formatAngkaInput(arisan); arisanInput.dataset.value = arisan; }
    
    if(tambahan > 0) {
      if(tambahanContainer) tambahanContainer.classList.remove('hidden');
      if(tambahanInput) { tambahanInput.value = formatAngkaInput(tambahan); tambahanInput.dataset.value = tambahan; }
    } else {
      if(tambahanContainer) tambahanContainer.classList.add('hidden');
      if(tambahanInput) { tambahanInput.value = '0'; tambahanInput.dataset.value = 0; }
    }
    
    this.updateTotalTunggakan();
  },
  
  updateTotalTunggakan() {
    const checked = document.querySelectorAll('.tung-bulan-cb:checked').length;
    const iuran = toNumber(document.getElementById('tung-iuran')?.dataset?.value || 0);
    const arisan = toNumber(document.getElementById('tung-arisan')?.dataset?.value || 0);
    const tambahan = toNumber(document.getElementById('tung-tambahan')?.dataset?.value || 0);
    const total = (iuran + arisan + tambahan) * checked;
    
    const jumlahEl = document.getElementById('tung-jumlah-bulan');
    const totalEl = document.getElementById('tung-total');
    if(jumlahEl) jumlahEl.innerText = checked;
    if(totalEl) totalEl.innerText = formatRupiah(total);
  },
  
  async submitTunggakan(e) {
    e.preventDefault();
    const wId = document.getElementById('tung-warga').value;
    const tahun = Number(document.getElementById('tung-tahun').value);
    const checked = [...document.querySelectorAll('.tung-bulan-cb:checked')].map(cb=>cb.value);
    
    if(!wId || checked.length===0) return showToast('Pilih warga dan minimal satu bulan!','error');
    
    const iuran = toNumber(document.getElementById('tung-iuran').dataset?.value || 0);
    const arisan = toNumber(document.getElementById('tung-arisan').dataset?.value || 0);
    const tambahan = toNumber(document.getElementById('tung-tambahan')?.dataset?.value || 0);
    
    showLoading();
    let success = true;
    for(const bulan of checked) {
      const res = await fetchAPI('save_tunggakan_manual', { wargaId: wId, bulan, tahun, iuran, arisan, tambahan });
      if(!res.success) {
        success = false;
        showToast(res.message + ' (' + bulan + ')', 'error');
        break;
      }
    }
    hideLoading();
    
    if(success) {
      window.closeAllModals();
      await loadData();
      showToast(checked.length + ' tunggakan berhasil dicatat');
    }
  },
  
// ==================== HAPUS TUNGGAKAN ====================
openHapusTunggakanModal() {
    if (!['superadmin', 'admin_suami'].includes(state.user.role)) return;
    
    // ✅ Gunakan helper function
    const wargaAktifIds = getWargaAktifIds();
    
    const list = (state.data.tunggakan || []).filter(t => wargaAktifIds.has(t['ID Warga']));
    
    if (list.length === 0) {
      showToast('Tidak ada data tunggakan untuk warga aktif', 'error');
      return;
    }
    
    ModalHelper.open('tpl-modal-hapus-tunggakan', () => {
      const tbody = document.getElementById('table-hapus-tunggakan-body');
      tbody.innerHTML = list.map(t => {
        const w = state.data.warga.find(x => x['ID Warga'] === t['ID Warga']);
        const nama = w ? (w['Nama Suami'] || w['Nama Istri'] || t['ID Warga']) : t['ID Warga'];
        const noRumah = w ? w['No Rumah'] || '-' : '-';
        
        return `<tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
          <td class="p-2">
            <input type="checkbox" class="tung-hapus-cb rounded border-gray-300 text-primary focus:ring-primary" value="${escHtml(t['ID Tunggakan'])}">
          </td>
          <td class="p-2 text-xs font-mono">${escHtml(t['ID Tunggakan'] || '-')}</td>
          <td class="p-2 font-medium">
            <div>${escHtml(nama)}</div>
            <div class="text-xs text-gray-500">${escHtml(noRumah)}</div>
          </td>
          <td class="p-2">${escHtml(t['Bulan'])} ${escHtml(t['Tahun'])}</td>
          <td class="p-2 text-right font-bold">${formatRupiah(Number(t['Iuran'] || 0) + Number(t['Arisan'] || 0))}</td>
        </tr>`;
      }).join('');
      
      // Select all checkbox
      const pilihSemua = document.getElementById('pilih-semua');
      if (pilihSemua) {
        // Hapus event listener lama dengan clone
        const newPilihSemua = pilihSemua.cloneNode(true);
        pilihSemua.parentNode.replaceChild(newPilihSemua, pilihSemua);
        
        newPilihSemua.addEventListener('change', (e) => {
          document.querySelectorAll('.tung-hapus-cb').forEach(cb => {
            cb.checked = e.target.checked;
          });
        });
      }
    });
  },
  
  async hapusTerpilih() {
    const selected = [...document.querySelectorAll('.tung-hapus-cb:checked')].map(cb=>cb.value);
    if(selected.length === 0) return showToast('Pilih tunggakan dulu!','error');
    
    const result = await showConfirmDialog('Hapus ' + selected.length + ' tunggakan terpilih?', {
      confirmText: 'Hapus', cancelText: 'Batal', showCheckbox: true, checkboxLabel: 'Catat sebagai pemasukan di Buku Kas?'
    });
    
    if(!result || !result.confirmed) return;
    const catatPemasukan = result.checked;
    
    showLoading();
    let allOk = true;
    for(const id of selected) {
      const res = await fetchAPI('delete_tunggakan', { id, catatPemasukan });
      if(!res.success) { allOk = false; showToast(res.message, 'error'); break; }
    }
    hideLoading();
    
    if(allOk) {
      window.closeAllModals();
      await loadData();
      showToast(selected.length + ' tunggakan dihapus' + (catatPemasukan ? ' dan pemasukan dicatat' : ''));
    }
  },
  
  async updateSemuaTunggakan() {
    const ok = await showConfirmDialog('Tambahkan tunggakan untuk bulan ini kepada semua warga yang memiliki kewajiban?', { confirmText: 'Update', cancelText: 'Batal' });
    if(!ok) return;
    showLoading();
    const res = await fetchAPI('update_tunggakan_bulan_ini', {});
    hideLoading();
    if(res.success) { await loadData(); showToast(res.message||'Tunggakan bulan ini ditambahkan'); }
    else showToast(res.message, 'error');
  }
};
</script>

<script>

window.ekas.kas = {

    const thead=document.getElementById('kas-thead'); if(thead) thead.innerHTML=`<tr><th class="px-6 py-4">Tanggal</th><th class="px-6 py-4">Kategori</th><th class="px-6 py-4">Keterangan</th><th class="px-6 py-4 text-right">Nominal</th>${canEdit?'<th class="px-6 py-4 text-right">Aksi</th>':''}</tr>`;
    if(kas.length===0){const colspan=canEdit?5:4;tb.innerHTML=`<tr><td colspan="${colspan}" class="px-6 py-10 text-center text-gray-500">Belum ada transaksi.</td></tr>`;}
    else tb.innerHTML=kas.map(k=>{const isMasuk=k.Jenis==='Pemasukan';const aksiHtml=canEdit?`<td class="px-6 py-4 text-right space-x-1"><button onclick="window.ekas.kas.openModal(null,'${escHtml(k.KasID)}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit" aria-label="Edit Kas"><i class="ph ph-pencil-simple" aria-hidden="true"></i></button><button onclick="window.ekas.kas.delete('${escHtml(k.KasID)}')" class="text-danger bg-red-50 p-2 rounded-lg" title="Hapus" aria-label="Hapus Kas"><i class="ph ph-trash" aria-hidden="true"></i></button></td>`:'';return`<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50"><td class="px-6 py-4 text-xs text-gray-500">${formatDateTime(k.Tanggal)}</td><td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-bold ${isMasuk?'bg-emerald-100 text-success':'bg-red-100 text-danger'}">${escHtml(k.Kategori)}</span></td><td class="px-6 py-4 text-sm font-medium">${escHtml(k.Keterangan)}</td><td class="px-6 py-4 text-right font-black ${isMasuk?'text-success':'text-danger'}">${isMasuk?'+':'-'}${formatRupiah(k.Nominal)}</td>${aksiHtml}</tr>`;}).join('');
    let totalMasuk=0,totalKeluar=0; kas.forEach(k=>{const nom=Number(k.Nominal)||0;if(k.Jenis==='Pemasukan') totalMasuk+=nom;else totalKeluar+=nom;});
    const surplus=totalMasuk-totalKeluar;

    const totalTunggakan=(state.data.tunggakan||[]).reduce((sum,t)=>sum+Number(t['Iuran']||0)+Number(t['Arisan']||0),0);
    tf.innerHTML=`<tr class="font-bold text-xs md:text-sm"><td class="px-6 py-3" colspan="3">Total Pemasukan</td><td class="px-6 py-3 text-right text-success">${formatRupiah(totalMasuk)}</td>${canEdit?'<td></td>':''}</tr><tr class="font-bold text-xs md:text-sm"><td class="px-6 py-3" colspan="3">Total Pengeluaran</td><td class="px-6 py-3 text-right text-danger">${formatRupiah(totalKeluar)}</td>${canEdit?'<td></td>':''}</tr><tr class="font-bold text-xs md:text-sm"><td class="px-6 py-3" colspan="3">Surplus/Defisit</td><td class="px-6 py-3 text-right ${surplus>=0?'text-success':'text-danger'}">${formatRupiah(surplus)}</td>${canEdit?'<td></td>':''}</tr><tr class="font-bold text-xs md:text-sm border-t border-gray-300 dark:border-gray-600"><td class="px-6 py-3" colspan="3">Saldo Akhir</td><td class="px-6 py-3 text-right text-primary">${formatRupiah(saldoAkhir)}</td>${canEdit?'<td></td>':''}</tr><tr class="font-bold text-xs md:text-sm"><td class="px-6 py-3" colspan="3">Total Saldo Tertunggak</td><td class="px-6 py-3 text-right text-warning">${formatRupiah(totalTunggakan)}</td>${canEdit?'<td></td>':''}</tr>`;
  },
  openModal(jenis,id=null){if(!['superadmin','admin_suami'].includes(state.user.role))return;const k=id?state.data.kas.find(x=>x.KasID===id):null;ModalHelper.open('tpl-modal-kas',()=>{document.getElementById('modal-kas-title').innerText=k?'Edit Kas':'Input Kas '+(k?k.Jenis:jenis);document.getElementById('k-id').value=k?k.KasID:'';document.getElementById('k-jenis').value=k?k.Jenis:jenis;document.getElementById('k-kategori').value=k?k.Kategori||'':'';document.getElementById('k-nominal').value=k?formatAngkaInput(k.Nominal):'';if(k)document.getElementById('k-nominal').dataset.value=k.Nominal;document.getElementById('k-ket').value=k?k.Keterangan||'':'';});},
  async submit(e){e.preventDefault();const nominalInput=document.getElementById('k-nominal');const nominal=toNumber(nominalInput.dataset?.value||nominalInput.value.replace(/\./g,'')||0);const payload={isEdit:!!document.getElementById('k-id').value,kasId:document.getElementById('k-id').value||'KAS-'+Date.now(),tgl:new Date().toISOString(),jenis:document.getElementById('k-jenis').value,kategori:document.getElementById('k-kategori').value,nominal,keterangan:document.getElementById('k-ket').value};showLoading();const res=await fetchAPI('save_kas',payload);hideLoading();if(res.success){window.closeAllModals();await loadData();showToast('Transaksi disimpan');}else showToast(res.message,'error');},
  async delete(id){if(!(await showConfirmDialog('Hapus transaksi ini? Data pembayaran terkait juga akan dihapus.')))return;const linkedPembayaran=state.data.pembayaran.find(p=>p.KasID===id);showLoading();if(linkedPembayaran){const resPay=await fetchAPI('delete_pembayaran',{id:linkedPembayaran.PayID});if(!resPay.success){hideLoading();showToast('Gagal menghapus pembayaran terkait: '+resPay.message,'error');return;}}const resKas=await fetchAPI('delete_kas',{id});hideLoading();if(resKas.success){await loadData();showToast('Transaksi dan pembayaran terkait dihapus (jika ada)');}else showToast(resKas.message,'error');},

{escHtml(w['No Rumah'])})</option>`).join('');document.getElementById('b-nama').value=b?b.NamaBiaya||'':'';document.getElementById('b-nominal').value=b?formatAngkaInput(b.Nominal):'';if(b)document.getElementById('b-nominal').dataset.value=b.Nominal;});},async submit(e){e.preventDefault();const id=document.getElementById('b-id').value;const nominalInput=document.getElementById('b-nominal');const nominal=toNumber(nominalInput.dataset?.value||nominalInput.value.replace(/\./g,'')||0);const payload={biayaId:id||undefined,wargaId:document.getElementById('b-warga').value,namaBiaya:document.getElementById('b-nama').value,nominal};showLoading();const res=await fetchAPI('save_biaya',payload);hideLoading();if(res.success){window.closeAllModals();await loadData();showToast(id?'Biaya diperbarui':'Biaya ditambahkan');}else showToast(res.message,'error');},async delete(id){if(!(await showConfirmDialog('Hapus biaya ini?')))return;showLoading();const res=await fetchAPI('delete_biaya',{id});hideLoading();if(res.success){await loadData();showToast('Dihapus');}else showToast(res.message,'error');}};

// BUKU TABUNGAN
function updateRingkasanTabungan(){const now=new Date();const todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());const todayEnd=new Date(todayStart.getTime()+24*60*60*1000);let totalSaldo=0;state.data.warga.forEach(w=>{totalSaldo+=getSaldo(w['ID Warga']);});let wargaNabungCount=0;state.data.warga.forEach(w=>{if(getSaldo(w['ID Warga'])>0)wargaNabungCount++;});const todayTrx=state.data.transaksi.filter(t=>{const tgl=new Date(t.Tanggal);return tgl>=todayStart&&tgl<todayEnd;});let totalHariIni=0;todayTrx.forEach(t=>{if(t['Jenis Transaksi']==='Setoran')totalHariIni+=Number(t['Nominal']);});const elTotal=document.getElementById('buku-total-saldo'),elWarga=document.getElementById('buku-warga-nabung'),elHariIni=document.getElementById('buku-total-hari-ini');if(elTotal)elTotal.textContent=formatRupiah(totalSaldo);if(elWarga)elWarga.textContent=wargaNabungCount;if(elHariIni)elHariIni.textContent=formatRupiah(totalHariIni);}

function setupBukuTabungan(){if(!state.user)return;let sel=document.getElementById('select-buku-anggota');if(!sel)return;sel.innerHTML='<option value="">-- Pilih Warga --</option>';if(state.user.role==='user'){sel.innerHTML=`<option value="${escHtml(state.user['ID Warga'])}">${escHtml(state.user['ID Warga'])} - ${escHtml(state.user['Nama Istri'])}</option>`;sel.value=state.user['ID Warga'];document.getElementById('buku-selector-wrapper').classList.add('hidden');renderBukuTabungan();}else{document.getElementById('buku-selector-wrapper').classList.remove('hidden');const sorted=[...state.data.warga].sort((a,b)=>(a['Nama Istri']||'').localeCompare(b['Nama Istri']||''));sorted.forEach(w=>{const namaIstri=w['Nama Istri']||'Tanpa Nama';const noRumah=w['No Rumah']||'-';sel.innerHTML+=`<option value="${escHtml(w['ID Warga'])}">${escHtml(namaIstri)} (${escHtml(noRumah)})</option>`;});updateRingkasanTabungan();}}

window.renderBukuTabungan=()=>{let id=document.getElementById('select-buku-anggota')?.value||state.user['ID Warga'];let area=document.getElementById('passbook-area'),emp=document.getElementById('passbook-empty');if(!id){if(area)area.classList.add('hidden');if(emp)emp.classList.remove('hidden');return;}if(area)area.classList.remove('hidden');if(emp)emp.classList.add('hidden');if(area)area.classList.add('flex');updateRingkasanTabungan();let w=state.data.warga.find(x=>String(x['ID Warga'])===String(id));if(!w){if(area)area.classList.add('hidden');if(emp)emp.classList.remove('hidden');showToast("Warga tidak ditemukan","error");return;}document.getElementById('buku-nama').innerText=escHtml(w['Nama Istri']);document.getElementById('buku-id').innerText=escHtml(w['ID Warga']||'-');document.getElementById('buku-norumah').innerText=escHtml(w['No Rumah']||'-');document.getElementById('buku-saldo').innerText=formatRupiah(getSaldo(id));let tb=document.getElementById('table-buku');tb.innerHTML='';let trx=state.data.transaksi.filter(t=>String(t['ID Anggota'])===String(id)).sort((x,y)=>new Date(x['Tanggal'])-new Date(y['Tanggal']));let sld=0;const canEdit=['superadmin','admin_istri'].includes(state.user.role);if(trx.length===0)tb.innerHTML='<tr><td colspan="6" class="p-6 text-center text-gray-500 italic">Belum ada mutasi</td></tr>';else trx.forEach(t=>{let isS=t['Jenis Transaksi']==='Setoran';let n=Number(t['Nominal']);sld+=isS?n:-n;tb.innerHTML+=`<tr class="border-b border-gray-100"><td class="p-3 text-xs text-gray-600 w-40">${formatDateTime(t['Tanggal'])}</td><td class="p-3"><span class="text-[10px] font-bold uppercase ${isS?'text-success':'text-danger'}">${escHtml(t['Jenis Transaksi'])}</span><br><span class="text-xs truncate block max-w-[200px]">${escHtml(t['Keterangan']||'-')}</span></td><td class="p-3 text-right text-success text-sm">${isS?formatRupiah(n):'-'}</td><td class="p-3 text-right text-danger text-sm">${!isS?formatRupiah(n):'-'}</td><td class="p-3 text-right font-bold text-sm bg-gray-50 dark:bg-gray-800/30">${formatRupiah(sld)}</td><td class="p-3 text-center"><div class="flex gap-1 justify-center">${canEdit?`<button onclick="editTransaksi('${escHtml(t['ID Transaksi'])}')" class="text-blue-500 bg-blue-50 p-1.5 rounded" title="Edit" aria-label="Edit Mutasi"><i class="ph ph-pencil-simple text-sm" aria-hidden="true"></i></button><button onclick="deleteTransaksi('${escHtml(t['ID Transaksi'])}')" class="text-danger bg-red-50 p-1.5 rounded" title="Hapus" aria-label="Hapus Mutasi"><i class="ph ph-trash text-sm" aria-hidden="true"></i></button>`:''}</div></td></tr>`;});};

window.cetakBukuTabunganPDF=function(){const id=document.getElementById('select-buku-anggota')?.value||state.user['ID Warga'];if(!id){showToast('Pilih warga terlebih dahulu','error');return;}const warga=state.data.warga.find(x=>String(x['ID Warga'])===String(id));if(!warga){showToast('Data warga tidak ditemukan','error');return;}const saldoAkhir=getSaldo(id);const transaksi=state.data.transaksi.filter(t=>String(t['ID Anggota'])===String(id)).sort((a,b)=>new Date(a['Tanggal'])-new Date(b['Tanggal']));const div=document.createElement('div');div.style.padding='20px';div.style.background='white';div.style.color='black';div.style.fontFamily='sans-serif';div.innerHTML=`<div style="text-align:center;margin-bottom:20px;"><h2 style="margin:0;font-size:20px;">BUKU TABUNGAN</h2><h3 style="margin:5px 0 0;font-size:16px;font-weight:normal;">Tabungan Ibu-Ibu RT</h3><hr style="margin:10px 0;"></div><table style="width:100%;font-size:12px;margin-bottom:20px;"><tr><td style="width:30%;font-weight:bold;">ID Warga</td><td>: ${escHtml(warga['ID Warga'])}</td></tr><tr><td style="font-weight:bold;">Nama Istri</td><td>: ${escHtml(warga['Nama Istri'])}</td></tr><tr><td style="font-weight:bold;">No Rumah</td><td>: ${escHtml(warga['No Rumah']||'-')}</td></tr><tr><td style="font-weight:bold;">Status</td><td>: ${escHtml(warga['Status']||'-')}</td></tr><tr><td style="font-weight:bold;">Saldo Akhir</td><td>: ${formatRupiah(saldoAkhir)}</td></tr></table><h4 style="font-size:14px;margin-bottom:10px;">Riwayat Mutasi</h4><table style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr style="background:#0F766E;color:white;"><th style="border:1px solid #ccc;padding:6px;">Tanggal</th><th style="border:1px solid #ccc;padding:6px;">Keterangan</th><th style="border:1px solid #ccc;padding:6px;text-align:right;">Debit</th><th style="border:1px solid #ccc;padding:6px;text-align:right;">Kredit</th><th style="border:1px solid #ccc;padding:6px;text-align:right;">Saldo</th></tr></thead><tbody>${transaksi.length===0?'<tr><td colspan="5" style="text-align:center;padding:15px;">Belum ada mutasi</td></tr>':(()=>{let saldoBerjalan=0;return transaksi.map(t=>{const isSetoran=t['Jenis Transaksi']==='Setoran';const nominal=Number(t['Nominal']);saldoBerjalan+=isSetoran?nominal:-nominal;return`<tr><td style="border:1px solid #ddd;padding:6px;">${formatDateTime(t['Tanggal'])}</td><td style="border:1px solid #ddd;padding:6px;"><strong>${escHtml(t['Jenis Transaksi'])}</strong><br><span style="font-size:10px;">${escHtml(t['Keterangan']||'-')}</span></td><td style="border:1px solid #ddd;padding:6px;text-align:right;color:green;">${isSetoran?formatRupiah(nominal):'-'}</td><td style="border:1px solid #ddd;padding:6px;text-align:right;color:red;">${!isSetoran?formatRupiah(nominal):'-'}</td><td style="border:1px solid #ddd;padding:6px;text-align:right;font-weight:bold;">${formatRupiah(saldoBerjalan)}</td></tr>`;}).join('');})()}</tbody></table><p style="text-align:right;margin-top:20px;font-size:10px;">Dicetak pada: ${formatDateTime(new Date())}</p>`;html2pdf().set({margin:10,filename:'Buku_Tabungan_'+id+'_'+Date.now()+'.pdf',html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(div).save();};

// PROFILE
window.previewProfilePhoto=function(e){const file=e.target.files&&e.target.files[0];if(!file)return;if(!file.type.startsWith('image/')){showToast("File harus berupa gambar","error");e.target.value='';return;}const reader=new FileReader();reader.onload=()=>{const preview=document.getElementById('profile-photo-preview');if(preview)preview.innerHTML=`<img src="${reader.result}" class="h-24 w-24 rounded-2xl object-cover border border-gray-200 dark:border-gray-700 shadow-lg" alt="Preview Foto">`;};reader.readAsDataURL(file);};

function resizeProfilePhoto(file){return new Promise((resolve,reject)=>{if(!file){resolve(null);return;}if(!file.type.startsWith('image/')){reject(new Error("File harus gambar."));return;}const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{const size=512;const canvas=document.createElement('canvas');canvas.width=size;canvas.height=size;const ctx=canvas.getContext('2d');const scale=Math.max(size/img.width,size/img.height);ctx.drawImage(img,(size-img.width*scale)/2,(size-img.height*scale)/2,img.width*scale,img.height*scale);resolve({name:file.name,mimeType:'image/jpeg',data:canvas.toDataURL('image/jpeg',0.82)});};img.src=reader.result;};reader.readAsDataURL(file);});}

window.openProfileModal=function(){const user=state.user;ModalHelper.open('tpl-modal-profile',()=>{document.getElementById('profile-photo-preview').innerHTML=avatarMarkup(state.user,'h-24 w-24');document.getElementById('profile-name-display').innerText=escHtml(user['Nama Istri']||user['Nama Suami']||'-');document.getElementById('profile-id-display').innerText=escHtml(user['ID Warga']||'-');document.getElementById('profile-role-display').innerText=getRoleLabel(user.role);document.getElementById('p-suami').value=user['Nama Suami']||'';document.getElementById('p-istri').value=user['Nama Istri']||'';document.getElementById('p-rumah').value=user['No Rumah']||'';document.getElementById('p-hp-suami').value=user['No HP Suami']||'';document.getElementById('p-hp-istri').value=user['No HP Istri']||'';document.getElementById('f-p-password').value='';document.getElementById('f-p-password2').value='';});};

window.submitProfile=async(e)=>{e.preventDefault();const password=document.getElementById('f-p-password').value.trim();const password2=document.getElementById('f-p-password2').value.trim();const file=document.getElementById('f-p-photo').files[0];const namaSuami=document.getElementById('p-suami').value.trim();const namaIstri=document.getElementById('p-istri').value.trim();const noRumah=document.getElementById('p-rumah').value.trim();const noHpSuami=document.getElementById('p-hp-suami').value.trim();const noHpIstri=document.getElementById('p-hp-istri').value.trim();if(password||password2){if(password.length<4){showToast("Password minimal 4 karakter","error");return;}if(password!==password2){showToast("Konfirmasi password tidak sama","error");return;}}if(!namaIstri){showToast("Nama Istri tidak boleh kosong","error");return;}if(!noRumah){showToast("No Rumah tidak boleh kosong","error");return;}let photo=null;try{photo=file?await resizeProfilePhoto(file):null;}catch(err){showToast(err.message||"Gagal memproses foto","error");return;}const payload={namaSuami,namaIstri,noRumah,noHpSuami,noHpIstri,password:password||undefined,photo};showLoading();const res=await fetchAPI('update_profile',payload);hideLoading();if(!res.success){showToast(res.message||"Gagal memperbarui profil","error");return;}state.user={...state.user,...(res.data||{}),role:state.user.role||normalizeRole(res.data?.Role)};state.user['Nama Suami']=namaSuami;state.user['Nama Istri']=namaIstri;state.user['No Rumah']=noRumah;state.user['No HP Suami']=noHpSuami;state.user['No HP Istri']=noHpIstri;if(res.data&&res.data['Foto Profil'])state.user['Foto Profil']=res.data['Foto Profil'];persistSession();document.body.setAttribute('data-role',state.user.role);showToast("Profil diperbarui");window.closeAllModals();await loadData();};
</script>
