<!DOCTYPE html>
<html lang="id" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tabungan & E-Kas RT</title>
  
  <meta name="theme-color" content="#0F766E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Fira Sans"', 'sans-serif'] },
          colors: { primary: '#0F766E', 'primary-dark': '#115E59', success: '#16A34A', danger: '#DC2626', warning: '#F59E0B', darkbg: '#111827', darkcard: '#1F2937' }
        }
      }
    }
  </script>

  <style>
    body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    .glass-nav { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
    .dark .glass-nav { background: rgba(31,41,55,0.85); }
    .modal-animate { animation: fadeInScale 0.2s ease-out forwards; }
    .toast-enter { animation: slideInDown 0.3s ease-out forwards; }
    @keyframes fadeInScale { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    @keyframes slideInDown { from { transform:translateY(-100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .hide-scroll::-webkit-scrollbar { display:none; }
    .hide-scroll { -ms-overflow-style:none; scrollbar-width:none; }
    body[data-role="user"] .admin-only { display:none !important; }
    .profile-avatar-img { object-fit:cover; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkbg dark:text-gray-200 transition-colors duration-300 antialiased overflow-hidden selection:bg-primary/30">

<div id="app" class="h-[100dvh] w-full max-w-[100vw] flex overflow-hidden relative">
  
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="absolute inset-0 z-50 bg-gray-50 dark:bg-darkbg flex flex-col items-center justify-center p-4">
    <div class="bg-white dark:bg-darkcard p-6 md:p-8 rounded-2xl shadow-xl w-[calc(100%-2rem)] max-w-md modal-animate border border-gray-100 dark:border-gray-700">
      <div class="flex justify-center mb-6">
        <div class="h-16 w-16 bg-primary text-white rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-primary/30"><i class="ph ph-wallet"></i></div>
      </div>
      <h1 class="text-2xl font-bold text-center mb-2 dark:text-white">Tabungan & E-Kas RT</h1>
      <p class="text-gray-500 dark:text-gray-400 text-center mb-8 text-sm">Masuk dengan ID Warga (blokf...)</p>
      <form id="login-form" class="space-y-4 w-full">
        <div>
          <label class="block text-sm font-medium mb-1">ID Warga</label>
          <div class="relative">
            <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="login-user" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Masukkan ID Warga" required>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <div class="relative">
            <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="login-pass" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Masukkan Password" required>
          </div>
        </div>
        <button type="submit" id="btn-login" class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 rounded-xl transition-colors shadow-md shadow-primary/30 mt-4 flex justify-center items-center gap-2">
          <span>Masuk</span><i class="ph ph-arrow-right font-bold"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div id="main-layout" class="flex w-full h-full max-w-[100vw] hidden">
    <!-- Sidebar Desktop -->
    <aside class="w-64 bg-white dark:bg-darkcard border-r border-gray-200 dark:border-gray-700 hidden lg:flex flex-col z-20 flex-shrink-0">
      <div class="p-6 flex items-center gap-3">
        <div class="h-10 w-10 bg-primary text-white rounded-xl flex items-center justify-center text-xl shadow-md"><i class="ph ph-wallet"></i></div>
        <div class="min-w-0">
          <h2 class="font-bold text-lg leading-tight dark:text-white truncate">E-Kas RT</h2>
          <span id="role-badge" class="text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded-full font-bold uppercase tracking-wide">Admin</span>
        </div>
      </div>
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scroll pb-4">
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium" data-target="dashboard"><i class="ph ph-squares-four text-xl"></i> Dashboard</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="warga"><i class="ph ph-identification-badge text-xl"></i> Warga</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="transaksi"><i class="ph ph-arrows-left-right text-xl"></i> Transaksi</button>
        <div class="h-px bg-gray-100 dark:bg-gray-800 my-2 admin-only"></div>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="pembayaran"><i class="ph ph-credit-card text-xl"></i> Pembayaran</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="kas"><i class="ph ph-book-open text-xl"></i> Buku Kas</button>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="laporan"><i class="ph ph-file-text text-xl"></i> Laporan</button>
        <div class="h-px bg-gray-100 dark:bg-gray-800 my-2"></div>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="buku"><i class="ph ph-book-bookmark text-xl"></i> Buku Tabungan</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="pengaturan"><i class="ph ph-gear text-xl"></i> Pengaturan</button>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 min-w-0 flex flex-col h-full relative max-w-full">
      <header class="lg:hidden glass-nav border-b border-gray-200 dark:border-gray-700 sticky top-0 z-20 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3 min-w-0">
          <div class="h-8 w-8 bg-primary text-white rounded-lg flex flex-shrink-0 items-center justify-center shadow-md"><i class="ph ph-wallet text-sm"></i></div>
          <h1 class="font-bold text-lg dark:text-white truncate" id="mobile-header-title">Dashboard</h1>
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <button onclick="navigate('pengaturan')" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors admin-only"><i class="ph ph-gear text-xl"></i></button>
          <button onclick="toggleTheme()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors"><i class="ph ph-moon text-xl dark:hidden"></i><i class="ph ph-sun text-xl hidden dark:inline-block"></i></button>
          <button onclick="handleLogout()" class="p-2 text-danger hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition-colors"><i class="ph ph-sign-out text-xl"></i></button>
        </div>
      </header>

      <div class="hidden lg:flex justify-end px-8 pt-6 pb-2 w-full flex-shrink-0 gap-2">
        <button onclick="navigate('pengaturan')" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors admin-only"><i class="ph ph-gear text-[22px]"></i></button>
        <button onclick="toggleTheme()" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors"><i class="ph ph-moon text-[22px] dark:hidden"></i><i class="ph ph-sun text-[22px] hidden dark:inline-block"></i></button>
        <button onclick="handleLogout()" class="p-2.5 bg-white dark:bg-darkcard text-danger shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors"><i class="ph ph-sign-out text-[22px]"></i></button>
      </div>

      <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 lg:px-8 lg:pb-8 lg:pt-2 pb-24 w-full" id="content-area"></div>
    </main>

    <!-- Bottom Navigation Mobile -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 w-full glass-nav border-t border-gray-200 dark:border-gray-700 z-30 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.1)] pb-safe">
      <div class="flex justify-around items-center p-1.5 px-1">
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0" data-target="dashboard"><i class="ph ph-squares-four text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Home</span></button>
        <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="warga"><i class="ph ph-identification-badge text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Warga</span></button>
        <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="transaksi"><i class="ph ph-arrows-left-right text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Trx</span></button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="buku"><i class="ph ph-book-bookmark text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Buku</span></button>
        <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="laporan"><i class="ph ph-file-text text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Laporan</span></button>
      </div>
    </nav>
  </div>
</div>

<!-- MODALS & TOASTS & LOADING -->
<div id="modals" class="relative z-50"></div>
<div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[calc(100%-2rem)] max-w-sm"></div>
<div id="loading-overlay" class="fixed inset-0 z-[200] bg-black/50 backdrop-blur-sm flex items-center justify-center hidden">
  <div class="bg-white dark:bg-darkcard p-8 rounded-2xl shadow-2xl flex flex-col items-center">
    <i class="ph ph-spinner animate-spin text-4xl text-primary"></i>
    <p class="mt-4 font-bold text-gray-700 dark:text-gray-200">Menyimpan...</p>
  </div>
</div>

<!-- TEMPLATES -->
<template id="tpl-dashboard">
  <div class="space-y-4 md:space-y-6 animate-fade-in w-full">
    <h2 class="text-2xl font-bold hidden lg:block dark:text-white" id="dash-title">Dashboard</h2>
    <div id="profile-card" class="hidden"></div>
    <div id="admin-container" class="admin-only space-y-4 md:space-y-6">
      <div id="admin-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full"></div>
      <div id="ekas-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full"></div>
      <div id="admin-charts" class="grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-6 mt-4 w-full">
        <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
          <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Statistik Tabungan</h3>
          <div class="h-56 md:h-64 w-full relative"><canvas id="chartTransaksi"></canvas></div>
        </div>
        <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
          <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Arus Kas E-Kas</h3>
          <div class="h-56 md:h-64 w-full relative"><canvas id="chartEkas"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-warga">
  <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
      <h2 class="text-2xl font-bold dark:text-white">Data Warga</h2>
      <button class="admin-only bg-primary hover:bg-primary-dark text-white px-4 py-2.5 rounded-xl flex items-center gap-2" onclick="window.ekas.warga.openModal()">
        <i class="ph ph-plus-circle text-lg"></i> Tambah Warga
      </button>
    </div>
    <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden relative w-full">
      <div class="overflow-x-auto w-full h-full">
        <table class="w-full text-left text-sm whitespace-nowrap min-w-[900px]">
          <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
            <tr>
              <th class="p-4">ID</th><th class="p-4">Suami</th><th class="p-4">Istri</th><th class="p-4">Rumah</th>
              <th class="p-4">Iuran/Arisan</th><th class="p-4">Saldo Tabungan</th><th class="p-4 admin-only text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="table-warga" class="divide-y divide-gray-100 dark:divide-gray-800"></tbody>
        </table>
      </div>
    </div>
  </div>
</template>

<template id="tpl-transaksi">
  <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
      <h2 class="text-2xl font-bold dark:text-white">Riwayat Transaksi</h2>
      <button class="bg-primary hover:bg-primary-dark text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center gap-2 shadow-sm whitespace-nowrap w-full sm:w-auto justify-center font-medium transition-colors" onclick="openModal('modal-transaksi')">
        <i class="ph ph-plus-circle text-lg"></i> <span>Transaksi Baru</span>
      </button>
    </div>
    <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden flex flex-col min-w-0 w-full relative">
      <div class="p-3 border-b border-gray-100 dark:border-gray-800 flex gap-2 overflow-x-auto hide-scroll w-full">
        <button class="px-4 py-1.5 rounded-full bg-primary text-white text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Semua', this)">Semua</button>
        <button class="px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Setoran', this)">Setoran</button>
        <button class="px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Penarikan', this)">Penarikan</button>
      </div>
      <div class="overflow-x-auto w-full flex-1">
        <table class="w-full text-left text-sm whitespace-nowrap min-w-[850px]">
          <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
            <tr><th class="p-4 w-40">Waktu</th><th class="p-4">ID Trx</th><th class="p-4">Warga</th><th class="p-4">Jenis</th><th class="p-4">Nominal</th><th class="p-4 text-center">Aksi</th></tr>
          </thead>
          <tbody id="table-transaksi" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-darkcard"></tbody>
        </table>
      </div>
    </div>
  </div>
</template>

<template id="tpl-pembayaran">
  <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
    <h2 class="text-2xl font-bold dark:text-white">Penerimaan Pembayaran</h2>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-1 bg-white dark:bg-darkcard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 h-fit">
        <form onsubmit="window.ekas.pembayaran.submit(event)" class="space-y-4">
          <div><label class="block text-sm font-medium mb-1">Pilih Warga</label>
            <select id="pay-warga" onchange="window.ekas.pembayaran.calculate()" required class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary transition-shadow">
              <option value="">-- Pilih Warga --</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium mb-1">Bulan</label><select id="pay-bulan" required class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2 outline-none"><option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret">Maret</option><option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option><option value="Juli">Juli</option><option value="Agustus">Agustus</option><option value="September">September</option><option value="Oktober">Oktober</option><option value="November">November</option><option value="Desember">Desember</option></select></div>
            <div><label class="block text-sm font-medium mb-1">Tahun</label><input type="number" id="pay-tahun" value="2026" required class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2 outline-none"></div>
          </div>
          <div class="bg-blue-50 dark:bg-blue-900/10 p-5 rounded-xl border border-blue-100 dark:border-blue-900/30 space-y-3 mt-2">
            <h4 class="font-bold text-sm uppercase text-blue-800 dark:text-blue-300">Rincian Tagihan</h4>
            <div class="flex justify-between text-sm text-gray-700 dark:text-gray-300"><span>Iuran Wajib</span> <span id="pay-iuran-val" class="font-medium">Rp0</span></div>
            <div class="flex justify-between text-sm text-gray-700 dark:text-gray-300"><span>Arisan</span> <span id="pay-arisan-val" class="font-medium">Rp0</span></div>
            <div class="flex justify-between text-sm text-gray-700 dark:text-gray-300"><span>Biaya Tambahan</span> <span id="pay-tambahan-val" class="font-medium text-warning">Rp0</span></div>
            <div class="border-t border-blue-200 dark:border-blue-800 pt-3 flex justify-between font-bold text-xl text-primary"><span>TOTAL</span> <span id="pay-total-val">Rp0</span></div>
          </div>
          <button type="submit" id="btn-save-pay" class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 rounded-xl transition-all shadow-md admin-only disabled:opacity-50 mt-2">Simpan Pembayaran</button>
        </form>
      </div>
      <div class="lg:col-span-2 bg-white dark:bg-darkcard rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm overflow-hidden flex flex-col h-fit">
        <div class="p-5 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50"><h3 class="font-bold text-lg">Riwayat Pembayaran</h3></div>
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm whitespace-nowrap">
            <thead class="border-b border-gray-200 dark:border-gray-800 text-gray-500 bg-gray-50/50 dark:bg-gray-900/20">
              <tr><th class="px-5 py-4">Warga</th><th class="px-5 py-4">Periode</th><th class="px-5 py-4">Rincian</th><th class="px-5 py-4">Total</th><th class="px-5 py-4 admin-only text-right">Aksi</th></tr>
            </thead>
            <tbody id="table-pembayaran" class="divide-y divide-gray-100 dark:divide-gray-800"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-kas">
  <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
      <h2 class="text-2xl font-bold dark:text-white">Buku Kas</h2>
      <div class="flex gap-2 sm:gap-3 admin-only">
        <button onclick="window.ekas.kas.openModal('Pemasukan')" class="bg-success hover:bg-green-700 text-white px-4 sm:px-5 py-2 sm:py-2.5 rounded-xl font-medium flex items-center shadow-md transition-colors"><i class="ph ph-plus-circle text-lg sm:mr-2"></i> <span class="hidden sm:block">Pemasukan</span></button>

        <div class="overflow-x-auto w-full flex-1">

  </div>

<!-- JS LOGIC -->
<script>
  const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxcuUe9qO2PyallWSn7vu2UiiKTnMqirKbocdI_VI8uWnYyjYYvRsv_DUpGIV2GSWiuqQ/exec';
  const ADMIN_VIEWS = new Set(['warga','transaksi','pembayaran','kas','pengaturan']);

  const readStorage = (key, fallback = '') => { try { return localStorage.getItem(key) || fallback; } catch(e) { return fallback; } };
  const writeStorage = (key, value) => { try { localStorage.setItem(key, value); } catch(e) {} };
  const removeStorage = (key) => { try { localStorage.removeItem(key); } catch(e) {} };

  window.toggleTheme = () => { 
    const html = document.documentElement; html.classList.toggle('dark'); 
    try { localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light'); } catch(e) {} 
  };

  let chartInstance = null, chartEkasInstance = null;
  const state = { 
    user: null, 
    data: { warga: [], transaksi: [], biaya: [], pembayaran: [], kas: [], settings: {} }, 
    settings: { gasUrl: readStorage('gasUrl', DEFAULT_GAS_URL), theme: readStorage('theme', 'light') },
    ui: { currentView: 'dashboard' }
  };
  
  const getGasUrl = () => (state.settings.gasUrl || DEFAULT_GAS_URL || '').trim();
  const normalizeRole = (role) => String(role || 'user').toLowerCase() === 'admin' ? 'admin' : 'user';
  const toNumber = (value) => { const n = Number(value); return Number.isFinite(n) ? n : 0; };
  const formatRupiah = (angka) => 'Rp ' + toNumber(angka).toLocaleString('id-ID');
  const formatDateTime = (iso) => {
    if (!iso) return '-';
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return '-';
    const pad = (n) => n.toString().padStart(2, '0');
    return `${pad(d.getDate())}-${pad(d.getMonth() + 1)}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const calculateSaldo = (id) => state.data.transaksi.filter(t=>String(t['ID Anggota'])===String(id)).reduce((s, t) => t['Jenis Transaksi'] === 'Setoran' ? s + toNumber(t['Nominal']) : s - toNumber(t['Nominal']), 0);
  const persistSession = () => { if (!state.user) return; writeStorage('app_session', JSON.stringify({ user: state.user, savedAt: Date.now() })); };
  const clearSession = () => removeStorage('app_session');
  const getUserInitials = (user) => String(user?.['Nama Istri'] || user?.['ID Warga'] || '?').trim().split(/\s+/).slice(0, 2).map(x => x[0] || '').join('').toUpperCase();
  const avatarMarkup = (user, classes = 'h-20 w-20') => {
    const url = user?.['Foto Profil'];
    if (url) return `<img src="${url}" alt="Foto Profil" class="${classes} profile-avatar-img rounded-2xl border border-white/30 bg-white/20 shadow-lg" onerror="this.replaceWith(Object.assign(document.createElement('div'), { className: '${classes} rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg', textContent: '${getUserInitials(user)}' }))">`;
    return `<div class="${classes} rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg">${getUserInitials(user)}</div>`;
  };
  const showToast = (msg, type = 'success') => {
    const container = document.getElementById('toast-container'); const toast = document.createElement('div');
    const clrs = { success: 'bg-green-100 text-green-800 border-green-200', error: 'bg-red-100 text-red-800 border-red-200' };
    toast.className = `flex items-center gap-3 p-3.5 rounded-xl border shadow-lg toast-enter pointer-events-auto backdrop-blur-md ${clrs[type]} w-full z-[100]`;
    toast.innerHTML = `<span class="font-medium text-sm">${msg}</span>`;
    container.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
  };
  function showLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
  function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

  async function fetchAPI(action, payload = {}) {
    const gasUrl = getGasUrl();
    if (gasUrl) {
      try {
        const request = { action, payload, user: state.user ? state.user.username : 'Guest' };
        if (state.user && state.user.token) request.auth = { token: state.user.token };
        const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(request), headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow' });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch(e) { throw new Error('Respons server bukan JSON.'); }
        if (!res.ok) return { success: false, message: data.message || `Server error ${res.status}` };
        return data;
      } catch(e) { console.error(e); return { success: false, message: e.message || "Koneksi ke Server gagal." }; }
    }
    return { success: false, message: "URL Backend tidak diatur." };
  }

  // ----- SESSION & AUTH -----
  async function restoreSession() {
    const raw = readStorage('app_session', '');
    if (!raw) return false;
    try {
      const session = JSON.parse(raw);
      if (!session || !session.user || !session.user.token) return false;
      state.user = session.user;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-layout').classList.remove('hidden');
      document.getElementById('role-badge').innerText = state.user.role === 'admin' ? 'Admin' : 'Warga';
      document.body.setAttribute('data-role', state.user.role);
      navigate('dashboard');
      const loaded = await loadData();
      if (!loaded) { clearSession(); state.user = null; document.body.removeAttribute('data-role'); document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-layout').classList.add('hidden'); return false; }
      return true;
    } catch (error) { clearSession(); return false; }
  }

  async function handleLogin(e) {
    e.preventDefault(); 
    const u = document.getElementById('login-user').value.trim(); 
    const p = document.getElementById('login-pass').value;
    const btn = document.getElementById('btn-login');
    btn.innerHTML = `<i class="ph ph-spinner animate-spin text-xl"></i> Memeriksa...`; btn.disabled = true;
    const res = await fetchAPI('login', { username: u, password: p });
    btn.innerHTML = `<span>Masuk</span><i class="ph ph-arrow-right font-bold"></i>`; btn.disabled = false;
    if (res.success) {
      state.user = { ...res.data, username: u, role: normalizeRole(res.role || res.data?.Role), token: res.token || '' };
      persistSession();
      document.getElementById('login-screen').classList.add('hidden'); 
      document.getElementById('main-layout').classList.remove('hidden');
      document.getElementById('role-badge').innerText = state.user.role === 'admin' ? 'Bendahara' : 'Warga';
      document.body.setAttribute('data-role', state.user.role);
      navigate('dashboard');
      const loaded = await loadData();
      showToast(loaded ? "Login berhasil" : "Login berhasil, tapi data belum termuat", loaded ? "success" : "error");
    } else showToast(res.message, "error");
  }

  async function loadData() {
    if (!state.user) return false;
    const res = await fetchAPI('get_all_data', { role: state.user.role, userId: state.user['ID Warga'] || state.user.userId });
    if(res.success) {
      state.data = { 
        warga: (res.data.warga || []),
        transaksi: (res.data.transaksi || []),
        biaya: (res.data.biaya || []),
        pembayaran: (res.data.pembayaran || []),
        kas: (res.data.kas || []),
        settings: (res.data.settings || [])
      };
      let settingMap = {};
      (state.data.settings||[]).forEach(s => settingMap[s.Nama] = s.Nilai);
      state.data.settings = settingMap;
      if(document.getElementById('set-iuran')) document.getElementById('set-iuran').value = settingMap['Iuran Wajib'] || 50000;
      if(document.getElementById('set-arisan')) document.getElementById('set-arisan').value = settingMap['Arisan Per Slot'] || 30000;
      const current = state.data.warga.find(w => String(w['ID Warga']) === String(state.user['ID Warga']));
      if (current) state.user = { ...state.user, ...current, role: state.user.role || normalizeRole(current.Role) };
      renderCurrentView();
      return true;
    }
    showToast(res.message || "Gagal memuat data", "error");
    return false;
  }

  function handleLogout() {
    state.user = null; state.data = { warga: [], transaksi: [], biaya: [], pembayaran: [], kas: [], settings: {} };
    clearSession();
    document.body.removeAttribute('data-role');
    document.getElementById('login-screen').classList.remove('hidden'); 
    document.getElementById('main-layout').classList.add('hidden');
    closeAllModals(); 
    if(chartInstance) { chartInstance.destroy(); chartInstance = null; }
    if(chartEkasInstance) { chartEkasInstance.destroy(); chartEkasInstance = null; }
    document.getElementById('content-area').innerHTML = '';
  }

  function navigate(viewName) {
    if (!state.user) return;
    if (state.user.role !== 'admin' && ADMIN_VIEWS.has(viewName)) viewName = 'dashboard';
    state.ui.currentView = viewName;
    document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(btn => {
      let isAktif = btn.dataset.target === viewName;
      let isAdminOnly = btn.classList.contains('admin-only') ? ' admin-only' : '';
      if(btn.classList.contains('nav-btn')) {
        btn.className = isAktif ? 'nav-btn'+isAdminOnly+' w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium' : 'nav-btn'+isAdminOnly+' w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium';
      } else {
        btn.className = isAktif ? 'nav-btn-mobile'+isAdminOnly+' flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0' : 'nav-btn-mobile'+isAdminOnly+' flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0';
      }
    });
    const tMap = { dashboard:'Dashboard', warga:'Warga', transaksi:'Transaksi', pembayaran:'Pembayaran', kas:'Buku Kas', laporan:'Laporan', buku:'Buku Tabungan', pengaturan:'Pengaturan' };
    document.getElementById('mobile-header-title').innerText = tMap[viewName] || 'Aplikasi';
    renderCurrentView();
  }

  document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(b => b.addEventListener('click', () => navigate(b.dataset.target)));

  function renderCurrentView() {
    if (!state.user) return;
    if (state.user.role !== 'admin' && ADMIN_VIEWS.has(state.ui.currentView)) state.ui.currentView = 'dashboard';
    const a = document.getElementById('content-area'); a.innerHTML = ''; const v = state.ui.currentView;
    if(v==='dashboard'){ a.appendChild(document.getElementById('tpl-dashboard').content.cloneNode(true)); renderDashboard(); }
    else if(v==='warga'){ a.appendChild(document.getElementById('tpl-warga').content.cloneNode(true)); window.ekas.warga.render(); }
    else if(v==='transaksi'){ a.appendChild(document.getElementById('tpl-transaksi').content.cloneNode(true)); renderTransaksi(); }
    else if(v==='pembayaran'){ a.appendChild(document.getElementById('tpl-pembayaran').content.cloneNode(true)); window.ekas.pembayaran.render(); }
    else if(v==='kas'){ a.appendChild(document.getElementById('tpl-kas').content.cloneNode(true)); window.ekas.kas.render(); }
    else if(v==='laporan'){ a.appendChild(document.getElementById('tpl-laporan').content.cloneNode(true)); window.ekas.laporan.init(); }
    else if(v==='buku'){ a.appendChild(document.getElementById('tpl-buku').content.cloneNode(true)); setupBukuTabungan(); }
    else if(v==='pengaturan'){ a.appendChild(document.getElementById('tpl-setting').content.cloneNode(true)); window.ekas.biaya.render(); }
  }

  // ===================== DASHBOARD =====================
  function renderDashboard() {
    if (!state.user) return;
    const myId = state.user['ID Warga'];
    const mySaldo = calculateSaldo(myId);
    const roleLabel = state.user.role === 'admin' ? 'Admin' : 'Warga';
    const profileHtml = `
      <div class="bg-gradient-to-br from-primary to-primary-dark p-5 md:p-6 rounded-2xl shadow-md text-white relative overflow-hidden flex flex-col sm:flex-row gap-4 mb-2 mt-2">
        <div class="absolute -right-6 -top-6 opacity-10"><i class="ph ph-user-circle" style="font-size: 150px;"></i></div>
        <div class="z-10 flex-shrink-0">${avatarMarkup(state.user, 'h-20 w-20 md:h-24 md:w-24')}</div>
        <div class="flex-1 z-10 w-full min-w-0">
          <div class="flex flex-wrap items-center gap-2 mb-2">

  // ===================== E-KAS =====================

    pembayaran: {

        tb.innerHTML = pay.map(p => {
          const wName = state.data.warga.find(w=>w['ID Warga']===p.WargaID)?.['Nama Istri'] || p.WargaID;
          return `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50">

            </td>
          </tr>`;
        }).join('');

      openEdit(payId) {
        const p = state.data.pembayaran.find(x => x.PayID === payId);
        if (!p) return;
        document.getElementById('pay-warga').value = p.WargaID;
        document.getElementById('pay-bulan').value = p.Bulan;
        document.getElementById('pay-tahun').value = p.Tahun;
        this.calculate();
        const btn = document.getElementById('btn-save-pay');
        btn.innerText = 'Update Pembayaran';
        btn.dataset.editId = payId;
      },
      calculate() {
        const wId = document.getElementById('pay-warga').value;
        const w = state.data.warga.find(x=>x['ID Warga']===wId);
        let iuran=0, arisan=0, tambahan=0;
        if(w) {
          if(w['Bayar Iuran?']==='YA') iuran = Number(state.data.settings['Iuran Wajib']||0);
          if(w['Ikut Arisan?']==='YA') arisan = (Number(w['Slot Arisan'])||0)*(Number(state.data.settings['Arisan Per Slot']||0));
          state.data.biaya.forEach(b => { if(b.WargaID===wId) tambahan += Number(b.Nominal); });
        }
        document.getElementById('pay-iuran-val').innerText = formatRupiah(iuran);
        document.getElementById('pay-arisan-val').innerText = formatRupiah(arisan);
        document.getElementById('pay-tambahan-val').innerText = formatRupiah(tambahan);
        document.getElementById('pay-total-val').innerText = formatRupiah(iuran+arisan+tambahan);
        document.getElementById('pay-total-val').dataset.val = iuran+arisan+tambahan;
      },
      async submit(e) {
        e.preventDefault();
        const wId = document.getElementById('pay-warga').value;
        if(!wId) return showToast('Pilih warga!','error');
        const total = Number(document.getElementById('pay-total-val').dataset.val);
        if(total<=0) return showToast('Total Rp0','error');
        const btn = document.getElementById('btn-save-pay');
        const isEdit = btn.dataset.editId;
        const payload = {
          payId: isEdit || undefined,
          wargaId: wId,
          bulan: document.getElementById('pay-bulan').value,
          tahun: document.getElementById('pay-tahun').value,
          iuran: Number(document.getElementById('pay-iuran-val').innerText.replace(/\D/g,'')),
          arisan: Number(document.getElementById('pay-arisan-val').innerText.replace(/\D/g,'')),
          tambahan: Number(document.getElementById('pay-tambahan-val').innerText.replace(/\D/g,'')),
          total
        };
        showLoading();
        const res = await fetchAPI('save_pembayaran', payload);
        hideLoading();
        if(res.success) {
          await loadData();
          e.target.reset();
          btn.innerText = 'Simpan Pembayaran';
          delete btn.dataset.editId;
          window.ekas.pembayaran.render();
          showToast(isEdit ? 'Pembayaran diperbarui' : 'Pembayaran disimpan!');
        } else showToast(res.message,'error');
      },
      async delete(id) {
        if(!confirm('Hapus pembayaran ini? Data terkait di Buku Kas juga akan dihapus.')) return;
        showLoading();
        const res = await fetchAPI('delete_pembayaran', { id });
        hideLoading();
        if(res.success) { await loadData(); showToast('Dihapus'); }
        else showToast(res.message,'error');
      }

        if(res.success) { window.closeAllModals(); await loadData(); showToast('Transaksi disimpan'); }
        else showToast(res.message,'error');
      },
      async delete(id) {
        if(!confirm('Hapus?')) return;

        else showToast(res.message,'error');

    biaya: {

          <div class="bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-md modal-animate overflow-hidden max-h-[90dvh] flex flex-col">
            <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
              <h3 class="font-bold">${id?'Edit':'Tambah'} Biaya</h3>
              <button onclick="window.closeAllModals()"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div class="overflow-y-auto p-4 md:p-6 hide-scroll">
              <form class="space-y-4" onsubmit="window.ekas.biaya.submit(event)">

                <div><label class="block text-xs font-medium mb-1">Warga</label><select id="b-warga" required class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm">${opts}</select></div>
                <div><label class="block text-xs font-medium mb-1">Nama Biaya</label><input type="text" id="b-nama" required class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="${b?b.NamaBiaya:''}"></div>
                <div><label class="block text-xs font-medium mb-1">Nominal</label><input type="number" id="b-nominal" required class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="${b?b.Nominal:''}"></div>
                <div class="pt-4"><button type="submit" class="w-full py-3 rounded-xl bg-warning text-white font-medium text-sm">Simpan</button></div>
              </form>
            </div>
          </div></div>`;
      },
      async submit(e) {
        e.preventDefault();
        const id = document.getElementById('b-id').value;
        const payload = { 
          biayaId: id || undefined,
          wargaId: document.getElementById('b-warga').value,

          nominal: Number(document.getElementById('b-nominal').value) 
        };

        if(res.success) { window.closeAllModals(); await loadData(); showToast(id?'Biaya diperbarui':'Biaya ditambahkan'); }
        else showToast(res.message,'error');
      },
      async delete(id) {
        if(!confirm('Hapus?')) return;
        showLoading();
        const res = await fetchAPI('delete_biaya', { id });
        hideLoading();
        if(res.success) { await loadData(); showToast('Dihapus'); }
        else showToast(res.message,'error');

    laporan: {
      init() {
        const sel = document.getElementById('lap-bulan');
        const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        if(sel.options.length===0) sel.innerHTML = months.map((m,i) => `<option value="${i}">${m}</option>`).join('');
        const now = new Date();
        sel.value = now.getMonth();
        document.getElementById('lap-tahun').value = now.getFullYear();
        this.render();
      },
      render() {
        const bulan = parseInt(document.getElementById('lap-bulan').value);
        const tahun = parseInt(document.getElementById('lap-tahun').value);
        const mName = document.getElementById('lap-bulan').options[bulan].text;
        let saldoAkhir=0, pemasukan=0, pengeluaran=0;
        const kasBulan = state.data.kas.filter(k => {
          if(!k.Tanggal) return false;
          const t = new Date(k.Tanggal);
          return t.getMonth()===bulan && t.getFullYear()===tahun;
        });
        kasBulan.forEach(k => {
          const nom = Number(k.Nominal)||0;
          if(k.Jenis==='Pemasukan') pemasukan+=nom; else pengeluaran+=nom;
        });
        state.data.kas.forEach(k => {
          if(!k.Tanggal) return;
          const t = new Date(k.Tanggal);
          if(t.getFullYear()<tahun || (t.getFullYear()===tahun && t.getMonth()<=bulan)) {
            saldoAkhir += (k.Jenis==='Pemasukan'?Number(k.Nominal):-Number(k.Nominal));
          }
        });
        let html = `<div class="text-center mb-8"><h3 class="text-2xl font-black uppercase">Laporan Keuangan RT</h3><p>Periode: ${mName} ${tahun}</p></div>`;
        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-8"><div><h4 class="font-bold text-success text-lg mb-4">Pemasukan</h4>`;
        if(kasBulan.filter(k=>k.Jenis==='Pemasukan').length===0) html += `<p class="text-sm text-gray-400">Tidak ada pemasukan.</p>`;
        else kasBulan.filter(k=>k.Jenis==='Pemasukan').forEach(k => { html += `<div class="flex justify-between text-sm py-2 border-b"><span>${k.Kategori} <span class="text-xs text-gray-500">${k.Keterangan}</span></span><span class="font-bold">${formatRupiah(k.Nominal)}</span></div>`; });
        html += `<div class="flex justify-between font-black text-success pt-4 mt-2 text-lg"><span>Total</span><span>${formatRupiah(pemasukan)}</span></div></div>`;
        html += `<div><h4 class="font-bold text-danger text-lg mb-4">Pengeluaran</h4>`;
        if(kasBulan.filter(k=>k.Jenis==='Pengeluaran').length===0) html += `<p class="text-sm text-gray-400">Tidak ada pengeluaran.</p>`;
        else kasBulan.filter(k=>k.Jenis==='Pengeluaran').forEach(k => { html += `<div class="flex justify-between text-sm py-2 border-b"><span>${k.Kategori} <span class="text-xs text-gray-500">${k.Keterangan}</span></span><span class="font-bold">${formatRupiah(k.Nominal)}</span></div>`; });
        html += `<div class="flex justify-between font-black text-danger pt-4 mt-2 text-lg"><span>Total</span><span>${formatRupiah(pengeluaran)}</span></div></div></div>`;
        html += `<div class="mt-8 p-6 bg-gray-50 dark:bg-gray-900/50 rounded-2xl border flex justify-between items-center"><span class="text-lg font-bold">Surplus/Defisit:</span><span class="text-3xl font-black ${pemasukan-pengeluaran>=0?'text-success':'text-danger'}">${formatRupiah(pemasukan-pengeluaran)}</span></div>`;
        html += `<div class="mt-4 p-6 bg-blue-50 dark:bg-blue-900/20 rounded-2xl border flex justify-between items-center"><span class="text-lg font-bold text-blue-800 dark:text-blue-300">Total Saldo Kas Akhir:</span><span class="text-3xl font-black text-primary">${formatRupiah(saldoAkhir)}</span></div>`;
        document.getElementById('laporan-content').innerHTML = html;
      },
      cetak() { window.print(); }
    },

      async save(e) {
        e.preventDefault();

          'Iuran Wajib': Number(document.getElementById('set-iuran').value),
          'Arisan Per Slot': Number(document.getElementById('set-arisan').value)
        };

  // ===================== TRANSAKSI & BUKU TABUNGAN =====================
  function renderTransaksi(filter = 'Semua') {
    const tb = document.getElementById('table-transaksi'); if(!tb) return; tb.innerHTML = '';
    let d = state.data.transaksi; if(filter!=='Semua') d = d.filter(t=>t['Jenis Transaksi']===filter);
    d.sort((a,b)=>new Date(b['Tanggal'])-new Date(a['Tanggal']));
    if(d.length===0) tb.innerHTML=`<tr><td colspan="6" class="p-8 text-center text-gray-500">Belum ada transaksi</td></tr>`;
    d.forEach(t => {
      let c = t['Jenis Transaksi']==='Setoran' ? 'text-success' : 'text-danger';
      let ic = t['Jenis Transaksi']==='Setoran' ? 'ph-arrow-down-left' : 'ph-arrow-up-right';
      tb.innerHTML += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50 dark:border-gray-800/50">
        <td class="p-3 md:p-4 text-gray-500 text-xs w-40">${formatDateTime(t['Tanggal'])}</td>
        <td class="p-3 md:p-4 font-mono text-[10px] md:text-xs">${t['ID Transaksi']}</td>
        <td class="p-3 md:p-4 font-medium">${t['Nama Anggota']}</td>
        <td class="p-3 md:p-4"><span class="flex items-center gap-1 text-xs font-bold ${c}"><i class="ph ${ic}"></i> ${t['Jenis Transaksi']}</span></td>
        <td class="p-3 md:p-4 font-bold ${c}">${formatRupiah(t['Nominal'])}</td>
        <td class="p-3 md:p-4 text-center space-x-1">
          <button onclick="window.editTransaksi('${t['ID Transaksi']}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg"><i class="ph ph-pencil-simple"></i></button>
          <button onclick="deleteTransaksi('${t['ID Transaksi']}')" class="text-danger bg-red-50 hover:bg-red-100 dark:bg-red-900/30 p-2 rounded-lg"><i class="ph ph-trash"></i></button>
        </td></tr>`;
    });
  }
  window.filterTrx = (val, btn) => {
    document.querySelectorAll('#content-area button').forEach(b => {
      if(b.innerText.includes('Semua')||b.innerText.includes('Setoran')||b.innerText.includes('Penarikan'))
        b.className = 'px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors';
    });
    btn.className = 'px-4 py-1.5 rounded-full bg-primary text-white text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors';
    renderTransaksi(val);
  };

  function setupBukuTabungan() {
    if (!state.user) return;
    let sel = document.getElementById('select-buku-anggota');
    sel.innerHTML = '<option value="">-- Pilih Warga --</option>';
    if (state.user.role === 'user') {
      sel.innerHTML = `<option value="${state.user['ID Warga']}">${state.user['ID Warga']} - ${state.user['Nama Istri']}</option>`;
      sel.value = state.user['ID Warga'];
      document.getElementById('buku-selector-wrapper').classList.add('hidden');
      renderBukuTabungan();
    } else {
      document.getElementById('buku-selector-wrapper').classList.remove('hidden');
      state.data.warga.forEach(w => sel.innerHTML += `<option value="${w['ID Warga']}">${w['ID Warga']} - ${w['Nama Istri']}</option>`);
    }
  }

  window.renderBukuTabungan = () => {
    let id = document.getElementById('select-buku-anggota').value;
    let area = document.getElementById('passbook-area'), emp = document.getElementById('passbook-empty');
    if(!id){ area.classList.add('hidden'); emp.classList.remove('hidden'); return; }
    area.classList.remove('hidden'); emp.classList.add('hidden'); area.classList.add('flex');
    let w = state.data.warga.find(x=>String(x['ID Warga'])===String(id));
    if(!w){ area.classList.add('hidden'); emp.classList.remove('hidden'); showToast("Warga tidak ditemukan", "error"); return; }
    document.getElementById('buku-nama').innerText=w['Nama Istri'];
    document.getElementById('buku-id').innerText=w['ID Warga'];
    document.getElementById('buku-norumah').innerText=w['No Rumah'];
    document.getElementById('buku-saldo').innerText=formatRupiah(calculateSaldo(id));
    let tb = document.getElementById('table-buku'); tb.innerHTML='';
    let trx = state.data.transaksi.filter(t=>String(t['ID Anggota'])===String(id)).sort((x,y)=>new Date(x['Tanggal'])-new Date(y['Tanggal']));
    let sld = 0;
    if(trx.length===0) tb.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-gray-500 italic">Belum ada mutasi</td></tr>`;
    else trx.forEach(t => {
      let isS = t['Jenis Transaksi']==='Setoran';
      let n = Number(t['Nominal']); sld += isS?n:-n;
      tb.innerHTML+=`<tr class="border-b border-gray-100">
        <td class="p-3 text-xs text-gray-600 w-40">${formatDateTime(t['Tanggal'])}</td>
        <td class="p-3"><span class="text-[10px] font-bold uppercase ${isS?'text-success':'text-danger'}">${t['Jenis Transaksi']}</span><br><span class="text-xs truncate block max-w-[200px]">${t['Keterangan']||'-'}</span></td>
        <td class="p-3 text-right text-success text-sm">${isS?formatRupiah(n):'-'}</td>
        <td class="p-3 text-right text-danger text-sm">${!isS?formatRupiah(n):'-'}</td>
        <td class="p-3 text-right font-bold text-sm bg-gray-50 dark:bg-gray-800/30">${formatRupiah(sld)}</td>
        <td class="p-3 text-center"><div class="flex gap-1 justify-center">
          <button onclick="window.editTransaksi('${t['ID Transaksi']}')" class="text-blue-500 bg-blue-50 p-1.5 rounded"><i class="ph ph-pencil-simple text-sm"></i></button>
          <button onclick="deleteTransaksi('${t['ID Transaksi']}')" class="text-danger bg-red-50 p-1.5 rounded"><i class="ph ph-trash text-sm"></i></button>
        </div></td>
      </tr>`;
    });
  };

  window.editTransaksi = function(idTransaksi) {
    const trx = state.data.transaksi.find(t => t['ID Transaksi'] === idTransaksi);
    if (!trx) return showToast('Transaksi tidak ditemukan', 'error');
    let opts = '<option value="">-- Pilih Warga --</option>';
    state.data.warga.forEach(w => opts += `<option value="${w['ID Warga']}" ${w['ID Warga']===trx['ID Anggota']?'selected':''}>${w['ID Warga']} - ${w['Nama Istri']}</option>`);
    document.getElementById('modals').innerHTML = `<div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
      <div class="bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-md modal-animate overflow-hidden max-h-[90dvh] flex flex-col">
        <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
          <h3 class="font-bold">Edit Transaksi</h3><button onclick="window.closeAllModals()"><i class="ph ph-x text-lg"></i></button>
        </div>
        <div class="overflow-y-auto p-4 md:p-6 hide-scroll">
          <form class="space-y-4" onsubmit="window.submitEditTransaksi(event, '${idTransaksi}')">
            <div class="flex p-1 bg-gray-100 dark:bg-gray-800 rounded-xl">
              <label class="flex-1 text-center"><input type="radio" name="f-t-jenis" value="Setoran" class="peer sr-only" ${trx['Jenis Transaksi']==='Setoran'?'checked':''}><div class="py-2 rounded-lg text-sm font-medium peer-checked:bg-white peer-checked:text-success shadow-sm">Uang Masuk</div></label>
              <label class="flex-1 text-center"><input type="radio" name="f-t-jenis" value="Penarikan" class="peer sr-only" ${trx['Jenis Transaksi']==='Penarikan'?'checked':''}><div class="py-2 rounded-lg text-sm font-medium peer-checked:bg-white peer-checked:text-danger shadow-sm">Uang Keluar</div></label>
            </div>
            <div><label class="block text-xs font-medium mb-1">Warga</label><select id="f-t-warga" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" required>${opts}</select></div>
            <div><label class="block text-xs font-medium mb-1">Nominal (Rp)</label><input type="number" id="f-t-nominal" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 font-bold text-lg text-right" required value="${trx['Nominal']}"></div>
            <div><label class="block text-xs font-medium mb-1">Keterangan</label><input type="text" id="f-t-ket" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="${trx['Keterangan']||''}"></div>
            <div class="pt-2"><button type="submit" class="w-full py-3 rounded-xl bg-primary text-white font-medium text-sm">Simpan Perubahan</button></div>
          </form>
        </div>
      </div></div>`;
  };

  window.submitEditTransaksi = async function(e, idTransaksi) {
    e.preventDefault();
    const idWarga = document.getElementById('f-t-warga').value;
    const warga = state.data.warga.find(w=>w['ID Warga']===idWarga);
    if(!warga) { showToast("Pilih warga", "error"); return; }
    const nominal = toNumber(document.getElementById('f-t-nominal').value);
    if(nominal <= 0) { showToast("Nominal > 0", "error"); return; }
    showLoading();
    const res = await fetchAPI('save_transaksi', {
      idTransaksi,
      idAnggota: idWarga,
      namaAnggota: warga['Nama Istri'],
      jenis: document.querySelector('input[name="f-t-jenis"]:checked').value,
      nominal,
      keterangan: document.getElementById('f-t-ket').value
    });
    hideLoading();
    if(!res.success) { showToast(res.message || "Gagal", "error"); return; }
    showToast("Transaksi diperbarui");
    window.closeAllModals();
    await loadData();
  };

  window.submitTransaksi = async (e) => {
    e.preventDefault();
    const idWarga = document.getElementById('f-t-warga').value;
    const warga = state.data.warga.find(w=>w['ID Warga']===idWarga);
    if(!warga) { showToast("Pilih warga", "error"); return; }
    const nominal = toNumber(document.getElementById('f-t-nominal').value);
    if(nominal <= 0) { showToast("Nominal > 0", "error"); return; }
    showLoading();
    const res = await fetchAPI('save_transaksi', {
      idAnggota: idWarga,
      namaAnggota: warga['Nama Istri'],
      jenis: document.querySelector('input[name="f-t-jenis"]:checked').value,
      nominal,
      keterangan: document.getElementById('f-t-ket').value
    });
    hideLoading();
    if(!res.success) { showToast(res.message || "Gagal", "error"); return; }
    showToast("Transaksi berhasil");
    window.closeAllModals();
    await loadData();
  };

  window.deleteTransaksi = async (id) => {
    if(!confirm("Hapus transaksi ini?")) return;
    showLoading();
    const res = await fetchAPI('delete_transaksi', { id });
    hideLoading();
    if(res.success) { await loadData(); showToast('Transaksi dihapus'); }
    else showToast(res.message, "error");
  };

  window.cetakBukuTabunganPDF = function() { /* kode cetak PDF yang sudah ada, tidak berubah */ };
  window.openModal = function(id) { /* kode modal profile dan transaksi baru (dengan form) seperti yang sudah ada */ };
  window.submitProfile = async (e) => { /* kode submit profile dengan loading */ };
  window.closeAllModals = () => document.getElementById('modals').innerHTML = '';
  window.previewProfilePhoto = function(e) { /* tidak berubah */ };
  
  function resizeProfilePhoto(file) { /* tidak berubah */ }

  document.addEventListener('DOMContentLoaded', async () => {
    if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark');
    document.getElementById('login-form').addEventListener('submit', handleLogin);
    await restoreSession();
  });
</script>
