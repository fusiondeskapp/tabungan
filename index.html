  <style>
    /* ========== BASE STYLES ========== */
    body { 
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none; 
    }
    
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    
    .glass-nav { 
      background: rgba(255,255,255,0.85); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
    }
    .dark .glass-nav { background: rgba(31,41,55,0.85); }
    
    .modal-animate { animation: fadeInScale 0.2s ease-out forwards; }
    .toast-enter { animation: slideInDown 0.3s ease-out forwards; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    
    @keyframes fadeInScale { 
      from { opacity:0; transform:scale(0.95); } 
      to { opacity:1; transform:scale(1); } 
    }
    @keyframes slideInDown { 
      from { transform:translateY(-100%); opacity:0; } 
      to { transform:translateY(0); opacity:1; } 
    }
    @keyframes fadeIn { 
      from { opacity: 0; } 
      to { opacity: 1; } 
    }
    
    .hide-scroll::-webkit-scrollbar { display:none; }
    .hide-scroll { -ms-overflow-style:none; scrollbar-width:none; }
    
    .profile-avatar-img { object-fit:cover; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    
    @media print { 
      .no-print { display: none !important; } 
      body { background: white !important; } 
    }

    /* ========== SPINNER LOADING ========== */
	.app-spinner {
	  width: 48px;
	  height: 48px;
	  border: 4px solid #e5e7eb;
	  border-top-color: #0F766E;
	  border-radius: 50%;
	  animation: spin 0.8s linear infinite;
	}
	@keyframes spin { to { transform: rotate(360deg); } }
	.dark .app-spinner { border-color: #374151; border-top-color: #14B8A6; }

    /* ========== SKELETON LOADING ========== */
    .skeleton {
      background: #e5e7eb;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .dark .skeleton {
      background: #374151;
    }
    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 1.5s infinite;
      transform: translateX(-100%);
    }
    .dark .skeleton::after {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    
    .skeleton-card { height: 180px; }
    .skeleton-stat { height: 80px; }
    .skeleton-table-row { height: 48px; margin-bottom: 4px; }

<!-- ==================== JAVASCRIPT: CORE & HELPERS ==================== -->
<script>
// ===================== KONFIGURASI =====================
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxcuUe9qO2PyallWSn7vu2UiiKTnMqirKbocdI_VI8uWnYyjYYvRsv_DUpGIV2GSWiuqQ/exec';
const MAX_RETRIES = 3;
const RETRY_DELAY_MS = 1000;
const SESSION_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;

const ROLE_PERMISSIONS = {
  dashboard: ['superadmin', 'admin_istri', 'admin_suami', 'user'],
  warga: ['superadmin', 'admin_istri', 'admin_suami'],
  transaksi: ['superadmin', 'admin_istri'],
  pembayaran: ['superadmin', 'admin_suami'],
  kas: ['superadmin', 'admin_istri', 'admin_suami', 'user'],
  buku: ['superadmin', 'admin_istri'],
  pengaturan: ['superadmin'],
  tentang: ['superadmin', 'admin_istri', 'admin_suami', 'user']
};

const state = { 
  user: null, 
  data: { warga: [], transaksi: [], tunggakan: [], biaya: [], pembayaran: [], kas: [], settings: {}, saldoMap: new Map() }, 
  settings: { gasUrl: DEFAULT_GAS_URL, theme: 'light' },
  ui: { currentView: 'dashboard' }
};

try {
  state.settings.gasUrl = localStorage.getItem('gasUrl') || DEFAULT_GAS_URL;
  state.settings.theme = localStorage.getItem('theme') || 'light';
} catch(e) {}

// ===================== ERROR BOUNDARY =====================
window.onerror = function(message, source, lineno, colno, error) {
  console.error('Global Error:', { message, source, lineno, colno, error });
  hideLoading();
  const contentArea = document.getElementById('content-area');
  if (contentArea && document.getElementById('main-layout') && !document.getElementById('main-layout').classList.contains('hidden')) {
    contentArea.innerHTML = `
      <div class="flex items-center justify-center h-full">
        <div class="text-center p-8 max-w-md">
          <i class="ph ph-warning-circle text-6xl text-warning mb-4" aria-hidden="true"></i>
          <h3 class="font-bold text-lg mb-2">Terjadi Kesalahan</h3>
          <p class="text-gray-500 mb-4 text-sm">Aplikasi mengalami error. Coba muat ulang halaman.</p>
          <button onclick="location.reload()" class="bg-primary text-white px-6 py-2 rounded-xl font-medium hover:bg-primary-dark transition-colors">
            <i class="ph ph-arrows-clockwise mr-2" aria-hidden="true"></i> Muat Ulang
          </button>
        </div>
      </div>`;
  }
  return true;
};

window.onunhandledrejection = function(event) {
  console.error('Unhandled Promise Rejection:', event.reason);
  hideLoading();
  showToast('Operasi gagal. Silakan coba lagi.', 'error');
};

// ===================== HELPER FUNCTIONS =====================
const getGasUrl = () => (state.settings.gasUrl || DEFAULT_GAS_URL || '').trim();
const normalizeRole = (role) => { const r = String(role || 'user').toLowerCase(); return ['superadmin', 'admin_istri', 'admin_suami', 'user'].includes(r) ? r : 'user'; };
const toNumber = (value) => { const n = Number(value); return Number.isFinite(n) ? n : 0; };
const formatRupiah = (angka) => 'Rp ' + toNumber(angka).toLocaleString('id-ID');

// HTML escaping untuk mencegah XSS
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const formatDateTime = (iso) => {
  if (!iso) return '-';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '-';
  const pad = (n) => n.toString().padStart(2, '0');
  const yyyy = String(d.getFullYear());
  return pad(d.getDate()) + '-' + pad(d.getMonth() + 1) + '-' + yyyy + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
};

// Saldo dari pre-computed Map
function getSaldo(id) {
  return state.data.saldoMap.get(String(id)) || 0;
}

function recalculateSaldoMap() {
  const map = new Map();
  state.data.transaksi.forEach(t => {
    const id = String(t['ID Anggota']);
    const nominal = toNumber(t['Nominal']);
    const current = map.get(id) || 0;
    map.set(id, t['Jenis Transaksi'] === 'Setoran' ? current + nominal : current - nominal);
  });
  state.data.warga.forEach(w => {
    const id = String(w['ID Warga']);
    if (!map.has(id)) map.set(id, 0);
  });
  state.data.saldoMap = map;
}

const getUserInitials = (user) => String(user?.['Nama Istri'] || user?.['Nama Suami'] || user?.['ID Warga'] || '?').trim().split(/\s+/).slice(0, 2).map(x => x[0] || '').join('').toUpperCase();

const avatarMarkup = (user, classes = 'h-20 w-20') => {
  const url = user?.['Foto Profil'];
  const initials = escHtml(getUserInitials(user));
  if (url) return `<img src="${escHtml(url)}" alt="Foto Profil" class="${classes} profile-avatar-img rounded-2xl border border-white/30 bg-white/20 shadow-lg" onerror="this.replaceWith(Object.assign(document.createElement('div'), { className: '${classes} rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg', textContent: '${initials}' }))">`;

/**
 * Mendapatkan daftar warga dengan status aktif
 * Mengabaikan warga dengan status "Nonaktif" (case-insensitive)
 * @returns {Array} Daftar warga aktif
 */
function getWargaAktif() {
  return state.data.warga.filter(w => {
    const status = String(w['Status'] || 'Aktif').trim();
    return status.toLowerCase() !== 'nonaktif';
  });
}

/**
 * Mendapatkan daftar warga aktif yang memiliki kewajiban (iuran/arisan/biaya tambahan)
 * @returns {Array} Daftar warga aktif dengan kewajiban
 */
function getWargaWithKewajiban() {
  return getWargaAktif().filter(w => {
    return w['Bayar Iuran?'] === 'YA' || 
           w['Ikut Arisan?'] === 'YA' || 
           state.data.biaya.some(b => b.WargaID === w['ID Warga']);
  });
}

/**
 * Mengecek apakah seorang warga aktif berdasarkan ID
 * @param {string} wargaId - ID Warga
 * @returns {boolean} True jika warga aktif
 */
function isWargaAktif(wargaId) {
  const warga = state.data.warga.find(w => w['ID Warga'] === wargaId);
  if (!warga) return false;
  const status = String(warga['Status'] || 'Aktif').trim();
  return status.toLowerCase() !== 'nonaktif';
}

/**
 * Mendapatkan ID warga aktif dalam bentuk Set untuk pengecekan cepat
 * @returns {Set} Set berisi ID warga aktif
 */
function getWargaAktifIds() {
  return new Set(getWargaAktif().map(w => w['ID Warga']));
}

function showConfirmDialog(message, options = {}) {

    const modalDiv = document.createElement('div');
    modalDiv.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-[300] flex items-center justify-center p-4';
    const modalContent = document.createElement('div');
    modalContent.className = 'bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-sm modal-animate overflow-hidden shadow-xl border border-gray-100 dark:border-gray-700';
    modalContent.innerHTML = `
      <div class="p-6 text-center">
        <i class="ph ph-warning-circle text-4xl text-warning mb-4" aria-hidden="true"></i>
        <p class="text-gray-800 dark:text-gray-200 font-medium text-sm mb-6">${escHtml(message)}</p>
        ${showCheckbox ? `<label class="flex items-center justify-center gap-2 mb-4 text-sm text-gray-600 dark:text-gray-400 cursor-pointer"><input type="checkbox" id="confirm-checkbox" class="rounded border-gray-300 text-primary focus:ring-primary"><span>${escHtml(checkboxLabel)}</span></label>` : ''}
        <div class="flex gap-3 justify-center">
          <button id="confirm-cancel" class="px-6 py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-medium text-sm transition-colors">${escHtml(cancelText)}</button>
          <button id="confirm-ok" class="px-6 py-2.5 rounded-xl bg-primary hover:bg-primary-dark text-white font-medium text-sm transition-colors shadow-md">${escHtml(confirmText)}</button>
        </div>
      </div>`;
    modalDiv.appendChild(modalContent);
    document.body.appendChild(modalDiv);
    const cleanup = () => { modalDiv.remove(); };
    modalDiv.querySelector('#confirm-ok').addEventListener('click', () => {
      const checkbox = modalDiv.querySelector('#confirm-checkbox');
      resolve(showCheckbox ? { confirmed: true, checked: checkbox ? checkbox.checked : false } : true);

    });
    modalDiv.querySelector('#confirm-cancel').addEventListener('click', () => {
      resolve(showCheckbox ? { confirmed: false, checked: false } : false);

// ===================== FORMAT INPUT RIBUAN =====================
function formatInputRibuan(e) {
  const input = e.target;
  let raw = input.value.replace(/\./g, '').replace(/,/g, '');
  if (raw === '' || isNaN(raw)) { input.dataset.value = ''; input.value = ''; return; }
  const number = parseInt(raw, 10);
  input.dataset.value = number;
  input.value = number.toLocaleString('id-ID', { maximumFractionDigits: 0 });
}

function formatAngkaInput(number) { if (!number || isNaN(number)) return ''; return Number(number).toLocaleString('id-ID', { maximumFractionDigits: 0 }); }

// ===================== MODALS =====================
window.closeAllModals = () => { document.getElementById('modals').innerHTML = ''; };

// ===================== MODAL HELPER =====================
const ModalHelper = {
  open(templateId, setupFn) {
    const template = document.getElementById(templateId);
    if (!template) return;
    document.getElementById('modals').innerHTML = '';
    const clone = template.content.cloneNode(true);
    document.getElementById('modals').appendChild(clone);
    if (setupFn) setupFn();
  },
  close() {
    window.closeAllModals();
  },
  fillTemplate(templateId, replacements) {
    const template = document.getElementById(templateId);
    if (!template) return '';
    let html = template.innerHTML;
    for (const [key, value] of Object.entries(replacements)) {
      html = html.replace(new RegExp(`{{${key}}}`, 'g'), escHtml(String(value)));
    }
    return html;
  }
};

// ===================== API CALL WITH RETRY =====================
async function fetchAPI(action, payload = {}, retryCount = 0) {
  const gasUrl = getGasUrl();
  if (!gasUrl) return { success: false, message: "URL Backend tidak diatur." };
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 30000);
  try {
    const request = { action, payload };
    if (state.user?.token) request.auth = { token: state.user.token };
    const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(request), headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow', signal: controller.signal });
    clearTimeout(timeoutId);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { throw new Error('Respons server bukan JSON.'); }
    
    // Tangani token expired
    if (data.code === 'TOKEN_EXPIRED' || (data.message && (data.message.includes('kedaluwarsa') || data.message.includes('expired') || data.message.includes('invalid token')))) {
      handleLogout();
      showToast('Sesi Anda telah berakhir. Silakan login kembali.', 'error');
      throw new Error('TOKEN_EXPIRED');
    }
    
    if (!res.ok) throw new Error(data.message || 'Server error ' + res.status);
    return data;
  } catch(e) {
    clearTimeout(timeoutId);
    if (e.message === 'TOKEN_EXPIRED') throw e;
    console.error('[fetchAPI] Error:', e.message, '| Retry:', retryCount, '| Action:', action);
    if ((e.name === 'AbortError' || e.message === 'Failed to fetch' || e.message.includes('NetworkError')) && retryCount < MAX_RETRIES) {
      const delay = RETRY_DELAY_MS * Math.pow(2, retryCount);
      await new Promise(resolve => setTimeout(resolve, delay));
      return fetchAPI(action, payload, retryCount + 1);
    }
    if (e.name === 'AbortError') return { success: false, message: 'Koneksi timeout. Server sibuk, coba ulangi.' };
    if (e.message === 'Failed to fetch') return { success: false, message: 'Tidak dapat terhubung ke server.' };
    return { success: false, message: e.message || "Koneksi gagal." };
  }
}

// ===================== SESSION =====================
function persistSession() { if (state.user) writeStorage('app_session', JSON.stringify({ user: state.user, savedAt: Date.now() })); }
function clearSession() { removeStorage('app_session'); }

async function restoreSession() {
  const raw = readStorage('app_session', '');
  if (!raw) return false;
  try {
    const session = JSON.parse(raw);
    if (!session?.user?.token) return false;
    if (Date.now() - session.savedAt > SESSION_MAX_AGE_MS) { clearSession(); return false; }
    state.user = session.user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-layout').classList.remove('hidden');
    document.getElementById('role-badge').innerText = getRoleLabel(state.user.role);
    document.body.setAttribute('data-role', state.user.role);
    updateNavigationVisibility();
    navigate('dashboard');
    const loaded = await loadData();
    if (!loaded) { handleLogout(); return false; }
    return true;
  } catch(error) { clearSession(); return false; }
}

// ===================== AUTH =====================
async function handleLogin(e) {
  e.preventDefault(); 
  const u = document.getElementById('login-user').value.trim(); 
  const p = document.getElementById('login-pass').value;
  const btn = document.getElementById('btn-login');
  btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl" aria-hidden="true"></i> Memeriksa...'; btn.disabled = true;
  try {
    const res = await fetchAPI('login', { username: u, password: p });
    if (res.success) {
      state.user = { ...res.data, username: u, role: res.role || 'user', token: res.token || '' };
      persistSession();
      document.getElementById('login-screen').classList.add('hidden'); 
      document.getElementById('main-layout').classList.remove('hidden');
      document.getElementById('role-badge').innerText = getRoleLabel(state.user.role);
      document.body.setAttribute('data-role', state.user.role);
      updateNavigationVisibility();
      navigate('dashboard');
      const loaded = await loadData();
      showToast(loaded ? "Login berhasil" : "Login berhasil, memuat data...", loaded ? "success" : "error");
    } else showToast(res.message || "Login gagal", "error");
  } catch(error) { showToast("Terjadi kesalahan saat login", "error"); }
  finally { btn.innerHTML = '<span>Masuk</span><i class="ph ph-arrow-right font-bold" aria-hidden="true"></i>'; btn.disabled = false; }
}

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function isInStandaloneMode() {
  return window.navigator.standalone === true ||
         window.matchMedia('(display-mode: standalone)').matches;
}

function dismissIOSBanner() {
  document.getElementById('ios-install-banner').style.display = 'none';
  try { localStorage.setItem('iosbannerDismissed', '1'); } catch(e) {}
}

function initIOSBanner() {
  if (isIOS() && !isInStandaloneMode()) {
    var dismissed = false;
    try { dismissed = localStorage.getItem('iosbannerDismissed') === '1'; } catch(e) {}
    if (!dismissed) {
      // Show after short delay so page renders first
      setTimeout(function() {
        var banner = document.getElementById('ios-install-banner');
        if (banner) banner.style.display = 'flex';
      }, 1500);
    }
  }
}

function installPWA() {
  if (window._pwaInstallPrompt) {
    window._pwaInstallPrompt.prompt();
    window._pwaInstallPrompt.userChoice.then(function(result) {
      if (result.outcome === 'accepted') {
        window._pwaInstallPrompt = null;
        document.getElementById('pwa-install-btn').style.display = 'none';
        showToast('Aplikasi berhasil diinstall! 🎉', 'success');
      }
    });
  }
}

function handleLogout() {
  state.user = null; 
  state.data = { warga: [], transaksi: [], tunggakan: [], biaya: [], pembayaran: [], kas: [], settings: {}, saldoMap: new Map() };
  clearSession();
  document.body.removeAttribute('data-role');
  document.getElementById('login-screen').classList.remove('hidden'); 
  document.getElementById('main-layout').classList.add('hidden');
  closeAllModals(); 
  document.getElementById('content-area').innerHTML = '';
}

// ===================== DATA LOADING =====================
async function loadData() {
  if (!state.user) return false;
  const res = await fetchAPI('get_all_data', {});
  if (res.success) {
    state.data = { warga: res.data.warga || [], transaksi: res.data.transaksi || [], tunggakan: res.data.tunggakan || [], biaya: res.data.biaya || [], pembayaran: res.data.pembayaran || [], kas: res.data.kas || [], settings: res.data.settings || [] };
    let settingMap = {};
    state.data.settings.forEach(s => settingMap[s.Nama] = s.Nilai);
    state.data.settings = settingMap;
    recalculateSaldoMap();
    if (document.getElementById('set-iuran')) document.getElementById('set-iuran').value = settingMap['Iuran Wajib'] || 50000;
    if (document.getElementById('set-arisan')) document.getElementById('set-arisan').value = settingMap['Arisan Per Slot'] || 30000;
    const current = state.data.warga.find(w => String(w['ID Warga']) === String(state.user['ID Warga']));
    if (current) state.user = { ...state.user, ...current, role: state.user.role || normalizeRole(current.Role) };
    renderCurrentView();
    return true;
  }
  showToast(res.message || "Gagal memuat data", "error");
  return false;
}

// ===================== NAVIGATION =====================
function navigate(viewName) {
  if (!state.user) return;
  if (!canAccess(viewName)) viewName = 'dashboard';
  state.ui.currentView = viewName;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const isAktif = btn.dataset.target === viewName;
    btn.className = isAktif ? 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium' : 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium';
    btn.style.display = canAccess(btn.dataset.target) ? '' : 'none';
  });
  document.querySelectorAll('.nav-btn-mobile').forEach(btn => {
    const isAktif = btn.dataset.target === viewName;
    btn.className = isAktif ? 'nav-btn-mobile flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0' : 'nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0';
    btn.style.display = canAccess(btn.dataset.target) ? '' : 'none';
  });
  const tMap = { dashboard: 'Dashboard', warga: 'Warga', transaksi: 'Transaksi', pembayaran: 'Pembayaran', kas: 'Buku Kas', buku: 'Buku Tabungan', pengaturan: 'Pengaturan', tentang: 'Tentang' };
  const mobileTitle = document.getElementById('mobile-header-title');
  if (mobileTitle) mobileTitle.innerText = tMap[viewName] || 'Aplikasi';
  renderCurrentView();
}

function renderCurrentView() {
  if (!state.user) return;
  if (!canAccess(state.ui.currentView)) state.ui.currentView = 'dashboard';
  const contentArea = document.getElementById('content-area'); 
  contentArea.innerHTML = ''; 
  const v = state.ui.currentView;
  const templates = { dashboard: 'tpl-dashboard', warga: 'tpl-warga', transaksi: 'tpl-transaksi', pembayaran: 'tpl-pembayaran', kas: 'tpl-kas', buku: 'tpl-buku', pengaturan: 'tpl-setting', tentang: 'tpl-tentang' };
  const templateId = templates[v];
  if (templateId) {
    const template = document.getElementById(templateId);
    if (template) contentArea.appendChild(template.content.cloneNode(true));
  }
  try {
    if (v === 'dashboard') renderDashboard();
    else if (v === 'warga' && window.ekas?.warga) window.ekas.warga.render();
    else if (v === 'transaksi') renderTransaksi();
    else if (v === 'pembayaran' && window.ekas?.pembayaran) window.ekas.pembayaran.render();
    else if (v === 'kas' && window.ekas?.kas) window.ekas.kas.render();
    else if (v === 'buku') setupBukuTabungan();
    else if (v === 'pengaturan' && window.ekas?.biaya) window.ekas.biaya.render();
  } catch(e) { console.error('Render error for view:', v, e); }
}

    chartsDiv.style.display = 'none';
    topSaldoSection.style.display = '';
    renderTopSaldo();
  } else if (role === 'admin_suami') {
    let totalMasuk=0, totalKeluar=0;
    state.data.kas.forEach(k => { const n = Number(k.Nominal); if(k.Jenis==='Pemasukan') totalMasuk+=n; else totalKeluar+=n; });
    const saldoKas = totalMasuk - totalKeluar;
    const totalTunggakanSemua = state.data.tunggakan.reduce((sum, t) => sum + Number(t['Iuran']||0) + Number(t['Arisan']||0), 0);
    statsDiv.innerHTML = `<div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Pemasukan Kas</p><h3 class="text-xl font-bold text-success">${formatRupiah(totalMasuk)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Pengeluaran Kas</p><h3 class="text-xl font-bold text-danger">${formatRupiah(totalKeluar)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Saldo Kas</p><h3 class="text-xl font-bold text-primary">${formatRupiah(saldoKas)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Total Tertunggak</p><h3 class="text-xl font-bold text-warning">${formatRupiah(totalTunggakanSemua)}</h3></div>`;
    chartsDiv.style.display = 'none';

  }
}

function renderCharts() {
  // Pie Chart: Warga Lunas vs Nunggak
  const ctxPie = document.getElementById('chartPieTunggakan');
  if (ctxPie) {
    const totalWarga = getWargaAktif().length;
    const tunggakanSet = new Set(state.data.tunggakan.map(t => t['ID Warga']));
    let wargaNunggak = 0;
    getWargaAktif().forEach(w => { if (tunggakanSet.has(w['ID Warga'])) wargaNunggak++; });
    const wargaLunas = totalWarga - wargaNunggak;
    
    chartPieTunggakan = new Chart(ctxPie, {
      type: 'doughnut',
      data: {
        labels: ['Lunas', 'Menunggak'],
        datasets: [{
          data: [wargaLunas, wargaNunggak],
          backgroundColor: ['#16A34A', '#DC2626'],
          borderColor: ['#16A34A', '#DC2626'],
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              generateLabels: function(chart) {
                const data = chart.data;
                return data.labels.map((label, i) => ({
                  text: `${label}: ${data.datasets[0].data[i]} (${totalWarga > 0 ? Math.round(data.datasets[0].data[i]/totalWarga*100) : 0}%)`,
                  fillStyle: data.datasets[0].backgroundColor[i],
                  strokeStyle: data.datasets[0].borderColor[i],
                  index: i
                }));
              }
            }
          }
        }
      }
    });
  }

  // Bar Chart: Pemasukan 6 Bulan Terakhir
  const ctxBar = document.getElementById('chartBarPemasukan');
  if (ctxBar) {
    const now = new Date();
    const bulanLabels = [];
    const pemasukanData = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      bulanLabels.push(['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'][d.getMonth()] + ' ' + String(d.getFullYear()).slice(-2));
      let total = 0;
      state.data.kas.forEach(k => {
        if (!k.Tanggal) return;
        const tgl = new Date(k.Tanggal);
        if (tgl.getMonth() === d.getMonth() && tgl.getFullYear() === d.getFullYear() && k.Jenis === 'Pemasukan') {
          total += Number(k.Nominal) || 0;
        }
      });
      pemasukanData.push(total);
    }
    
    chartBarPemasukan = new Chart(ctxBar, {
      type: 'bar',
      data: {
        labels: bulanLabels,
        datasets: [{
          label: 'Pemasukan',
          data: pemasukanData,
          backgroundColor: pemasukanData.map(() => '#0F766E'),
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) { return formatRupiah(ctx.raw); }
            }
          }
        },
        scales: {
          y: {
            ticks: {
              callback: function(value) {
                if (value >= 1000000) return (value/1000000).toFixed(1) + 'jt';
                if (value >= 1000) return (value/1000).toFixed(0) + 'rb';
                return value;
              }
            }
          }
        }
      }
    });
  }

  // Line Chart: Tren Saldo Kas
  const ctxLine = document.getElementById('chartLineSaldo');
  if (ctxLine) {
    const sortedKas = [...state.data.kas].filter(k => k.Tanggal).sort((a,b) => new Date(a.Tanggal) - new Date(b.Tanggal));
    const labels = sortedKas.map(k => formatDateTime(k.Tanggal));
    let runningSaldo = 0;
    const saldoData = sortedKas.map(k => {
      runningSaldo += (k.Jenis === 'Pemasukan' ? 1 : -1) * (Number(k.Nominal) || 0);
      return runningSaldo;
    });
    
    chartLineSaldo = new Chart(ctxLine, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Saldo Kas',
          data: saldoData,
          borderColor: '#0F766E',
          backgroundColor: 'rgba(15,118,110,0.1)',
          tension: 0.4,
          fill: true,
          pointRadius: labels.length > 30 ? 0 : 3,
          pointHoverRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) { return formatRupiah(ctx.raw); }
            }
          }
        },
        scales: {
          y: {
            ticks: {
              callback: function(value) {
                if (value >= 1000000) return (value/1000000).toFixed(1) + 'jt';
                return value;
              }
            }
          }
        }
      }
    });
  }
}

function renderTopSaldo() {
  const container = document.getElementById('top-saldo-list');
  if (!container) return;
  
  const sorted = [...state.data.warga].sort((a,b) => getSaldo(b['ID Warga']) - getSaldo(a['ID Warga']));
  const top5 = sorted.slice(0, 5).filter(w => getSaldo(w['ID Warga']) > 0);
  
  if (top5.length === 0) {
    container.innerHTML = '<p class="text-center text-gray-500 text-sm py-4">Belum ada data saldo.</p>';
    return;
  }
  
  const maxSaldo = getSaldo(top5[0]['ID Warga']);
  const medals = ['👑', '🥈', '🥉', '4️⃣', '5️⃣'];
  
  container.innerHTML = top5.map((w, i) => {
    const saldo = getSaldo(w['ID Warga']);
    const barWidth = maxSaldo > 0 ? Math.round((saldo / maxSaldo) * 100) : 0;
    const isGold = i === 0;
    return `
      <div class="flex items-center gap-3 p-3 ${isGold ? 'bg-yellow-50 dark:bg-yellow-900/10 rounded-xl border border-yellow-200 dark:border-yellow-800' : 'border-b border-gray-100 dark:border-gray-800'}">
        <span class="text-lg flex-shrink-0 w-8 text-center">${medals[i] || '#'+(i+1)}</span>
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-center mb-1">
            <span class="font-medium text-sm truncate ${isGold ? 'text-yellow-800 dark:text-yellow-200' : ''}">${escHtml(w['Nama Istri'] || w['Nama Suami'] || '-')}</span>
            <span class="font-bold text-sm ${isGold ? 'text-yellow-800 dark:text-yellow-200' : 'text-primary'}">${formatRupiah(saldo)}</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="flex-1 h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
              <div class="h-full ${isGold ? 'bg-yellow-400' : 'bg-primary'} rounded-full transition-all duration-500" style="width:${barWidth}%"></div>
            </div>
            <span class="text-[10px] text-gray-400 w-12 text-right">${escHtml(w['No Rumah'] || '-')}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}
</script>

  },

    if(!['superadmin','admin_istri','admin_suami'].includes(state.user.role)) return;
    const w = id ? state.data.warga.find(x=>x['ID Warga']===id) : null, isEdit = !!id, isSuperadmin = state.user.role==='superadmin';
    ModalHelper.open('tpl-modal-warga', () => {
      document.getElementById('modal-warga-title').innerText = isEdit ? 'Edit Warga' : 'Tambah Warga';
      document.getElementById('w-id').value = id||'';
      document.getElementById('w-suami').value = w?w['Nama Suami']||'':'';
      document.getElementById('w-istri').value = w?w['Nama Istri']||'':'';
      document.getElementById('w-rumah').value = w?w['No Rumah']||'':'';
      document.getElementById('w-hp-suami').value = w?w['No HP Suami']||'':'';
      document.getElementById('w-hp-istri').value = w?w['No HP Istri']||'':'';
      document.getElementById('w-iuran').value = w&&w['Bayar Iuran?']==='TIDAK'?'TIDAK':'YA';
      document.getElementById('w-arisan').value = w&&w['Ikut Arisan?']==='TIDAK'?'TIDAK':'YA';
      document.getElementById('w-slot').value = w?w['Slot Arisan']||'1':'1';
      document.getElementById('w-password').value = '';
      document.getElementById('w-role-container').style.display = isSuperadmin ? '' : 'none';
      document.getElementById('w-role').value = w?w['Role']||'user':'user';
      document.getElementById('w-status-container').style.display = (!isSuperadmin || isEdit) ? '' : 'none';
      document.getElementById('w-status').value = w&&w.Status==='Nonaktif'?'Nonaktif':'Aktif';
    });
  },
  async submit(e) {
    e.preventDefault();
    if(!['superadmin','admin_istri','admin_suami'].includes(state.user.role)) return;
    const isSuperadmin = state.user.role==='superadmin';
    const payload = { id: document.getElementById('w-id').value, namaSuami: document.getElementById('w-suami').value, namaIstri: document.getElementById('w-istri').value, noRumah: document.getElementById('w-rumah').value, noHpSuami: document.getElementById('w-hp-suami').value, noHpIstri: document.getElementById('w-hp-istri').value, bayarIuran: document.getElementById('w-iuran').value, ikutArisan: document.getElementById('w-arisan').value, slotArisan: Number(document.getElementById('w-slot').value), password: document.getElementById('w-password').value, role: isSuperadmin ? document.getElementById('w-role').value : 'user', status: document.getElementById('w-status') ? document.getElementById('w-status').value : 'Aktif' };
    showLoading();
    const res = await fetchAPI('save_warga', payload);
    hideLoading();
    if(res.success) { window.closeAllModals(); await loadData(); showToast(res.generatedPassword ? 'Data warga tersimpan. Password: ' + res.generatedPassword : 'Data warga tersimpan'); }
    else showToast(res.message, 'error');
  },
  async delete(id) {
    if(!['superadmin','admin_istri','admin_suami'].includes(state.user.role)) return;
    if(!(await showConfirmDialog('Hapus warga ini?'))) return;
    showLoading();
    const res = await fetchAPI('delete_warga', { id });
    hideLoading();
    if(res.success) { await loadData(); showToast('Dihapus'); }
    else showToast(res.message, 'error');
  }
};
</script>

<!-- ==================== JAVASCRIPT: TRANSAKSI ==================== -->
<script>
function renderTransaksi(filter='Semua') {
  const tb = document.getElementById('table-transaksi'); if(!tb) return; tb.innerHTML = '';
  const canEdit = ['superadmin','admin_istri'].includes(state.user.role);
  document.getElementById('trx-add-btn').innerHTML = canEdit ? `<button class="bg-primary hover:bg-primary-dark text-white px-3 py-2 rounded-xl flex items-center gap-1.5 shadow-sm whitespace-nowrap w-full sm:w-auto justify-center text-xs font-medium transition-colors" onclick="openModalTransaksi()" aria-label="Transaksi Baru"><i class="ph ph-plus-circle text-sm" aria-hidden="true"></i> <span>Transaksi Baru</span></button>` : '';
  
  const filterBtns = document.getElementById('trx-filter-btns');
  if(filterBtns) filterBtns.innerHTML = `<button class="px-4 py-1.5 rounded-full ${filter==='Semua'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300'} text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="renderTransaksi('Semua')">Semua</button><button class="px-4 py-1.5 rounded-full ${filter==='Setoran'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300'} text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="renderTransaksi('Setoran')">Setoran</button><button class="px-4 py-1.5 rounded-full ${filter==='Penarikan'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300'} text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="renderTransaksi('Penarikan')">Penarikan</button>`;
  
  const thead = document.getElementById('transaksi-thead'), showTrxId = state.user.role !== 'admin_istri';
  thead.innerHTML = `<tr><th class="p-2 md:p-4 w-28 md:w-40">Waktu</th>${showTrxId?'<th class="p-2 md:p-4 hidden md:table-cell">ID Trx</th>':''}<th class="p-2 md:p-4">Warga</th><th class="p-2 md:p-4">Jenis</th><th class="p-2 md:p-4">Nominal</th><th class="p-2 md:p-4 text-center">Aksi</th></tr>`;
  
  let d = state.data.transaksi; if(filter!=='Semua') d = d.filter(t=>t['Jenis Transaksi']===filter);
  d.sort((a,b)=>new Date(b['Tanggal'])-new Date(a['Tanggal']));
  
  if(d.length===0) { tb.innerHTML = `<tr><td colspan="${showTrxId?6:5}" class="p-8 text-center text-gray-500">Belum ada transaksi</td></tr>`; return; }
  
  d.forEach(t => { const isSetoran = t['Jenis Transaksi']==='Setoran', c = isSetoran?'text-success':'text-danger', ic = isSetoran?'ph-arrow-down-left':'ph-arrow-up-right'; tb.innerHTML += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50 dark:border-gray-800/50"><td class="p-2 md:p-4 text-gray-500 text-xs w-28 md:w-40">${formatDateTime(t['Tanggal'])}</td>${showTrxId?`<td class="p-2 md:p-4 font-mono text-[10px] md:text-xs hidden md:table-cell">${escHtml(t['ID Transaksi'])}</td>`:''}<td class="p-2 md:p-4 font-medium">${escHtml(t['Nama Anggota'])}</td><td class="p-2 md:p-4"><span class="flex items-center gap-1 text-xs font-bold ${c}"><i class="ph ${ic}" aria-hidden="true"></i> ${escHtml(t['Jenis Transaksi'])}</span></td><td class="p-2 md:p-4 font-bold ${c}">${formatRupiah(t['Nominal'])}</td><td class="p-2 md:p-4 text-center space-x-1">${canEdit?`<button onclick="editTransaksi('${escHtml(t['ID Transaksi'])}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit" aria-label="Edit Transaksi"><i class="ph ph-pencil-simple" aria-hidden="true"></i></button><button onclick="deleteTransaksi('${escHtml(t['ID Transaksi'])}')" class="text-danger bg-red-50 hover:bg-red-100 dark:bg-red-900/30 p-2 rounded-lg" title="Hapus" aria-label="Hapus Transaksi"><i class="ph ph-trash" aria-hidden="true"></i></button>`:''}</td></tr>`; });
}

function openModalTransaksi(editData=null) {
  if(!['superadmin','admin_istri'].includes(state.user.role)) return;
  ModalHelper.open('tpl-modal-transaksi', () => {
    const isEdit = !!editData;
    document.getElementById('modal-trx-title').innerText = isEdit ? 'Edit Transaksi' : 'Transaksi Baru';
    const sel = document.getElementById('f-t-warga');
    let opts = '<option value="">-- Pilih Warga --</option>';
    
    if (state.user.role === 'admin_istri') { 
      // ✅ Admin istri: hanya warga aktif, urut berdasarkan Nama Istri
      getWargaAktif()
        .sort((a, b) => (a['Nama Istri'] || '').localeCompare(b['Nama Istri'] || ''))
        .forEach(w => {
          const selected = editData && editData['ID Anggota'] === w['ID Warga'] ? 'selected' : '';
          opts += `<option value="${escHtml(w['ID Warga'])}" ${selected}>${escHtml(w['Nama Istri'])} (${escHtml(w['No Rumah'])})</option>`;
        });
    } else if (state.user.role === 'superadmin') { 
      // ✅ Superadmin: semua warga (termasuk nonaktif), urut berdasarkan ID
      state.data.warga
        .sort((a, b) => (a['ID Warga'] || '').localeCompare(b['ID Warga'] || ''))
        .forEach(w => {
          const selected = editData && editData['ID Anggota'] === w['ID Warga'] ? 'selected' : '';
          opts += `<option value="${escHtml(w['ID Warga'])}" ${selected}>${escHtml(w['ID Warga'])} - ${escHtml(w['Nama Istri'])}</option>`;
        });
    }
    
    sel.innerHTML = opts;
    
    const defaultJenis = editData?editData['Jenis Transaksi']:'Setoran';
    document.querySelector('input[name="f-t-jenis"][value="Setoran"]').checked = defaultJenis==='Setoran';
    document.querySelector('input[name="f-t-jenis"][value="Penarikan"]').checked = defaultJenis==='Penarikan';
    
    const nominalInput = document.getElementById('f-t-nominal');
    nominalInput.value = editData ? formatAngkaInput(editData['Nominal']) : '';
    nominalInput.dataset.value = editData ? editData['Nominal'] : '';
    nominalInput.addEventListener('input', formatInputRibuan);
    
    document.getElementById('f-t-ket').value = editData?(editData['Keterangan']||''):'';
    
    // Update form onsubmit
    const form = document.querySelector('#tpl-modal-transaksi form') || document.querySelector('#modals form');
    if (form) form.onsubmit = function(e) { submitTransaksi(e, editData?editData['ID Transaksi']:''); };
  });
}

function editTransaksi(idTransaksi) {
  if(!['superadmin','admin_istri'].includes(state.user.role)) return;
  const trx = state.data.transaksi.find(t=>t['ID Transaksi']===idTransaksi);
  if(!trx) return showToast('Transaksi tidak ditemukan', 'error');
  openModalTransaksi(trx);
}

async function submitTransaksi(e, editId='') {
  e.preventDefault();
  const idWarga = document.getElementById('f-t-warga').value;
  const warga = state.data.warga.find(w=>w['ID Warga']===idWarga);
  if(!warga) { showToast("Pilih warga", "error"); return; }
  const nominalInput = document.getElementById('f-t-nominal');
  const nominal = toNumber(nominalInput.dataset?.value || nominalInput.value.replace(/\./g,'') || '0');
  if(nominal<=0) { showToast("Nominal > 0", "error"); return; }
  const payload = { idTransaksi: editId||undefined, idAnggota: idWarga, namaAnggota: warga['Nama Istri'], jenis: document.querySelector('input[name="f-t-jenis"]:checked').value, nominal, keterangan: document.getElementById('f-t-ket').value };
  showLoading();
  const res = await fetchAPI('save_transaksi', payload);
  hideLoading();
  if(!res.success) { showToast(res.message||"Gagal", "error"); return; }
  showToast(editId?"Transaksi diperbarui":"Transaksi berhasil");
  window.closeAllModals();
  await loadData();
}

async function deleteTransaksi(id) {
  if(!(await showConfirmDialog("Hapus transaksi ini?"))) return;
  showLoading();
  const res = await fetchAPI('delete_transaksi', { id });
  hideLoading();
  if(res.success) { await loadData(); showToast('Transaksi dihapus'); }
  else showToast(res.message, "error");
}
</script>

<!-- ==================== JAVASCRIPT: PEMBAYARAN & TUNGGAKAN ==================== -->
<script>
window.ekas.pembayaran = {
render() {
    const sel = document.getElementById('pay-warga'); if(!sel) return;
    const tunggakanMap = {};
    state.data.tunggakan.forEach(t => { if(!tunggakanMap[t['ID Warga']]) tunggakanMap[t['ID Warga']]=0; tunggakanMap[t['ID Warga']]+=Number(t['Iuran']||0)+Number(t['Arisan']||0); });
    
    // ✅ Gunakan helper functions untuk konsistensi
    let wargaList;
    if (['admin_suami', 'superadmin'].includes(state.user.role)) {
        wargaList = getWargaWithKewajiban();
        wargaList.sort((a, b) => (a['Nama Suami'] || '').localeCompare(b['Nama Suami'] || ''));
    } else {
        wargaList = getWargaAktif();
        wargaList.sort((a, b) => (a['Nama Istri'] || '').localeCompare(b['Nama Istri'] || ''));
    }
    
    sel.innerHTML = '<option value="">-- Pilih Warga --</option>' + wargaList.map(w => {
        const adaTunggakan = tunggakanMap[w['ID Warga']] > 0;
        const namaTampil = ['admin_suami', 'superadmin'].includes(state.user.role) 
            ? `${w['Nama Suami']} (${w['No Rumah']})` 
            : `${w['Nama Istri']} (${w['No Rumah']})`;
        return `<option value="${escHtml(w['ID Warga'])}">${escHtml(namaTampil)}${adaTunggakan ? ' ⚠️ Nunggak' : ''}</option>`;
    }).join('');
    
    const tb = document.getElementById('table-pembayaran');
    let pay = [...(state.data.pembayaran||[])].sort((a,b)=>new Date(b.Tanggal)-new Date(a.Tanggal));
    const canEdit = ['superadmin','admin_suami'].includes(state.user.role);
    const saveBtn = document.getElementById('btn-save-pay'); if(saveBtn) { saveBtn.disabled=!canEdit; saveBtn.classList.toggle('opacity-50',!canEdit); }
    
    const thead = document.getElementById('pembayaran-thead');
    if(thead) thead.innerHTML = `<tr><th class="px-5 py-4">Warga</th><th class="px-5 py-4">Periode</th><th class="px-5 py-4">Rincian</th><th class="px-5 py-4">Total</th>${canEdit?'<th class="px-5 py-4 text-right">Aksi</th>':''}</tr>`;
    
    if(pay.length===0) { const colspan = canEdit?5:4; tb.innerHTML = `<tr><td colspan="${colspan}" class="px-5 py-10 text-center text-gray-500">Belum ada pembayaran.</td></tr>`; }
    else tb.innerHTML = pay.map(p=>{ const wName = state.data.warga.find(w=>w['ID Warga']===p.WargaID)?.['Nama Suami']||p.WargaID; return `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50"><td class="px-5 py-3"><div class="font-bold">${escHtml(wName)}</div><div class="text-xs text-gray-500">${formatDateTime(p.Tanggal)}</div></td><td class="px-5 py-3">${escHtml(p.Bulan)} ${escHtml(p.Tahun)}</td><td class="px-5 py-3 text-xs">Iur:${escHtml(p.Iuran)} Ars:${escHtml(p.Arisan)} Tmb:${escHtml(p.Tambahan)}</td><td class="px-5 py-3 font-black text-success">${formatRupiah(p.Total)}</td>${canEdit?`<td class="px-5 py-3 text-right space-x-1"><button onclick="window.ekas.pembayaran.openEdit('${escHtml(p.PayID)}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit" aria-label="Edit Pembayaran"><i class="ph ph-pencil-simple" aria-hidden="true"></i></button><button onclick="window.ekas.pembayaran.delete('${escHtml(p.PayID)}')" class="text-danger bg-red-50 p-2 rounded-lg" title="Hapus" aria-label="Hapus Pembayaran"><i class="ph ph-trash" aria-hidden="true"></i></button></td>`:''}</tr>`; }).join('');
    
    // Tiga tombol aksi tunggakan
    const btnsDiv = document.getElementById('pembayaran-tunggakan-btns');
    if(btnsDiv && ['superadmin','admin_suami'].includes(state.user.role)) {
      btnsDiv.innerHTML = `
        <button onclick="window.ekas.pembayaran.openTunggakanModal()" class="flex-1 bg-warning hover:bg-amber-600 text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors" aria-label="Catat Tunggakan Manual">
          <i class="ph ph-clock-counter-clockwise mr-1" aria-hidden="true"></i> Catat Tunggakan
        </button>
        <button onclick="window.ekas.pembayaran.openHapusTunggakanModal()" class="flex-1 bg-danger hover:bg-red-700 text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors" aria-label="Hapus Tunggakan">
          <i class="ph ph-trash mr-1" aria-hidden="true"></i> Hapus Tunggakan
        </button>
        <button onclick="window.ekas.pembayaran.updateSemuaTunggakan()" class="w-full bg-primary hover:bg-primary-dark text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors mt-1" aria-label="Update Tunggakan Bulan Ini">
          <i class="ph ph-arrows-clockwise mr-1" aria-hidden="true"></i> Update Tunggakan Bulan Ini
        </button>`;
    } else if(btnsDiv) btnsDiv.innerHTML = '';
  },
  openEdit(payId) {
    const p = state.data.pembayaran.find(x=>x.PayID===payId); if(!p) return;
    document.getElementById('pay-warga').value = p.WargaID;
    document.getElementById('pay-bulan').value = p.Bulan;
    document.getElementById('pay-tahun').value = p.Tahun;
    this.calculate();
    const btn = document.getElementById('btn-save-pay'); btn.innerText='Update Pembayaran'; btn.dataset.editId=payId;
  },
  calculate() {
    const wId = document.getElementById('pay-warga').value;
    const w = state.data.warga.find(x=>x['ID Warga']===wId);
    let iuran=0, arisan=0, tambahan=0;
    if(w) { if(w['Bayar Iuran?']==='YA') iuran = Number(state.data.settings['Iuran Wajib']||0); if(w['Ikut Arisan?']==='YA') arisan = (Number(w['Slot Arisan'])||0)*(Number(state.data.settings['Arisan Per Slot']||0)); state.data.biaya.forEach(b=>{ if(b.WargaID===wId) tambahan+=Number(b.Nominal); }); }
    document.getElementById('pay-iuran-val').innerText=formatRupiah(iuran);
    document.getElementById('pay-arisan-val').innerText=formatRupiah(arisan);
    document.getElementById('pay-tambahan-val').innerText=formatRupiah(tambahan);
    document.getElementById('pay-total-val').innerText=formatRupiah(iuran+arisan+tambahan);
    document.getElementById('pay-total-val').dataset.val=iuran+arisan+tambahan;
  },
  async submit(e) {
    e.preventDefault();
    const wId = document.getElementById('pay-warga').value; if(!wId) return showToast('Pilih warga!','error');
    const total = Number(document.getElementById('pay-total-val').dataset.val); if(total<=0) return showToast('Total Rp0','error');
    const btn = document.getElementById('btn-save-pay'), isEdit = btn.dataset.editId;
    const payload = { payId: isEdit||undefined, wargaId: wId, bulan: document.getElementById('pay-bulan').value, tahun: document.getElementById('pay-tahun').value, iuran: Number(document.getElementById('pay-iuran-val').innerText.replace(/\D/g,'')), arisan: Number(document.getElementById('pay-arisan-val').innerText.replace(/\D/g,'')), tambahan: Number(document.getElementById('pay-tambahan-val').innerText.replace(/\D/g,'')), total };
    showLoading();
    const res = await fetchAPI('save_pembayaran', payload);
    hideLoading();
    if(res.success) { await loadData(); document.getElementById('form-pembayaran').reset(); btn.innerText='Simpan Pembayaran'; delete btn.dataset.editId; window.ekas.pembayaran.render(); showToast(isEdit?'Pembayaran diperbarui':'Pembayaran disimpan!'); }
    else showToast(res.message,'error');
  },
  async delete(id) { if(!(await showConfirmDialog('Hapus pembayaran ini? Data terkait di Buku Kas juga akan dihapus.'))) return; showLoading(); const res = await fetchAPI('delete_pembayaran',{id}); hideLoading(); if(res.success){await loadData();showToast('Dihapus');}else showToast(res.message,'error'); },
  
  // ==================== TUNGGAKAN MANUAL ====================
openTunggakanModal() {
    if (!['superadmin', 'admin_suami'].includes(state.user.role)) return;
    
    ModalHelper.open('tpl-modal-tunggakan', () => {
      const sel = document.getElementById('tung-warga');
      
      // ✅ Gunakan helper function
      const wargaAktif = getWargaAktif().sort((a, b) => (a['Nama Suami'] || '').localeCompare(b['Nama Suami'] || ''));
      
      if (wargaAktif.length === 0) {
        sel.innerHTML = '<option value="">-- Tidak ada warga aktif --</option>';
        return;
      }
      
      sel.innerHTML = '<option value="">-- Pilih Warga --</option>' + 
        wargaAktif.map(w => {
          const namaSuami = w['Nama Suami'] || 'Tanpa Nama';
          const noRumah = w['No Rumah'] || '-';
          return `<option value="${escHtml(w['ID Warga'])}">${escHtml(namaSuami)} (${escHtml(noRumah)})</option>`;
        }).join('');
      
      // Set tahun default ke tahun sekarang
      const tahunInput = document.getElementById('tung-tahun');
      if (tahunInput) {
        tahunInput.value = new Date().getFullYear();
      }
      
      // Attach event listener untuk checkbox bulan
      const bulanContainer = document.getElementById('bulan-container');
      if (bulanContainer) {
        // Hapus listener lama jika ada
        const newBulanContainer = bulanContainer.cloneNode(true);
        bulanContainer.parentNode.replaceChild(newBulanContainer, bulanContainer);
        
        newBulanContainer.addEventListener('change', () => {
          window.ekas.pembayaran.updateTotalTunggakan();
        });
      }
      
      // Hitung nominal awal
      window.ekas.pembayaran.hitungNominalTunggakan();
    });
},
  
  hitungNominalTunggakan() {
    const wId = document.getElementById('tung-warga')?.value;
    const w = wId ? state.data.warga.find(x=>x['ID Warga']===wId) : null;
    let iuran = 0, arisan = 0, tambahan = 0;
    
    if(w) {
      if(w['Bayar Iuran?']==='YA') iuran = Number(state.data.settings['Iuran Wajib']||0);
      if(w['Ikut Arisan?']==='YA') arisan = (Number(w['Slot Arisan'])||0) * (Number(state.data.settings['Arisan Per Slot']||0));
      state.data.biaya.filter(b=>b.WargaID===wId).forEach(b=>tambahan+=Number(b.Nominal));
    }
    
    const iuranInput = document.getElementById('tung-iuran');
    const arisanInput = document.getElementById('tung-arisan');
    const tambahanContainer = document.getElementById('tung-tambahan-container');
    const tambahanInput = document.getElementById('tung-tambahan');
    
    if(iuranInput) { iuranInput.value = formatAngkaInput(iuran); iuranInput.dataset.value = iuran; }
    if(arisanInput) { arisanInput.value = formatAngkaInput(arisan); arisanInput.dataset.value = arisan; }
    
    if(tambahan > 0) {
      if(tambahanContainer) tambahanContainer.classList.remove('hidden');
      if(tambahanInput) { tambahanInput.value = formatAngkaInput(tambahan); tambahanInput.dataset.value = tambahan; }
    } else {
      if(tambahanContainer) tambahanContainer.classList.add('hidden');
      if(tambahanInput) { tambahanInput.value = '0'; tambahanInput.dataset.value = 0; }
    }
    
    this.updateTotalTunggakan();
  },
  
  updateTotalTunggakan() {
    const checked = document.querySelectorAll('.tung-bulan-cb:checked').length;
    const iuran = toNumber(document.getElementById('tung-iuran')?.dataset?.value || 0);
    const arisan = toNumber(document.getElementById('tung-arisan')?.dataset?.value || 0);
    const tambahan = toNumber(document.getElementById('tung-tambahan')?.dataset?.value || 0);
    const total = (iuran + arisan + tambahan) * checked;
    
    const jumlahEl = document.getElementById('tung-jumlah-bulan');
    const totalEl = document.getElementById('tung-total');
    if(jumlahEl) jumlahEl.innerText = checked;
    if(totalEl) totalEl.innerText = formatRupiah(total);
  },
  
  async submitTunggakan(e) {
    e.preventDefault();
    const wId = document.getElementById('tung-warga').value;
    const tahun = Number(document.getElementById('tung-tahun').value);
    const checked = [...document.querySelectorAll('.tung-bulan-cb:checked')].map(cb=>cb.value);
    
    if(!wId || checked.length===0) return showToast('Pilih warga dan minimal satu bulan!','error');
    
    const iuran = toNumber(document.getElementById('tung-iuran').dataset?.value || 0);
    const arisan = toNumber(document.getElementById('tung-arisan').dataset?.value || 0);
    const tambahan = toNumber(document.getElementById('tung-tambahan')?.dataset?.value || 0);
    
    showLoading();
    let success = true;
    for(const bulan of checked) {
      const res = await fetchAPI('save_tunggakan_manual', { wargaId: wId, bulan, tahun, iuran, arisan, tambahan });
      if(!res.success) {
        success = false;
        showToast(res.message + ' (' + bulan + ')', 'error');
        break;
      }
    }
    hideLoading();
    
    if(success) {
      window.closeAllModals();
      await loadData();
      showToast(checked.length + ' tunggakan berhasil dicatat');
    }
  },
  
// ==================== HAPUS TUNGGAKAN ====================
openHapusTunggakanModal() {
    if (!['superadmin', 'admin_suami'].includes(state.user.role)) return;
    
    // ✅ Gunakan helper function
    const wargaAktifIds = getWargaAktifIds();
    
    const list = (state.data.tunggakan || []).filter(t => wargaAktifIds.has(t['ID Warga']));
    
    if (list.length === 0) {
      showToast('Tidak ada data tunggakan untuk warga aktif', 'error');
      return;
    }
    
    ModalHelper.open('tpl-modal-hapus-tunggakan', () => {
      const tbody = document.getElementById('table-hapus-tunggakan-body');
      tbody.innerHTML = list.map(t => {
        const w = state.data.warga.find(x => x['ID Warga'] === t['ID Warga']);
        const nama = w ? (w['Nama Suami'] || w['Nama Istri'] || t['ID Warga']) : t['ID Warga'];
        const noRumah = w ? w['No Rumah'] || '-' : '-';
        
        return `<tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
          <td class="p-2">
            <input type="checkbox" class="tung-hapus-cb rounded border-gray-300 text-primary focus:ring-primary" value="${escHtml(t['ID Tunggakan'])}">
          </td>
          <td class="p-2 text-xs font-mono">${escHtml(t['ID Tunggakan'] || '-')}</td>
          <td class="p-2 font-medium">
            <div>${escHtml(nama)}</div>
            <div class="text-xs text-gray-500">${escHtml(noRumah)}</div>
          </td>
          <td class="p-2">${escHtml(t['Bulan'])} ${escHtml(t['Tahun'])}</td>
          <td class="p-2 text-right font-bold">${formatRupiah(Number(t['Iuran'] || 0) + Number(t['Arisan'] || 0))}</td>
        </tr>`;
      }).join('');
      
      // Select all checkbox
      const pilihSemua = document.getElementById('pilih-semua');
      if (pilihSemua) {
        // Hapus event listener lama dengan clone
        const newPilihSemua = pilihSemua.cloneNode(true);
        pilihSemua.parentNode.replaceChild(newPilihSemua, pilihSemua);
        
        newPilihSemua.addEventListener('change', (e) => {
          document.querySelectorAll('.tung-hapus-cb').forEach(cb => {
            cb.checked = e.target.checked;
          });
        });
      }
    });
  },
  
  async hapusTerpilih() {
    const selected = [...document.querySelectorAll('.tung-hapus-cb:checked')].map(cb=>cb.value);
    if(selected.length === 0) return showToast('Pilih tunggakan dulu!','error');
    
    const result = await showConfirmDialog('Hapus ' + selected.length + ' tunggakan terpilih?', {
      confirmText: 'Hapus', cancelText: 'Batal', showCheckbox: true, checkboxLabel: 'Catat sebagai pemasukan di Buku Kas?'
    });
    
    if(!result || !result.confirmed) return;
    const catatPemasukan = result.checked;
    
    showLoading();
    let allOk = true;
    for(const id of selected) {
      const res = await fetchAPI('delete_tunggakan', { id, catatPemasukan });
      if(!res.success) { allOk = false; showToast(res.message, 'error'); break; }
    }
    hideLoading();
    
    if(allOk) {
      window.closeAllModals();
      await loadData();
      showToast(selected.length + ' tunggakan dihapus' + (catatPemasukan ? ' dan pemasukan dicatat' : ''));
    }
  },
  
  async updateSemuaTunggakan() {
    const ok = await showConfirmDialog('Tambahkan tunggakan untuk bulan ini kepada semua warga yang memiliki kewajiban?', { confirmText: 'Update', cancelText: 'Batal' });
    if(!ok) return;
    showLoading();
    const res = await fetchAPI('update_tunggakan_bulan_ini', {});
    hideLoading();
    if(res.success) { await loadData(); showToast(res.message||'Tunggakan bulan ini ditambahkan'); }
    else showToast(res.message, 'error');
  }
};
</script>

<script>
// KAS
window.ekas.kas = {
