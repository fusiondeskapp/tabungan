<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tabungan Ibu-Ibu RT</title>
    
    <meta name="theme-color" content="#0F766E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Fira Sans"', 'sans-serif'] },
                    colors: { primary: '#0F766E', 'primary-dark': '#115E59', success: '#16A34A', danger: '#DC2626', darkbg: '#111827', darkcard: '#1F2937' }
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .dark .glass-nav { background: rgba(31, 41, 55, 0.85); }
        .modal-animate { animation: fadeInScale 0.2s ease-out forwards; }
        .toast-enter { animation: slideInDown 0.3s ease-out forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        body[data-role="user"] .admin-only { display: none !important; }
        .profile-avatar-img { object-fit: cover; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkbg dark:text-gray-200 transition-colors duration-300 antialiased overflow-hidden selection:bg-primary/30">

    <div id="app" class="h-[100dvh] w-full max-w-[100vw] flex overflow-hidden relative">
        
        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="absolute inset-0 z-50 bg-gray-50 dark:bg-darkbg flex flex-col items-center justify-center p-4">
            <div class="bg-white dark:bg-darkcard p-6 md:p-8 rounded-2xl shadow-xl w-[calc(100%-2rem)] max-w-md modal-animate border border-gray-100 dark:border-gray-700">
                <div class="flex justify-center mb-6">
                    <div class="h-16 w-16 bg-primary text-white rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-primary/30"><i class="ph ph-wallet"></i></div>
                </div>
                <h1 class="text-2xl font-bold text-center mb-2 dark:text-white">Tabungan RT</h1>
                <p class="text-gray-500 dark:text-gray-400 text-center mb-8 text-sm">Masuk untuk mengelola tabungan</p>
                
                <form id="login-form" class="space-y-4 w-full">
                    <div>
                        <label class="block text-sm font-medium mb-1">Username / ID Anggota</label>
                        <div class="relative">
                            <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="login-user" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Masukkan Username / ID" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Password</label>
                        <div class="relative">
                            <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="login-pass" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Masukkan Password" required>
                        </div>
                    </div>
                    <button type="submit" id="btn-login" class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 rounded-xl transition-colors shadow-md shadow-primary/30 mt-4 flex justify-center items-center gap-2">
                        <span>Masuk</span><i class="ph ph-arrow-right font-bold"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- MAIN LAYOUT -->
        <div id="main-layout" class="flex w-full h-full max-w-[100vw] hidden">
            <!-- Sidebar Desktop -->
            <aside class="w-64 bg-white dark:bg-darkcard border-r border-gray-200 dark:border-gray-700 hidden lg:flex flex-col z-20 flex-shrink-0">
                <div class="p-6 flex items-center gap-3">
                    <div class="h-10 w-10 bg-primary text-white rounded-xl flex items-center justify-center text-xl shadow-md"><i class="ph ph-wallet"></i></div>
                    <div class="min-w-0">
                        <h2 class="font-bold text-lg leading-tight dark:text-white truncate">Tabungan RT</h2>
                        <span id="role-badge" class="text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded-full font-bold uppercase tracking-wide">Admin</span>
                    </div>
                </div>

                <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scroll pb-4">
                    <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium" data-target="dashboard"><i class="ph ph-squares-four text-xl"></i> Dashboard</button>
                    <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="anggota"><i class="ph ph-users text-xl"></i> Anggota</button>
                    <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="transaksi"><i class="ph ph-arrows-left-right text-xl"></i> Transaksi</button>
                    <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="laporan"><i class="ph ph-file-text text-xl"></i> Laporan</button>
                    <div class="h-px bg-gray-100 dark:bg-gray-800 my-2 admin-only"></div>
                    <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="buku"><i class="ph ph-book-bookmark text-xl"></i> Buku Tabungan</button>
                    <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="pengaturan"><i class="ph ph-gear text-xl"></i> Pengaturan</button>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 min-w-0 flex flex-col h-full relative max-w-full">
                <!-- Mobile Header -->
                <header class="lg:hidden glass-nav border-b border-gray-200 dark:border-gray-700 sticky top-0 z-20 px-4 py-3 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="h-8 w-8 bg-primary text-white rounded-lg flex flex-shrink-0 items-center justify-center shadow-md"><i class="ph ph-wallet text-sm"></i></div>
                        <h1 class="font-bold text-lg dark:text-white truncate" id="mobile-header-title">Dashboard</h1>
                    </div>
                    <div class="flex gap-1 flex-shrink-0">
                        <button onclick="navigate('pengaturan')" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors admin-only"><i class="ph ph-gear text-xl"></i></button>
                        <button onclick="toggleTheme()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors"><i class="ph ph-moon text-xl dark:hidden"></i><i class="ph ph-sun text-xl hidden dark:inline-block"></i></button>
                        <button onclick="handleLogout()" class="p-2 text-danger hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition-colors"><i class="ph ph-sign-out text-xl"></i></button>
                    </div>
                </header>

                <!-- Desktop Topbar -->
                <div class="hidden lg:flex justify-end px-8 pt-6 pb-2 w-full flex-shrink-0 gap-2">
                    <button onclick="navigate('pengaturan')" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors admin-only"><i class="ph ph-gear text-[22px]"></i></button>
                    <button onclick="toggleTheme()" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors"><i class="ph ph-moon text-[22px] dark:hidden"></i><i class="ph ph-sun text-[22px] hidden dark:inline-block"></i></button>
                    <button onclick="handleLogout()" class="p-2.5 bg-white dark:bg-darkcard text-danger shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors"><i class="ph ph-sign-out text-[22px]"></i></button>
                </div>

                <!-- Content Views -->
                <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 lg:px-8 lg:pb-8 lg:pt-2 pb-24 w-full" id="content-area"></div>
            </main>

            <!-- Bottom Navigation Mobile -->
            <nav class="lg:hidden fixed bottom-0 left-0 right-0 w-full glass-nav border-t border-gray-200 dark:border-gray-700 z-30 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.1)] pb-safe">
                <div class="flex justify-around items-center p-1.5 px-1">
                    <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0" data-target="dashboard"><i class="ph ph-squares-four text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Home</span></button>
                    <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="anggota"><i class="ph ph-users text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Anggota</span></button>
                    <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="transaksi"><i class="ph ph-arrows-left-right text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Trx</span></button>
                    <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="buku"><i class="ph ph-book-bookmark text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Buku</span></button>
                    <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="laporan"><i class="ph ph-file-text text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Laporan</span></button>
                </div>
            </nav>
        </div>
    </div>

    <!-- MODALS & TOASTS -->
    <div id="modals" class="relative z-50"></div>
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[calc(100%-2rem)] max-w-sm"></div>

    <!-- TEMPLATES -->
    <template id="tpl-dashboard">
        <div class="space-y-4 md:space-y-6 animate-fade-in w-full">
            <h2 class="text-2xl font-bold hidden lg:block dark:text-white" id="dash-title">Overview</h2>
            <!-- Profile Khusus User -->
            <div id="profile-card" class="hidden"></div>
            
            <!-- Container khusus Admin -->
            <div id="admin-container" class="admin-only space-y-4 md:space-y-6">
                <!-- Stats Grid -->
                <div id="admin-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full"></div>
                <!-- Charts: hanya grafik, tanpa aktivitas -->
                <div id="admin-charts" class="grid grid-cols-1 lg:grid-cols-1 gap-4 lg:gap-6 mt-4 w-full">
                    <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
                        <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Statistik Keseluruhan</h3>
                        <div class="h-56 md:h-64 w-full relative">
                            <canvas id="chartTransaksi"></canvas>
                        </div>
                    </div>
                    <!-- Kolom Aktivitas Sistem Terakhir dihapus -->
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-anggota">
        <!-- sama seperti sebelumnya, tidak berubah -->
        <div class="space-y-4 flex flex-col w-full h-full animate-fade-in">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <h2 class="text-2xl font-bold dark:text-white">Daftar Anggota</h2>
                <div class="flex flex-col sm:flex-row w-full sm:w-auto gap-2">
                    <div class="relative w-full sm:w-64">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-anggota" placeholder="Cari anggota..." class="w-full pl-10 pr-4 py-2.5 sm:py-2 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none bg-white text-sm">
                    </div>
                    <button class="bg-primary hover:bg-primary-dark text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center justify-center gap-2 shadow-sm whitespace-nowrap font-medium w-full sm:w-auto transition-colors" onclick="openModal('modal-anggota')">
                        <i class="ph ph-plus-circle text-lg"></i> <span>Tambah Anggota</span>
                    </button>
                </div>
            </div>
            <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden relative w-full">
                <div class="overflow-x-auto w-full h-full">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-[820px]">
                        <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
                            <tr><th class="p-4">ID</th><th class="p-4">Nama Lengkap</th><th class="p-4 text-center">Role</th><th class="p-4">No Rmh</th><th class="p-4">Saldo</th><th class="p-4 text-center">Status</th><th class="p-4 text-center">Aksi</th></tr>
                        </thead>
                        <tbody id="table-anggota" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-darkcard"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-transaksi">
        <!-- tidak berubah -->
        <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <h2 class="text-2xl font-bold dark:text-white">Riwayat Transaksi</h2>
                <button class="bg-primary hover:bg-primary-dark text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center gap-2 shadow-sm whitespace-nowrap w-full sm:w-auto justify-center font-medium transition-colors" onclick="openModal('modal-transaksi')">
                    <i class="ph ph-plus-circle text-lg"></i> <span>Transaksi Baru</span>
                </button>
            </div>
            <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden flex flex-col min-w-0 w-full relative">
                <div class="p-3 border-b border-gray-100 dark:border-gray-800 flex gap-2 overflow-x-auto hide-scroll w-full">
                    <button class="px-4 py-1.5 rounded-full bg-primary text-white text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Semua', this)">Semua Transaksi</button>
                    <button class="px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Setoran', this)">Setoran Masuk</button>
                    <button class="px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Penarikan', this)">Penarikan</button>
                </div>
                <div class="overflow-x-auto w-full flex-1">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-[850px]">
                        <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
                            <tr><th class="p-4 w-40">Waktu</th><th class="p-4">ID Trx</th><th class="p-4">Anggota</th><th class="p-4">Jenis</th><th class="p-4">Nominal</th><th class="p-4 text-center">Aksi</th></tr>
                        </thead>
                        <tbody id="table-transaksi" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-darkcard"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-laporan">
        <!-- tidak berubah -->
        <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <h2 class="text-2xl font-bold dark:text-white">Laporan Keuangan</h2>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="exportLaporanPDF()" class="flex-1 sm:flex-none bg-danger hover:bg-red-700 text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center justify-center gap-2 shadow-sm font-medium transition"><i class="ph ph-file-pdf text-lg"></i> PDF</button>
                    <button onclick="exportExcel()" class="flex-1 sm:flex-none bg-success hover:bg-green-700 text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center justify-center gap-2 shadow-sm font-medium transition"><i class="ph ph-file-xls text-lg"></i> Excel</button>
                </div>
            </div>
            <div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex flex-col sm:flex-row gap-4 sm:items-end">
                <div class="w-full sm:w-56">
                    <label class="block text-xs font-medium mb-1">Filter Periode Waktu</label>
                    <select id="filter-waktu" class="w-full p-2.5 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-2 focus:ring-primary focus:outline-none" onchange="renderLaporanData()">
                        <option value="Bulan Ini">Bulan Ini</option><option value="Minggu Ini">Minggu Ini</option><option value="Hari Ini">Hari Ini</option><option value="Tahun Ini">Tahun Ini</option><option value="Semua">Semua Waktu</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3 w-full sm:flex-1">
                    <div class="p-3 bg-success/10 border border-success/20 rounded-xl"><p class="text-[10px] text-success font-bold uppercase mb-0.5">Total Setoran</p><p class="font-bold text-success text-lg md:text-xl truncate" id="lap-tot-setoran">Rp 0</p></div>
                    <div class="p-3 bg-danger/10 border border-danger/20 rounded-xl"><p class="text-[10px] text-danger font-bold uppercase mb-0.5">Total Penarikan</p><p class="font-bold text-danger text-lg md:text-xl truncate" id="lap-tot-penarikan">Rp 0</p></div>
                </div>
            </div>
            <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden flex flex-col min-w-0 w-full relative">
                <div class="overflow-x-auto w-full flex-1">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-[600px]">
                        <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
                            <tr><th class="p-4 w-44">Tanggal</th><th class="p-4">Anggota</th><th class="p-4">Jenis Transaksi</th><th class="p-4 text-right">Nominal</th></tr>
                        </thead>
                        <tbody id="table-laporan" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-darkcard"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-buku">
        <!-- tidak berubah -->
        <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
            <h2 class="text-2xl font-bold hidden lg:block dark:text-white">Buku Tabungan Digital</h2>
            
            <div class="bg-white dark:bg-darkcard p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800" id="buku-selector-wrapper">
                <label class="block text-xs font-medium text-gray-500 mb-1">Pilih Nama Anggota:</label>
                <select id="select-buku-anggota" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none bg-white" onchange="renderBukuTabungan()"></select>
            </div>

            <div id="passbook-area" class="hidden flex-1 flex-col gap-4 min-w-0 w-full overflow-y-auto hide-scroll pb-10">
                <div class="flex flex-col md:flex-row gap-4 w-full shrink-0">
                    <div class="bg-gradient-to-br from-primary to-primary-dark p-5 md:p-6 rounded-2xl shadow-md text-white flex-1 relative overflow-hidden h-36 md:h-44">
                        <div class="absolute -right-6 -top-6 opacity-10 pointer-events-none"><i class="ph ph-wallet" style="font-size: 140px;"></i></div>
                        <div class="relative z-10 flex flex-col h-full justify-between">
                            <div><p class="text-white/80 text-[10px] uppercase font-bold tracking-wider mb-1">Buku Tabungan RT</p><h3 class="text-xl md:text-2xl font-bold truncate pr-10" id="buku-nama">-</h3></div>
                            <div class="grid grid-cols-2 gap-2 text-sm mt-auto">
                                <div><p class="text-white/60 text-[10px]">ID Anggota</p><p class="font-medium font-mono text-xs md:text-sm truncate" id="buku-id">-</p></div>
                                <div><p class="text-white/60 text-[10px]">No Rumah</p><p class="font-medium font-mono text-xs md:text-sm" id="buku-norumah">-</p></div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-darkcard p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-[0.7] flex flex-col justify-center items-center h-36 md:h-44">
                        <p class="text-gray-500 dark:text-gray-400 text-xs font-medium mb-1 uppercase tracking-wide">Saldo Akhir</p>
                        <h2 class="text-2xl md:text-3xl font-bold text-primary mb-3 md:mb-4 truncate w-full text-center" id="buku-saldo">Rp 0</h2>
                        <div class="w-full"><button onclick="cetakBukuTabunganPDF()" class="w-full bg-gray-50 hover:bg-gray-100 dark:bg-gray-700/50 text-gray-700 dark:text-white py-2 rounded-xl text-sm font-medium transition flex justify-center items-center gap-2"><i class="ph ph-file-pdf text-lg text-danger"></i> Unduh PDF</button></div>
                    </div>
                </div>

                <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden flex flex-col min-w-0" id="pdf-content">
                    <div class="p-3 md:p-4 border-b border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50">
                        <h4 class="font-bold text-sm text-primary flex items-center gap-2"><i class="ph ph-list-bullets text-lg"></i> Tabel Riwayat Mutasi</h4>
                    </div>
                    <div class="overflow-x-auto w-full flex-1">
                        <table class="w-full text-left text-xs md:text-sm whitespace-nowrap min-w-[600px]">
                            <thead class="bg-white dark:bg-darkcard text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700">
                                <tr><th class="p-3 font-medium">Tanggal</th><th class="p-3 font-medium">Keterangan</th><th class="p-3 font-medium text-right">Debit (Masuk)</th><th class="p-3 font-medium text-right">Kredit (Keluar)</th><th class="p-3 font-medium text-right bg-gray-50 dark:bg-gray-800/30">Saldo</th></tr>
                            </thead>
                            <tbody id="table-buku" class="divide-y divide-gray-100 dark:divide-gray-800 font-mono bg-white dark:bg-darkcard"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div id="passbook-empty" class="flex-1 flex flex-col items-center justify-center text-gray-400 pb-10 text-center px-4"><i class="ph ph-book-open text-6xl mb-4 opacity-50 text-primary"></i><h3 class="font-bold text-gray-600 dark:text-gray-300 mb-1">Pilih Anggota Terlebih Dahulu</h3><p class="text-sm">Riwayat mutasi transaksi buku tabungan akan muncul di sini.</p></div>
        </div>
    </template>

    <!-- JS LOGIC -->
    <script>
        const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxcuUe9qO2PyallWSn7vu2UiiKTnMqirKbocdI_VI8uWnYyjYYvRsv_DUpGIV2GSWiuqQ/exec';
        const ADMIN_VIEWS = new Set(['anggota', 'transaksi', 'laporan', 'pengaturan']);

        const readStorage = (key, fallback = '') => {
            try { return localStorage.getItem(key) || fallback; } catch(e) { return fallback; }
        };

        const writeStorage = (key, value) => {
            try { localStorage.setItem(key, value); } catch(e) {}
        };

        const removeStorage = (key) => {
            try { localStorage.removeItem(key); } catch(e) {}
        };

        window.toggleTheme = () => { 
            const html = document.documentElement; 
            html.classList.toggle('dark'); 
            try { localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light'); } catch(e) {} 
        };

        function initMockDB() {
            if(!localStorage.getItem('mock_anggota')) {
                localStorage.setItem('mock_anggota', JSON.stringify([{"ID Anggota":"sitiaminah12", "Password":"123456", "Role":"user", "Nama Lengkap":"Siti Aminah", "No Rumah":"12", "No HP":"08123456789", "Status":"Aktif", "Foto Profil":""}]));
                localStorage.setItem('mock_transaksi', JSON.stringify([{"ID Transaksi":"TRX-2026-01", "Tanggal": new Date().toISOString(), "ID Anggota":"sitiaminah12", "Nama Anggota":"Siti Aminah", "Jenis Transaksi":"Setoran", "Nominal":150000, "Keterangan":"Iuran"}]));
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => { 
            initMockDB(); 
            if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark'); 
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            await restoreSession();
        });

        let chartInstance = null;
        const state = { user: null, data: { anggota: [], transaksi: [], logs: [] }, settings: { gasUrl: readStorage('gasUrl', DEFAULT_GAS_URL), theme: readStorage('theme', 'light') }, ui: { currentView: 'dashboard' } };
        
        const getGasUrl = () => (state.settings.gasUrl || DEFAULT_GAS_URL || '').trim();
        const normalizeRole = (role) => String(role || 'user').toLowerCase() === 'admin' ? 'admin' : 'user';
        const toNumber = (value) => {
            const n = Number(value);
            return Number.isFinite(n) ? n : 0;
        };
        const formatRupiah = (angka) => 'Rp ' + toNumber(angka).toLocaleString('id-ID');
        const formatDateTime = (iso) => {
            if (!iso) return '-';
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return '-';
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(d.getDate())}-${pad(d.getMonth() + 1)}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const calculateSaldo = (id) => state.data.transaksi.filter(t=>String(t['ID Anggota'])===String(id)).reduce((s, t) => t['Jenis Transaksi'] === 'Setoran' ? s + toNumber(t['Nominal']) : s - toNumber(t['Nominal']), 0);
        const withoutPassword = (anggota) => {
            const data = { ...anggota };
            delete data.Password;
            delete data['Foto File ID'];
            data.Role = normalizeRole(data.Role);
            return data;
        };
        const persistSession = () => {
            if (!state.user) return;
            writeStorage('app_session', JSON.stringify({
                user: state.user,
                savedAt: Date.now()
            }));
        };
        const clearSession = () => removeStorage('app_session');
        const getUserInitials = (user) => String(user?.['Nama Lengkap'] || user?.['ID Anggota'] || '?').trim().split(/\s+/).slice(0, 2).map(x => x[0] || '').join('').toUpperCase();
        const avatarMarkup = (user, classes = 'h-20 w-20') => {
            const url = user?.['Foto Profil'];
            if (url) return `<img src="${url}" alt="Foto Profil" class="${classes} profile-avatar-img rounded-2xl border border-white/30 bg-white/20 shadow-lg" onerror="this.replaceWith(Object.assign(document.createElement('div'), { className: '${classes} rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg', textContent: '${getUserInitials(user)}' }))">`;
            return `<div class="${classes} rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg">${getUserInitials(user)}</div>`;
        };

        const showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            const clrs = { success: 'bg-green-100 text-green-800 border-green-200', error: 'bg-red-100 text-red-800 border-red-200' };
            toast.className = `flex items-center gap-3 p-3.5 rounded-xl border shadow-lg toast-enter pointer-events-auto backdrop-blur-md ${clrs[type]} w-full z-[100]`;
            toast.innerHTML = `<span class="font-medium text-sm">${msg}</span>`;
            container.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        };

        async function fetchAPI(action, payload = {}) {
            const gasUrl = getGasUrl();

            if (gasUrl) {
                try {
                    const request = {
                        action,
                        payload,
                        user: state.user ? state.user.username : 'Guest'
                    };

                    if (state.user && state.user.token) {
                        request.auth = { token: state.user.token };
                    }

                    const res = await fetch(gasUrl, {
                        method: 'POST',
                        body: JSON.stringify(request),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        redirect: 'follow'
                    });
                    const text = await res.text();
                    let data;

                    try {
                        data = JSON.parse(text);
                    } catch(e) {
                        throw new Error('Respons server bukan JSON. Cek URL /exec dan izin Web App.');
                    }

                    if (!res.ok) {
                        return { success: false, message: data.message || `Server error ${res.status}` };
                    }

                    return data;
                } catch(e) {
                    console.error(e);
                    return { success: false, message: e.message || "Koneksi ke Server Google gagal." };
                }
            }

            return new Promise(resolve => {
                setTimeout(() => {
                    let a = JSON.parse(readStorage('mock_anggota', '[]')); 
                    let t = JSON.parse(readStorage('mock_transaksi', '[]')); 
                    const actor = state.user ? state.user.username : 'Unknown';
                    
                    if(action === 'login') {
                        if(payload.username.toLowerCase()==='bendahara' && payload.password==='123456') resolve({success:true, role:'admin', data:{'ID Anggota':'ADMIN', 'Nama Lengkap':'Bendahara'}});
                        else { let u = a.find(x => String(x['ID Anggota']).toLowerCase() === String(payload.username).toLowerCase()); if(u && payload.password===(u.Password || '123456')) resolve({success:true, role:normalizeRole(u.Role), data:withoutPassword(u)}); else resolve({success:false, message:'Username / Password salah!'}); }
                    } else if (action === 'get_all_data') {
                        if(payload.role === 'user') resolve({success: true, data: { anggota: a.filter(x=>String(x['ID Anggota'])===String(payload.userId)).map(withoutPassword), transaksi: t.filter(x=>String(x['ID Anggota'])===String(payload.userId)), logs:[] }});
                        else resolve({success: true, data: { anggota: a.map(withoutPassword), transaksi: t, logs:[] }});
                    } else if (action === 'update_profile') {
                        let i = a.findIndex(x => String(x['ID Anggota']) === String(state.user?.['ID Anggota']));
                        if(i === -1) { resolve({success:false, message:'Profil tidak ditemukan.'}); return; }
                        if(payload.password) a[i].Password = payload.password;
                        if(payload.photo && payload.photo.data) a[i]['Foto Profil'] = payload.photo.data;
                        localStorage.setItem('mock_anggota', JSON.stringify(a));
                        resolve({success:true, message:'Profil berhasil diperbarui.', role:normalizeRole(a[i].Role), data:withoutPassword(a[i])});
                    } else if (action === 'save_anggota') {
                        if(!payload.nama || !payload.noRumah) { resolve({success:false, message:'Nama dan nomor rumah wajib diisi.'}); return; }
                        let id = payload.id || (payload.nama.toLowerCase().replace(/[^a-z]/g, '') + payload.noRumah);
                        if(!payload.id) { a.push({"ID Anggota": id, "Password": payload.password || '123456', "Role": normalizeRole(payload.role), "Nama Lengkap": payload.nama, "No Rumah": payload.noRumah, "No HP": payload.noHp, "Status": payload.status, "Tanggal Dibuat": new Date().toISOString(), "Foto Profil":""}); } 
                        else { let i = a.findIndex(x => String(x['ID Anggota']) === String(id)); if(i>-1) { if(payload.password) a[i]['Password']=payload.password; a[i]['Role']=normalizeRole(payload.role); a[i]['Nama Lengkap']=payload.nama; a[i]['No Rumah']=payload.noRumah; a[i]['No HP']=payload.noHp; a[i]['Status']=payload.status; } else { resolve({success:false, message:'Anggota tidak ditemukan.'}); return; } }
                        localStorage.setItem('mock_anggota', JSON.stringify(a)); resolve({success:true});
                    } else if (action === 'save_transaksi') {
                        const anggota = a.find(x => String(x['ID Anggota']) === String(payload.idAnggota));
                        if(!anggota) { resolve({success:false, message:'Anggota transaksi tidak ditemukan.'}); return; }
                        if(toNumber(payload.nominal) <= 0) { resolve({success:false, message:'Nominal transaksi harus lebih dari 0.'}); return; }
                        let id = "TRX-" + new Date().toISOString().slice(0,10).replace(/-/g,'') + "-" + ("000"+(t.length+1)).slice(-4);
                        t.push({"ID Transaksi": id, "Tanggal": new Date().toISOString(), "ID Anggota": payload.idAnggota, "Nama Anggota": anggota['Nama Lengkap'], "Jenis Transaksi": payload.jenis, "Nominal": toNumber(payload.nominal), "Keterangan": payload.keterangan, "User Input": actor});
                        localStorage.setItem('mock_transaksi', JSON.stringify(t)); resolve({success:true});
                    } else if (action === 'delete_anggota') {
                        if(t.some(x => String(x['ID Anggota']) === String(payload.id))) { resolve({success:false, message:'Anggota masih punya transaksi. Ubah status menjadi Nonaktif.'}); return; }
                        let idx = a.findIndex(x => String(x['ID Anggota']) === String(payload.id));
                        if(idx > -1) a.splice(idx, 1); else { resolve({success:false, message:'Anggota tidak ditemukan.'}); return; }
                        // log dihapus
                        localStorage.setItem('mock_anggota', JSON.stringify(a));
                        resolve({success:true});
                    } else if (action === 'delete_transaksi') {
                        let idx = t.findIndex(x => String(x['ID Transaksi']) === String(payload.id));
                        if(idx > -1) t.splice(idx, 1); else { resolve({success:false, message:'Transaksi tidak ditemukan.'}); return; }
                        // log dihapus
                        localStorage.setItem('mock_transaksi', JSON.stringify(t));
                        resolve({success:true});
                    } else {
                        resolve({success:false, message:'Aksi tidak ditemukan.'});
                    }
                }, 400);
            });
        }

        async function restoreSession() {
            const raw = readStorage('app_session', '');
            if (!raw) return false;

            try {
                const session = JSON.parse(raw);
                if (!session || !session.user || !session.user.token) return false;

                state.user = session.user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-layout').classList.remove('hidden');
                document.getElementById('role-badge').innerText = state.user.role === 'admin' ? 'Admin' : 'Anggota';
                document.body.setAttribute('data-role', state.user.role);
                document.getElementById('login-form').reset();
                navigate('dashboard');

                const loaded = await loadData();
                if (!loaded) {
                    clearSession();
                    state.user = null;
                    document.body.removeAttribute('data-role');
                    document.getElementById('login-screen').classList.remove('hidden');
                    document.getElementById('main-layout').classList.add('hidden');
                    return false;
                }

                return true;
            } catch (error) {
                clearSession();
                return false;
            }
        }

        async function handleLogin(e) {
            e.preventDefault(); 
            const u = document.getElementById('login-user').value.trim(); 
            const p = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-xl"></i> Memeriksa...`; btn.disabled = true;

            const res = await fetchAPI('login', { username: u, password: p });
            btn.innerHTML = `<span>Masuk</span><i class="ph ph-arrow-right font-bold"></i>`; btn.disabled = false;

            if (res.success) {
                state.user = { ...res.data, username: u, role: normalizeRole(res.role || res.data?.Role), token: res.token || '' };
                persistSession();
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('main-layout').classList.remove('hidden');
                document.getElementById('role-badge').innerText = state.user.role === 'admin' ? 'Bendahara' : 'Anggota';
                document.body.setAttribute('data-role', state.user.role);
                navigate('dashboard');
                const loaded = await loadData();
                showToast(loaded ? "Login berhasil" : "Login berhasil, tapi data belum termuat", loaded ? "success" : "error");
            } else showToast(res.message, "error");
        }

        async function loadData() {
            if (!state.user) return false;
            const res = await fetchAPI('get_all_data', { role: state.user.role, userId: state.user['ID Anggota'] });
            if(res.success) {
                state.data = {
                    anggota: (res.data && res.data.anggota) || [],
                    transaksi: (res.data && res.data.transaksi) || [],
                    logs: []   // log selalu kosong
                };
                const current = state.data.anggota.find(a => String(a['ID Anggota']) === String(state.user['ID Anggota']));
                if (current) state.user = { ...state.user, ...current, role: state.user.role || normalizeRole(current.Role) };
                renderCurrentView();
                return true;
            }

            showToast(res.message || "Gagal memuat data", "error");
            return false;
        }

        function handleLogout() {
            state.user = null; state.data = { anggota: [], transaksi: [], logs: [] }; state.ui.currentView = 'dashboard';
            clearSession();
            document.body.removeAttribute('data-role'); document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-layout').classList.add('hidden');
            document.getElementById('login-form').reset(); closeAllModals(); if(chartInstance) { chartInstance.destroy(); chartInstance = null; }
            document.getElementById('content-area').innerHTML = '';
            document.getElementById('mobile-header-title').innerText = 'Dashboard';
        }

        function navigate(viewName) {
            if (!state.user) return;
            if (state.user.role !== 'admin' && ADMIN_VIEWS.has(viewName)) viewName = 'dashboard';
            state.ui.currentView = viewName;
            document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(btn => {
                let isAktif = btn.dataset.target === viewName;
                let isAdminOnly = btn.classList.contains('admin-only') ? ' admin-only' : '';
                
                if(btn.classList.contains('nav-btn')) {
                    btn.className = isAktif ? 'nav-btn' + isAdminOnly + ' w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium' : 'nav-btn' + isAdminOnly + ' w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium';
                } else {
                    btn.className = isAktif ? 'nav-btn-mobile' + isAdminOnly + ' flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0' : 'nav-btn-mobile' + isAdminOnly + ' flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0';
                }
            });
            const tMap = { dashboard:'Dashboard', anggota:'Anggota', transaksi:'Transaksi', buku:'Buku Tabungan', laporan:'Laporan', pengaturan:'Pengaturan' };
            document.getElementById('mobile-header-title').innerText = tMap[viewName] || 'Aplikasi';
            renderCurrentView();
        }

        document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(b => b.addEventListener('click', () => navigate(b.dataset.target)));

        function renderCurrentView() {
            if (!state.user) return;
            if (state.user.role !== 'admin' && ADMIN_VIEWS.has(state.ui.currentView)) state.ui.currentView = 'dashboard';
            const a = document.getElementById('content-area'); a.innerHTML = ''; const v = state.ui.currentView;
            if(v==='dashboard'){ a.appendChild(document.getElementById('tpl-dashboard').content.cloneNode(true)); renderDashboard(); }
            else if(v==='anggota'){ a.appendChild(document.getElementById('tpl-anggota').content.cloneNode(true)); renderAnggota(); }
            else if(v==='transaksi'){ a.appendChild(document.getElementById('tpl-transaksi').content.cloneNode(true)); renderTransaksi(); }
            else if(v==='laporan'){ a.appendChild(document.getElementById('tpl-laporan').content.cloneNode(true)); renderLaporanData(); }
            else if(v==='buku'){ a.appendChild(document.getElementById('tpl-buku').content.cloneNode(true)); setupBukuTabungan(); }
            else if(v==='pengaturan'){ renderPengaturan(a); }
        }

        window.closeAllModals = () => document.getElementById('modals').innerHTML = '';

        window.previewProfilePhoto = function(e) {
            const file = e.target.files && e.target.files[0];
            if(!file) return;

            if(!file.type.startsWith('image/')) {
                showToast("File harus berupa gambar", "error");
                e.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                const preview = document.getElementById('profile-photo-preview');
                if(preview) preview.innerHTML = `<img src="${reader.result}" class="h-24 w-24 rounded-2xl object-cover border border-gray-200 dark:border-gray-700 shadow-lg" alt="Preview Foto">`;
            };
            reader.readAsDataURL(file);
        };

        function resizeProfilePhoto(file) {
            return new Promise((resolve, reject) => {
                if(!file) { resolve(null); return; }
                if(!file.type.startsWith('image/')) { reject(new Error("File harus berupa gambar.")); return; }

                const reader = new FileReader();
                reader.onerror = () => reject(new Error("Gagal membaca file foto."));
                reader.onload = () => {
                    const img = new Image();
                    img.onerror = () => reject(new Error("Foto tidak bisa diproses."));
                    img.onload = () => {
                        const size = 512;
                        const canvas = document.createElement('canvas');
                        canvas.width = size; canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        const scale = Math.max(size / img.width, size / img.height);
                        const w = img.width * scale, h = img.height * scale;
                        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
                        resolve({
                            name: file.name || 'profile.jpg',
                            mimeType: 'image/jpeg',
                            data: canvas.toDataURL('image/jpeg', 0.82)
                        });
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderDashboard() {
            if (!state.user) return;
            const myId = state.user['ID Anggota'];
            const mySaldo = calculateSaldo(myId);
            const roleLabel = state.user.role === 'admin' ? 'Admin' : 'Anggota';
            const profileHtml = `
                <div class="bg-gradient-to-br from-primary to-primary-dark p-5 md:p-6 rounded-2xl shadow-md text-white relative overflow-hidden flex flex-col sm:flex-row gap-4 mb-2 mt-2">
                    <div class="absolute -right-6 -top-6 opacity-10"><i class="ph ph-user-circle" style="font-size: 150px;"></i></div>
                    <div class="z-10 flex-shrink-0">${avatarMarkup(state.user, 'h-20 w-20 md:h-24 md:w-24')}</div>
                    <div class="flex-1 z-10 w-full min-w-0">
                        <div class="flex flex-wrap items-center gap-2 mb-2">
                            <p class="text-white/80 text-[10px] uppercase font-bold tracking-wide">Profil ${roleLabel}</p>
                            <span class="text-[10px] uppercase font-bold bg-white/15 border border-white/20 px-2 py-0.5 rounded-full">${roleLabel}</span>
                        </div>
                        <h3 class="text-2xl font-bold mb-1 truncate">${state.user['Nama Lengkap'] || '-'}</h3>
                        <p class="text-xs opacity-90"><i class="ph ph-identification-card"></i> ID: ${state.user['ID Anggota'] || '-'}</p>
                        <p class="text-xs opacity-90 mt-0.5"><i class="ph ph-house"></i> Rumah No. ${state.user['No Rumah'] || '-'}</p>
                    </div>
                    <div class="z-10 flex flex-col gap-2 sm:items-end">
                        <div class="bg-white text-gray-800 p-4 rounded-xl shadow-lg text-center min-w-[150px]">
                            <p class="text-[10px] font-bold text-gray-500 uppercase">Total Saldo</p>
                            <p class="text-xl font-bold text-primary">${formatRupiah(mySaldo)}</p>
                        </div>
                        <button onclick="openModal('modal-profile')" class="bg-white/15 hover:bg-white/25 text-white border border-white/25 px-4 py-2 rounded-xl text-sm font-medium flex items-center justify-center gap-2 transition-colors">
                            <i class="ph ph-user-circle-gear text-lg"></i> Edit Profil
                        </button>
                    </div>
                </div>`;

            document.getElementById('profile-card').innerHTML = profileHtml;
            document.getElementById('profile-card').classList.remove('hidden');
            document.getElementById('dash-title').innerText = state.user.role === 'admin' ? 'Dashboard Admin' : 'Beranda Anggota';

            if (state.user.role !== 'admin') {
                document.getElementById('admin-container').classList.add('hidden');
                if(chartInstance) { chartInstance.destroy(); chartInstance = null; }

                        <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                            <h3 class="font-bold" id="m-anggota-title">Tambah Anggota</h3>
                            <button onclick="closeAllModals()"><i class="ph ph-x text-lg"></i></button>
                        </div>
                        <div class="overflow-y-auto p-4 md:p-6 hide-scroll">
                            <form class="space-y-4" onsubmit="submitAnggota(event)">
                                <input type="hidden" id="f-a-id">
                                <div><label class="block text-xs font-medium mb-1">Password Login</label><input type="password" id="f-a-password" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none" autocomplete="new-password" placeholder="Kosongkan untuk default / tidak diubah"></div>
                                <div><label class="block text-xs font-medium mb-1">Role Akses</label><select id="f-a-role" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none"><option value="user">User</option><option value="admin">Admin</option></select></div>
                                <div><label class="block text-xs font-medium mb-1">Nama Lengkap</label><input type="text" id="f-a-nama" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none" required></div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div><label class="block text-xs font-medium mb-1">No Rmh</label><input type="text" id="f-a-norumah" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none" required></div>
                                    <div><label class="block text-xs font-medium mb-1">No HP</label><input type="text" id="f-a-nohp" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none"></div>
                                </div>
                                <div id="div-status" class="hidden"><label class="block text-xs font-medium mb-1">Status</label>
                                    <select id="f-a-status" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none"><option value="Aktif">Aktif</option><option value="Nonaktif">Nonaktif</option></select>
                                </div>
                                <div class="pt-2"><button type="submit" class="w-full py-3 rounded-xl bg-primary text-white font-medium text-sm">Simpan Data</button></div>
                            </form>
                        </div>
                    </div></div>`;
            } else if (id === 'modal-transaksi') {
                let opts = `<option value="">-- Pilih Anggota --</option>`; state.data.anggota.forEach(a => opts += `<option value="${a['ID Anggota']}">${a['ID Anggota']} - ${a['Nama Lengkap']}</option>`);
                content = `<div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div class="bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-md modal-animate overflow-hidden max-h-[90dvh] flex flex-col">
                        <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                            <h3 class="font-bold">Transaksi Baru</h3><button onclick="closeAllModals()"><i class="ph ph-x text-lg"></i></button>
                        </div>
                        <div class="overflow-y-auto p-4 md:p-6 hide-scroll">
                            <form class="space-y-4" onsubmit="submitTransaksi(event)">
                                <div class="flex p-1 bg-gray-100 dark:bg-gray-800 rounded-xl">
                                    <label class="flex-1 text-center"><input type="radio" name="f-t-jenis" value="Setoran" class="peer sr-only" checked><div class="py-2 rounded-lg text-sm font-medium peer-checked:bg-white peer-checked:text-success shadow-sm">Uang Masuk</div></label>
                                    <label class="flex-1 text-center"><input type="radio" name="f-t-jenis" value="Penarikan" class="peer sr-only"><div class="py-2 rounded-lg text-sm font-medium peer-checked:bg-white peer-checked:text-danger shadow-sm">Uang Keluar</div></label>
                                </div>
                                <div><label class="block text-xs font-medium mb-1">Anggota</label><select id="f-t-anggota" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none" required>${opts}</select></div>
                                <div><label class="block text-xs font-medium mb-1">Nominal (Rp)</label><input type="number" id="f-t-nominal" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 font-bold text-lg text-right focus:ring-primary focus:outline-none" required></div>
                                <div><label class="block text-xs font-medium mb-1">Keterangan</label><input type="text" id="f-t-ket" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm focus:ring-primary focus:outline-none" placeholder="Cth: Iuran Juli"></div>
                                <div class="pt-2"><button type="submit" class="w-full py-3 rounded-xl bg-primary text-white font-medium text-sm">Proses Transaksi</button></div>
                            </form>
                        </div>
                    </div></div>`;
            }
            con.innerHTML = content;
        }

        window.submitProfile = async (e) => {
            e.preventDefault();
            const password = document.getElementById('f-p-password').value.trim();
            const password2 = document.getElementById('f-p-password2').value.trim();
            const file = document.getElementById('f-p-photo').files[0];
            const btn = document.getElementById('btn-profile-save');

            if(password || password2) {
                if(password.length < 4) { showToast("Password minimal 4 karakter", "error"); return; }
                if(password !== password2) { showToast("Konfirmasi password tidak sama", "error"); return; }
            }

            if(!password && !file) {
                showToast("Tidak ada perubahan profil", "error");
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = `<i class="ph ph-spinner animate-spin text-lg"></i> Menyimpan...`;
                const photo = file ? await resizeProfilePhoto(file) : null;
                const res = await fetchAPI('update_profile', { password, photo });

                if(!res.success) { showToast(res.message || "Gagal memperbarui profil", "error"); return; }

                state.user = {
                    ...state.user,
                    ...(res.data || {}),
                    role: normalizeRole(res.role || res.data?.Role || state.user.role)
                };
                persistSession();
                document.body.setAttribute('data-role', state.user.role);
                showToast(res.message || "Profil berhasil diperbarui");
                closeAllModals();
                await loadData();
            } catch(error) {
                showToast(error.message || "Gagal memproses foto", "error");
            } finally {
                if(btn) {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="ph ph-floppy-disk text-lg"></i> Simpan Profil`;
                }
            }
        };

        window.submitAnggota = async (e) => {
            e.preventDefault();
            const res = await fetchAPI('save_anggota', {
                id: document.getElementById('f-a-id').value,
                password: document.getElementById('f-a-password').value,
                role: document.getElementById('f-a-role').value,
                nama: document.getElementById('f-a-nama').value,
                noRumah: document.getElementById('f-a-norumah').value,
                noHp: document.getElementById('f-a-nohp').value,
                status: document.getElementById('f-a-status') ? document.getElementById('f-a-status').value : 'Aktif'
            });

            if(!res.success) { showToast(res.message || "Gagal menyimpan anggota", "error"); return; }

            showToast(res.message || "Data anggota tersimpan");
            closeAllModals();
            await loadData();
        };

        window.submitTransaksi = async (e) => {
            e.preventDefault();
            const idA = document.getElementById('f-t-anggota').value;
            const anggota = state.data.anggota.find(a=>String(a['ID Anggota'])===String(idA));
            const nominal = toNumber(document.getElementById('f-t-nominal').value);

            if(!anggota) { showToast("Pilih anggota terlebih dahulu", "error"); return; }
            if(nominal <= 0) { showToast("Nominal transaksi harus lebih dari 0", "error"); return; }

            const res = await fetchAPI('save_transaksi', {
                idAnggota: idA,
                namaAnggota: anggota['Nama Lengkap'],
                jenis: document.querySelector('input[name="f-t-jenis"]:checked').value,
                nominal,
                keterangan: document.getElementById('f-t-ket').value
            });

            if(!res.success) { showToast(res.message || "Gagal menyimpan transaksi", "error"); return; }

            showToast(res.message || "Transaksi berhasil");
            closeAllModals();
            await loadData();
        };
        
        window.editAnggota = (id) => { 
            const a = state.data.anggota.find(x => String(x['ID Anggota']) === String(id));
            if(!a) { showToast("Anggota tidak ditemukan", "error"); return; }
            openModal('modal-anggota'); 
            document.getElementById('m-anggota-title').innerText='Edit Anggota'; 
            document.getElementById('f-a-id').value=a['ID Anggota']; document.getElementById('f-a-password').value=''; document.getElementById('f-a-role').value=normalizeRole(a['Role']); document.getElementById('f-a-nama').value=a['Nama Lengkap']; document.getElementById('f-a-norumah').value=a['No Rumah']; document.getElementById('f-a-nohp').value=a['No HP']; document.getElementById('div-status').classList.remove('hidden'); document.getElementById('f-a-status').value=a['Status']; 
        };

        window.deleteAnggota = async (id) => {
            if(!confirm("Yakin ingin menghapus anggota ini? Aksi ini tidak dapat dibatalkan.")) return;
            const res = await fetchAPI('delete_anggota', { id: id });
            if(res.success) { showToast(res.message || "Anggota dihapus!"); loadData(); } else { showToast(res.message || "Gagal menghapus", "error"); }
        }

        window.deleteTransaksi = async (id) => {
            if(!confirm("Yakin menghapus transaksi ini? Saldo dan buku tabungan akan disesuaikan secara otomatis.")) return;
            const res = await fetchAPI('delete_transaksi', { id: id });
            if(res.success) { showToast(res.message || "Transaksi dihapus!"); loadData(); } else { showToast(res.message || "Gagal menghapus", "error"); }
        }

    </script>
</body>
</html>
