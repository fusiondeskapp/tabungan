<!-- ==================== SCRIPT BAGIAN 1: CORE & SETUP ==================== -->
<script>
// ===================== KONFIGURASI =====================
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxcuUe9qO2PyallWSn7vu2UiiKTnMqirKbocdI_VI8uWnYyjYYvRsv_DUpGIV2GSWiuqQ/exec';
const MAX_RETRIES = 3;
const RETRY_DELAY_MS = 1000;
const SESSION_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
const APP_VERSION = '3.1.0';

const ROLE_PERMISSIONS = {
  dashboard: ['superadmin', 'admin_istri', 'admin_suami', 'user'],
  warga: ['superadmin', 'admin_istri', 'admin_suami'],
  transaksi: ['superadmin', 'admin_istri'],
  pembayaran: ['superadmin', 'admin_suami'],
  kas: ['superadmin', 'admin_istri', 'admin_suami', 'user'],
  buku: ['superadmin', 'admin_istri'],
  pengaturan: ['superadmin'],
  tentang: ['superadmin', 'admin_istri', 'admin_suami', 'user']
};

const state = { 
  user: null, 
  data: { warga: [], transaksi: [], tunggakan: [], biaya: [], pembayaran: [], kas: [], settings: {} }, 
  settings: { gasUrl: DEFAULT_GAS_URL, theme: 'light' },
  ui: { currentView: 'dashboard' },
  pwa: { deferredPrompt: null, isInstalled: false }
};

try {
  state.settings.gasUrl = localStorage.getItem('gasUrl') || DEFAULT_GAS_URL;
  state.settings.theme = localStorage.getItem('theme') || 'light';
} catch(e) {}

// ===================== ERROR BOUNDARY =====================
window.onerror = function(message, source, lineno, colno, error) {
  console.error('Global Error:', { message, source, lineno, colno, error });
  hideLoading();
  const contentArea = document.getElementById('content-area');
  if (contentArea && document.getElementById('main-layout') && !document.getElementById('main-layout').classList.contains('hidden')) {
    contentArea.innerHTML = `
      <div class="flex items-center justify-center h-full">
        <div class="text-center p-8 max-w-md">
          <i class="ph ph-warning-circle text-6xl text-warning mb-4"></i>
          <h3 class="font-bold text-lg mb-2">Terjadi Kesalahan</h3>
          <p class="text-gray-500 mb-4 text-sm">Aplikasi mengalami error. Silakan coba lagi.</p>
          <div class="flex gap-3 justify-center">
            <button onclick="navigate(state.ui.currentView || 'dashboard')" class="bg-primary text-white px-6 py-2 rounded-xl font-medium hover:bg-primary-dark transition-colors">
              <i class="ph ph-arrows-clockwise mr-2"></i> Coba Lagi
            </button>
            <button onclick="location.reload()" class="bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-6 py-2 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
              <i class="ph ph-arrow-counter-clockwise mr-2"></i> Muat Ulang
            </button>
          </div>
        </div>
      </div>`;
  }
  return true;
};

window.onunhandledrejection = function(event) {
  console.error('Unhandled Promise Rejection:', event.reason);
  hideLoading();
  showToast('Operasi gagal. Silakan coba lagi.', 'error');
};

// ===================== HELPER FUNCTIONS =====================
const getGasUrl = function() { return (state.settings.gasUrl || DEFAULT_GAS_URL || '').trim(); };

const normalizeRole = function(role) { 
  const r = String(role || 'user').toLowerCase(); 
  return ['superadmin', 'admin_istri', 'admin_suami', 'user'].includes(r) ? r : 'user'; 
};

const toNumber = function(value) { const n = Number(value); return Number.isFinite(n) ? n : 0; };

const formatRupiah = function(angka) { return 'Rp ' + toNumber(angka).toLocaleString('id-ID'); };

const formatDateTime = function(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '-';
  const pad = function(n) { return n.toString().padStart(2, '0'); };
  const yy = String(d.getFullYear()).slice(-2);
  return pad(d.getDate()) + '-' + pad(d.getMonth() + 1) + '-' + yy + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
};

const calculateSaldo = function(id) {
  return state.data.transaksi
    .filter(function(t) { return String(t['ID Anggota']) === String(id); })
    .reduce(function(s, t) { 
      return t['Jenis Transaksi'] === 'Setoran' ? s + toNumber(t['Nominal']) : s - toNumber(t['Nominal']); 
    }, 0);
};

const escapeHtml = function(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
};

const getUserInitials = function(user) {
  return String(user?.['Nama Istri'] || user?.['Nama Suami'] || user?.['ID Warga'] || '?')
    .trim().split(/\s+/).slice(0, 2).map(function(x) { return x[0] || ''; }).join('').toUpperCase();
};

const avatarMarkup = function(user, classes) {
  classes = classes || 'h-20 w-20';
  const url = user?.['Foto Profil'];
  if (url) {
    return '<img src="' + url + '" alt="Foto Profil" class="' + classes + ' profile-avatar-img rounded-2xl border border-white/30 bg-white/20 shadow-lg" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'), { className: \'' + classes + ' rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg\', textContent: \'' + getUserInitials(user) + '\' }))">';
  }
  return '<div class="' + classes + ' rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg">' + getUserInitials(user) + '</div>';
};

const getRoleLabel = function(role) {
  var labels = { superadmin: 'Superadmin', admin_istri: 'Admin Istri', admin_suami: 'Admin Suami', user: 'Warga' };
  return labels[role] || 'User';
};

function canAccess(viewName) { 
  return (ROLE_PERMISSIONS[viewName] || []).includes(state.user?.role || 'user'); 
}

function updateNavigationVisibility() {
  document.querySelectorAll('.nav-btn[data-target], .nav-btn-mobile[data-target]').forEach(function(btn) {
    if (!canAccess(btn.dataset.target)) btn.classList.add('hidden');
    else btn.classList.remove('hidden');
  });
}

// ===================== STORAGE HELPERS =====================

// ===================== CONFIRM DIALOG =====================
function showConfirmDialog(message, options) {
  return new Promise(function(resolve) {
    options = options || {};
    var confirmText = options.confirmText || 'Ya';
    var cancelText = options.cancelText || 'Batal';
    var showCheckbox = options.showCheckbox || false;
    var checkboxLabel = options.checkboxLabel || '';
    
    var modalDiv = document.createElement('div');
    modalDiv.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-[300] flex items-center justify-center p-4';
    
    var modalContent = document.createElement('div');
    modalContent.className = 'bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-sm modal-animate overflow-hidden shadow-xl border border-gray-100 dark:border-gray-700';
    modalContent.innerHTML = '<div class="p-6 text-center">' +
      '<i class="ph ph-warning-circle text-4xl text-warning mb-4"></i>' +
      '<p class="text-gray-800 dark:text-gray-200 font-medium text-sm mb-6">' + message + '</p>' +
      (showCheckbox ? '<label class="flex items-center justify-center gap-2 mb-4 text-sm text-gray-600 dark:text-gray-400 cursor-pointer"><input type="checkbox" id="confirm-checkbox" class="rounded border-gray-300 text-primary focus:ring-primary"><span>' + checkboxLabel + '</span></label>' : '') +
      '<div class="flex gap-3 justify-center">' +
        '<button id="confirm-cancel" class="px-6 py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-medium text-sm transition-colors">' + cancelText + '</button>' +
        '<button id="confirm-ok" class="px-6 py-2.5 rounded-xl bg-primary hover:bg-primary-dark text-white font-medium text-sm transition-colors shadow-md">' + confirmText + '</button>' +
      '</div></div>';
    
    modalDiv.appendChild(modalContent);
    document.body.appendChild(modalDiv);
    
    var cleanup = function() { modalDiv.remove(); };
    
    modalDiv.querySelector('#confirm-ok').addEventListener('click', function() {
      var checkbox = modalDiv.querySelector('#confirm-checkbox');
      if (showCheckbox) {
        resolve({ confirmed: true, checked: checkbox ? checkbox.checked : false });
      } else {
        resolve(true);
      }
      cleanup();
    });
    
    modalDiv.querySelector('#confirm-cancel').addEventListener('click', function() {
      if (showCheckbox) { resolve({ confirmed: false, checked: false }); }
      else { resolve(false); }
      cleanup();
    });
    
    modalDiv.addEventListener('click', function(e) { 
      if (e.target === modalDiv) modalDiv.querySelector('#confirm-cancel').click(); 
    });
  });
}

// ===================== WRAPPER: withLoading =====================
async function withLoading(apiCall, successMsg, errorPrefix) {
  errorPrefix = errorPrefix || '';
  showLoading();
  try {
    var res = await apiCall();
    hideLoading();
    if (res.success) {
      if (successMsg) showToast(successMsg);
      return res;
    } else {
      showToast(errorPrefix + (res.message || 'Gagal'), 'error');
      return res;
    }
  } catch(err) {
    hideLoading();
    showToast(errorPrefix + 'Terjadi kesalahan', 'error');
    return { success: false, message: err.message };
  }
}

// ===================== DEBOUNCE =====================
function debounce(fn, delay) {
  var timer = null;
  return function() {
    var context = this;
    var args = arguments;
    clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(context, args); }, delay);
  };
}

// ===================== API CALL WITH RETRY =====================
async function fetchAPI(action, payload, retryCount) {
  retryCount = retryCount || 0;
  var gasUrl = getGasUrl();
  if (!gasUrl) return { success: false, message: "URL Backend tidak diatur." };
  
  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, 30000);
  
  try {
    var request = { action: action, payload: payload || {} };
    if (state.user?.token) request.auth = { token: state.user.token };
    
    var res = await fetch(gasUrl, { 
      method: 'POST', 
      body: JSON.stringify(request), 
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
      redirect: 'follow', 
      signal: controller.signal 
    });
    
    clearTimeout(timeoutId);
    var text = await res.text();
    var data;
    try { data = JSON.parse(text); } 
    catch(e) { throw new Error('Respons server bukan JSON.'); }
    
    if (!res.ok) throw new Error(data.message || 'Server error ' + res.status);
    return data;
    
  } catch(e) {
    clearTimeout(timeoutId);
    console.error('[fetchAPI] Error:', e.message, '| Retry:', retryCount, '| Action:', action);
    
    var isNetworkError = (e.name === 'AbortError' || e.message === 'Failed to fetch' || e.message.includes('NetworkError'));
    
    if (isNetworkError && retryCount < MAX_RETRIES) {
      var delay = RETRY_DELAY_MS * Math.pow(2, retryCount);
      await new Promise(function(resolve) { setTimeout(resolve, delay); });
      return fetchAPI(action, payload, retryCount + 1);
    }
    
    if (e.name === 'AbortError') return { success: false, message: 'Koneksi timeout. Server sibuk, coba ulangi.' };
    if (e.message === 'Failed to fetch') return { success: false, message: 'Tidak dapat terhubung ke server.' };
    return { success: false, message: e.message || "Koneksi gagal." };
  }
}

// ===================== SESSION MANAGEMENT =====================
function persistSession() { 
  if (state.user) writeStorage('app_session', JSON.stringify({ user: state.user, savedAt: Date.now() })); 
}

function clearSession() { removeStorage('app_session'); }

async function restoreSession() {
  var raw = readStorage('app_session', '');
  if (!raw) return false;
  try {
    var session = JSON.parse(raw);
    if (!session?.user?.token) return false;
    if (Date.now() - session.savedAt > SESSION_MAX_AGE_MS) { clearSession(); return false; }
    state.user = session.user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-layout').classList.remove('hidden');
    document.getElementById('role-badge').innerText = getRoleLabel(state.user.role);
    document.body.setAttribute('data-role', state.user.role);
    updateNavigationVisibility();
    navigate('dashboard');
    var loaded = await loadData();
    if (!loaded) { handleLogout(); return false; }
    return true;
  } catch(error) { clearSession(); return false; }
}

// ===================== DATA TABLE RENDERER =====================
class DataTableRenderer {
  constructor(containerId, config) { 
    this.container = document.getElementById(containerId); 
    this.config = config; 
  }
  
  render(data) {
    if (!this.container) return;
    
    if (!data || data.length === 0) {
      var colspan = this.config.columns.length + (this.config.actions ? 1 : 0);
      this.container.innerHTML = '<tr><td colspan="' + colspan + '" class="p-6 text-center text-gray-500">' + (this.config.emptyMessage || 'Belum ada data.') + '</td></tr>';
      return;
    }
    
    var self = this;
    
    function renderChunk(items) {
      var html = items.map(function(row, index) {
        var cells = '';
        self.config.columns.forEach(function(col) {
          var value = col.render ? col.render(row, index) : (row[col.key] || '-');
          cells += '<td class="' + (col.class || 'p-2 md:p-4') + '">' + value + '</td>';
        });
        
        if (self.config.actions?.length > 0) {
          var actionButtons = self.config.actions
            .filter(function(action) { return !action.condition || action.condition(row); })
            .map(function(action) {
              var handler = action.handler.replace('{id}', row[action.idKey]);
              return '<button onclick="' + handler + '" class="' + (action.class || 'text-blue-500 bg-blue-50 p-2 rounded-lg') + '" title="' + (action.title || '') + '"><i class="ph ' + action.icon + '"></i></button>';
            })
            .join('');
          cells += '<td class="p-2 md:p-4 text-center"><div class="flex justify-center gap-1">' + actionButtons + '</div></td>';
        }
        
        return '<tr class="' + (self.config.rowClass || 'hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50 dark:border-gray-800/50') + '">' + cells + '</tr>';
      }).join('');
      
      return html;
    }
    
    // Untuk data besar (>50 baris), render dalam chunk pakai requestAnimationFrame
    if (data.length > 50) {
      var chunkSize = 25;
      var html = '';
      var i = 0;
      
      var self = this;
      function processChunk() {
        var chunk = data.slice(i, i + chunkSize);
        html += renderChunk(chunk);
        self.container.innerHTML = html;
        i += chunkSize;
        if (i < data.length) {
          requestAnimationFrame(processChunk);
        }
      }
      requestAnimationFrame(processChunk);
    } else {
      this.container.innerHTML = renderChunk(data);
    }
  }
}

}

function renderCharts() {
  // Serialize data untuk perbandingan
  let currentData = {
    transaksi: { setoran: 0, penarikan: 0 },
    kas: { masuk: Array(12).fill(0), keluar: Array(12).fill(0) }
  };
  
  state.data.transaksi.forEach(function(t) {
    const n = Number(t['Nominal']);
    if (t['Jenis Transaksi'] === 'Setoran') currentData.transaksi.setoran += n;
    else currentData.transaksi.penarikan += n;
  });
  
  state.data.kas.forEach(function(k) {
    if (!k.Tanggal) return;
    const tgl = new Date(k.Tanggal);
    const m = tgl.getMonth();
    const nom = Number(k.Nominal) || 0;
    if (k.Jenis === 'Pemasukan') currentData.kas.masuk[m] += nom;
    else currentData.kas.keluar[m] += nom;
  });
  
  // Bandingkan dengan data terakhir
  const dataStr = JSON.stringify(currentData);
  if (lastChartData === dataStr) return; // Tidak ada perubahan
  lastChartData = dataStr;

  // Chart Transaksi
  const ctx1 = document.getElementById('chartTransaksi');
  if (ctx1) {
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: ['Setoran', 'Penarikan'],
        datasets: [{
          data: [currentData.transaksi.setoran, currentData.transaksi.penarikan],
          backgroundColor: ['#14B8A6', '#DC2626'],
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } }
      }
    });
  }

  // Chart E-Kas
  const ctx2 = document.getElementById('chartEkas');
  if (ctx2) {
    if (chartEkasInstance) chartEkasInstance.destroy();
    chartEkasInstance = new Chart(ctx2, {
      type: 'line',
      data: {
        labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'],
        datasets: [
          {
            label: 'Pemasukan',
            data: currentData.kas.masuk,
            borderColor: '#16A34A',
            backgroundColor: 'rgba(22,163,74,0.1)',
            tension: 0.3,
            fill: true
          },
          {
            label: 'Pengeluaran',
            data: currentData.kas.keluar,
            borderColor: '#DC2626',
            backgroundColor: 'rgba(220,38,38,0.1)',
            tension: 0.3,
            fill: true
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });
  }
}

          '<form class="space-y-4" onsubmit="window.ekas.warga.submit(event)">' +
            '<input type="hidden" id="w-id" value="' + (id||'') + '">' +
            '<div><label class="block text-xs font-medium mb-1">Nama Suami</label><input type="text" id="w-suami" required class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="' + escapeHtml(w?w['Nama Suami']:'') + '"></div>' +
            '<div><label class="block text-xs font-medium mb-1">Nama Istri</label><input type="text" id="w-istri" required class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="' + escapeHtml(w?w['Nama Istri']:'') + '"></div>' +
            '<div><label class="block text-xs font-medium mb-1">No Rumah</label><input type="text" id="w-rumah" required class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="' + escapeHtml(w?w['No Rumah']:'') + '"></div>' +
            '<div class="grid grid-cols-2 gap-4">' +
              '<div><label class="block text-xs font-medium mb-1">No HP Suami</label><input type="text" id="w-hp-suami" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="' + escapeHtml(w?w['No HP Suami']:'') + '"></div>' +
              '<div><label class="block text-xs font-medium mb-1">No HP Istri</label><input type="text" id="w-hp-istri" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="' + escapeHtml(w?w['No HP Istri']:'') + '"></div>' +
            '</div>' +
            '<div class="grid grid-cols-2 gap-4">' +
              '<div><label class="block text-xs font-medium mb-1">Bayar Iuran?</label>' +
                '<select id="w-iuran" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm">' +
                  '<option value="YA" ' + (w&&w['Bayar Iuran?']==='YA'?'selected':'') + '>YA</option>' +
                  '<option value="TIDAK" ' + (w&&w['Bayar Iuran?']==='TIDAK'?'selected':'') + '>TIDAK</option>' +
                '</select></div>' +
              '<div><label class="block text-xs font-medium mb-1">Ikut Arisan?</label>' +
                '<select id="w-arisan" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm">' +
                  '<option value="YA" ' + (w&&w['Ikut Arisan?']==='YA'?'selected':'') + '>YA</option>' +
                  '<option value="TIDAK" ' + (w&&w['Ikut Arisan?']==='TIDAK'?'selected':'') + '>TIDAK</option>' +
                '</select></div>' +
            '</div>' +
            '<div><label class="block text-xs font-medium mb-1">Slot Arisan</label><input type="number" id="w-slot" value="' + (w?w['Slot Arisan']:'1') + '" min="0" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm"></div>' +
            '<div><label class="block text-xs font-medium mb-1">Password (kosongkan jika tidak diubah)</label><input type="password" id="w-password" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" placeholder="Password baru"></div>' +
            (isSuperadmin ? 
              '<div><label class="block text-xs font-medium mb-1">Role</label>' +
                '<select id="w-role" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm">' +
                  '<option value="user" ' + (w&&w['Role']==='user'?'selected':'') + '>User</option>' +
                  '<option value="admin_istri" ' + (w&&w['Role']==='admin_istri'?'selected':'') + '>Admin Istri</option>' +
                  '<option value="admin_suami" ' + (w&&w['Role']==='admin_suami'?'selected':'') + '>Admin Suami</option>' +
                  '<option value="superadmin" ' + (w&&w['Role']==='superadmin'?'selected':'') + '>Superadmin</option>' +
                '</select></div>' 
            : '<input type="hidden" id="w-role" value="user">') +
            '<div id="div-status" class="' + ((!isSuperadmin || isEdit) ? '' : 'hidden') + '"><label class="block text-xs font-medium mb-1">Status</label>' +
              '<select id="w-status" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm">' +
                '<option value="Aktif" ' + (w&&w.Status==='Aktif'?'selected':'') + '>Aktif</option>' +
                '<option value="Nonaktif" ' + (w&&w.Status==='Nonaktif'?'selected':'') + '>Nonaktif</option>' +
              '</select></div>' +
            '<div class="pt-4"><button type="submit" class="w-full py-3 rounded-xl bg-primary text-white font-medium text-sm">Simpan</button></div>' +
          '</form>' +
        '</div>' +
      '</div></div>';
    
    document.getElementById('modals').innerHTML = html;
  },

  submit: async function(e) {
    e.preventDefault();
    if (!['superadmin', 'admin_istri', 'admin_suami'].includes(state.user.role)) return;
    
    const isSuperadmin = state.user.role === 'superadmin';
    const payload = {
      id: document.getElementById('w-id').value,
      namaSuami: document.getElementById('w-suami').value,
      namaIstri: document.getElementById('w-istri').value,
      noRumah: document.getElementById('w-rumah').value,
      noHpSuami: document.getElementById('w-hp-suami').value,
      noHpIstri: document.getElementById('w-hp-istri').value,
      bayarIuran: document.getElementById('w-iuran').value,
      ikutArisan: document.getElementById('w-arisan').value,
      slotArisan: Number(document.getElementById('w-slot').value),
      password: document.getElementById('w-password').value,
      role: isSuperadmin ? document.getElementById('w-role').value : 'user',
      status: document.getElementById('w-status') ? document.getElementById('w-status').value : 'Aktif'
    };
    
    const res = await withLoading(
      function() { return fetchAPI('save_warga', payload); },
      null,
      'Gagal menyimpan: '
    );
    
    if (res.success) { 
      window.closeAllModals(); 
      await loadData(); 
      showToast(res.generatedPassword ? 'Data warga tersimpan. Password: ' + res.generatedPassword : 'Data warga tersimpan');
    }
  },

  delete: async function(id) {
    if (!['superadmin', 'admin_istri', 'admin_suami'].includes(state.user.role)) return;
    const confirmed = await showConfirmDialog('Hapus warga ini?');
    if (!confirmed) return;
    
    const res = await withLoading(
      function() { return fetchAPI('delete_warga', { id: id }); },
      'Warga dihapus',
      'Gagal menghapus: '
    );
    
    if (res.success) await loadData();
  }
};

// ===================== TRANSAKSI =====================
function renderTransaksi(filter) {
  filter = filter || 'Semua';
  const tb = document.getElementById('table-transaksi');
  if (!tb) return;
  tb.innerHTML = '';
  
  const canEdit = (state.user.role === 'superadmin' || state.user.role === 'admin_istri');
  document.getElementById('trx-add-btn').innerHTML = canEdit ? 
    '<button class="bg-primary hover:bg-primary-dark text-white px-3 py-2 rounded-xl flex items-center gap-1.5 shadow-sm whitespace-nowrap w-full sm:w-auto justify-center text-xs font-medium transition-colors" onclick="window.modals.transaksi()"><i class="ph ph-plus-circle text-sm"></i> <span>Transaksi Baru</span></button>' : '';

  const filterBtns = document.getElementById('trx-filter-btns');
  if (filterBtns) {
    filterBtns.innerHTML = 
      '<button class="px-4 py-1.5 rounded-full ' + (filter==='Semua'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300') + ' text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="debouncedRenderTransaksi(\'Semua\')">Semua</button>' +
      '<button class="px-4 py-1.5 rounded-full ' + (filter==='Setoran'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300') + ' text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="debouncedRenderTransaksi(\'Setoran\')">Setoran</button>' +
      '<button class="px-4 py-1.5 rounded-full ' + (filter==='Penarikan'?'bg-primary text-white':'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300') + ' text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="debouncedRenderTransaksi(\'Penarikan\')">Penarikan</button>';
  }

  const thead = document.getElementById('transaksi-thead');
  const showTrxId = state.user.role !== 'admin_istri';
  thead.innerHTML = '<tr>' +
    '<th class="p-2 md:p-4 w-28 md:w-40">Waktu</th>' +
    (showTrxId ? '<th class="p-2 md:p-4 hidden md:table-cell">ID Trx</th>' : '') +
    '<th class="p-2 md:p-4">Warga</th>' +
    '<th class="p-2 md:p-4">Jenis</th>' +
    '<th class="p-2 md:p-4">Nominal</th>' +
    '<th class="p-2 md:p-4 text-center">Aksi</th>' +
  '</tr>';

  let d = state.data.transaksi;
  if (filter !== 'Semua') d = d.filter(function(t) { return t['Jenis Transaksi'] === filter; });
  d.sort(function(a,b) { return new Date(b['Tanggal']) - new Date(a['Tanggal']); });
  
  if (d.length === 0) {
    tb.innerHTML = '<tr><td colspan="' + (showTrxId ? 6 : 5) + '" class="p-8 text-center text-gray-500">Belum ada transaksi</td></tr>';
    return;
  }
  
  let html = '';
  d.forEach(function(t) {
    const isSetoran = t['Jenis Transaksi'] === 'Setoran';
    const c = isSetoran ? 'text-success' : 'text-danger';
    const ic = isSetoran ? 'ph-arrow-down-left' : 'ph-arrow-up-right';
    
    html += '<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50 dark:border-gray-800/50">' +
      '<td class="p-2 md:p-4 text-gray-500 text-xs w-28 md:w-40">' + formatDateTime(t['Tanggal']) + '</td>' +
      (showTrxId ? '<td class="p-2 md:p-4 font-mono text-[10px] md:text-xs hidden md:table-cell">' + escapeHtml(t['ID Transaksi']) + '</td>' : '') +
      '<td class="p-2 md:p-4 font-medium">' + escapeHtml(t['Nama Anggota']) + '</td>' +
      '<td class="p-2 md:p-4"><span class="flex items-center gap-1 text-xs font-bold ' + c + '"><i class="ph ' + ic + '"></i> ' + escapeHtml(t['Jenis Transaksi']) + '</span></td>' +
      '<td class="p-2 md:p-4 font-bold ' + c + '">' + formatRupiah(t['Nominal']) + '</td>' +
      '<td class="p-2 md:p-4 text-center space-x-1">' +
        (canEdit ? 
          '<button onclick="editTransaksi(\'' + t['ID Transaksi'] + '\')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit"><i class="ph ph-pencil-simple"></i></button>' +
          '<button onclick="deleteTransaksi(\'' + t['ID Transaksi'] + '\')" class="text-danger bg-red-50 hover:bg-red-100 dark:bg-red-900/30 p-2 rounded-lg" title="Hapus"><i class="ph ph-trash"></i></button>' 
        : '') +
      '</td></tr>';
  });
  
  tb.innerHTML = html;
}

// Debounced version
const debouncedRenderTransaksi = debounce(function(filter) {
  renderTransaksi(filter);
}, 150);

// ===================== MODAL TRANSAKSI =====================
window.modals.transaksi = function(editData) {
  if (!['superadmin', 'admin_istri'].includes(state.user.role)) return;
  
  let opts = '<option value="">-- Pilih Warga --</option>';
  if (state.user.role === 'admin_istri') {
    const aktifWarga = state.data.warga
      .filter(function(w) { return String(w.Status || '').toLowerCase() === 'aktif'; })
      .sort(function(a, b) { return (a['Nama Istri'] || '').localeCompare(b['Nama Istri'] || ''); });
    aktifWarga.forEach(function(w) {
      opts += '<option value="' + w['ID Warga'] + '" ' + (editData && editData['ID Anggota'] === w['ID Warga'] ? 'selected' : '') + '>' + escapeHtml(w['Nama Istri']) + ' (' + escapeHtml(w['No Rumah']) + ')</option>';
    });
  } else {
    state.data.warga.forEach(function(w) {
      opts += '<option value="' + w['ID Warga'] + '" ' + (editData && editData['ID Anggota'] === w['ID Warga'] ? 'selected' : '') + '>' + escapeHtml(w['ID Warga']) + ' - ' + escapeHtml(w['Nama Istri']) + '</option>';
    });
  }
  
  const isEdit = !!editData;
  const defaultJenis = editData ? editData['Jenis Transaksi'] : 'Setoran';
  const defaultNominal = editData ? formatAngkaInput(editData['Nominal']) : '';
  const defaultKet = editData ? (editData['Keterangan'] || '') : '';
  
  document.getElementById('modals').innerHTML = 
  '<div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">' +
    '<div class="bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-md modal-animate overflow-hidden max-h-[90dvh] flex flex-col">' +
      '<div class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">' +
        '<h3 class="font-bold">' + (isEdit ? 'Edit' : 'Transaksi Baru') + '</h3>' +
        '<button onclick="window.closeAllModals()"><i class="ph ph-x text-lg"></i></button>' +
      '</div>' +
      '<div class="overflow-y-auto p-4 md:p-6 hide-scroll">' +
        '<form class="space-y-4" onsubmit="submitTransaksi(event, \'' + (editData ? editData['ID Transaksi'] : '') + '\')">' +
          '<div class="flex p-1 bg-gray-100 dark:bg-gray-800 rounded-xl">' +
            '<label class="flex-1 text-center"><input type="radio" name="f-t-jenis" value="Setoran" class="peer sr-only" ' + (defaultJenis === 'Setoran' ? 'checked' : '') + '><div class="py-2 rounded-lg text-sm font-medium peer-checked:bg-white peer-checked:text-success shadow-sm">Uang Masuk</div></label>' +
            '<label class="flex-1 text-center"><input type="radio" name="f-t-jenis" value="Penarikan" class="peer sr-only" ' + (defaultJenis === 'Penarikan' ? 'checked' : '') + '><div class="py-2 rounded-lg text-sm font-medium peer-checked:bg-white peer-checked:text-danger shadow-sm">Uang Keluar</div></label>' +
          '</div>' +
          '<div><label class="block text-xs font-medium mb-1">Warga</label><select id="f-t-warga" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" required>' + opts + '</select></div>' +
          '<div><label class="block text-xs font-medium mb-1">Nominal (Rp)</label><input type="text" id="f-t-nominal" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 font-bold text-lg text-right" required value="' + defaultNominal + '"></div>' +
          '<div><label class="block text-xs font-medium mb-1">Keterangan</label><input type="text" id="f-t-ket" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" placeholder="Cth: Iuran Juli" value="' + escapeHtml(defaultKet) + '"></div>' +
          '<div class="pt-2"><button type="submit" class="w-full py-3 rounded-xl bg-primary text-white font-medium text-sm">' + (isEdit ? 'Simpan Perubahan' : 'Proses Transaksi') + '</button></div>' +
        '</form>' +
      '</div>' +
    '</div></div>';
  
  setTimeout(function() {
    const ni = document.getElementById('f-t-nominal');
    if (ni) {
      ni.addEventListener('input', formatInputRibuan);
      if (editData) ni.dataset.value = editData['Nominal'];
    }
  }, 50);
};

function editTransaksi(idTransaksi) {
  if (!['superadmin', 'admin_istri'].includes(state.user.role)) return;
  const trx = state.data.transaksi.find(function(t) { return t['ID Transaksi'] === idTransaksi; });
  if (!trx) return showToast('Transaksi tidak ditemukan', 'error');
  window.modals.transaksi(trx);
}

async function submitTransaksi(e, editId) {
  e.preventDefault();
  editId = editId || '';
  
  const idWarga = document.getElementById('f-t-warga').value;
  const warga = state.data.warga.find(function(w) { return w['ID Warga'] === idWarga; });
  if (!warga) { showToast("Pilih warga", "error"); return; }
  
  const nominal = parseFormattedNumber(document.getElementById('f-t-nominal'));
  if (nominal <= 0) { showToast("Nominal > 0", "error"); return; }
  
  const payload = {
    idTransaksi: editId || undefined,
    idAnggota: idWarga,
    namaAnggota: warga['Nama Istri'],
    jenis: document.querySelector('input[name="f-t-jenis"]:checked').value,
    nominal: nominal,
    keterangan: document.getElementById('f-t-ket').value
  };
  
  const res = await withLoading(
    function() { return fetchAPI('save_transaksi', payload); },
    null,
    'Gagal: '
  );
  
  if (!res.success) return;
  
  showToast(editId ? "Transaksi diperbarui" : "Transaksi berhasil");
  window.closeAllModals();
  await loadData();
}

async function deleteTransaksi(id) {
  const confirmed = await showConfirmDialog("Hapus transaksi ini?");
  if (!confirmed) return;
  
  const res = await withLoading(
    function() { return fetchAPI('delete_transaksi', { id: id }); },
    'Transaksi dihapus',
    'Gagal menghapus: '
  );
  
  if (res.success) await loadData();
}

<script>
// ===================== PEMBAYARAN =====================
window.ekas.pembayaran = {
  render: function() {
    const sel = document.getElementById('pay-warga');
    if (!sel) return;
    
    const tunggakanMap = {};
    state.data.tunggakan.forEach(function(t) {
      if (!tunggakanMap[t['ID Warga']]) tunggakanMap[t['ID Warga']] = 0;
      tunggakanMap[t['ID Warga']] += Number(t['Iuran']||0) + Number(t['Arisan']||0);
    });

    let wargaList = state.data.warga;
    if (state.user.role === 'admin_suami') {
      wargaList = wargaList.filter(function(w) {
        return w['Bayar Iuran?'] === 'YA' ||
               w['Ikut Arisan?'] === 'YA' ||
               state.data.biaya.some(function(b) { return b.WargaID === w['ID Warga']; });
      }).sort(function(a,b) { return (a['Nama Suami']||'').localeCompare(b['Nama Suami']||''); });
    }

    let selHtml = '<option value="">-- Pilih Warga --</option>';
    wargaList.forEach(function(w) {
      const adaTunggakan = tunggakanMap[w['ID Warga']] > 0;
      selHtml += '<option value="' + w['ID Warga'] + '">' + escapeHtml(w['Nama Suami']) + ' (' + escapeHtml(w['No Rumah']) + ')' + (adaTunggakan ? ' ⚠️ Nunggak' : '') + '</option>';
    });
    sel.innerHTML = selHtml;

    const tb = document.getElementById('table-pembayaran');
    let pay = [].concat(state.data.pembayaran || []).sort(function(a,b) { return new Date(b.Tanggal) - new Date(a.Tanggal); });
    const canEdit = (state.user.role === 'superadmin' || state.user.role === 'admin_suami');
    
    const saveBtn = document.getElementById('btn-save-pay');
    if (saveBtn) {
      saveBtn.disabled = !canEdit;
      saveBtn.classList.toggle('opacity-50', !canEdit);
    }

    const thead = document.getElementById('pembayaran-thead');
    if (thead) {
      thead.innerHTML = '<tr>' +
        '<th class="px-5 py-4">Warga</th>' +
        '<th class="px-5 py-4">Periode</th>' +
        '<th class="px-5 py-4">Rincian</th>' +
        '<th class="px-5 py-4">Total</th>' +
        (canEdit ? '<th class="px-5 py-4 text-right">Aksi</th>' : '') +
      '</tr>';
    }

    if (pay.length === 0) {
      const colspan = canEdit ? 5 : 4;
      tb.innerHTML = '<tr><td colspan="' + colspan + '" class="px-5 py-10 text-center text-gray-500">Belum ada pembayaran.</td></tr>';
    } else {
      let payHtml = '';
      pay.forEach(function(p) {
        const wName = (state.data.warga.find(function(w) { return w['ID Warga'] === p.WargaID; }) || {})['Nama Suami'] || p.WargaID;
        payHtml += '<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50">' +
          '<td class="px-5 py-3"><div class="font-bold">' + escapeHtml(wName) + '</div><div class="text-xs text-gray-500">' + formatDateTime(p.Tanggal) + '</div></td>' +
          '<td class="px-5 py-3">' + escapeHtml(p.Bulan) + ' ' + p.Tahun + '</td>' +
          '<td class="px-5 py-3 text-xs">Iur:' + p.Iuran + ' Ars:' + p.Arisan + ' Tmb:' + p.Tambahan + '</td>' +
          '<td class="px-5 py-3 font-black text-success">' + formatRupiah(p.Total) + '</td>' +
          (canEdit ? 
            '<td class="px-5 py-3 text-right space-x-1">' +
              '<button onclick="window.ekas.pembayaran.openEdit(\'' + p.PayID + '\')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit"><i class="ph ph-pencil-simple"></i></button>' +
              '<button onclick="window.ekas.pembayaran.delete(\'' + p.PayID + '\')" class="text-danger bg-red-50 p-2 rounded-lg" title="Hapus"><i class="ph ph-trash"></i></button>' +
            '</td>' 
          : '') +
        '</tr>';
      });
      tb.innerHTML = payHtml;
    }

    const btnsDiv = document.getElementById('pembayaran-tunggakan-btns');
    if (btnsDiv) {
      if (state.user.role === 'superadmin' || state.user.role === 'admin_suami') {
        btnsDiv.innerHTML = 
          '<button onclick="window.ekas.pembayaran.openTunggakanModal()" class="flex-1 bg-warning hover:bg-amber-600 text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors">' +
            '<i class="ph ph-clock-counter-clockwise mr-1"></i> Catat Tunggakan' +
          '</button>' +
          '<button onclick="window.ekas.pembayaran.openHapusTunggakanModal()" class="flex-1 bg-danger hover:bg-red-700 text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors">' +
            '<i class="ph ph-trash mr-1"></i> Hapus Tunggakan' +
          '</button>' +
          '<button onclick="window.ekas.pembayaran.updateSemuaTunggakan()" class="w-full bg-primary hover:bg-primary-dark text-white px-3 py-2 rounded-xl font-medium text-sm shadow-sm transition-colors mt-1">' +
            '<i class="ph ph-arrows-clockwise mr-1"></i> Update Tunggakan Bulan Ini' +
          '</button>';
      } else {
        btnsDiv.innerHTML = '';
      }
    }
  },

  openEdit: function(payId) {
    const p = state.data.pembayaran.find(function(x) { return x.PayID === payId; });
    if (!p) return;
    document.getElementById('pay-warga').value = p.WargaID;
    document.getElementById('pay-bulan').value = p.Bulan;
    document.getElementById('pay-tahun').value = p.Tahun;
    this.calculate();
    const btn = document.getElementById('btn-save-pay');
    btn.innerText = 'Update Pembayaran';
    btn.dataset.editId = payId;
  },

  calculate: function() {
    const wId = document.getElementById('pay-warga').value;
    const w = state.data.warga.find(function(x) { return x['ID Warga'] === wId; });
    let iuran = 0, arisan = 0, tambahan = 0;
    if (w) {
      if (w['Bayar Iuran?'] === 'YA') iuran = Number(state.data.settings['Iuran Wajib'] || 0);
      if (w['Ikut Arisan?'] === 'YA') arisan = (Number(w['Slot Arisan']) || 0) * (Number(state.data.settings['Arisan Per Slot'] || 0));
      state.data.biaya.forEach(function(b) { if (b.WargaID === wId) tambahan += Number(b.Nominal); });
    }
    document.getElementById('pay-iuran-val').innerText = formatRupiah(iuran);
    document.getElementById('pay-arisan-val').innerText = formatRupiah(arisan);
    document.getElementById('pay-tambahan-val').innerText = formatRupiah(tambahan);
    document.getElementById('pay-total-val').innerText = formatRupiah(iuran + arisan + tambahan);
    document.getElementById('pay-total-val').dataset.val = iuran + arisan + tambahan;
  },

  submit: async function(e) {
    e.preventDefault();
    const wId = document.getElementById('pay-warga').value;
    if (!wId) return showToast('Pilih warga!', 'error');
    const total = Number(document.getElementById('pay-total-val').dataset.val);
    if (total <= 0) return showToast('Total Rp0', 'error');
    
    const btn = document.getElementById('btn-save-pay');
    const isEdit = btn.dataset.editId;
    const payload = {
      payId: isEdit || undefined,
      wargaId: wId,
      bulan: document.getElementById('pay-bulan').value,
      tahun: document.getElementById('pay-tahun').value,
      iuran: Number(document.getElementById('pay-iuran-val').innerText.replace(/\D/g,'')),
      arisan: Number(document.getElementById('pay-arisan-val').innerText.replace(/\D/g,'')),
      tambahan: Number(document.getElementById('pay-tambahan-val').innerText.replace(/\D/g,'')),
      total: total
    };
    
    const res = await withLoading(
      function() { return fetchAPI('save_pembayaran', payload); },
      null,
      'Gagal: '
    );
    
    if (res.success) {
      await loadData();
      document.getElementById('form-pembayaran').reset();
      btn.innerText = 'Simpan Pembayaran';
      delete btn.dataset.editId;
      window.ekas.pembayaran.render();
      showToast(isEdit ? 'Pembayaran diperbarui' : 'Pembayaran disimpan!');
    }
  },

  delete: async function(id) {
    const confirmed = await showConfirmDialog('Hapus pembayaran ini? Data terkait di Buku Kas juga akan dihapus.');
    if (!confirmed) return;
    
    const res = await withLoading(
      function() { return fetchAPI('delete_pembayaran', { id: id }); },
      'Pembayaran dihapus',
      'Gagal menghapus: '
    );
    
    if (res.success) await loadData();
  },

  hitungNominalTunggakan: function() {
    const wId = document.getElementById('tung-warga') ? document.getElementById('tung-warga').value : null;
    const w = wId ? state.data.warga.find(function(x) { return x['ID Warga'] === wId; }) : null;
    let iuran = 0, arisan = 0, tambahan = 0;
    if (w) {
      if (w['Bayar Iuran?'] === 'YA') iuran = Number(state.data.settings['Iuran Wajib'] || 0);
      if (w['Ikut Arisan?'] === 'YA') arisan = (Number(w['Slot Arisan']) || 0) * (Number(state.data.settings['Arisan Per Slot'] || 0));
      state.data.biaya.filter(function(b) { return b.WargaID === wId; }).forEach(function(b) { tambahan += Number(b.Nominal); });
    }
    if (document.getElementById('tung-iuran')) document.getElementById('tung-iuran').value = formatAngkaInput(iuran);
    if (document.getElementById('tung-arisan')) document.getElementById('tung-arisan').value = formatAngkaInput(arisan);
    if (tambahan > 0) {
      document.getElementById('tung-tambahan-container').classList.remove('hidden');
      document.getElementById('tung-tambahan').value = formatAngkaInput(tambahan);
    } else {
      document.getElementById('tung-tambahan-container').classList.add('hidden');
      if (document.getElementById('tung-tambahan')) document.getElementById('tung-tambahan').value = '0';
    }
    this.updateTotalTunggakan();
  },

  updateTotalTunggakan: function() {
    const checked = document.querySelectorAll('.tung-bulan-cb:checked').length;
    const iuran = parseFormattedNumber(document.getElementById('tung-iuran'));
    const arisan = parseFormattedNumber(document.getElementById('tung-arisan'));
    const tambahan = parseFormattedNumber(document.getElementById('tung-tambahan'));
    const total = (iuran + arisan + tambahan) * checked;
    document.getElementById('tung-jumlah-bulan').innerText = checked;
    document.getElementById('tung-total').innerText = formatRupiah(total);
  },

  submitTunggakan: async function(e) {
    e.preventDefault();
    const wId = document.getElementById('tung-warga').value;
    const tahun = Number(document.getElementById('tung-tahun').value);
    const checked = [].slice.call(document.querySelectorAll('.tung-bulan-cb:checked')).map(function(cb) { return cb.value; });
    if (!wId || checked.length === 0) return showToast('Pilih warga dan minimal satu bulan!', 'error');
    
    const iuran = parseFormattedNumber(document.getElementById('tung-iuran'));
    const arisan = parseFormattedNumber(document.getElementById('tung-arisan'));
    const tambahan = parseFormattedNumber(document.getElementById('tung-tambahan'));
    
    showLoading();
    let success = true;
    for (let i = 0; i < checked.length; i++) {
      const bulan = checked[i];
      const res = await fetchAPI('save_tunggakan_manual', { wargaId: wId, bulan: bulan, tahun: tahun, iuran: iuran, arisan: arisan, tambahan: tambahan });
      if (!res.success) { success = false; showToast(res.message + ' (' + bulan + ')', 'error'); break; }
    }
    hideLoading();
    if (success) {
      window.closeAllModals();
      await loadData();
      showToast(checked.length + ' tunggakan berhasil dicatat');
    }
  },

            '</thead>' +

          '</table>' +

    setTimeout(function() {

      });
    }, 50);
  },

  hapusTerpilih: async function() {
    const selected = [].slice.call(document.querySelectorAll('.tung-hapus-cb:checked')).map(function(cb) { return cb.value; });
    if (selected.length === 0) return showToast('Pilih tunggakan dulu!', 'error');
    
    const result = await showConfirmDialog('Hapus ' + selected.length + ' tunggakan terpilih?', {
      confirmText: 'Hapus',
      cancelText: 'Batal',
      showCheckbox: true,
      checkboxLabel: 'Catat sebagai pemasukan di Buku Kas?'
    });
    
    if (!result || !result.confirmed) return;
    const catatPemasukan = result.checked;
    
    showLoading();
    let allOk = true;
    for (let i = 0; i < selected.length; i++) {
      const res = await fetchAPI('delete_tunggakan', { id: selected[i], catatPemasukan: catatPemasukan });
      if (!res.success) { allOk = false; showToast(res.message, 'error'); break; }
    }
    hideLoading();
    if (allOk) {
      window.closeAllModals();
      await loadData();
      showToast(selected.length + ' tunggakan dihapus' + (catatPemasukan ? ' dan pemasukan dicatat' : ''));
    }
  },

    if (res.success) {
      await loadData();
      showToast(res.message || 'Tunggakan bulan ini ditambahkan');
    }
  }

// ===================== KAS =====================
window.ekas.kas = {
  render: function() {
    const tb = document.getElementById('table-kas');
    const tf = document.getElementById('kas-footer');
    if (!tb) return;

    let kas = [].concat(state.data.kas || []);
    const dari = document.getElementById('kas-dari') ? document.getElementById('kas-dari').value : null;
    const sampai = document.getElementById('kas-sampai') ? document.getElementById('kas-sampai').value : null;
    if (dari) kas = kas.filter(function(k) { return new Date(k.Tanggal) >= new Date(dari); });
    if (sampai) kas = kas.filter(function(k) { return new Date(k.Tanggal) <= new Date(sampai + 'T23:59:59'); });
    kas.sort(function(a,b) { return new Date(b.Tanggal) - new Date(a.Tanggal); });

    const canEdit = (state.user.role === 'superadmin' || state.user.role === 'admin_suami');

    document.getElementById('kas-action-btns').innerHTML = canEdit ? 
      '<button onclick="window.ekas.kas.openModal(\'Pemasukan\')" class="bg-success hover:bg-green-700 text-white px-3 py-2 rounded-xl text-xs font-medium flex items-center shadow-md transition-colors"><i class="ph ph-plus-circle text-sm mr-1"></i> Pemasukan</button>' +
      '<button onclick="window.ekas.kas.openModal(\'Pengeluaran\')" class="bg-danger hover:bg-red-700 text-white px-3 py-2 rounded-xl text-xs font-medium flex items-center shadow-md transition-colors"><i class="ph ph-minus-circle text-sm mr-1"></i> Pengeluaran</button>' +
      '<button onclick="window.ekas.kas.cetakPDF()" class="bg-gray-800 hover:bg-gray-900 text-white px-3 py-2 rounded-xl text-xs font-medium flex items-center shadow-md transition-colors"><i class="ph ph-printer text-sm mr-1"></i> Cetak</button>'

      tb.innerHTML = '<tr><td colspan="' + colspan + '" class="px-6 py-10 text-center text-gray-500">Belum ada transaksi.</td></tr>';
    } else {
      let kasHtml = '';
      kas.forEach(function(k) {
        const isMasuk = k.Jenis === 'Pemasukan';
        const aksiHtml = canEdit ? 
          '<td class="px-6 py-4 text-right space-x-1">' +
            '<button onclick="window.ekas.kas.openModal(null,\'' + k.KasID + '\')" class="text-blue-500 bg-blue-50 p-2 rounded-lg" title="Edit"><i class="ph ph-pencil-simple"></i></button>' +
            '<button onclick="window.ekas.kas.delete(\'' + k.KasID + '\')" class="text-danger bg-red-50 p-2 rounded-lg" title="Hapus"><i class="ph ph-trash"></i></button>' +
          '</td>' : '';
        kasHtml += '<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors border-b border-gray-50">' +
          '<td class="px-6 py-4 text-xs text-gray-500">' + formatDateTime(k.Tanggal) + '</td>' +
          '<td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-bold ' + (isMasuk ? 'bg-emerald-100 text-success' : 'bg-red-100 text-danger') + '">' + escapeHtml(k.Kategori) + '</span></td>' +
          '<td class="px-6 py-4 text-sm font-medium">' + escapeHtml(k.Keterangan) + '</td>' +
          '<td class="px-6 py-4 text-right font-black ' + (isMasuk ? 'text-success' : 'text-danger') + '">' + (isMasuk ? '+' : '-') + formatRupiah(k.Nominal) + '</td>' +
          aksiHtml +
        '</tr>';
      });
      tb.innerHTML = kasHtml;
    }

    let totalMasuk = 0, totalKeluar = 0;
    kas.forEach(function(k) { const nom = Number(k.Nominal) || 0; if (k.Jenis === 'Pemasukan') totalMasuk += nom; else totalKeluar += nom; });
    const surplus = totalMasuk - totalKeluar;

            '<div><label class="block text-xs font-medium mb-1">Keterangan</label><input type="text" id="k-ket" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="' + escapeHtml(k ? k.Keterangan : '') + '"></div>' +

        '</div>' +
      '</div></div>';
  },

  submit: async function(e) {
    e.preventDefault();
    const nominal = parseFormattedNumber(document.getElementById('k-nominal'));
    const payload = {
      isEdit: !!document.getElementById('k-id').value,
      kasId: document.getElementById('k-id').value || 'KAS-' + Date.now(),
      tgl: new Date().toISOString(),
      jenis: document.getElementById('k-jenis').value,
      kategori: document.getElementById('k-kategori').value,
      nominal: nominal,
      keterangan: document.getElementById('k-ket').value
    };
    
    const res = await withLoading(
      function() { return fetchAPI('save_kas', payload); },
      'Transaksi disimpan',
      'Gagal: '
    );
    
    if (res.success) {
      window.closeAllModals();
      await loadData();
    }
  },

  delete: async function(id) {
    const confirmed = await showConfirmDialog('Hapus transaksi ini? Data pembayaran terkait juga akan dihapus.');
    if (!confirmed) return;
    
    const linkedPembayaran = state.data.pembayaran.find(function(p) { return p.KasID === id; });
    
    showLoading();
    if (linkedPembayaran) {
      const resPay = await fetchAPI('delete_pembayaran', { id: linkedPembayaran.PayID });
      if (!resPay.success) {
        hideLoading();
        showToast('Gagal menghapus pembayaran terkait: ' + resPay.message, 'error');
        return;
      }
    }
    const resKas = await fetchAPI('delete_kas', { id: id });
    hideLoading();
    
    if (resKas.success) {
      await loadData();
      showToast('Transaksi dan pembayaran terkait dihapus (jika ada)');
    } else {
      showToast(resKas.message, 'error');
    }
  },

  cetakPDF: function() {
    const printArea = document.getElementById('kas-print-area');
    if (!printArea) return;
    const timestamp = formatDateTime(new Date());
    const cloned = printArea.cloneNode(true);
    const table = cloned.querySelector('table');
    if (table) {
      const rows = table.querySelectorAll('tr');
      rows.forEach(function(row) {
        const cells = row.querySelectorAll('th, td');
        if (cells.length > 4) row.removeChild(cells[cells.length - 1]);
      });
    }
    const wrapper = document.createElement('div');
    wrapper.style.padding = '20px';
    wrapper.style.background = 'white';
    wrapper.style.color = 'black';
    wrapper.style.fontFamily = 'sans-serif';
    wrapper.innerHTML = '<h2 style="text-align:center;margin-bottom:5px;">Laporan Buku Kas</h2><p style="text-align:center;font-size:12px;color:#666;margin-bottom:20px;">Dicetak pada: ' + timestamp + '</p>';
    wrapper.appendChild(cloned);
    html2pdf().set({ margin: 10, filename: 'Buku_Kas_' + new Date().toISOString().slice(0,10) + '.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(wrapper).save();
  }
};

function updateRingkasanTabungan() {
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const todayEnd = new Date(todayStart.getTime() + 24 * 60 * 60 * 1000);
  
  let totalSaldo = 0;
  state.data.warga.forEach(function(w) { totalSaldo += calculateSaldo(w['ID Warga']); });
  
  let wargaNabungCount = 0;
  state.data.warga.forEach(function(w) { if (calculateSaldo(w['ID Warga']) > 0) wargaNabungCount++; });
  
  const todayTrx = state.data.transaksi.filter(function(t) {
    const tgl = new Date(t.Tanggal);
    return tgl >= todayStart && tgl < todayEnd;
  });
  
  let totalHariIni = 0;
  todayTrx.forEach(function(t) { if (t['Jenis Transaksi'] === 'Setoran') totalHariIni += Number(t['Nominal']); });
  
  const elTotal = document.getElementById('buku-total-saldo');
  const elWarga = document.getElementById('buku-warga-nabung');
  const elHariIni = document.getElementById('buku-total-hari-ini');
  
  if (elTotal) elTotal.textContent = formatRupiah(totalSaldo);
  if (elWarga) elWarga.textContent = wargaNabungCount;
  if (elHariIni) elHariIni.textContent = formatRupiah(totalHariIni);
}

function setupBukuTabungan() {
  if (!state.user) return;
  let sel = document.getElementById('select-buku-anggota');
  if (!sel) return;
  
  sel.innerHTML = '<option value="">-- Pilih Warga --</option>';
  
  if (state.user.role === 'user') {
    sel.innerHTML = '<option value="' + state.user['ID Warga'] + '">' + escapeHtml(state.user['ID Warga']) + ' - ' + escapeHtml(state.user['Nama Istri']) + '</option>';
    sel.value = state.user['ID Warga'];
    document.getElementById('buku-selector-wrapper').classList.add('hidden');
    renderBukuTabungan();
  } else {
    document.getElementById('buku-selector-wrapper').classList.remove('hidden');
    const sorted = [].concat(state.data.warga).sort(function(a, b) {
      return (a['Nama Istri'] || '').localeCompare(b['Nama Istri'] || '');
    });
    sorted.forEach(function(w) {
      const namaIstri = w['Nama Istri'] || 'Tanpa Nama';
      const noRumah = w['No Rumah'] || '-';
      sel.innerHTML += '<option value="' + w['ID Warga'] + '">' + escapeHtml(namaIstri) + ' (' + escapeHtml(noRumah) + ')</option>';
    });
    updateRingkasanTabungan();
  }
}

window.renderBukuTabungan = function() {
  let id = (document.getElementById('select-buku-anggota') ? document.getElementById('select-buku-anggota').value : null) || state.user['ID Warga'];
  let area = document.getElementById('passbook-area');
  let emp = document.getElementById('passbook-empty');
  
  if (!id) { 
    if (area) area.classList.add('hidden'); 
    if (emp) emp.classList.remove('hidden'); 
    return; 
  }
  
  if (area) area.classList.remove('hidden'); 
  if (emp) emp.classList.add('hidden'); 
  if (area) area.classList.add('flex');
  
  updateRingkasanTabungan();
  
  let w = state.data.warga.find(function(x) { return String(x['ID Warga']) === String(id); });
  if (!w) { 
    if (area) area.classList.add('hidden'); 
    if (emp) emp.classList.remove('hidden'); 
    showToast("Warga tidak ditemukan", "error"); 
    return; 
  }
  
  document.getElementById('buku-nama').innerText = w['Nama Istri'];
  document.getElementById('buku-id').innerText = w['ID Warga'] || '-';
  document.getElementById('buku-norumah').innerText = w['No Rumah'] || '-';
  document.getElementById('buku-saldo').innerText = formatRupiah(calculateSaldo(id));

  let tb = document.getElementById('table-buku'); 
  tb.innerHTML = '';
  
  let trx = state.data.transaksi
    .filter(function(t) { return String(t['ID Anggota']) === String(id); })
    .sort(function(x,y) { return new Date(x['Tanggal']) - new Date(y['Tanggal']); });
  
  let sld = 0;
  const canEdit = (state.user.role === 'superadmin' || state.user.role === 'admin_istri');
  
  if (trx.length === 0) {
    tb.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-gray-500 italic">Belum ada mutasi</td></tr>';
  } else {
    let html = '';
    trx.forEach(function(t) {
      let isS = t['Jenis Transaksi'] === 'Setoran';
      let n = Number(t['Nominal']); 
      sld += isS ? n : -n;
      html += '<tr class="border-b border-gray-100">' +
        '<td class="p-3 text-xs text-gray-600 w-40">' + formatDateTime(t['Tanggal']) + '</td>' +
        '<td class="p-3"><span class="text-[10px] font-bold uppercase ' + (isS ? 'text-success' : 'text-danger') + '">' + escapeHtml(t['Jenis Transaksi']) + '</span><br><span class="text-xs truncate block max-w-[200px]">' + escapeHtml(t['Keterangan'] || '-') + '</span></td>' +
        '<td class="p-3 text-right text-success text-sm">' + (isS ? formatRupiah(n) : '-') + '</td>' +
        '<td class="p-3 text-right text-danger text-sm">' + (!isS ? formatRupiah(n) : '-') + '</td>' +
        '<td class="p-3 text-right font-bold text-sm bg-gray-50 dark:bg-gray-800/30">' + formatRupiah(sld) + '</td>' +
        '<td class="p-3 text-center"><div class="flex gap-1 justify-center">' +
          (canEdit ? 
            '<button onclick="editTransaksi(\'' + t['ID Transaksi'] + '\')" class="text-blue-500 bg-blue-50 p-1.5 rounded" title="Edit"><i class="ph ph-pencil-simple text-sm"></i></button>' +
            '<button onclick="deleteTransaksi(\'' + t['ID Transaksi'] + '\')" class="text-danger bg-red-50 p-1.5 rounded" title="Hapus"><i class="ph ph-trash text-sm"></i></button>' 
          : '') +
        '</div></td>' +
      '</tr>';
    });
    tb.innerHTML = html;
  }
};

            '<div><label class="block text-xs font-medium mb-1">No HP Suami</label><input type="text" id="p-hp-suami" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="' + escapeHtml(user['No HP Suami'] || '') + '"></div>' +
            '<div><label class="block text-xs font-medium mb-1">No HP Istri</label><input type="text" id="p-hp-istri" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" value="' + escapeHtml(user['No HP Istri'] || '') + '"></div>' +

          '<div><label class="block text-xs font-medium mb-1">Password Baru</label><input type="password" id="f-p-password" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" autocomplete="new-password" placeholder="Kosongkan jika tidak diganti"></div>' +

        '</form>' +

};

window.previewProfilePhoto = function(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast("File harus berupa gambar", "error"); e.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = function() {
    const preview = document.getElementById('profile-photo-preview');
    if (preview) preview.innerHTML = '<img src="' + reader.result + '" class="h-24 w-24 rounded-2xl object-cover border border-gray-200 dark:border-gray-700 shadow-lg" alt="Preview Foto">';
  };
  reader.readAsDataURL(file);
};

function resizeProfilePhoto(file) {
  return new Promise(function(resolve, reject) {
    if (!file) { resolve(null); return; }
    if (!file.type.startsWith('image/')) { reject(new Error("File harus gambar.")); return; }
    const reader = new FileReader();
    reader.onload = function() {
      const img = new Image();
      img.onload = function() {
        const size = 512;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(size / img.width, size / img.height);
        ctx.drawImage(img, (size - img.width * scale) / 2, (size - img.height * scale) / 2, img.width * scale, img.height * scale);
        resolve({ name: file.name, mimeType: 'image/jpeg', data: canvas.toDataURL('image/jpeg', 0.82) });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

window.submitProfile = async function(e) {
  e.preventDefault();
  const password = document.getElementById('f-p-password').value.trim();
  const password2 = document.getElementById('f-p-password2').value.trim();
  const file = document.getElementById('f-p-photo').files[0];
  const namaSuami = document.getElementById('p-suami').value.trim();
  const namaIstri = document.getElementById('p-istri').value.trim();
  const noRumah = document.getElementById('p-rumah').value.trim();
  const noHpSuami = document.getElementById('p-hp-suami').value.trim();
  const noHpIstri = document.getElementById('p-hp-istri').value.trim();

  if (password || password2) {
    if (password.length < 4) { showToast("Password minimal 4 karakter", "error"); return; }
    if (password !== password2) { showToast("Konfirmasi password tidak sama", "error"); return; }
  }
  if (!namaIstri) { showToast("Nama Istri tidak boleh kosong", "error"); return; }
  if (!noRumah) { showToast("No Rumah tidak boleh kosong", "error"); return; }

  let photo = null;
  try {
    photo = file ? await resizeProfilePhoto(file) : null;
  } catch(err) {
    showToast(err.message || "Gagal memproses foto", "error");
    return;
  }
  
  const payload = {
    namaSuami: namaSuami,
    namaIstri: namaIstri,
    noRumah: noRumah,
    noHpSuami: noHpSuami,
    noHpIstri: noHpIstri,
    password: password || undefined,
    photo: photo
  };
  
  const res = await withLoading(
    function() { return fetchAPI('update_profile', payload); },
    null,
    'Gagal: '
  );
  
  if (!res.success) return;
  
  state.user = Object.assign({}, state.user, (res.data || {}), { role: state.user.role || normalizeRole(res.data?.Role) });
  state.user['Nama Suami'] = namaSuami;
  state.user['Nama Istri'] = namaIstri;
  state.user['No Rumah'] = noRumah;
  state.user['No HP Suami'] = noHpSuami;
  state.user['No HP Istri'] = noHpIstri;
  if (res.data && res.data['Foto Profil']) state.user['Foto Profil'] = res.data['Foto Profil'];
  
  persistSession();
  document.body.setAttribute('data-role', state.user.role);
  showToast("Profil diperbarui");
  window.closeAllModals();
  await loadData();
};
