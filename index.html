<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tabungan Ibu-Ibu RT</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0F766E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230F766E'/><text x='50' y='65' font-size='40' fill='white' text-anchor='middle'>RT</text></svg>">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Fira Sans"', 'sans-serif'] },
                    colors: {
                        primary: '#0F766E',
                        'primary-dark': '#115E59',
                        secondary: '#14B8A6',
                        success: '#16A34A',
                        danger: '#DC2626',
                        darkbg: '#111827',
                        darkcard: '#1F2937'
                    }
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass-nav { background: rgba(31, 41, 55, 0.85); }
        
        .modal-animate { animation: fadeInScale 0.2s ease-out forwards; }
        .toast-enter { animation: slideInDown 0.3s ease-out forwards; }
        
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* ROLE-BASED CSS HIDING */
        body[data-role="user"] .admin-only {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkbg dark:text-gray-200 transition-colors duration-300 antialiased overflow-hidden selection:bg-primary/30">

    <div id="app" class="h-[100dvh] w-full max-w-[100vw] flex overflow-hidden relative">
        
        <!-- ================= LOGIN SCREEN ================= -->
        <div id="login-screen" class="absolute inset-0 z-50 bg-gray-50 dark:bg-darkbg flex flex-col items-center justify-center p-4">
            <div class="bg-white dark:bg-darkcard p-6 md:p-8 rounded-2xl shadow-xl w-[calc(100%-2rem)] max-w-md modal-animate border border-gray-100 dark:border-gray-700">
                <div class="flex justify-center mb-6">
                    <div class="h-16 w-16 bg-primary text-white rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-primary/30">
                        <i class="ph ph-wallet"></i>
                    </div>
                </div>
                <h1 class="text-2xl font-bold text-center mb-2 dark:text-white">Tabungan RT</h1>
                <p class="text-gray-500 dark:text-gray-400 text-center mb-8 text-sm">Masuk untuk mengelola dana warga</p>
                
                <form id="login-form" class="space-y-4 w-full">
                    <div>
                        <label class="block text-sm font-medium mb-1">Username / Nama Anggota</label>
                        <div class="relative">
                            <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="login-user" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Misal: bendahara atau Siti Aminah" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Password</label>
                        <div class="relative">
                            <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="login-pass" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Password default: 123456" required>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 rounded-xl transition-colors shadow-md shadow-primary/30 mt-4 flex justify-center items-center gap-2">
                        <span>Masuk</span>
                        <i class="ph ph-arrow-right font-bold"></i>
                    </button>
                </form>
                <div class="mt-6 text-xs text-center bg-gray-50 dark:bg-gray-800/50 p-4 rounded-xl border border-gray-100 dark:border-gray-700">
                    <p class="font-bold text-gray-600 dark:text-gray-300 mb-2">Akses Demo / Uji Coba:</p>
                    <p class="mb-1"><span class="font-medium text-primary">Bendahara:</span> Username: <b>bendahara</b> | Pass: 123456</p>
                    <p><span class="font-medium text-primary">Anggota:</span> Username: <b>Siti Aminah</b> | Pass: 123456</p>
                </div>
            </div>
        </div>

        <!-- ================= MAIN LAYOUT ================= -->
        <div id="main-layout" class="flex w-full h-full max-w-[100vw] hidden">
            
            <!-- Sidebar (Desktop) -->
            <aside class="w-64 bg-white dark:bg-darkcard border-r border-gray-200 dark:border-gray-700 hidden lg:flex flex-col z-20 flex-shrink-0">
                <div class="p-6 flex items-center gap-3">
                    <div class="h-10 w-10 bg-primary text-white rounded-xl flex items-center justify-center text-xl shadow-md">
                        <i class="ph ph-wallet"></i>
                    </div>
                    <div class="min-w-0">
                        <h2 class="font-bold text-lg leading-tight dark:text-white truncate">Tabungan RT</h2>
                        <span id="role-badge" class="text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded-full font-bold uppercase tracking-wide">Admin</span>
                    </div>
                </div>

                <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scroll pb-4">
                    <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium" data-target="dashboard">
                        <i class="ph ph-squares-four text-xl"></i> Dashboard
                    </button>
                    <!-- Admin Only Menus -->
                    <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="anggota">
                        <i class="ph ph-users text-xl"></i> Anggota
                    </button>
                    <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="transaksi">
                        <i class="ph ph-arrows-left-right text-xl"></i> Transaksi
                    </button>
                    <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="laporan">
                        <i class="ph ph-file-text text-xl"></i> Laporan
                    </button>
                    <div class="h-px bg-gray-100 dark:bg-gray-800 my-2"></div>
                    <!-- All User Menus -->
                    <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="buku">
                        <i class="ph ph-book-bookmark text-xl"></i> Buku Tabungan
                    </button>
                    <!-- Admin Only Again -->
                    <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="aktivitas">
                        <i class="ph ph-clock-counter-clockwise text-xl"></i> Log Aktivitas
                    </button>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 min-w-0 flex flex-col h-full relative max-w-full">
                
                <!-- Mobile Header -->
                <header class="lg:hidden glass-nav border-b border-gray-200 dark:border-gray-700 sticky top-0 z-20 px-4 py-3 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="h-8 w-8 bg-primary text-white rounded-lg flex flex-shrink-0 items-center justify-center shadow-md">
                            <i class="ph ph-wallet text-sm"></i>
                        </div>
                        <h1 class="font-bold text-lg dark:text-white truncate" id="mobile-header-title">Dashboard</h1>
                    </div>
                    <div class="flex gap-1 flex-shrink-0">
                        <button onclick="navigate('pengaturan')" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors admin-only">
                            <i class="ph ph-gear text-xl"></i>
                        </button>
                        <button onclick="toggleTheme()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                            <i class="ph ph-moon text-xl dark:hidden"></i>
                            <i class="ph ph-sun text-xl hidden dark:block"></i>
                        </button>
                        <button onclick="handleLogout()" class="p-2 text-danger hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition-colors">
                            <i class="ph ph-sign-out text-xl"></i>
                        </button>
                    </div>
                </header>

                <!-- Desktop Topbar & Logout (Static position) -->
                <div class="hidden lg:flex justify-end px-8 pt-6 pb-2 w-full flex-shrink-0 gap-2">
                    <button onclick="navigate('pengaturan')" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors admin-only">
                        <i class="ph ph-gear text-[22px]"></i>
                    </button>
                    <button onclick="toggleTheme()" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors">
                        <i class="ph ph-moon text-[22px] dark:hidden"></i>
                        <i class="ph ph-sun text-[22px] hidden dark:block"></i>
                    </button>
                    <button onclick="handleLogout()" class="p-2.5 bg-white dark:bg-darkcard text-danger shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors">
                        <i class="ph ph-sign-out text-[22px]"></i>
                    </button>
                </div>

                <!-- Content Views -->
                <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 lg:px-8 lg:pb-8 lg:pt-2 pb-24 w-full" id="content-area">
                    <!-- Views will be injected here via JS -->
                </div>
            </main>

            <!-- Bottom Navigation (Mobile) -->
            <nav class="lg:hidden fixed bottom-0 left-0 right-0 w-full glass-nav border-t border-gray-200 dark:border-gray-700 z-30 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.1)] pb-safe">
                <div class="flex justify-around items-center p-1.5 px-1">
                    <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0" data-target="dashboard">
                        <i class="ph ph-squares-four text-[20px] mb-1"></i>
                        <span class="text-[9px] font-medium truncate">Home</span>
                    </button>
                    <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="anggota">
                        <i class="ph ph-users text-[20px] mb-1"></i>
                        <span class="text-[9px] font-medium truncate">Anggota</span>
                    </button>
                    <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="transaksi">
                        <i class="ph ph-arrows-left-right text-[20px] mb-1"></i>
                        <span class="text-[9px] font-medium truncate">Trx</span>
                    </button>
                    <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="buku">
                        <i class="ph ph-book-bookmark text-[20px] mb-1"></i>
                        <span class="text-[9px] font-medium truncate">Buku</span>
                    </button>
                    <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="laporan">
                        <i class="ph ph-file-text text-[20px] mb-1"></i>
                        <span class="text-[9px] font-medium truncate">Laporan</span>
                    </button>
                </div>
            </nav>

        </div>
    </div>

    <!-- ================= MODALS & TOASTS CONTAINER ================= -->
    <div id="modals" class="relative z-50"></div>
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[calc(100%-2rem)] max-w-sm"></div>

    <!-- ================= TEMPLATES ================= -->
    <template id="tpl-dashboard">
        <div class="space-y-4 md:space-y-6 animate-fade-in w-full">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-2xl font-bold hidden lg:block dark:text-white" id="dash-title">Overview</h2>
                <!-- Tombol Shortcut Tambah Transaksi di Dashboard -->
                <button onclick="openModal('modal-transaksi')" class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-xl text-sm font-medium shadow-md shadow-primary/30 flex items-center gap-2 admin-only ml-auto transition-colors">
                    <i class="ph ph-plus-circle text-lg"></i> <span class="hidden sm:inline">Transaksi Baru</span>
                </button>
            </div>
            
            <!-- Profil Card (Dynamic: Hanya muncul style khusus untuk Anggota/Admin via JS) -->
            <div id="profile-card" class="hidden"></div>
            
            <!-- Stats Grid (Khusus Admin) -->
            <div id="admin-stats" class="admin-only grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full">
                <div class="bg-white dark:bg-darkcard p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-1.5 bg-blue-100 text-blue-600 rounded-lg"><i class="ph ph-users text-lg"></i></div>
                        <p class="text-[10px] md:text-xs text-gray-500 font-medium truncate">Total Anggota</p>
                    </div>
                    <h3 class="text-xl md:text-2xl font-bold dark:text-white truncate" id="stat-anggota">0</h3>
                </div>
                <div class="bg-white dark:bg-darkcard p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-1.5 bg-primary/10 text-primary rounded-lg"><i class="ph ph-wallet text-lg"></i></div>
                        <p class="text-[10px] md:text-xs text-gray-500 font-medium truncate">Total Saldo</p>
                    </div>
                    <h3 class="text-base md:text-xl font-bold text-primary dark:text-primary truncate" id="stat-saldo">Rp 0</h3>
                </div>
                <div class="bg-white dark:bg-darkcard p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-1.5 bg-success/10 text-success rounded-lg"><i class="ph ph-trend-up text-lg"></i></div>
                        <p class="text-[10px] md:text-xs text-gray-500 font-medium truncate">Setoran Bulan Ini</p>
                    </div>
                    <h3 class="text-base md:text-lg font-bold text-success truncate" id="stat-setoran">Rp 0</h3>
                </div>
                <div class="bg-white dark:bg-darkcard p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-1.5 bg-danger/10 text-danger rounded-lg"><i class="ph ph-trend-down text-lg"></i></div>
                        <p class="text-[10px] md:text-xs text-gray-500 font-medium truncate">Penarikan Bulan Ini</p>
                    </div>
                    <h3 class="text-base md:text-lg font-bold text-danger truncate" id="stat-penarikan">Rp 0</h3>
                </div>
            </div>

            <!-- Charts (Khusus Admin) -->
            <div id="admin-charts" class="admin-only grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-6 mt-4 w-full">
                <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
                    <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Statistik 6 Bulan</h3>
                    <div class="h-56 md:h-64 w-full relative">
                        <canvas id="chartTransaksi"></canvas>
                    </div>
                </div>
                <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
                    <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Aktivitas Terakhir</h3>
                    <div class="space-y-3" id="recent-activities">
                        <!-- Injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-anggota">
        <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <h2 class="text-2xl font-bold hidden lg:block dark:text-white">Daftar Anggota</h2>
                <div class="flex flex-col sm:flex-row w-full sm:w-auto gap-2">
                    <div class="relative w-full sm:w-64">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-anggota" placeholder="Cari anggota..." class="w-full pl-10 pr-4 py-2.5 sm:py-2 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none bg-white text-sm">
                    </div>
                    <button class="bg-primary hover:bg-primary-dark text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center justify-center gap-2 shadow-sm whitespace-nowrap admin-only font-medium w-full sm:w-auto transition-colors" onclick="openModal('modal-anggota')">
                        <i class="ph ph-plus-circle text-lg"></i> <span>Tambah Anggota</span>
                    </button>
                </div>
            </div>

            <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden flex flex-col min-w-0 w-full relative">
                <div class="overflow-x-auto w-full h-full flex-1">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
                        <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
                            <tr>
                                <th class="p-3 md:p-4 font-medium w-32">ID Anggota</th>
                                <th class="p-3 md:p-4 font-medium">Nama Lengkap</th>
                                <th class="p-3 md:p-4 font-medium w-24">No Rmh</th>
                                <th class="p-3 md:p-4 font-medium">Saldo</th>
                                <th class="p-3 md:p-4 font-medium text-center">Status</th>
                                <th class="p-3 md:p-4 font-medium text-center w-20">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-anggota" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-darkcard">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-transaksi">
        <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <h2 class="text-2xl font-bold hidden lg:block dark:text-white">Riwayat Transaksi Umum</h2>
                <button class="bg-primary hover:bg-primary-dark text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center gap-2 shadow-sm whitespace-nowrap admin-only w-full sm:w-auto justify-center font-medium transition-colors" onclick="openModal('modal-transaksi')">
                    <i class="ph ph-plus-circle text-lg"></i> <span>Transaksi Baru</span>
                </button>
            </div>

            <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden flex flex-col min-w-0 w-full relative">
                <div class="p-3 border-b border-gray-100 dark:border-gray-800 flex gap-2 overflow-x-auto hide-scroll w-full">
                    <button class="px-4 py-1.5 rounded-full bg-primary text-white text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Semua', this)">Semua Transaksi</button>
                    <button class="px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Setoran', this)">Setoran Masuk</button>
                    <button class="px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Penarikan', this)">Penarikan</button>
                </div>
                <div class="overflow-x-auto w-full flex-1">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-[750px]">
                        <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
                            <tr>
                                <th class="p-3 md:p-4 font-medium w-36">Waktu</th>
                                <th class="p-3 md:p-4 font-medium">ID Trx</th>
                                <th class="p-3 md:p-4 font-medium">Nama Anggota</th>
                                <th class="p-3 md:p-4 font-medium">Jenis</th>
                                <th class="p-3 md:p-4 font-medium">Nominal</th>
                                <th class="p-3 md:p-4 font-medium w-48">Keterangan</th>
                            </tr>
                        </thead>
                        <tbody id="table-transaksi" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-darkcard">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-laporan">

            <div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex flex-col sm:flex-row gap-4 sm:items-end">

    <template id="tpl-buku">
        <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
            <h2 class="text-2xl font-bold hidden lg:block dark:text-white">Buku Tabungan Digital</h2>
            
            <div class="bg-white dark:bg-darkcard p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800" id="buku-selector-wrapper">
                <label class="block text-xs font-medium text-gray-500 mb-1">Cari & Pilih Nama Anggota:</label>
                <select id="select-buku-anggota" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none bg-white font-medium text-sm" onchange="renderBukuTabungan()">
                    <option value="">-- Silakan Pilih Anggota --</option>
                </select>
            </div>

            <div id="passbook-area" class="hidden flex-1 flex-col gap-4 min-w-0 w-full overflow-y-auto hide-scroll pb-10">
                <!-- Info Saldo & Identitas -->
                <div class="flex flex-col md:flex-row gap-4 w-full shrink-0">
                    <div class="bg-gradient-to-br from-primary to-primary-dark p-5 md:p-6 rounded-2xl shadow-md text-white flex-1 relative overflow-hidden h-36 md:h-44">
                        <div class="absolute -right-6 -top-6 opacity-10 pointer-events-none"><i class="ph ph-wallet" style="font-size: 140px;"></i></div>
                        <div class="relative z-10 flex flex-col h-full justify-between">
                            <div>
                                <p class="text-white/80 text-[10px] uppercase tracking-wider mb-1 font-bold">Buku Tabungan RT</p>
                                <h3 class="text-xl md:text-2xl font-bold truncate pr-10" id="buku-nama">-</h3>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-sm mt-auto">
                                <div><p class="text-white/60 text-[10px]">ID Anggota</p><p class="font-medium font-mono text-xs md:text-sm truncate" id="buku-id">-</p></div>
                                <div><p class="text-white/60 text-[10px]">No Rumah</p><p class="font-medium font-mono text-xs md:text-sm" id="buku-norumah">-</p></div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-darkcard p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-[0.7] flex flex-col justify-center items-center h-36 md:h-44">
                        <p class="text-gray-500 dark:text-gray-400 text-xs font-medium mb-1 uppercase tracking-wide">Saldo Akhir</p>
                        <h2 class="text-2xl md:text-3xl font-bold text-primary mb-3 md:mb-4 truncate w-full text-center" id="buku-saldo">Rp 0</h2>
                        <div class="w-full"><button onclick="cetakBukuTabunganPDF()" class="w-full bg-gray-50 hover:bg-gray-100 dark:bg-gray-700/50 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-white py-2 rounded-xl text-sm font-medium transition flex justify-center items-center gap-2"><i class="ph ph-file-pdf text-lg text-danger"></i> Unduh PDF</button></div>
                    </div>
                </div>

                <!-- Riwayat Transaksi Buku Tabungan -->
                <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden flex flex-col min-w-0" id="pdf-content">
                    <div class="p-3 md:p-4 border-b border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 flex justify-between items-center">
                        <h4 class="font-bold text-sm text-primary flex items-center gap-2"><i class="ph ph-list-bullets text-lg"></i> Tabel Riwayat Mutasi Transaksi</h4>
                    </div>
                    <div class="overflow-x-auto w-full flex-1">
                        <table class="w-full text-left text-xs md:text-sm whitespace-nowrap min-w-[600px]">
                            <thead class="bg-white dark:bg-darkcard text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700">
                                <tr>
                                    <th class="p-3 font-medium">Waktu Transaksi</th>
                                    <th class="p-3 font-medium">Jenis & Keterangan</th>
                                    <th class="p-3 font-medium text-right">Debit (Masuk)</th>
                                    <th class="p-3 font-medium text-right">Kredit (Keluar)</th>
                                    <th class="p-3 font-medium text-right bg-gray-50 dark:bg-gray-800/30">Saldo Akhir</th>
                                </tr>
                            </thead>
                            <tbody id="table-buku" class="divide-y divide-gray-100 dark:divide-gray-800 font-mono bg-white dark:bg-darkcard">
                                <!-- Baris transaksi akan dimasukkan di sini oleh JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- Empty State -->
            <div id="passbook-empty" class="flex-1 flex flex-col items-center justify-center text-gray-400 pb-10 text-center px-4">
                <i class="ph ph-book-open text-6xl mb-4 opacity-50 text-primary"></i>
                <h3 class="font-bold text-gray-600 dark:text-gray-300 mb-1">Pilih Anggota Terlebih Dahulu</h3>
                <p class="text-sm">Riwayat mutasi transaksi buku tabungan akan muncul di sini setelah Anda memilih nama anggota pada kolom di atas.</p>
            </div>
        </div>
    </template>

    <script>
        // --- INIT MOCK DATA ---
        function initMockDB() {
            if(!localStorage.getItem('mock_anggota')) {
                localStorage.setItem('mock_anggota', JSON.stringify([
                    {"ID Anggota":"SITIAMINAH-12", "Nama Lengkap":"Siti Aminah", "No Rumah":"12", "No HP":"08123456789", "Status":"Aktif", "Tanggal Dibuat": new Date().toISOString()},
                    {"ID Anggota":"RINA-08", "Nama Lengkap":"Rina", "No Rumah":"08", "No HP":"08987654321", "Status":"Aktif", "Tanggal Dibuat": new Date().toISOString()}
                ]));
                localStorage.setItem('mock_transaksi', JSON.stringify([
                    {"ID Transaksi":"TRX-20260618-0001", "Tanggal": new Date().toISOString(), "ID Anggota":"SITIAMINAH-12", "Nama Anggota":"Siti Aminah", "Jenis Transaksi":"Setoran", "Nominal":150000, "Keterangan":"Iuran Awal", "User Input":"Bendahara"}
                ]));
                localStorage.setItem('mock_logs', JSON.stringify([]));
            }
        }

        // Setup Mock DB before anything else
        document.addEventListener('DOMContentLoaded', () => { 
            initMockDB();
            if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark'); 
            document.getElementById('login-form').addEventListener('submit', handleLogin); 
        });

        // --- APP STATE ---
        const state = { 
            user: null, 
            data: { anggota: [], transaksi: [], logs: [] }, 
            settings: { gasUrl: localStorage.getItem('gasUrl') || '', theme: localStorage.getItem('theme') || 'light' }, 
            ui: { currentView: 'dashboard' } 
        };
        const formatRupiah = (angka) => 'Rp ' + Number(angka).toLocaleString('id-ID');
        const formatDateTime = (iso) => iso ? new Date(iso).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour:'2-digit', minute:'2-digit' }) : '-';
        const calculateSaldo = (id) => state.data.transaksi.filter(t=>t['ID Anggota']===id).reduce((sum, t) => t['Jenis Transaksi'] === 'Setoran' ? sum + Number(t['Nominal']) : sum - Number(t['Nominal']), 0);

        const showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const clrs = { success: 'bg-green-100 text-green-800 border-green-200 dark:bg-green-900/80 dark:text-green-300 dark:border-green-800', error: 'bg-red-100 text-red-800 border-red-200 dark:bg-red-900/80 dark:text-red-300 dark:border-red-800' };
            const icons = { success: 'check-circle', error: 'x-circle' };
            toast.className = `flex items-center gap-3 p-3.5 rounded-xl border shadow-lg toast-enter pointer-events-auto backdrop-blur-md ${clrs[type]} w-full`;
            toast.innerHTML = `<i class="ph ph-${icons[type]} text-xl flex-shrink-0"></i><span class="font-medium text-xs md:text-sm">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        };

        // --- API LAYER ---
        async function fetchAPI(action, payload = {}) {
            // Jika ada URL GAS di pengaturan, kirim data aktual ke Google Sheets
            if (state.settings.gasUrl) {
                try {
                    const response = await fetch(state.settings.gasUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action, payload, user: state.user ? state.user.username : 'Unknown' })
                    });
                    
                    const textRes = await response.text();
                    try {
                        return JSON.parse(textRes);
                    } catch(err) {
                        console.error("Format respon GAS salah:", textRes);
                        if(textRes.toLowerCase().includes("<html")) {
                            return { success: false, message: "Akses ditolak! Pastikan deploy Apps Script di-set Akses: 'Siapa Saja' (Anyone)." };
                        }
                        return { success: false, message: "Error dari server Google Script." };
                    }
                } catch (e) {
                    console.error("Koneksi Error:", e);
                    return { success: false, message: "Koneksi terputus. Pastikan URL Google Script benar." };
                }
            } 
            // Jika URL kosong, gunakan Mock DB Lokal (Untuk test UI)
            else {
                return new Promise(resolve => {
                    setTimeout(() => {
                        let a = JSON.parse(localStorage.getItem('mock_anggota') || '[]');
                        let t = JSON.parse(localStorage.getItem('mock_transaksi') || '[]');
                        let l = JSON.parse(localStorage.getItem('mock_logs') || '[]');
                        if (action === 'get_all_data') resolve({ success: true, data: { anggota: a, transaksi: t, logs: l } });
                        else if (action === 'save_anggota') {
                            let id = payload.id || payload.nama.toUpperCase().replace(/[^A-Z]/g, '') + '-' + payload.noRumah;
                            if(!payload.id) { a.push({"ID Anggota": id, "Nama Lengkap": payload.nama, "No Rumah": payload.noRumah, "No HP": payload.noHp, "Status": payload.status, "Tanggal Dibuat": new Date().toISOString()}); } 
                            else { let i = a.findIndex(x => x['ID Anggota'] === id); if(i>-1) { a[i]['Nama Lengkap']=payload.nama; a[i]['No Rumah']=payload.noRumah; a[i]['No HP']=payload.noHp; a[i]['Status']=payload.status; } }
                            localStorage.setItem('mock_anggota', JSON.stringify(a)); resolve({success:true});
                        } else if (action === 'save_transaksi') {
                            let id = "TRX-" + new Date().toISOString().slice(0,10).replace(/-/g,'') + "-" + ("000"+(t.length+1)).slice(-4);
                            t.push({"ID Transaksi": id, "Tanggal": new Date().toISOString(), "ID Anggota": payload.idAnggota, "Nama Anggota": payload.namaAnggota, "Jenis Transaksi": payload.jenis, "Nominal": payload.nominal, "Keterangan": payload.keterangan, "User Input": state.user ? state.user.username : 'admin'});
                            localStorage.setItem('mock_transaksi', JSON.stringify(t)); resolve({success:true});
                        }
                    }, 300);
                });
            }
        }

        async function loadData() {
            const res = await fetchAPI('get_all_data');
            if(res.success) { 
                state.data = res.data; 
                renderCurrentView(); 
            } else {
                if(res.message) showToast(res.message, 'error'); // Tampilkan error jika koneksi GAS gagal
            }
        }

        // --- AUTH ---
        function handleLogin(e) {
            e.preventDefault(); 
            const u = document.getElementById('login-user').value.trim(); 
            const p = document.getElementById('login-pass').value;
            
            // Validasi Login Bendahara (Admin)
            if (u.toLowerCase() === 'bendahara' && p === '123456') {
                state.user = { username: 'Bendahara', role: 'admin' };
                successLogin();
            } 
            // Validasi Login Anggota (User)
            else {
                // Ambil data anggota lokal jika loadData belum jalan
                let anggotaList = state.data.anggota.length > 0 ? state.data.anggota : (JSON.parse(localStorage.getItem('mock_anggota')) || []);
                let foundUser = anggotaList.find(a => a['Nama Lengkap'].toLowerCase() === u.toLowerCase());
                
                if(foundUser && p === '123456') {
                    state.user = { ...foundUser, username: foundUser['Nama Lengkap'], role: 'user' };
                    successLogin();
                } else {
                    showToast("Nama Anggota atau Password salah", "error");
                }
            }
        }

        function successLogin() {
            document.getElementById('login-screen').classList.add('hidden'); 
            document.getElementById('main-layout').classList.remove('hidden');
            document.getElementById('role-badge').innerText = state.user.role === 'admin' ? 'Bendahara' : 'Anggota';
            
            // Menerapkan pembatasan Role melalui Global Body Atribut
            document.body.setAttribute('data-role', state.user.role);
            
            loadData(); 
            showToast("Login berhasil");
        }

        function handleLogout() {
            state.user = null; document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-layout').classList.add('hidden');
            document.getElementById('login-form').reset(); closeAllModals(); document.body.removeAttribute('data-role');
            navigate('dashboard'); // reset view
        }

        function navigate(viewName) {
            state.ui.currentView = viewName;
            document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(btn => {
                let isAktif = btn.dataset.target === viewName;
                if(btn.classList.contains('nav-btn')) btn.className = isAktif ? 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium' : 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium';
                else {
                    let baseMobileClass = btn.classList.contains('admin-only') ? 'nav-btn-mobile admin-only' : 'nav-btn-mobile';
                    btn.className = isAktif ? `${baseMobileClass} flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0` : `${baseMobileClass} flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0`;
                }
            });
            const tMap = { dashboard:'Dashboard', anggota:'Anggota', transaksi:'Transaksi', buku:'Buku Tabungan', laporan:'Laporan', aktivitas:'Log', pengaturan:'Pengaturan' };
            document.getElementById('mobile-header-title').innerText = tMap[viewName] || 'Aplikasi';
            renderCurrentView();
        }

        document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(b => b.addEventListener('click', () => navigate(b.dataset.target)));

        function renderCurrentView() {
            const a = document.getElementById('content-area'); a.innerHTML = ''; const v = state.ui.currentView;
            if(v==='dashboard'){ a.appendChild(document.getElementById('tpl-dashboard').content.cloneNode(true)); renderDashboard(); }
            else if(v==='anggota'){ a.appendChild(document.getElementById('tpl-anggota').content.cloneNode(true)); renderAnggota(); }
            else if(v==='transaksi'){ a.appendChild(document.getElementById('tpl-transaksi').content.cloneNode(true)); renderTransaksi(); }
            else if(v==='laporan'){ a.appendChild(document.getElementById('tpl-laporan').content.cloneNode(true)); renderLaporanData(); }
            else if(v==='buku'){ a.appendChild(document.getElementById('tpl-buku').content.cloneNode(true)); setupBukuTabungan(); }
            else if(v==='aktivitas'){ renderAktivitas(a); } else if(v==='pengaturan'){ renderPengaturan(a); }
        }

        // --- STREAMING_CHUNK:Dashboard & Role Logic... ---
        function renderDashboard() {
            // Dashboard Khusus Anggota (User)
            if (state.user.role === 'user') {
                const myId = state.user['ID Anggota'];
                const mySaldo = calculateSaldo(myId);
                
                let htmlProfile = `
                    <div class="bg-gradient-to-br from-primary to-primary-dark p-6 md:p-8 rounded-2xl shadow-md text-white relative overflow-hidden flex flex-col md:flex-row gap-6 items-center md:items-start mb-2 mt-4">
                        <div class="absolute -right-10 -top-10 opacity-10 pointer-events-none"><i class="ph ph-user-circle" style="font-size: 200px;"></i></div>
                        <div class="h-24 w-24 bg-white/20 rounded-full flex items-center justify-center text-5xl flex-shrink-0 backdrop-blur-sm border border-white/30 z-10 shadow-lg">
                            <i class="ph ph-user"></i>
                        </div>
                        <div class="flex-1 text-center md:text-left z-10 w-full">
                            <p class="text-white/80 text-[10px] uppercase tracking-widest mb-1 font-bold">Profil Tabungan Anda</p>
                            <h3 class="text-2xl md:text-3xl font-bold mb-3">${state.user['Nama Lengkap']}</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-2 gap-x-4 text-xs text-white/90 bg-black/10 p-4 rounded-xl border border-white/10 w-full">
                                <p class="flex items-center gap-2"><i class="ph ph-identification-card text-lg opacity-70"></i> ${state.user['ID Anggota']}</p>
                                <p class="flex items-center gap-2"><i class="ph ph-house text-lg opacity-70"></i> Rumah No. ${state.user['No Rumah']}</p>
                                <p class="flex items-center gap-2"><i class="ph ph-phone text-lg opacity-70"></i> HP: ${state.user['No HP'] || '-'}</p>
                                <p class="flex items-center gap-2"><i class="ph ph-check-circle text-lg opacity-70"></i> <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase ${state.user['Status'] === 'Aktif' ? 'bg-green-500/50' : 'bg-red-500/50'}">${state.user['Status']}</span></p>
                            </div>
                        </div>
                        <div class="bg-white text-gray-800 p-5 rounded-2xl shadow-lg text-center min-w-[180px] z-10 mt-4 md:mt-0 md:self-stretch flex flex-col justify-center border-[4px] border-white/20 bg-clip-padding">
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1">Saldo Saat Ini</p>
                            <p class="text-2xl font-bold text-primary truncate">${formatRupiah(mySaldo)}</p>
                        </div>
                    </div>
                `;
                document.getElementById('profile-card').innerHTML = htmlProfile;
                document.getElementById('profile-card').classList.remove('hidden');
                document.getElementById('dash-title').innerText = 'Beranda Anggota';
            } 
            // Dashboard Khusus Bendahara (Admin)
            else {
                let saldo=0, setB=0, penB=0, now=new Date();
                state.data.transaksi.forEach(t => {
                    let amt = Number(t['Nominal']), isBulanIni = new Date(t['Tanggal']).getMonth() === now.getMonth() && new Date(t['Tanggal']).getFullYear() === now.getFullYear();
                    if(t['Jenis Transaksi']==='Setoran') { saldo+=amt; if(isBulanIni) setB+=amt; } else { saldo-=amt; if(isBulanIni) penB+=amt; }
                });
                
                document.getElementById('stat-anggota').innerText = state.data.anggota.length;
                document.getElementById('stat-saldo').innerText = formatRupiah(saldo);
                document.getElementById('stat-setoran').innerText = formatRupiah(setB);
                document.getElementById('stat-penarikan').innerText = formatRupiah(penB);
                
                let ctx = document.getElementById('chartTransaksi');
                if(ctx) {
                    new Chart(ctx, { type: 'bar', data: { labels: ['Jan','Feb','Mar','Apr','Mei', now.toLocaleDateString('id-ID', { month:'short' })], datasets: [
                        { label: 'Setoran', data: [0, 0, 0, 0, 0, setB], backgroundColor: '#14B8A6' }, { label: 'Penarikan', data: [0, 0, 0, 0, 0, penB], backgroundColor: '#DC2626' }
                    ]}, options: { responsive: true, maintainAspectRatio: false }});
                }
                document.getElementById('recent-activities').innerHTML = `<p class="text-sm text-gray-500">Berjalan normal. Sistem tersinkronisasi.</p>`;

                document.getElementById('profile-card').innerHTML = `
                    <div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex items-center gap-4 mb-4">
                        <div class="h-12 w-12 bg-primary/10 text-primary rounded-full flex items-center justify-center text-2xl flex-shrink-0"><i class="ph ph-user-gear"></i></div>
                        <div>
                            <h3 class="font-bold text-base md:text-lg dark:text-white">Selamat Datang, Bendahara!</h3>
                            <p class="text-xs text-gray-500">Berikut adalah ringkasan keuangan tabungan RT hari ini.</p>
                        </div>
                    </div>
                `;

        window.renderLaporanData = () => {
            const filter = document.getElementById('filter-waktu').value;
            const tb = document.getElementById('table-laporan');
            tb.innerHTML = '';
            let tSetoran = 0, tPenarikan = 0;
            
            let filtered = state.data.transaksi.filter(t => {
                let d = new Date(t['Tanggal']), now = new Date();
                if (filter === 'Hari Ini') return d.toDateString() === now.toDateString();
                if (filter === 'Minggu Ini') { let fd = new Date(now.setDate(now.getDate() - now.getDay())); return d >= fd; }
                if (filter === 'Bulan Ini') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if (filter === 'Tahun Ini') return d.getFullYear() === now.getFullYear();
                return true; 
            });

            filtered.sort((a,b)=>new Date(b['Tanggal'])-new Date(a['Tanggal']));
            if(filtered.length === 0) tb.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500">Tidak ada transaksi pada periode ini</td></tr>`;

            filtered.forEach(t => {
                let isS = t['Jenis Transaksi'] === 'Setoran';
                if(isS) tSetoran += Number(t['Nominal']); else tPenarikan += Number(t['Nominal']);
                let c = isS ? 'text-success' : 'text-danger';

            });

        }
        window.closeAllModals = () => document.getElementById('modals').innerHTML = '';

        window.submitAnggota = async (e) => { e.preventDefault(); await fetchAPI('save_anggota', { id: document.getElementById('f-a-id').value, nama: document.getElementById('f-a-nama').value, noRumah: document.getElementById('f-a-norumah').value, noHp: document.getElementById('f-a-nohp').value, status: document.getElementById('f-a-status')?document.getElementById('f-a-status').value:'Aktif' }); showToast("Berhasil tersimpan"); closeAllModals(); loadData(); };
        window.submitTransaksi = async (e) => { e.preventDefault(); let idA = document.getElementById('f-t-anggota').value; await fetchAPI('save_transaksi', { idAnggota: idA, namaAnggota: state.data.anggota.find(a=>a['ID Anggota']===idA)['Nama Lengkap'], jenis: document.querySelector('input[name="f-t-jenis"]:checked').value, nominal: Number(document.getElementById('f-t-nominal').value), keterangan: document.getElementById('f-t-ket').value }); showToast("Transaksi Berhasil"); closeAllModals(); loadData(); };
        
        window.editAnggota = (id) => { 
            const a = state.data.anggota.find(x => x['ID Anggota'] === id);
            openModal('modal-anggota'); 
            document.getElementById('m-anggota-title').innerText='Edit Anggota'; 
            document.getElementById('f-a-id').value=a['ID Anggota']; document.getElementById('f-a-nama').value=a['Nama Lengkap']; document.getElementById('f-a-norumah').value=a['No Rumah']; document.getElementById('f-a-nohp').value=a['No HP']; document.getElementById('div-status').classList.remove('hidden'); document.getElementById('f-a-status').value=a['Status']; 
        };

        window.toggleTheme = () => { let h = document.documentElement; h.classList.toggle('dark'); localStorage.setItem('theme', h.classList.contains('dark')?'dark':'light'); };
    </script>
</body>
</html>
