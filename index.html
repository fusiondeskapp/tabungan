<!DOCTYPE html>
<html lang="id" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tabungan & E-Kas RT</title>
  
  <meta name="theme-color" content="#0F766E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Fira Sans"', 'sans-serif'] },
          colors: { primary: '#0F766E', 'primary-dark': '#115E59', success: '#16A34A', danger: '#DC2626', warning: '#F59E0B', darkbg: '#111827', darkcard: '#1F2937' }
        }
      }
    }
  </script>

  <style>
    body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    .glass-nav { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
    .dark .glass-nav { background: rgba(31,41,55,0.85); }
    .modal-animate { animation: fadeInScale 0.2s ease-out forwards; }
    .toast-enter { animation: slideInDown 0.3s ease-out forwards; }
    @keyframes fadeInScale { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    @keyframes slideInDown { from { transform:translateY(-100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .hide-scroll::-webkit-scrollbar { display:none; }
    .hide-scroll { -ms-overflow-style:none; scrollbar-width:none; }
    body[data-role="user"] .admin-only { display:none !important; }
    .profile-avatar-img { object-fit:cover; }
    .view-section { display:none; }
    .view-section.active { display:block; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkbg dark:text-gray-200 transition-colors duration-300 antialiased overflow-hidden selection:bg-primary/30">

<div id="app" class="h-[100dvh] w-full max-w-[100vw] flex overflow-hidden relative">
  
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="absolute inset-0 z-50 bg-gray-50 dark:bg-darkbg flex flex-col items-center justify-center p-4">
    <div class="bg-white dark:bg-darkcard p-6 md:p-8 rounded-2xl shadow-xl w-[calc(100%-2rem)] max-w-md modal-animate border border-gray-100 dark:border-gray-700">
      <div class="flex justify-center mb-6">
        <div class="h-16 w-16 bg-primary text-white rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-primary/30"><i class="ph ph-wallet"></i></div>
      </div>
      <h1 class="text-2xl font-bold text-center mb-2 dark:text-white">Tabungan & E-Kas RT</h1>
      <p class="text-gray-500 dark:text-gray-400 text-center mb-8 text-sm">Masuk untuk mengelola</p>
      <form id="login-form" class="space-y-4 w-full">
        <div>
          <label class="block text-sm font-medium mb-1">Username / ID Anggota</label>
          <div class="relative">
            <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="login-user" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Masukkan Username / ID" required>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <div class="relative">
            <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="login-pass" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Masukkan Password" required>
          </div>
        </div>
        <button type="submit" id="btn-login" class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 rounded-xl transition-colors shadow-md shadow-primary/30 mt-4 flex justify-center items-center gap-2">
          <span>Masuk</span><i class="ph ph-arrow-right font-bold"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div id="main-layout" class="flex w-full h-full max-w-[100vw] hidden">
    <!-- Sidebar Desktop -->
    <aside class="w-64 bg-white dark:bg-darkcard border-r border-gray-200 dark:border-gray-700 hidden lg:flex flex-col z-20 flex-shrink-0">
      <div class="p-6 flex items-center gap-3">
        <div class="h-10 w-10 bg-primary text-white rounded-xl flex items-center justify-center text-xl shadow-md"><i class="ph ph-wallet"></i></div>
        <div class="min-w-0">
          <h2 class="font-bold text-lg leading-tight dark:text-white truncate">Tabungan RT</h2>
          <span id="role-badge" class="text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded-full font-bold uppercase tracking-wide">Admin</span>
        </div>
      </div>
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scroll pb-4">
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium" data-target="dashboard"><i class="ph ph-squares-four text-xl"></i> Dashboard</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="anggota"><i class="ph ph-users text-xl"></i> Anggota</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="transaksi"><i class="ph ph-arrows-left-right text-xl"></i> Transaksi</button>
        <div class="h-px bg-gray-100 dark:bg-gray-800 my-2 admin-only"></div>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="warga"><i class="ph ph-identification-badge text-xl"></i> Warga</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="pembayaran"><i class="ph ph-credit-card text-xl"></i> Pembayaran</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="kas"><i class="ph ph-book-open text-xl"></i> Buku Kas</button>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="laporan"><i class="ph ph-file-text text-xl"></i> Laporan</button>
        <div class="h-px bg-gray-100 dark:bg-gray-800 my-2"></div>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="buku"><i class="ph ph-book-bookmark text-xl"></i> Buku Tabungan</button>
        <button class="nav-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="pengaturan"><i class="ph ph-gear text-xl"></i> Pengaturan</button>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 min-w-0 flex flex-col h-full relative max-w-full">
      <header class="lg:hidden glass-nav border-b border-gray-200 dark:border-gray-700 sticky top-0 z-20 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3 min-w-0">
          <div class="h-8 w-8 bg-primary text-white rounded-lg flex flex-shrink-0 items-center justify-center shadow-md"><i class="ph ph-wallet text-sm"></i></div>
          <h1 class="font-bold text-lg dark:text-white truncate" id="mobile-header-title">Dashboard</h1>
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <button onclick="navigate('pengaturan')" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors admin-only"><i class="ph ph-gear text-xl"></i></button>
          <button onclick="toggleTheme()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors"><i class="ph ph-moon text-xl dark:hidden"></i><i class="ph ph-sun text-xl hidden dark:inline-block"></i></button>
          <button onclick="handleLogout()" class="p-2 text-danger hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition-colors"><i class="ph ph-sign-out text-xl"></i></button>
        </div>
      </header>

      <div class="hidden lg:flex justify-end px-8 pt-6 pb-2 w-full flex-shrink-0 gap-2">
        <button onclick="navigate('pengaturan')" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors admin-only"><i class="ph ph-gear text-[22px]"></i></button>
        <button onclick="toggleTheme()" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors"><i class="ph ph-moon text-[22px] dark:hidden"></i><i class="ph ph-sun text-[22px] hidden dark:inline-block"></i></button>
        <button onclick="handleLogout()" class="p-2.5 bg-white dark:bg-darkcard text-danger shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors"><i class="ph ph-sign-out text-[22px]"></i></button>
      </div>

      <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 lg:px-8 lg:pb-8 lg:pt-2 pb-24 w-full" id="content-area"></div>
    </main>

    <!-- Bottom Navigation Mobile -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 w-full glass-nav border-t border-gray-200 dark:border-gray-700 z-30 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.1)] pb-safe">
      <div class="flex justify-around items-center p-1.5 px-1">
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0" data-target="dashboard"><i class="ph ph-squares-four text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Home</span></button>
        <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="warga"><i class="ph ph-identification-badge text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Warga</span></button>
        <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="pembayaran"><i class="ph ph-credit-card text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Bayar</span></button>
        <button class="nav-btn-mobile admin-only flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="kas"><i class="ph ph-book-open text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Kas</span></button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="buku"><i class="ph ph-book-bookmark text-[22px] mb-1"></i><span class="text-[10px] font-medium truncate">Buku</span></button>
      </div>
    </nav>
  </div>
</div>

<!-- MODALS & TOASTS -->
<div id="modals" class="relative z-50"></div>
<div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[calc(100%-2rem)] max-w-sm"></div>

<!-- TEMPLATES -->
<template id="tpl-dashboard">
  <div class="space-y-4 md:space-y-6 animate-fade-in w-full">
    <h2 class="text-2xl font-bold hidden lg:block dark:text-white" id="dash-title">Overview</h2>
    <div id="profile-card" class="hidden"></div>
    <div id="admin-container" class="admin-only space-y-4 md:space-y-6">
      <div id="admin-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full"></div>
      <div id="ekas-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full"></div>
      <div id="admin-charts" class="grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-6 mt-4 w-full">
        <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
          <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Statistik Tabungan</h3>
          <div class="h-56 md:h-64 w-full relative"><canvas id="chartTransaksi"></canvas></div>
        </div>
        <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
          <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Arus Kas E-Kas</h3>
          <div class="h-56 md:h-64 w-full relative"><canvas id="chartEkas"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-anggota">
  <div class="space-y-4 flex flex-col w-full h-full animate-fade-in">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
      <h2 class="text-2xl font-bold dark:text-white">Daftar Anggota</h2>
      <div class="flex flex-col sm:flex-row w-full sm:w-auto gap-2">
        <div class="relative w-full sm:w-64">
          <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="search-anggota" placeholder="Cari anggota..." class="w-full pl-10 pr-4 py-2.5 sm:py-2 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none bg-white text-sm">
        </div>
        <button class="bg-primary hover:bg-primary-dark text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center justify-center gap-2 shadow-sm whitespace-nowrap font-medium w-full sm:w-auto transition-colors" onclick="openModal('modal-anggota')">
          <i class="ph ph-plus-circle text-lg"></i> <span>Tambah</span>
        </button>
      </div>
    </div>
    <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden relative w-full">
      <div class="overflow-x-auto w-full h-full">
        <table class="w-full text-left text-sm whitespace-nowrap min-w-[820px]">
          <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
            <tr><th class="p-4">ID</th><th class="p-4">Nama</th><th class="p-4 text-center">Role</th><th class="p-4">No Rmh</th><th class="p-4">Saldo</th><th class="p-4 text-center">Status</th><th class="p-4 text-center">Aksi</th></tr>
          </thead>
          <tbody id="table-anggota" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-darkcard"></tbody>
        </table>
      </div>
    </div>
  </div>
</template>

<template id="tpl-transaksi">
  <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
      <h2 class="text-2xl font-bold dark:text-white">Riwayat Transaksi</h2>
      <button class="bg-primary hover:bg-primary-dark text-white px-4 py-2.5 sm:py-2 rounded-xl flex items-center gap-2 shadow-sm whitespace-nowrap w-full sm:w-auto justify-center font-medium transition-colors" onclick="openModal('modal-transaksi')">
        <i class="ph ph-plus-circle text-lg"></i> <span>Transaksi Baru</span>
      </button>
    </div>
    <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden flex flex-col min-w-0 w-full relative">
      <div class="p-3 border-b border-gray-100 dark:border-gray-800 flex gap-2 overflow-x-auto hide-scroll w-full">
        <button class="px-4 py-1.5 rounded-full bg-primary text-white text-xs sm:text-sm font-medium whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Semua', this)">Semua</button>
        <button class="px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Setoran', this)">Setoran</button>
        <button class="px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-xs sm:text-sm font-medium hover:bg-gray-200 whitespace-nowrap flex-shrink-0 transition-colors" onclick="filterTrx('Penarikan', this)">Penarikan</button>
      </div>
      <div class="overflow-x-auto w-full flex-1">
        <table class="w-full text-left text-sm whitespace-nowrap min-w-[850px]">
          <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
            <tr><th class="p-4 w-40">Waktu</th><th class="p-4">ID Trx</th><th class="p-4">Anggota</th><th class="p-4">Jenis</th><th class="p-4">Nominal</th><th class="p-4 text-center">Aksi</th></tr>
          </thead>
          <tbody id="table-transaksi" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-darkcard"></tbody>
        </table>
      </div>
    </div>
  </div>
</template>

<template id="tpl-warga">
  <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
      <h2 class="text-2xl font-bold dark:text-white">Data Warga</h2>
      <button class="admin-only bg-primary hover:bg-primary-dark text-white px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-sm font-medium w-full sm:w-auto transition-colors" onclick="window.ekas.warga.openModal()">
        <i class="ph ph-plus-circle text-lg"></i> <span>Tambah Warga</span>
      </button>
    </div>
    <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-hidden relative w-full">
      <div class="overflow-x-auto w-full h-full">
        <table class="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
          <thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
            <tr><th class="p-4">ID</th><th class="p-4">Nama</th><th class="p-4">Rumah</th><th class="p-4">Iuran/Arisan</th><th class="p-4 admin-only text-center">Aksi</th></tr>
          </thead>
          <tbody id="table-warga" class="divide-y divide-gray-100 dark:divide-gray-800"></tbody>
        </table>
      </div>
    </div>
  </div>
</template>

<template id="tpl-pembayaran">
  <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
    <h2 class="text-2xl font-bold dark:text-white">Penerimaan Pembayaran</h2>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-1 bg-white dark:bg-darkcard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 h-fit">
        <form onsubmit="window.ekas.pembayaran.submit(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">Pilih Warga</label>
            <select id="pay-warga" onchange="window.ekas.pembayaran.calculate()" required class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary transition-shadow">
              <option value="">-- Pilih Warga --</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Bulan</label>
              <select id="pay-bulan" required class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-primary transition-shadow">
                <option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret">Maret</option>
                <option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option>
                <option value="Juli">Juli</option><option value="Agustus">Agustus</option><option value="September">September</option>
                <option value="Oktober">Oktober</option><option value="November">November</option><option value="Desember">Desember</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Tahun</label>
              <input type="number" id="pay-tahun" value="2026" required class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-primary transition-shadow">
            </div>
          </div>
          <div class="bg-blue-50 dark:bg-blue-900/10 p-5 rounded-xl border border-blue-100 dark:border-blue-900/30 space-y-3 mt-2">
            <h4 class="font-bold text-sm uppercase text-blue-800 dark:text-blue-300">Rincian Tagihan</h4>
            <div class="flex justify-between text-sm text-gray-700 dark:text-gray-300"><span>Iuran Wajib</span> <span id="pay-iuran-val" class="font-medium">Rp0</span></div>
            <div class="flex justify-between text-sm text-gray-700 dark:text-gray-300"><span>Arisan</span> <span id="pay-arisan-val" class="font-medium">Rp0</span></div>
            <div class="flex justify-between text-sm text-gray-700 dark:text-gray-300"><span>Biaya Tambahan</span> <span id="pay-tambahan-val" class="font-medium text-warning">Rp0</span></div>
            <div class="border-t border-blue-200 dark:border-blue-800 pt-3 flex justify-between font-bold text-xl text-primary">

<!-- JS LOGIC -->
<script>
  const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxcuUe9qO2PyallWSn7vu2UiiKTnMqirKbocdI_VI8uWnYyjYYvRsv_DUpGIV2GSWiuqQ/exec';
  const ADMIN_VIEWS = new Set(['anggota','transaksi','warga','pembayaran','kas','pengaturan']);

  const readStorage = (key, fallback = '') => { try { return localStorage.getItem(key) || fallback; } catch(e) { return fallback; } };
  const writeStorage = (key, value) => { try { localStorage.setItem(key, value); } catch(e) {} };
  const removeStorage = (key) => { try { localStorage.removeItem(key); } catch(e) {} };

  window.toggleTheme = () => { 
    const html = document.documentElement; html.classList.toggle('dark'); 
    try { localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light'); } catch(e) {} 
  };

  let chartInstance = null, chartEkasInstance = null;
  const state = { 
    user: null, 
    data: { anggota: [], transaksi: [], logs: [], warga: [], biaya: [], pembayaran: [], kas: [], settings: {} }, 
    settings: { gasUrl: readStorage('gasUrl', DEFAULT_GAS_URL), theme: readStorage('theme', 'light') },
    ui: { currentView: 'dashboard' }
  };
  
  const getGasUrl = () => (state.settings.gasUrl || DEFAULT_GAS_URL || '').trim();
  const normalizeRole = (role) => String(role || 'user').toLowerCase() === 'admin' ? 'admin' : 'user';
  const toNumber = (value) => { const n = Number(value); return Number.isFinite(n) ? n : 0; };
  const formatRupiah = (angka) => 'Rp ' + toNumber(angka).toLocaleString('id-ID');
  const formatDateTime = (iso) => {
    if (!iso) return '-';
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return '-';
    const pad = (n) => n.toString().padStart(2, '0');
    return `${pad(d.getDate())}-${pad(d.getMonth() + 1)}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const calculateSaldo = (id) => state.data.transaksi.filter(t=>String(t['ID Anggota'])===String(id)).reduce((s, t) => t['Jenis Transaksi'] === 'Setoran' ? s + toNumber(t['Nominal']) : s - toNumber(t['Nominal']), 0);
  const withoutPassword = (anggota) => { const data = { ...anggota }; delete data.Password; delete data['Foto File ID']; data.Role = normalizeRole(data.Role); return data; };
  const persistSession = () => { if (!state.user) return; writeStorage('app_session', JSON.stringify({ user: state.user, savedAt: Date.now() })); };
  const clearSession = () => removeStorage('app_session');
  const getUserInitials = (user) => String(user?.['Nama Lengkap'] || user?.['ID Anggota'] || '?').trim().split(/\s+/).slice(0, 2).map(x => x[0] || '').join('').toUpperCase();
  const avatarMarkup = (user, classes = 'h-20 w-20') => {
    const url = user?.['Foto Profil'];
    if (url) return `<img src="${url}" alt="Foto Profil" class="${classes} profile-avatar-img rounded-2xl border border-white/30 bg-white/20 shadow-lg" onerror="this.replaceWith(Object.assign(document.createElement('div'), { className: '${classes} rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg', textContent: '${getUserInitials(user)}' }))">`;
    return `<div class="${classes} rounded-2xl border border-white/30 bg-white/20 flex items-center justify-center text-2xl font-bold shadow-lg">${getUserInitials(user)}</div>`;
  };
  const showToast = (msg, type = 'success') => {
    const container = document.getElementById('toast-container'); const toast = document.createElement('div');
    const clrs = { success: 'bg-green-100 text-green-800 border-green-200', error: 'bg-red-100 text-red-800 border-red-200' };
    toast.className = `flex items-center gap-3 p-3.5 rounded-xl border shadow-lg toast-enter pointer-events-auto backdrop-blur-md ${clrs[type]} w-full z-[100]`;
    toast.innerHTML = `<span class="font-medium text-sm">${msg}</span>`;
    container.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
  };

  async function fetchAPI(action, payload = {}) {
    const gasUrl = getGasUrl();
    if (gasUrl) {
      try {
        const request = { action, payload, user: state.user ? state.user.username : 'Guest' };
        if (state.user && state.user.token) request.auth = { token: state.user.token };
        const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(request), headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow' });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch(e) { throw new Error('Respons server bukan JSON.'); }
        if (!res.ok) return { success: false, message: data.message || `Server error ${res.status}` };
        return data;
      } catch(e) { console.error(e); return { success: false, message: e.message || "Koneksi ke Server gagal." }; }
    }
    return { success: false, message: "URL Backend tidak diatur." };
  }

  // ----- SESSION & AUTH -----
  async function restoreSession() {
    const raw = readStorage('app_session', '');
    if (!raw) return false;
    try {
      const session = JSON.parse(raw);
      if (!session || !session.user || !session.user.token) return false;
      state.user = session.user;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-layout').classList.remove('hidden');
      document.getElementById('role-badge').innerText = state.user.role === 'admin' ? 'Admin' : 'Anggota';
      document.body.setAttribute('data-role', state.user.role);
      navigate('dashboard');
      const loaded = await loadData();
      if (!loaded) { clearSession(); state.user = null; document.body.removeAttribute('data-role'); document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-layout').classList.add('hidden'); return false; }
      return true;
    } catch (error) { clearSession(); return false; }
  }

  async function handleLogin(e) {
    e.preventDefault(); 
    const u = document.getElementById('login-user').value.trim(); 
    const p = document.getElementById('login-pass').value;
    const btn = document.getElementById('btn-login');
    btn.innerHTML = `<i class="ph ph-spinner animate-spin text-xl"></i> Memeriksa...`; btn.disabled = true;
    const res = await fetchAPI('login', { username: u, password: p });
    btn.innerHTML = `<span>Masuk</span><i class="ph ph-arrow-right font-bold"></i>`; btn.disabled = false;
    if (res.success) {
      state.user = { ...res.data, username: u, role: normalizeRole(res.role || res.data?.Role), token: res.token || '' };
      persistSession();
      document.getElementById('login-screen').classList.add('hidden'); 
      document.getElementById('main-layout').classList.remove('hidden');
      document.getElementById('role-badge').innerText = state.user.role === 'admin' ? 'Bendahara' : 'Anggota';
      document.body.setAttribute('data-role', state.user.role);
      navigate('dashboard');
      const loaded = await loadData();
      showToast(loaded ? "Login berhasil" : "Login berhasil, tapi data belum termuat", loaded ? "success" : "error");
    } else showToast(res.message, "error");
  }

  async function loadData() {
    if (!state.user) return false;
    const res = await fetchAPI('get_all_data', { role: state.user.role, userId: state.user['ID Anggota'] });
    if(res.success) {
      state.data = { 
        anggota: (res.data.anggota || []), transaksi: (res.data.transaksi || []), logs: [],
        warga: (res.data.warga || []), biaya: (res.data.biaya || []), pembayaran: (res.data.pembayaran || []),
        kas: (res.data.kas || []), settings: (res.data.settings || [])
      };
      let settingMap = {};
      if(state.data.settings) state.data.settings.forEach(s => settingMap[s.Nama] = s.Nilai);
      state.data.settings = settingMap;
      if(document.getElementById('set-iuran')) document.getElementById('set-iuran').value = settingMap['Iuran Wajib'] || 50000;
      if(document.getElementById('set-arisan')) document.getElementById('set-arisan').value = settingMap['Arisan Per Slot'] || 30000;
      const current = state.data.anggota.find(a => String(a['ID Anggota']) === String(state.user['ID Anggota']));
      if (current) state.user = { ...state.user, ...current, role: state.user.role || normalizeRole(current.Role) };
      renderCurrentView();
      return true;
    }
    showToast(res.message || "Gagal memuat data", "error");
    return false;
  }

  function handleLogout() {
    state.user = null; state.data = { anggota: [], transaksi: [], logs: [], warga: [], biaya: [], pembayaran: [], kas: [], settings: {} };
    clearSession();
    document.body.removeAttribute('data-role');
    document.getElementById('login-screen').classList.remove('hidden'); 
    document.getElementById('main-layout').classList.add('hidden');
    closeAllModals(); 
    if(chartInstance) { chartInstance.destroy(); chartInstance = null; }
    if(chartEkasInstance) { chartEkasInstance.destroy(); chartEkasInstance = null; }
    document.getElementById('content-area').innerHTML = '';
  }

  // ----- NAVIGATION -----
  function navigate(viewName) {
    if (!state.user) return;
    if (state.user.role !== 'admin' && ADMIN_VIEWS.has(viewName)) viewName = 'dashboard';
    state.ui.currentView = viewName;
    document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(btn => {
      let isAktif = btn.dataset.target === viewName;
      let isAdminOnly = btn.classList.contains('admin-only') ? ' admin-only' : '';
      if(btn.classList.contains('nav-btn')) {
        btn.className = isAktif ? 'nav-btn'+isAdminOnly+' w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium' : 'nav-btn'+isAdminOnly+' w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium';
      } else {
        btn.className = isAktif ? 'nav-btn-mobile'+isAdminOnly+' flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0' : 'nav-btn-mobile'+isAdminOnly+' flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0';
      }
    });
    const tMap = { dashboard:'Dashboard', anggota:'Anggota', transaksi:'Transaksi', warga:'Warga', pembayaran:'Pembayaran', kas:'Buku Kas', laporan:'Laporan', buku:'Buku Tabungan', pengaturan:'Pengaturan' };
    document.getElementById('mobile-header-title').innerText = tMap[viewName] || 'Aplikasi';
    renderCurrentView();
  }

  document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(b => b.addEventListener('click', () => navigate(b.dataset.target)));

  function renderCurrentView() {
    if (!state.user) return;
    if (state.user.role !== 'admin' && ADMIN_VIEWS.has(state.ui.currentView)) state.ui.currentView = 'dashboard';
    const a = document.getElementById('content-area'); a.innerHTML = ''; const v = state.ui.currentView;
    if(v==='dashboard'){ a.appendChild(document.getElementById('tpl-dashboard').content.cloneNode(true)); renderDashboard(); }
    else if(v==='anggota'){ a.appendChild(document.getElementById('tpl-anggota').content.cloneNode(true)); renderAnggota(); }
    else if(v==='transaksi'){ a.appendChild(document.getElementById('tpl-transaksi').content.cloneNode(true)); renderTransaksi(); }

    laporan: {
      init() {
        const sel = document.getElementById('lap-bulan');
        const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        if(sel.options.length===0) sel.innerHTML = months.map((m,i) => `<option value="${i}">${m}</option>`).join('');
        const now = new Date();
        sel.value = now.getMonth();
        document.getElementById('lap-tahun').value = now.getFullYear();
        this.render();
      },
      render() {
        const bulan = parseInt(document.getElementById('lap-bulan').value);
        const tahun = parseInt(document.getElementById('lap-tahun').value);
        const mName = document.getElementById('lap-bulan').options[bulan].text;
        let saldoAkhir=0, pemasukan=0, pengeluaran=0;
        const kasBulan = state.data.kas.filter(k => {
          if(!k.Tanggal) return false;
          const t = new Date(k.Tanggal);
          return t.getMonth()===bulan && t.getFullYear()===tahun;
        });
        kasBulan.forEach(k => {
          const nom = Number(k.Nominal)||0;
          if(k.Jenis==='Pemasukan') pemasukan+=nom;
          else pengeluaran+=nom;
        });
        state.data.kas.forEach(k => {
          if(!k.Tanggal) return;
          const t = new Date(k.Tanggal);
          if(t.getFullYear()<tahun || (t.getFullYear()===tahun && t.getMonth()<=bulan)) {
            saldoAkhir += (k.Jenis==='Pemasukan'?Number(k.Nominal):-Number(k.Nominal));
          }
        });
        let html = `<div class="text-center mb-8"><h3 class="text-2xl font-black uppercase">Laporan Keuangan RT</h3><p>Periode: ${mName} ${tahun}</p></div>`;
        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div><h4 class="font-bold text-success text-lg mb-4">Pemasukan</h4>`;
        if(kasBulan.filter(k=>k.Jenis==='Pemasukan').length===0) html += `<p class="text-sm text-gray-400">Tidak ada pemasukan.</p>`;
        else kasBulan.filter(k=>k.Jenis==='Pemasukan').forEach(k => { html += `<div class="flex justify-between text-sm py-2 border-b"><span>${k.Kategori} <span class="text-xs text-gray-500">${k.Keterangan}</span></span><span class="font-bold">${formatRupiah(k.Nominal)}</span></div>`; });
        html += `<div class="flex justify-between font-black text-success pt-4 mt-2 text-lg"><span>Total</span><span>${formatRupiah(pemasukan)}</span></div></div>`;
        html += `<div><h4 class="font-bold text-danger text-lg mb-4">Pengeluaran</h4>`;
        if(kasBulan.filter(k=>k.Jenis==='Pengeluaran').length===0) html += `<p class="text-sm text-gray-400">Tidak ada pengeluaran.</p>`;
        else kasBulan.filter(k=>k.Jenis==='Pengeluaran').forEach(k => { html += `<div class="flex justify-between text-sm py-2 border-b"><span>${k.Kategori} <span class="text-xs text-gray-500">${k.Keterangan}</span></span><span class="font-bold">${formatRupiah(k.Nominal)}</span></div>`; });
        html += `<div class="flex justify-between font-black text-danger pt-4 mt-2 text-lg"><span>Total</span><span>${formatRupiah(pengeluaran)}</span></div></div></div>`;
        html += `<div class="mt-8 p-6 bg-gray-50 dark:bg-gray-900/50 rounded-2xl border flex justify-between items-center">
          <span class="text-lg font-bold">Surplus/Defisit:</span>

        </div>`;
        html += `<div class="mt-4 p-6 bg-blue-50 dark:bg-blue-900/20 rounded-2xl border flex justify-between items-center">
          <span class="text-lg font-bold text-blue-800 dark:text-blue-300">Total Saldo Kas Akhir:</span>
          <span class="text-3xl font-black text-primary">${formatRupiah(saldoAkhir)}</span>
        </div>`;
        document.getElementById('laporan-content').innerHTML = html;
      },
      cetak() { window.print(); }
    },

          saldoKas+=nom; chartKasMasuk[m]+=nom;
          if(m===now.getMonth() && tgl.getFullYear()===now.getFullYear()) masuk+=nom;

      document.getElementById('ekas-stats').innerHTML = `

        <div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Saldo Kas</p><h3 class="text-xl font-bold text-primary">${formatRupiah(saldoKas)}</h3></div>
        <div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Masuk Bulan Ini</p><h3 class="text-xl font-bold text-success">${formatRupiah(masuk)}</h3></div>
        <div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Keluar Bulan Ini</p><h3 class="text-xl font-bold text-danger">${formatRupiah(keluar)}</h3></div>

      // Chart Tabungan
      const ctx1 = document.getElementById('chartTransaksi');
      if(ctx1) {
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx1, {
          type: 'bar',
          data: {
            labels: ['Setoran', 'Penarikan'],
            datasets: [{ label: 'Total', data: [st, pt], backgroundColor: ['#14B8A6', '#DC2626'] }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }

      // Chart E-Kas
      const ctx2 = document.getElementById('chartEkas');
      if(ctx2) {
        if(chartEkasInstance) chartEkasInstance.destroy();
        chartEkasInstance = new Chart(ctx2, {
          type: 'line',
          data: {
            labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'],
            datasets: [
              { label: 'Pemasukan', data: chartKasMasuk, borderColor: '#16A34A', backgroundColor: 'rgba(22,163,74,0.1)', tension: 0.3, fill: true },
              { label: 'Pengeluaran', data: chartKasKeluar, borderColor: '#DC2626', backgroundColor: 'rgba(220,38,38,0.1)', tension: 0.3, fill: true }
            ]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }
    }
  }

  // renderAnggota, renderTransaksi, filterTrx, dll.

  function renderTransaksi(filter = 'Semua') {

  window.renderBukuTabungan = () => {

    });
  };

    const saldoAkhir = calculateSaldo(id);

        .sort((a, b) => new Date(a['Tanggal']) - new Date(b['Tanggal']));

                <tr style="background:#0F766E; color:white;">
                    <th style="border:1px solid #ccc; padding:6px;">Tanggal</th>

                    <th style="border:1px solid #ccc; padding:6px; text-align:right;">Saldo</th>
                </tr>

              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div><label class="block text-xs font-medium mb-1">No Rmh</label><input type="text" id="f-a-norumah" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" required></div>
                <div><label class="block text-xs font-medium mb-1">No HP</label><input type="text" id="f-a-nohp" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm"></div>
              </div>
              <div id="div-status" class="hidden"><label class="block text-xs font-medium mb-1">Status</label><select id="f-a-status" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm"><option value="Aktif">Aktif</option><option value="Nonaktif">Nonaktif</option></select></div>
              <div class="pt-2"><button type="submit" class="w-full py-3 rounded-xl bg-primary text-white font-medium text-sm">Simpan Data</button></div>
            </form>
          </div>
        </div></div>`;
    } else if (id === 'modal-transaksi') {
      let opts = '<option value="">-- Pilih Anggota --</option>';
      state.data.anggota.forEach(a => opts += `<option value="${a['ID Anggota']}">${a['ID Anggota']} - ${a['Nama Lengkap']}</option>`);
      content = `<div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-md modal-animate overflow-hidden max-h-[90dvh] flex flex-col">
          <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
            <h3 class="font-bold">Transaksi Baru</h3><button onclick="closeAllModals()"><i class="ph ph-x text-lg"></i></button>
          </div>
          <div class="overflow-y-auto p-4 md:p-6 hide-scroll">
            <form class="space-y-4" onsubmit="submitTransaksi(event)">
              <div class="flex p-1 bg-gray-100 dark:bg-gray-800 rounded-xl">
                <label class="flex-1 text-center"><input type="radio" name="f-t-jenis" value="Setoran" class="peer sr-only" checked><div class="py-2 rounded-lg text-sm font-medium peer-checked:bg-white peer-checked:text-success shadow-sm">Uang Masuk</div></label>
                <label class="flex-1 text-center"><input type="radio" name="f-t-jenis" value="Penarikan" class="peer sr-only"><div class="py-2 rounded-lg text-sm font-medium peer-checked:bg-white peer-checked:text-danger shadow-sm">Uang Keluar</div></label>
              </div>
              <div><label class="block text-xs font-medium mb-1">Anggota</label><select id="f-t-anggota" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" required>${opts}</select></div>
              <div><label class="block text-xs font-medium mb-1">Nominal (Rp)</label><input type="number" id="f-t-nominal" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 font-bold text-lg text-right" required></div>
              <div><label class="block text-xs font-medium mb-1">Keterangan</label><input type="text" id="f-t-ket" class="w-full p-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-900 text-sm" placeholder="Cth: Iuran Juli"></div>
              <div class="pt-2"><button type="submit" class="w-full py-3 rounded-xl bg-primary text-white font-medium text-sm">Proses Transaksi</button></div>
            </form>
          </div>
        </div></div>`;
    }
    con.innerHTML = content;
  };

  window.submitProfile = async (e) => {
    e.preventDefault();
    const password = document.getElementById('f-p-password').value.trim();
    const password2 = document.getElementById('f-p-password2').value.trim();
    const file = document.getElementById('f-p-photo').files[0];
    if(password || password2) {
      if(password.length < 4) { showToast("Password minimal 4 karakter", "error"); return; }
      if(password !== password2) { showToast("Konfirmasi password tidak sama", "error"); return; }
    }
    if(!password && !file) { showToast("Tidak ada perubahan", "error"); return; }
    const photo = file ? await resizeProfilePhoto(file) : null;
    const res = await fetchAPI('update_profile', { password, photo });
    if(!res.success) { showToast(res.message || "Gagal memperbarui profil", "error"); return; }
    state.user = { ...state.user, ...(res.data || {}), role: normalizeRole(res.role || res.data?.Role || state.user.role) };
    persistSession();
    document.body.setAttribute('data-role', state.user.role);
    showToast(res.message || "Profil berhasil diperbarui");
    closeAllModals();
    await loadData();
  };

  window.submitAnggota = async (e) => {
    e.preventDefault();
    const res = await fetchAPI('save_anggota', {
      id: document.getElementById('f-a-id').value,
      password: document.getElementById('f-a-password').value,
      role: document.getElementById('f-a-role').value,
      nama: document.getElementById('f-a-nama').value,
      noRumah: document.getElementById('f-a-norumah').value,
      noHp: document.getElementById('f-a-nohp').value,
      status: document.getElementById('f-a-status') ? document.getElementById('f-a-status').value : 'Aktif'
    });
    if(!res.success) { showToast(res.message || "Gagal menyimpan", "error"); return; }
    showToast("Data anggota tersimpan");
    closeAllModals();
    await loadData();
  };

  window.submitTransaksi = async (e) => {
    e.preventDefault();
    const idA = document.getElementById('f-t-anggota').value;
    const anggota = state.data.anggota.find(a=>String(a['ID Anggota'])===String(idA));
    const nominal = toNumber(document.getElementById('f-t-nominal').value);
    if(!anggota) { showToast("Pilih anggota", "error"); return; }
    if(nominal <= 0) { showToast("Nominal > 0", "error"); return; }
    const res = await fetchAPI('save_transaksi', {
      idAnggota: idA,
      namaAnggota: anggota['Nama Lengkap'],
      jenis: document.querySelector('input[name="f-t-jenis"]:checked').value,
      nominal,
      keterangan: document.getElementById('f-t-ket').value
    });
    if(!res.success) { showToast(res.message || "Gagal", "error"); return; }
    showToast("Transaksi berhasil");
    closeAllModals();
    await loadData();
  };

  window.editAnggota = (id) => {
    const a = state.data.anggota.find(x => String(x['ID Anggota']) === String(id));
    if(!a) { showToast("Anggota tidak ditemukan", "error"); return; }
    openModal('modal-anggota');
    document.getElementById('m-anggota-title').innerText='Edit Anggota';
    document.getElementById('f-a-id').value=a['ID Anggota'];
    document.getElementById('f-a-role').value=normalizeRole(a['Role']);
    document.getElementById('f-a-nama').value=a['Nama Lengkap'];
    document.getElementById('f-a-norumah').value=a['No Rumah'];
    document.getElementById('f-a-nohp').value=a['No HP'];
    document.getElementById('div-status').classList.remove('hidden');
    document.getElementById('f-a-status').value=a['Status'];
  };

  window.deleteAnggota = async (id) => {
    if(!confirm("Yakin ingin menghapus anggota ini? Aksi tidak dapat dibatalkan.")) return;
    const res = await fetchAPI('delete_anggota', { id });
    if(res.success) { showToast("Anggota dihapus"); loadData(); }
    else showToast(res.message, "error");
  };

  window.deleteTransaksi = async (id) => {
    if(!confirm("Hapus transaksi ini? Saldo akan disesuaikan.")) return;
    const res = await fetchAPI('delete_transaksi', { id });
    if(res.success) { showToast("Transaksi dihapus"); loadData(); }
    else showToast(res.message, "error");
  };

  window.saveSettings = async function() {
    const url = document.getElementById('setting-gas').value.trim();
    if (url && !/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/i.test(url)) {
      showToast("URL Apps Script harus berupa Web App URL yang berakhir /exec", "error");
      return;
    }
    state.settings.gasUrl = url;
    localStorage.setItem('gasUrl', url);
    showToast("Pengaturan disimpan. Memuat ulang...");
    await loadData();
  };

  window.showDetailAnggota = function(id) {
    const a = state.data.anggota.find(x => String(x['ID Anggota']) === String(id));
    if(!a) { showToast("Anggota tidak ditemukan", "error"); return; }
    const saldo = calculateSaldo(id);
    let trx = state.data.transaksi.filter(t => String(t['ID Anggota']) === String(id)).sort((x,y)=>new Date(y['Tanggal'])-new Date(x['Tanggal']));
    let trHtml = '';
    if(trx.length === 0) trHtml = `<tr><td colspan="3" class="p-6 text-center text-gray-500 text-sm italic">Belum ada mutasi transaksi</td></tr>`;
    trx.forEach(t => {
      let isS = t['Jenis Transaksi'] === 'Setoran';
      let c = isS ? 'text-success' : 'text-danger';
      let icon = isS ? 'ph-arrow-down-left' : 'ph-arrow-up-right';
      trHtml += `<tr class="border-b border-gray-100 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
        <td class="p-3 text-xs text-gray-500">${formatDateTime(t['Tanggal'])}<br><span class="text-gray-800 dark:text-gray-200 font-medium truncate max-w-[120px] block mt-0.5">${t['Keterangan']}</span></td>
        <td class="p-3 text-xs font-bold ${c}"><i class="ph ${icon}"></i> ${t['Jenis Transaksi']}</td>
        <td class="p-3 text-sm font-bold text-right ${c}">${formatRupiah(t['Nominal'])}</td>
      </tr>`;
    });
    const content = `<div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
      <div class="bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-lg modal-animate overflow-hidden max-h-[90dvh] flex flex-col shadow-2xl">
        <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
          <h3 class="font-bold flex items-center gap-2"><i class="ph ph-user text-primary text-xl"></i> Profil & Riwayat</h3>
          <button onclick="closeAllModals()"><i class="ph ph-x text-lg"></i></button>
        </div>
        <div class="overflow-y-auto p-0 hide-scroll flex-1">
          <div class="p-5 bg-gradient-to-br from-primary to-primary-dark text-white">
            <div class="flex justify-between items-start mb-4">
              <div>
                <h2 class="text-xl font-bold mb-1">${a['Nama Lengkap']}</h2>
                <p class="text-white/80 text-xs font-mono">${a['ID Anggota']} • HP: ${a['No HP'] || '-'}</p>
                <p class="text-white/80 text-xs font-mono">Rumah No. ${a['No Rumah']}</p>
              </div>
              <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase ${a['Status'] === 'Aktif' ? 'bg-white/20' : 'bg-red-500/50'}">${a['Status']}</span>
            </div>
            <div class="bg-white/10 p-3 rounded-xl backdrop-blur-sm border border-white/20 flex justify-between items-center">
              <p class="text-white/80 text-[10px] uppercase font-bold">Total Saldo</p>
              <p class="text-2xl font-bold">${formatRupiah(saldo)}</p>
            </div>
          </div>
          <div class="p-0">
            <h4 class="font-bold p-4 pb-2 text-sm bg-gray-50 dark:bg-darkcard sticky top-0 border-b border-gray-100 dark:border-gray-800">Riwayat Mutasi Terakhir</h4>
            <table class="w-full text-left"><tbody>${trHtml}</tbody></table>
          </div>
        </div>
        <div class="p-4 border-t border-gray-100 dark:border-gray-800 bg-white dark:bg-darkcard flex gap-2 admin-only" style="display:${state.user.role==='admin'?'':'none'}">
          <button onclick="editAnggota('${a['ID Anggota']}')" class="w-full py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 font-medium text-sm hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center gap-2 transition-colors"><i class="ph ph-pencil-simple text-lg text-primary"></i> Edit Data Anggota</button>
        </div>
      </div>
    </div>`;
    document.getElementById('modals').innerHTML = content;
  };

  // resizeProfilePhoto helper
  function resizeProfilePhoto(file) {
    return new Promise((resolve, reject) => {
      if(!file) { resolve(null); return; }
      if(!file.type.startsWith('image/')) { reject(new Error("File harus berupa gambar.")); return; }
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const size = 512;
          const canvas = document.createElement('canvas');
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext('2d');
          const scale = Math.max(size / img.width, size / img.height);
          const w = img.width * scale, h = img.height * scale;
          ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
          resolve({
            name: file.name || 'profile.jpg',
            mimeType: 'image/jpeg',
            data: canvas.toDataURL('image/jpeg', 0.82)
          });
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ===================== INISIALISASI =====================
  document.addEventListener('DOMContentLoaded', async () => {
    if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark');
    document.getElementById('login-form').addEventListener('submit', handleLogin);
    await restoreSession();
  });
</script>
