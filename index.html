<head>

  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%230F766E'/%3E%3Cstop offset='100%25' style='stop-color:%2314B8A6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Cpath d='M45 60 L90 100 L135 60' stroke='white' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='90' cy='100' r='40' fill='white' opacity='0.9'/%3E%3Ctext x='90' y='115' text-anchor='middle' font-family='Arial,sans-serif' font-size='50' font-weight='bold' fill='%230F766E'%3ERp%3C/text%3E%3C/svg%3E">
  
  <link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Asap Condensed"', 'sans-serif'] },
          colors: { primary: '#0F766E', 'primary-dark': '#115E59', success: '#16A34A', danger: '#DC2626', warning: '#F59E0B', darkbg: '#111827', darkcard: '#1F2937' }
        }
      }
    }
  </script>

  <style>
    /* ========== BASE STYLES ========== */
    body { 
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none; 
    }
    
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    
    .glass-nav { 
      background: rgba(255,255,255,0.85); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
    }
    .dark .glass-nav { background: rgba(31,41,55,0.85); }
    
    .modal-animate { animation: fadeInScale 0.2s ease-out forwards; }
    .toast-enter { animation: slideInDown 0.3s ease-out forwards; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    
    @keyframes fadeInScale { 
      from { opacity:0; transform:scale(0.95); } 
      to { opacity:1; transform:scale(1); } 
    }
    @keyframes slideInDown { 
      from { transform:translateY(-100%); opacity:0; } 
      to { transform:translateY(0); opacity:1; } 
    }
    @keyframes fadeIn { 
      from { opacity: 0; } 
      to { opacity: 1; } 
    }
    
    .hide-scroll::-webkit-scrollbar { display:none; }
    .hide-scroll { -ms-overflow-style:none; scrollbar-width:none; }
    
    .profile-avatar-img { object-fit:cover; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    
    @media print { 
      .no-print { display: none !important; } 
      body { background: white !important; } 
    }

    /* ========== SPINNER LOADING ========== */
	.app-spinner {
	  width: 48px;
	  height: 48px;
	  border: 4px solid #e5e7eb;
	  border-top-color: #0F766E;
	  border-radius: 50%;
	  animation: spin 0.8s linear infinite;
	}
	@keyframes spin { to { transform: rotate(360deg); } }
	.dark .app-spinner { border-color: #374151; border-top-color: #14B8A6; }

    /* ========== SKELETON LOADING ========== */
    .skeleton {
      background: #e5e7eb;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .dark .skeleton {
      background: #374151;
    }
    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 1.5s infinite;
      transform: translateX(-100%);
    }
    .dark .skeleton::after {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    
    .skeleton-card { height: 180px; }
    .skeleton-stat { height: 80px; }
    .skeleton-table-row { height: 48px; margin-bottom: 4px; }
    .skeleton-chart-pie { height: 220px; width: 220px; border-radius: 50%; margin: 0 auto; }
    .skeleton-chart-bar { height: 200px; }
    .skeleton-chart-line { height: 200px; }
    .skeleton-detail { height: 160px; }
    .skeleton-list-item { height: 56px; margin-bottom: 6px; }
    .skeleton-text { height: 14px; margin-bottom: 8px; width: 80%; }
    .skeleton-text-short { height: 14px; margin-bottom: 8px; width: 50%; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkbg dark:text-gray-200 transition-colors duration-300 antialiased overflow-hidden selection:bg-primary/30">

<div id="app" class="h-[100dvh] w-full max-w-[100vw] flex overflow-hidden relative">
  
  <!-- ==================== LOGIN SCREEN ==================== -->
  <div id="login-screen" class="absolute inset-0 z-50 bg-gray-50 dark:bg-darkbg flex flex-col items-center justify-center p-4">
    <div class="bg-white dark:bg-darkcard p-6 md:p-8 rounded-2xl shadow-xl w-[calc(100%-2rem)] max-w-md modal-animate border border-gray-100 dark:border-gray-700">
      <div class="flex justify-center mb-6">
        <div class="h-16 w-16 bg-primary text-white rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-primary/30">
          <i class="ph ph-wallet"></i>
        </div>
      </div>
      <h1 class="text-2xl font-bold text-center mb-2 dark:text-white">Tabungan & E-Kas RT</h1>
      <p class="text-gray-500 dark:text-gray-400 text-center mb-8 text-sm">Masuk dengan ID Warga (blokf...)</p>
      <form id="login-form" class="space-y-4 w-full">
        <div>
          <label class="block text-sm font-medium mb-1">ID Warga</label>
          <div class="relative">
            <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" aria-hidden="true"></i>
            <input type="text" id="login-user" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Masukkan ID Warga" autocomplete="username" required>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <div class="relative">
            <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" aria-hidden="true"></i>
            <input type="password" id="login-pass" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Masukkan Password" autocomplete="current-password" required>
          </div>
        </div>
        <button type="submit" id="btn-login" class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 rounded-xl transition-colors shadow-md shadow-primary/30 mt-4 flex justify-center items-center gap-2">
          <span>Masuk</span>
          <i class="ph ph-arrow-right font-bold" aria-hidden="true"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- ==================== MAIN LAYOUT ==================== -->
  <div id="main-layout" class="flex w-full h-full max-w-[100vw] hidden">
    
    <!-- ===== SIDEBAR DESKTOP ===== -->
    <aside class="w-64 bg-white dark:bg-darkcard border-r border-gray-200 dark:border-gray-700 hidden lg:flex flex-col z-20 flex-shrink-0">
      <div class="p-6 flex items-center gap-3">
        <div class="h-10 w-10 bg-primary text-white rounded-xl flex items-center justify-center text-xl shadow-md">
          <i class="ph ph-wallet" aria-hidden="true"></i>
        </div>
        <div class="min-w-0">
          <h2 class="font-bold text-lg leading-tight dark:text-white truncate">E-Kas RT</h2>
          <span id="role-badge" class="text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded-full font-bold uppercase tracking-wide">Admin</span>
        </div>
      </div>
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scroll pb-4" id="desktop-nav">
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium" data-target="dashboard" aria-label="Dashboard">
          <i class="ph ph-squares-four text-xl" aria-hidden="true"></i> Dashboard
        </button>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="warga" aria-label="Data Warga">
          <i class="ph ph-identification-badge text-xl" aria-hidden="true"></i> Warga
        </button>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="transaksi" aria-label="Transaksi">
          <i class="ph ph-arrows-left-right text-xl" aria-hidden="true"></i> Transaksi
        </button>
        <div class="h-px bg-gray-100 dark:bg-gray-800 my-2"></div>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="pembayaran" aria-label="Pembayaran">
          <i class="ph ph-credit-card text-xl" aria-hidden="true"></i> Pembayaran
        </button>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="kas" aria-label="Buku Kas">
          <i class="ph ph-book-open text-xl" aria-hidden="true"></i> Buku Kas
        </button>
        <div class="h-px bg-gray-100 dark:bg-gray-800 my-2"></div>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="buku" aria-label="Buku Tabungan">
          <i class="ph ph-book-bookmark text-xl" aria-hidden="true"></i> Buku Tabungan
        </button>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="pengaturan" aria-label="Pengaturan">
          <i class="ph ph-gear text-xl" aria-hidden="true"></i> Pengaturan
        </button>
        <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium" data-target="tentang" aria-label="Tentang">
          <i class="ph ph-info text-xl" aria-hidden="true"></i> Tentang
        </button>
      </nav>
    </aside>

    <!-- ===== MAIN CONTENT AREA ===== -->
    <main class="flex-1 min-w-0 flex flex-col h-full relative max-w-full">
      
      <!-- Header Mobile -->
      <header class="lg:hidden glass-nav border-b border-gray-200 dark:border-gray-700 sticky top-0 z-20 px-4 py-3 flex justify-between items-center shadow-sm no-print">
        <div class="flex items-center gap-3 min-w-0">
          <div class="h-8 w-8 bg-primary text-white rounded-lg flex flex-shrink-0 items-center justify-center shadow-md">
            <i class="ph ph-wallet text-sm" aria-hidden="true"></i>
          </div>
          <h1 class="font-bold text-lg dark:text-white truncate" id="mobile-header-title">Dashboard</h1>
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <button onclick="navigate('tentang')" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors" aria-label="Tentang" title="Tentang">
            <i class="ph ph-info text-xl" aria-hidden="true"></i>
          </button>
          <button onclick="toggleTheme()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors" aria-label="Ganti Tema" title="Ganti Tema">
            <i class="ph ph-moon text-xl dark:hidden" aria-hidden="true"></i>
            <i class="ph ph-sun text-xl hidden dark:inline-block" aria-hidden="true"></i>
          </button>
          <button onclick="handleLogout()" class="p-2 text-danger hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition-colors" aria-label="Keluar" title="Keluar">
            <i class="ph ph-sign-out text-xl" aria-hidden="true"></i>
          </button>
        </div>
      </header>

      <!-- Header Actions Desktop -->
      <div class="hidden lg:flex justify-end px-8 pt-6 pb-2 w-full flex-shrink-0 gap-2 no-print">
        <button onclick="navigate('tentang')" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors" aria-label="Tentang" title="Tentang">
          <i class="ph ph-info text-[22px]" aria-hidden="true"></i>
        </button>
        <button onclick="toggleTheme()" class="p-2.5 bg-white dark:bg-darkcard text-gray-500 shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:text-primary transition-colors" aria-label="Ganti Tema" title="Ganti Tema">
          <i class="ph ph-moon text-[22px] dark:hidden" aria-hidden="true"></i>
          <i class="ph ph-sun text-[22px] hidden dark:inline-block" aria-hidden="true"></i>
        </button>
        <button onclick="handleLogout()" class="p-2.5 bg-white dark:bg-darkcard text-danger shadow-sm border border-gray-100 dark:border-gray-700 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors" aria-label="Keluar" title="Keluar">
          <i class="ph ph-sign-out text-[22px]" aria-hidden="true"></i>
        </button>
      </div>

      <!-- Content Area -->
      <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 lg:px-8 lg:pb-8 lg:pt-2 pb-32 w-full" id="content-area"></div>
    </main>

    <!-- ===== MOBILE BOTTOM NAVIGATION ===== -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 w-full glass-nav border-t border-gray-200 dark:border-gray-700 z-30 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.1)] pb-safe no-print">
      <div class="flex justify-around items-center p-1.5 px-1" id="mobile-nav">
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0" data-target="dashboard" aria-label="Dashboard">
          <i class="ph ph-squares-four text-[22px] mb-1" aria-hidden="true"></i>
          <span class="text-[10px] font-medium truncate">Home</span>
        </button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="warga" aria-label="Warga">
          <i class="ph ph-identification-badge text-[22px] mb-1" aria-hidden="true"></i>
          <span class="text-[10px] font-medium truncate">Warga</span>
        </button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="transaksi" aria-label="Transaksi">
          <i class="ph ph-arrows-left-right text-[22px] mb-1" aria-hidden="true"></i>
          <span class="text-[10px] font-medium truncate">Trx</span>
        </button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="pembayaran" aria-label="Pembayaran">
          <i class="ph ph-credit-card text-[22px] mb-1" aria-hidden="true"></i>
          <span class="text-[10px] font-medium truncate">Bayar</span>
        </button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="kas" aria-label="Buku Kas">
          <i class="ph ph-book-open text-[22px] mb-1" aria-hidden="true"></i>
          <span class="text-[10px] font-medium truncate">Kas</span>
        </button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="buku" aria-label="Buku Tabungan">
          <i class="ph ph-book-bookmark text-[22px] mb-1" aria-hidden="true"></i>
          <span class="text-[10px] font-medium truncate">Buku</span>
        </button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="pengaturan" aria-label="Pengaturan">
          <i class="ph ph-gear text-[22px] mb-1" aria-hidden="true"></i>
          <span class="text-[10px] font-medium truncate">Set</span>
        </button>
        <button class="nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0" data-target="tentang" aria-label="Tentang">
          <i class="ph ph-info text-[22px] mb-1" aria-hidden="true"></i>
          <span class="text-[10px] font-medium truncate">Tentang</span>
        </button>
      </div>
    </nav>
  </div>
</div>

<!-- ==================== TEMPLATES ==================== -->

<!-- Template: Dashboard -->
<template id="tpl-dashboard">
  <div class="space-y-4 md:space-y-6 animate-fade-in w-full">
    <h2 class="text-2xl font-bold hidden lg:block dark:text-white">Dashboard</h2>
    
    <!-- Profile Card Container -->
    <div id="profile-card" class="hidden"></div>
    
    <!-- Tunggakan Table Container (untuk non-admin) -->
    <div id="tunggakan-table-container" class="hidden"></div>
    
    <!-- Mutasi Section (untuk non-admin) -->
    <div id="dashboard-mutasi"></div>
    
    <!-- Admin Section -->
    <div id="admin-container" class="space-y-4 md:space-y-6" style="display:none;">
      <!-- Stat Cards -->
      <div id="dashboard-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full"></div>
      
      <!-- Charts Grid -->
      <div id="admin-charts" class="grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-6 mt-4 w-full" style="display:none;">
        <!-- Pie Chart: Warga Lunas vs Nunggak -->
        <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
          <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Status Pembayaran Warga</h3>
          <div class="h-56 md:h-64 w-full relative">
            <canvas id="chartPieTunggakan"></canvas>
          </div>
        </div>
        
        <!-- Bar Chart: Pemasukan 6 Bulan Terakhir -->
        <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0">
          <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Pemasukan 6 Bulan Terakhir</h3>
          <div class="h-56 md:h-64 w-full relative">
            <canvas id="chartBarPemasukan"></canvas>
          </div>
        </div>
        
        <!-- Line Chart: Tren Saldo Kas -->
        <div class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full min-w-0 lg:col-span-2">
          <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base">Tren Saldo Kas</h3>
          <div class="h-56 md:h-64 w-full relative">
            <canvas id="chartLineSaldo"></canvas>
          </div>
        </div>
      </div>
      
      <!-- Top 5 Saldo Tertinggi -->
      <div id="top-saldo-section" class="bg-white dark:bg-darkcard p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 w-full mt-4" style="display:none;">
        <h3 class="font-bold text-gray-700 dark:text-gray-200 mb-4 text-sm md:text-base flex items-center gap-2">
          <i class="ph ph-trophy text-warning text-lg" aria-hidden="true"></i> Top 5 Saldo Tabungan Tertinggi
        </h3>
        <div id="top-saldo-list" class="space-y-2"></div>
      </div>
    </div>
  </div>
</template>

<!-- Template: Warga -->
<template id="tpl-warga">
  <div class="space-y-4 animate-fade-in h-full flex flex-col w-full">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
      <h2 class="text-2xl font-bold dark:text-white hidden lg:block">Data Warga</h2>
      <div class="flex gap-2">
        <span id="warga-tunggakan-btn"></span>
        <span id="warga-add-btn"></span>
      </div>
    </div>
    <div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex-1 overflow-y-auto relative w-full min-h-0">
      <div class="overflow-x-auto w-full h-full">

    contentArea.innerHTML = `

const getGasUrl = () => (state.settings.gasUrl || DEFAULT_GAS_URL || '').trim();

const toNumber = (value) => { const n = Number(value); return Number.isFinite(n) ? n : 0; };
const formatRupiah = (angka) => 'Rp ' + toNumber(angka).toLocaleString('id-ID');

// HTML escaping untuk mencegah XSS
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const formatDateTime = (iso) => {
  if (!iso) return '-';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '-';
  const pad = (n) => n.toString().padStart(2, '0');
  const yyyy = String(d.getFullYear());
  return pad(d.getDate()) + '-' + pad(d.getMonth() + 1) + '-' + yyyy + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
};

// Saldo dari pre-computed Map
function getSaldo(id) {
  return state.data.saldoMap.get(String(id)) || 0;
}

function recalculateSaldoMap() {
  const map = new Map();
  state.data.transaksi.forEach(t => {
    const id = String(t['ID Anggota']);
    const nominal = toNumber(t['Nominal']);
    const current = map.get(id) || 0;
    map.set(id, t['Jenis Transaksi'] === 'Setoran' ? current + nominal : current - nominal);
  });
  state.data.warga.forEach(w => {
    const id = String(w['ID Warga']);
    if (!map.has(id)) map.set(id, 0);
  });
  state.data.saldoMap = map;
}

function showConfirmDialog(message, options = {}) {
  return new Promise((resolve) => {
    const { confirmText = 'Ya', cancelText = 'Batal', showCheckbox = false, checkboxLabel = '' } = options;
    const modalDiv = document.createElement('div');
    modalDiv.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-[300] flex items-center justify-center p-4';
    const modalContent = document.createElement('div');
    modalContent.className = 'bg-white dark:bg-darkcard rounded-2xl w-[calc(100%-2rem)] max-w-sm modal-animate overflow-hidden shadow-xl border border-gray-100 dark:border-gray-700';
    modalContent.innerHTML = `
      <div class="p-6 text-center">
        <i class="ph ph-warning-circle text-4xl text-warning mb-4" aria-hidden="true"></i>
        <p class="text-gray-800 dark:text-gray-200 font-medium text-sm mb-6">${escHtml(message)}</p>
        ${showCheckbox ? `<label class="flex items-center justify-center gap-2 mb-4 text-sm text-gray-600 dark:text-gray-400 cursor-pointer"><input type="checkbox" id="confirm-checkbox" class="rounded border-gray-300 text-primary focus:ring-primary"><span>${escHtml(checkboxLabel)}</span></label>` : ''}
        <div class="flex gap-3 justify-center">
          <button id="confirm-cancel" class="px-6 py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-medium text-sm transition-colors">${escHtml(cancelText)}</button>
          <button id="confirm-ok" class="px-6 py-2.5 rounded-xl bg-primary hover:bg-primary-dark text-white font-medium text-sm transition-colors shadow-md">${escHtml(confirmText)}</button>
        </div>
      </div>`;
    modalDiv.appendChild(modalContent);
    document.body.appendChild(modalDiv);
    const cleanup = () => { modalDiv.remove(); };
    modalDiv.querySelector('#confirm-ok').addEventListener('click', () => {
      const checkbox = modalDiv.querySelector('#confirm-checkbox');
      resolve(showCheckbox ? { confirmed: true, checked: checkbox ? checkbox.checked : false } : true);
      cleanup();
    });
    modalDiv.querySelector('#confirm-cancel').addEventListener('click', () => {
      resolve(showCheckbox ? { confirmed: false, checked: false } : false);
      cleanup();
    });
    modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) modalDiv.querySelector('#confirm-cancel').click(); });
  });
}

function formatInputRibuan(e) {

window.closeAllModals = () => { document.getElementById('modals').innerHTML = ''; };

// ===================== MODAL HELPER =====================
const ModalHelper = {
  open(templateId, setupFn) {
    const template = document.getElementById(templateId);
    if (!template) return;
    document.getElementById('modals').innerHTML = '';
    const clone = template.content.cloneNode(true);
    document.getElementById('modals').appendChild(clone);
    if (setupFn) setupFn();
  },
  close() {
    window.closeAllModals();
  },
  fillTemplate(templateId, replacements) {
    const template = document.getElementById(templateId);
    if (!template) return '';
    let html = template.innerHTML;
    for (const [key, value] of Object.entries(replacements)) {
      html = html.replace(new RegExp(`{{${key}}}`, 'g'), escHtml(String(value)));
    }
    return html;
  }
};

// ===================== API CALL WITH RETRY =====================
async function fetchAPI(action, payload = {}, retryCount = 0) {
  const gasUrl = getGasUrl();
  if (!gasUrl) return { success: false, message: "URL Backend tidak diatur." };
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 30000);
  try {
    const request = { action, payload };
    if (state.user?.token) request.auth = { token: state.user.token };
    const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(request), headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow', signal: controller.signal });
    clearTimeout(timeoutId);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { throw new Error('Respons server bukan JSON.'); }
    
    // Tangani token expired
    if (data.code === 'TOKEN_EXPIRED' || (data.message && (data.message.includes('kedaluwarsa') || data.message.includes('expired') || data.message.includes('invalid token')))) {
      handleLogout();
      showToast('Sesi Anda telah berakhir. Silakan login kembali.', 'error');
      throw new Error('TOKEN_EXPIRED');
    }
    
    if (!res.ok) throw new Error(data.message || 'Server error ' + res.status);
    return data;
  } catch(e) {
    clearTimeout(timeoutId);
    if (e.message === 'TOKEN_EXPIRED') throw e;
    console.error('[fetchAPI] Error:', e.message, '| Retry:', retryCount, '| Action:', action);
    if ((e.name === 'AbortError' || e.message === 'Failed to fetch' || e.message.includes('NetworkError')) && retryCount < MAX_RETRIES) {
      const delay = RETRY_DELAY_MS * Math.pow(2, retryCount);
      await new Promise(resolve => setTimeout(resolve, delay));
      return fetchAPI(action, payload, retryCount + 1);
    }
    if (e.name === 'AbortError') return { success: false, message: 'Koneksi timeout. Server sibuk, coba ulangi.' };
    if (e.message === 'Failed to fetch') return { success: false, message: 'Tidak dapat terhubung ke server.' };
    return { success: false, message: e.message || "Koneksi gagal." };
  }
}

// ===================== SESSION =====================
function persistSession() { if (state.user) writeStorage('app_session', JSON.stringify({ user: state.user, savedAt: Date.now() })); }
function clearSession() { removeStorage('app_session'); }

async function restoreSession() {
  const raw = readStorage('app_session', '');
  if (!raw) return false;
  try {
    const session = JSON.parse(raw);
    if (!session?.user?.token) return false;
    if (Date.now() - session.savedAt > SESSION_MAX_AGE_MS) { clearSession(); return false; }
    state.user = session.user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-layout').classList.remove('hidden');
    document.getElementById('role-badge').innerText = getRoleLabel(state.user.role);
    document.body.setAttribute('data-role', state.user.role);
    updateNavigationVisibility();
    navigate('dashboard');
    const loaded = await loadData();
    if (!loaded) { handleLogout(); return false; }
    return true;
  } catch(error) { clearSession(); return false; }
}

// ===================== AUTH =====================
async function handleLogin(e) {
  e.preventDefault(); 
  const u = document.getElementById('login-user').value.trim(); 
  const p = document.getElementById('login-pass').value;
  const btn = document.getElementById('btn-login');
  btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl" aria-hidden="true"></i> Memeriksa...'; btn.disabled = true;
  try {
    const res = await fetchAPI('login', { username: u, password: p });
    if (res.success) {
      state.user = { ...res.data, username: u, role: res.role || 'user', token: res.token || '' };
      persistSession();
      document.getElementById('login-screen').classList.add('hidden'); 
      document.getElementById('main-layout').classList.remove('hidden');
      document.getElementById('role-badge').innerText = getRoleLabel(state.user.role);
      document.body.setAttribute('data-role', state.user.role);
      updateNavigationVisibility();
      navigate('dashboard');
      const loaded = await loadData();
      showToast(loaded ? "Login berhasil" : "Login berhasil, memuat data...", loaded ? "success" : "error");
    } else showToast(res.message || "Login gagal", "error");
  } catch(error) { showToast("Terjadi kesalahan saat login", "error"); }
  finally { btn.innerHTML = '<span>Masuk</span><i class="ph ph-arrow-right font-bold" aria-hidden="true"></i>'; btn.disabled = false; }
}

function handleLogout() {
  state.user = null; 
  state.data = { warga: [], transaksi: [], tunggakan: [], biaya: [], pembayaran: [], kas: [], settings: {}, saldoMap: new Map() };
  clearSession();
  document.body.removeAttribute('data-role');
  document.getElementById('login-screen').classList.remove('hidden'); 
  document.getElementById('main-layout').classList.add('hidden');
  closeAllModals(); 
  document.getElementById('content-area').innerHTML = '';
}

// ===================== DATA LOADING =====================
async function loadData() {
  if (!state.user) return false;
  const res = await fetchAPI('get_all_data', {});
  if (res.success) {
    state.data = { warga: res.data.warga || [], transaksi: res.data.transaksi || [], tunggakan: res.data.tunggakan || [], biaya: res.data.biaya || [], pembayaran: res.data.pembayaran || [], kas: res.data.kas || [], settings: res.data.settings || [] };
    let settingMap = {};
    state.data.settings.forEach(s => settingMap[s.Nama] = s.Nilai);
    state.data.settings = settingMap;
    recalculateSaldoMap();
    if (document.getElementById('set-iuran')) document.getElementById('set-iuran').value = settingMap['Iuran Wajib'] || 50000;
    if (document.getElementById('set-arisan')) document.getElementById('set-arisan').value = settingMap['Arisan Per Slot'] || 30000;
    const current = state.data.warga.find(w => String(w['ID Warga']) === String(state.user['ID Warga']));
    if (current) state.user = { ...state.user, ...current, role: state.user.role || normalizeRole(current.Role) };
    renderCurrentView();
    return true;
  }
  showToast(res.message || "Gagal memuat data", "error");
  return false;
}

// ===================== NAVIGATION =====================
function navigate(viewName) {
  if (!state.user) return;
  if (!canAccess(viewName)) viewName = 'dashboard';
  state.ui.currentView = viewName;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const isAktif = btn.dataset.target === viewName;
    btn.className = isAktif ? 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium' : 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium';
    btn.style.display = canAccess(btn.dataset.target) ? '' : 'none';
  });
  document.querySelectorAll('.nav-btn-mobile').forEach(btn => {
    const isAktif = btn.dataset.target === viewName;
    btn.className = isAktif ? 'nav-btn-mobile flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0' : 'nav-btn-mobile flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0';
    btn.style.display = canAccess(btn.dataset.target) ? '' : 'none';
  });
  const tMap = { dashboard: 'Dashboard', warga: 'Warga', transaksi: 'Transaksi', pembayaran: 'Pembayaran', kas: 'Buku Kas', buku: 'Buku Tabungan', pengaturan: 'Pengaturan', tentang: 'Tentang' };
  const mobileTitle = document.getElementById('mobile-header-title');
  if (mobileTitle) mobileTitle.innerText = tMap[viewName] || 'Aplikasi';
  renderCurrentView();
}

function renderCurrentView() {
  if (!state.user) return;
  if (!canAccess(state.ui.currentView)) state.ui.currentView = 'dashboard';
  const contentArea = document.getElementById('content-area'); 
  contentArea.innerHTML = ''; 
  const v = state.ui.currentView;
  const templates = { dashboard: 'tpl-dashboard', warga: 'tpl-warga', transaksi: 'tpl-transaksi', pembayaran: 'tpl-pembayaran', kas: 'tpl-kas', buku: 'tpl-buku', pengaturan: 'tpl-setting', tentang: 'tpl-tentang' };
  const templateId = templates[v];
  if (templateId) {
    const template = document.getElementById(templateId);
    if (template) contentArea.appendChild(template.content.cloneNode(true));
  }
  try {
    if (v === 'dashboard') renderDashboard();
    else if (v === 'warga' && window.ekas?.warga) window.ekas.warga.render();
    else if (v === 'transaksi') renderTransaksi();
    else if (v === 'pembayaran' && window.ekas?.pembayaran) window.ekas.pembayaran.render();
    else if (v === 'kas' && window.ekas?.kas) window.ekas.kas.render();
    else if (v === 'buku') setupBukuTabungan();
    else if (v === 'pengaturan' && window.ekas?.biaya) window.ekas.biaya.render();
  } catch(e) { console.error('Render error for view:', v, e); }
}

        <div class="overflow-x-auto"><table class="w-full text-left text-xs md:text-sm whitespace-nowrap min-w-full md:min-w-[500px]"><thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700"><tr><th class="p-2 font-medium">ID</th><th class="p-2 font-medium">Bulan</th><th class="p-2 font-medium">Tahun</th><th class="p-2 font-medium text-right">Iuran</th><th class="p-2 font-medium text-right">Arisan</th></tr></thead><tbody>${tunggakanSaya.map(t => `<tr class="border-b border-gray-100 dark:border-gray-800"><td class="p-2 text-xs font-mono text-gray-500">${escHtml(t['ID Tunggakan']||'-')}</td><td class="p-2 font-medium">${escHtml(t['Bulan']||'-')}</td><td class="p-2">${escHtml(t['Tahun']||'-')}</td><td class="p-2 text-right text-success font-medium">${formatRupiah(t['Iuran'])}</td><td class="p-2 text-right text-primary font-medium">${formatRupiah(t['Arisan'])}</td></tr>`).join('')}</tbody></table></div></div>` : `<div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 p-4 md:p-5 mt-4 text-center text-gray-500"><i class="ph ph-smiley text-2xl mb-2 text-success" aria-hidden="true"></i><p class="text-sm font-medium">Kamu tidak memiliki tunggakan. 👍</p></div>`;

}

function renderDashboardMutasiSection_(myId) {
  const mutasiDiv = document.getElementById('dashboard-mutasi');
  if (state.user.role !== 'superadmin') {
    const myTransaksi = state.data.transaksi.filter(t => String(t['ID Anggota']) === String(myId)).sort((a,b) => new Date(b['Tanggal']) - new Date(a['Tanggal']));
    const sortedAsc = [...myTransaksi].sort((a,b) => new Date(a['Tanggal']) - new Date(b['Tanggal']));
    let saldo = 0;
    const saldoMap = new Map();
    sortedAsc.forEach(t => { const isSetoran = t['Jenis Transaksi'] === 'Setoran'; const nominal = Number(t['Nominal']); saldo += isSetoran ? nominal : -nominal; saldoMap.set(t['ID Transaksi'], saldo); });
    const recentSorted = [...myTransaksi].sort((a,b) => new Date(b['Tanggal']) - new Date(a['Tanggal'])).slice(0, 5);
    mutasiDiv.innerHTML = `<div class="bg-white dark:bg-darkcard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 p-4 md:p-5 mt-6"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-gray-700 dark:text-gray-200 text-sm md:text-base">Riwayat Tabungan Istri</h3>${canAccess('buku') ? '<button onclick="navigate(\'buku\')" class="text-xs text-primary hover:underline">Lihat Buku Tabungan</button>' : ''}</div><div class="overflow-x-auto"><table class="w-full text-left text-xs md:text-sm whitespace-nowrap min-w-full md:min-w-[600px]"><thead class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700"><tr><th class="p-2 font-medium">Tanggal</th><th class="p-2 font-medium">Keterangan</th><th class="p-2 font-medium text-right">Debit</th><th class="p-2 font-medium text-right">Kredit</th><th class="p-2 font-medium text-right">Saldo</th></tr></thead><tbody>${recentSorted.length === 0 ? '<tr><td colspan="5" class="p-4 text-center text-gray-500 italic">Belum ada mutasi</td></tr>' : recentSorted.map(t => { const isSetoran = t['Jenis Transaksi'] === 'Setoran'; const nominal = Number(t['Nominal']); const saldoSaatIni = saldoMap.get(t['ID Transaksi']); return `<tr class="border-b border-gray-100 dark:border-gray-800"><td class="p-2 text-gray-600">${formatDateTime(t['Tanggal'])}</td><td class="p-2"><span class="text-[10px] font-bold uppercase ${isSetoran?'text-success':'text-danger'}">${escHtml(t['Jenis Transaksi'])}</span><br><span class="text-xs">${escHtml(t['Keterangan']||'-')}</span></td><td class="p-2 text-right text-success">${isSetoran ? formatRupiah(nominal) : '-'}</td><td class="p-2 text-right text-danger">${!isSetoran ? formatRupiah(nominal) : '-'}</td><td class="p-2 text-right font-bold">${formatRupiah(saldoSaatIni)}</td></tr>`; }).join('')}</tbody></table></div></div>`;
    mutasiDiv.style.display = 'block';
  } else mutasiDiv.style.display = 'none';
}

function renderDashboardAdminSection_(role) {
  const adminContainer = document.getElementById('admin-container');
  if (!['superadmin', 'admin_istri', 'admin_suami'].includes(role)) {
    adminContainer.style.display = 'none';
    return;
  }
  adminContainer.style.display = 'block';
  renderAdminStats_(role);
}

function renderAdminStats_(role) {
  const statsDiv = document.getElementById('dashboard-stats');
  const chartsDiv = document.getElementById('admin-charts');
  const topSaldoSection = document.getElementById('top-saldo-section');
  
  if (role === 'superadmin') {
    let saldoKas=0, masuk=0, keluar=0;
    const now = new Date();
    state.data.kas.forEach(k => { if(!k.Tanggal) return; const tgl = new Date(k.Tanggal); const m = tgl.getMonth(); const nom = Number(k.Nominal)||0; if(k.Jenis==='Pemasukan') { saldoKas+=nom; if(m===now.getMonth() && tgl.getFullYear()===now.getFullYear()) masuk+=nom; } else { saldoKas-=nom; if(m===now.getMonth() && tgl.getFullYear()===now.getFullYear()) keluar+=nom; } });
    statsDiv.innerHTML = `<div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Total Warga</p><h3 class="text-xl font-bold">${state.data.warga.length}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Saldo Kas</p><h3 class="text-xl font-bold text-primary">${formatRupiah(saldoKas)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Masuk Bulan Ini</p><h3 class="text-xl font-bold text-success">${formatRupiah(masuk)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Keluar Bulan Ini</p><h3 class="text-xl font-bold text-danger">${formatRupiah(keluar)}</h3></div>`;
    chartsDiv.style.display = '';
    topSaldoSection.style.display = '';
    renderCharts();
    renderTopSaldo();
  } else if (role === 'admin_istri') {
    let totalSetoran=0, totalPenarikan=0, totalTabungan=0;
    state.data.transaksi.forEach(t => { const n = Number(t['Nominal']); if(t['Jenis Transaksi']==='Setoran') totalSetoran+=n; else totalPenarikan+=n; });
    state.data.warga.forEach(w => { totalTabungan += getSaldo(w['ID Warga']); });
    statsDiv.innerHTML = `<div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Total Warga</p><h3 class="text-xl font-bold">${state.data.warga.length}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Total Setoran</p><h3 class="text-xl font-bold text-success">${formatRupiah(totalSetoran)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Total Penarikan</p><h3 class="text-xl font-bold text-danger">${formatRupiah(totalPenarikan)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Total Saldo</p><h3 class="text-xl font-bold text-primary">${formatRupiah(totalTabungan)}</h3></div>`;
    chartsDiv.style.display = 'none';
    topSaldoSection.style.display = '';
    renderTopSaldo();
  } else if (role === 'admin_suami') {
    let totalMasuk=0, totalKeluar=0;
    state.data.kas.forEach(k => { const n = Number(k.Nominal); if(k.Jenis==='Pemasukan') totalMasuk+=n; else totalKeluar+=n; });
    const saldoKas = totalMasuk - totalKeluar;
    const totalTunggakanSemua = state.data.tunggakan.reduce((sum, t) => sum + Number(t['Iuran']||0) + Number(t['Arisan']||0), 0);
    statsDiv.innerHTML = `<div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Pemasukan Kas</p><h3 class="text-xl font-bold text-success">${formatRupiah(totalMasuk)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Pengeluaran Kas</p><h3 class="text-xl font-bold text-danger">${formatRupiah(totalKeluar)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Saldo Kas</p><h3 class="text-xl font-bold text-primary">${formatRupiah(saldoKas)}</h3></div><div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border"><p class="text-xs text-gray-500">Total Tertunggak</p><h3 class="text-xl font-bold text-warning">${formatRupiah(totalTunggakanSemua)}</h3></div>`;
    chartsDiv.style.display = 'none';
    topSaldoSection.style.display = 'none';
  }
}

function renderCharts() {
  // Pie Chart: Warga Lunas vs Nunggak
  const ctxPie = document.getElementById('chartPieTunggakan');
  if (ctxPie) {
    const totalWarga = getWargaAktif().length;
    const tunggakanSet = new Set(state.data.tunggakan.map(t => t['ID Warga']));
    let wargaNunggak = 0;
    getWargaAktif().forEach(w => { if (tunggakanSet.has(w['ID Warga'])) wargaNunggak++; });
    const wargaLunas = totalWarga - wargaNunggak;
    
    chartPieTunggakan = new Chart(ctxPie, {
      type: 'doughnut',
      data: {
        labels: ['Lunas', 'Menunggak'],
        datasets: [{
          data: [wargaLunas, wargaNunggak],
          backgroundColor: ['#16A34A', '#DC2626'],
          borderColor: ['#16A34A', '#DC2626'],
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              generateLabels: function(chart) {
                const data = chart.data;
                return data.labels.map((label, i) => ({
                  text: `${label}: ${data.datasets[0].data[i]} (${totalWarga > 0 ? Math.round(data.datasets[0].data[i]/totalWarga*100) : 0}%)`,
                  fillStyle: data.datasets[0].backgroundColor[i],
                  strokeStyle: data.datasets[0].borderColor[i],
                  index: i
                }));
              }
            }
          }
        }
      }
    });
  }

  // Bar Chart: Pemasukan 6 Bulan Terakhir
  const ctxBar = document.getElementById('chartBarPemasukan');
  if (ctxBar) {
    const now = new Date();
    const bulanLabels = [];
    const pemasukanData = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      bulanLabels.push(['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'][d.getMonth()] + ' ' + String(d.getFullYear()).slice(-2));
      let total = 0;
      state.data.kas.forEach(k => {
        if (!k.Tanggal) return;
        const tgl = new Date(k.Tanggal);
        if (tgl.getMonth() === d.getMonth() && tgl.getFullYear() === d.getFullYear() && k.Jenis === 'Pemasukan') {
          total += Number(k.Nominal) || 0;
        }
      });
      pemasukanData.push(total);
    }
    
    chartBarPemasukan = new Chart(ctxBar, {
      type: 'bar',
      data: {
        labels: bulanLabels,
        datasets: [{
          label: 'Pemasukan',
          data: pemasukanData,
          backgroundColor: pemasukanData.map(() => '#0F766E'),
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) { return formatRupiah(ctx.raw); }
            }
          }
        },
        scales: {
          y: {
            ticks: {
              callback: function(value) {
                if (value >= 1000000) return (value/1000000).toFixed(1) + 'jt';
                if (value >= 1000) return (value/1000).toFixed(0) + 'rb';
                return value;
              }
            }
          }
        }
      }
    });
  }

  // Line Chart: Tren Saldo Kas
  const ctxLine = document.getElementById('chartLineSaldo');
  if (ctxLine) {
    const sortedKas = [...state.data.kas].filter(k => k.Tanggal).sort((a,b) => new Date(a.Tanggal) - new Date(b.Tanggal));
    const labels = sortedKas.map(k => formatDateTime(k.Tanggal));
    let runningSaldo = 0;
    const saldoData = sortedKas.map(k => {
      runningSaldo += (k.Jenis === 'Pemasukan' ? 1 : -1) * (Number(k.Nominal) || 0);
      return runningSaldo;
    });
    
    chartLineSaldo = new Chart(ctxLine, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Saldo Kas',
          data: saldoData,
          borderColor: '#0F766E',
          backgroundColor: 'rgba(15,118,110,0.1)',
          tension: 0.4,
          fill: true,
          pointRadius: labels.length > 30 ? 0 : 3,
          pointHoverRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) { return formatRupiah(ctx.raw); }
            }
          }
        },
        scales: {
          y: {
            ticks: {
              callback: function(value) {
                if (value >= 1000000) return (value/1000000).toFixed(1) + 'jt';
                return value;
              }
            }
          }
        }
      }
    });
  }
}

function renderTopSaldo() {
  const container = document.getElementById('top-saldo-list');
  if (!container) return;
  
  const sorted = [...state.data.warga].sort((a,b) => getSaldo(b['ID Warga']) - getSaldo(a['ID Warga']));
  const top5 = sorted.slice(0, 5).filter(w => getSaldo(w['ID Warga']) > 0);
  
  if (top5.length === 0) {
    container.innerHTML = '<p class="text-center text-gray-500 text-sm py-4">Belum ada data saldo.</p>';
    return;
  }
  
  const maxSaldo = getSaldo(top5[0]['ID Warga']);
  const medals = ['👑', '🥈', '🥉', '4️⃣', '5️⃣'];
  
  container.innerHTML = top5.map((w, i) => {
    const saldo = getSaldo(w['ID Warga']);
    const barWidth = maxSaldo > 0 ? Math.round((saldo / maxSaldo) * 100) : 0;
    const isGold = i === 0;
    return `
      <div class="flex items-center gap-3 p-3 ${isGold ? 'bg-yellow-50 dark:bg-yellow-900/10 rounded-xl border border-yellow-200 dark:border-yellow-800' : 'border-b border-gray-100 dark:border-gray-800'}">
        <span class="text-lg flex-shrink-0 w-8 text-center">${medals[i] || '#'+(i+1)}</span>
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-center mb-1">
            <span class="font-medium text-sm truncate ${isGold ? 'text-yellow-800 dark:text-yellow-200' : ''}">${escHtml(w['Nama Istri'] || w['Nama Suami'] || '-')}</span>
            <span class="font-bold text-sm ${isGold ? 'text-yellow-800 dark:text-yellow-200' : 'text-primary'}">${formatRupiah(saldo)}</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="flex-1 h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
              <div class="h-full ${isGold ? 'bg-yellow-400' : 'bg-primary'} rounded-full transition-all duration-500" style="width:${barWidth}%"></div>
            </div>
            <span class="text-[10px] text-gray-400 w-12 text-right">${escHtml(w['No Rumah'] || '-')}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}
</script>

<!-- ==================== JAVASCRIPT: WARGA ==================== -->
