    <!-- JS LOGIC -->
    <script>
        function initMockDB() {
            if(!localStorage.getItem('mock_anggota')) {
                localStorage.setItem('mock_anggota', JSON.stringify([{"ID Anggota":"SITIAMINAH-12", "Nama Lengkap":"Siti Aminah", "No Rumah":"12", "No HP":"08123456789", "Status":"Aktif"}]));
                localStorage.setItem('mock_transaksi', JSON.stringify([{"ID Transaksi":"TRX-2026-01", "Tanggal": new Date().toISOString(), "ID Anggota":"SITIAMINAH-12", "Nama Anggota":"Siti Aminah", "Jenis Transaksi":"Setoran", "Nominal":150000, "Keterangan":"Iuran"}]));
            }
        }
        document.addEventListener('DOMContentLoaded', () => { 
            initMockDB(); if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark'); 
            document.getElementById('login-form').addEventListener('submit', handleLogin); 
        });

        const state = { user: null, data: { anggota: [], transaksi: [], logs: [] }, settings: { gasUrl: localStorage.getItem('gasUrl') || '', theme: localStorage.getItem('theme') || 'light' }, ui: { currentView: 'dashboard' } };
        const formatRupiah = (angka) => 'Rp ' + Number(angka).toLocaleString('id-ID');
        const formatDateTime = (iso) => iso ? new Date(iso).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '-';
        const calculateSaldo = (id) => state.data.transaksi.filter(t=>t['ID Anggota']===id).reduce((s, t) => t['Jenis Transaksi'] === 'Setoran' ? s + Number(t['Nominal']) : s - Number(t['Nominal']), 0);

        const showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            const clrs = { success: 'bg-green-100 text-green-800 border-green-200', error: 'bg-red-100 text-red-800 border-red-200' };
            toast.className = `flex items-center gap-3 p-3.5 rounded-xl border shadow-lg toast-enter pointer-events-auto backdrop-blur-md ${clrs[type]} w-full`;
            toast.innerHTML = `<span class="font-medium text-sm">${msg}</span>`;
            container.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        };

        // NEW SECURE API FETCH 
        async function fetchAPI(action, payload = {}) {
            if (state.settings.gasUrl) {
                try {
                    const res = await fetch(state.settings.gasUrl, {
                        method: 'POST', body: JSON.stringify({ action, payload, user: state.user ? state.user.username : 'Guest' }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    return await res.json();
                } catch(e) { return { success: false, message: "Koneksi ke Server Google Gagal" }; }
            } else {
                // Mock System
                return new Promise(resolve => {
                    setTimeout(() => {
                        let a = JSON.parse(localStorage.getItem('mock_anggota')), t = JSON.parse(localStorage.getItem('mock_transaksi')), l = JSON.parse(localStorage.getItem('mock_logs')||'[]');
                        if(action === 'login') {
                            if(payload.username.toLowerCase()==='bendahara' && payload.password==='123456') resolve({success:true, role:'admin', data:{'ID Anggota':'ADMIN', 'Nama Lengkap':'Bendahara'}});
                            else { let u = a.find(x => x['ID Anggota'].toLowerCase() === payload.username.toLowerCase()); if(u && payload.password==='123456') resolve({success:true, role:'user', data:u}); else resolve({success:false, message:'ID Anggota salah'}); }
                        } else if (action === 'get_all_data') {
                            if(payload.role === 'user') resolve({success: true, data: { anggota: a.filter(x=>x['ID Anggota']===payload.userId), transaksi: t.filter(x=>x['ID Anggota']===payload.userId), logs:[] }});
                            else resolve({success: true, data: { anggota: a, transaksi: t, logs: l }});
                        }
                    }, 400);
                });
            }
        }

        async function handleLogin(e) {
            e.preventDefault(); 
            const u = document.getElementById('login-user').value.trim(); 
            const p = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-xl"></i> Memeriksa...`; btn.disabled = true;

            const res = await fetchAPI('login', { username: u, password: p });
            btn.innerHTML = `<span>Masuk</span><i class="ph ph-arrow-right font-bold"></i>`; btn.disabled = false;

            if (res.success) {
                state.user = { ...res.data, username: u, role: res.role };
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('main-layout').classList.remove('hidden');
                document.getElementById('role-badge').innerText = state.user.role === 'admin' ? 'Bendahara' : 'Anggota';
                document.body.setAttribute('data-role', state.user.role);
                loadData(); showToast("Login berhasil");
            } else showToast(res.message, "error");
        }

        async function loadData() {
            // Meminta get_all_data dengan membawa ROLE. Supaya jika anggota yang akses, backend cuma kirim data dia aja.
            const res = await fetchAPI('get_all_data', { role: state.user.role, userId: state.user['ID Anggota'] });
            if(res.success) { state.data = res.data; renderCurrentView(); }
        }

        function handleLogout() {
            state.user = null; document.body.removeAttribute('data-role');
            document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-layout').classList.add('hidden');
            document.getElementById('login-form').reset(); navigate('dashboard');
        }

        function navigate(viewName) {
            state.ui.currentView = viewName;
            document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(btn => {
                let isAktif = btn.dataset.target === viewName;
                if(btn.classList.contains('nav-btn')) btn.className = isAktif ? 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-primary bg-primary/10 font-medium' : 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-medium';
                else { let bClass = btn.classList.contains('admin-only')?'nav-btn-mobile admin-only':'nav-btn-mobile'; btn.className = isAktif ? `${bClass} flex flex-col items-center justify-center p-2 text-primary flex-1 min-w-0` : `${bClass} flex flex-col items-center justify-center p-2 text-gray-400 flex-1 min-w-0`; }
            });
            renderCurrentView();
        }

        document.querySelectorAll('.nav-btn, .nav-btn-mobile').forEach(b => b.addEventListener('click', () => navigate(b.dataset.target)));

        function renderCurrentView() {
            const a = document.getElementById('content-area'); a.innerHTML = ''; const v = state.ui.currentView;
            if(v==='dashboard'){ a.appendChild(document.getElementById('tpl-dashboard').content.cloneNode(true)); renderDashboard(); }
            else if(v==='anggota'){ a.appendChild(document.getElementById('tpl-anggota').content.cloneNode(true)); renderAnggota(); }
            else if(v==='buku'){ a.appendChild(document.getElementById('tpl-buku').content.cloneNode(true)); setupBukuTabungan(); }
            else { a.innerHTML = `<div class="p-6 text-center text-gray-500 mt-10">Tampilan ${v} dirender dengan Vanilla JS (Cek source murni).</div>`; }
        }

        // --- DASHBOARD (Dinamis: User vs Admin) ---
        function renderDashboard() {
            if (state.user.role === 'user') {
                const myId = state.user['ID Anggota']; const mySaldo = calculateSaldo(myId);
                let h = `
                    <div class="bg-gradient-to-br from-primary to-primary-dark p-6 rounded-2xl shadow-md text-white relative overflow-hidden flex flex-col md:flex-row gap-4 mb-2 mt-2">
                        <div class="absolute -right-6 -top-6 opacity-10"><i class="ph ph-user-circle" style="font-size: 150px;"></i></div>
                        <div class="flex-1 z-10 w-full">
                            <p class="text-white/80 text-[10px] uppercase font-bold">Profil Anda</p>
                            <h3 class="text-2xl font-bold mb-2">${state.user['Nama Lengkap']}</h3>
                            <p class="text-xs opacity-90"><i class="ph ph-identification-card"></i> ID: ${state.user['ID Anggota']}</p>
                        </div>
                        <div class="bg-white text-gray-800 p-4 rounded-xl shadow-lg text-center min-w-[150px] z-10 self-start md:self-center">
                            <p class="text-[10px] font-bold text-gray-500 uppercase">Total Saldo</p>
                            <p class="text-xl font-bold text-primary">${formatRupiah(mySaldo)}</p>
                        </div>
                    </div>`;
                document.getElementById('profile-card').innerHTML = h; document.getElementById('profile-card').classList.remove('hidden');
                document.getElementById('dash-title').innerText = 'Beranda Anggota';
            } else {
                // Tampilan Stats untuk Bendahara
                let sal=0, st=0, pt=0; state.data.transaksi.forEach(t => { let n = Number(t['Nominal']); if(t['Jenis Transaksi']==='Setoran') { sal+=n; st+=n;} else { sal-=n; pt+=n; } });
                document.getElementById('admin-stats').innerHTML = `
                    <div class="bg-white p-4 rounded-2xl border"><p class="text-xs text-gray-500">Anggota</p><h3 class="text-xl font-bold">${state.data.anggota.length}</h3></div>
                    <div class="bg-white p-4 rounded-2xl border"><p class="text-xs text-gray-500">Total Saldo Kas</p><h3 class="text-xl font-bold text-primary">${formatRupiah(sal)}</h3></div>
                `;
            }
        }

        // --- ANGGOTA (Only Admin) ---
        function renderAnggota() {
            const tb = document.getElementById('table-anggota'); tb.innerHTML = '';
            state.data.anggota.forEach(a => {
                tb.innerHTML += `<tr class="border-b border-gray-100">
                    <td class="p-4 font-mono text-primary text-sm">${a['ID Anggota']}</td><td class="p-4 font-medium text-sm">${a['Nama Lengkap']}</td>
                    <td class="p-4 text-sm">${a['No Rumah']}</td><td class="p-4 text-center"><span class="px-2 py-0.5 rounded-full text-xs bg-green-100 text-green-700">${a['Status']}</span></td>
                    <td class="p-4 text-center"><button class="text-blue-500 hover:bg-blue-50 p-2 rounded-lg">Info</button></td></tr>`;
            });
        }

        // --- BUKU TABUNGAN ---
        function setupBukuTabungan() {
            let sel = document.getElementById('select-buku-anggota'); sel.innerHTML = '<option value="">-- Pilih Anggota --</option>';
            if (state.user.role === 'user') {
                sel.innerHTML = `<option value="${state.user['ID Anggota']}">${state.user['ID Anggota']} - ${state.user['Nama Lengkap']}</option>`;
                sel.value = state.user['ID Anggota']; document.getElementById('buku-selector-wrapper').classList.add('hidden');
                renderBukuTabungan();
            } else {
                document.getElementById('buku-selector-wrapper').classList.remove('hidden');
                state.data.anggota.forEach(a => sel.innerHTML += `<option value="${a['ID Anggota']}">${a['ID Anggota']} - ${a['Nama Lengkap']}</option>`);
            }
        }
        
        window.renderBukuTabungan = () => {
            let id = document.getElementById('select-buku-anggota').value;
            let area = document.getElementById('passbook-area'), emp = document.getElementById('passbook-empty');
            if(!id){ area.classList.add('hidden'); emp.classList.remove('hidden'); return; }
            area.classList.remove('hidden'); emp.classList.add('hidden'); area.classList.add('flex');
            
            let a = state.data.anggota.find(x=>x['ID Anggota']===id);
            document.getElementById('buku-nama').innerText=a['Nama Lengkap']; document.getElementById('buku-id').innerText=a['ID Anggota']; document.getElementById('buku-norumah').innerText=a['No Rumah']; document.getElementById('buku-saldo').innerText=formatRupiah(calculateSaldo(id));
            
            let tb = document.getElementById('table-buku'); tb.innerHTML='';
            let trx = state.data.transaksi.filter(t=>t['ID Anggota']===id).sort((x,y)=>new Date(x['Tanggal'])-new Date(y['Tanggal']));
            let sld = 0;
            if(trx.length===0) tb.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-500 italic">Belum ada mutasi</td></tr>`;
            else trx.forEach(t => { let isS = t['Jenis Transaksi']==='Setoran'; let n = Number(t['Nominal']); sld += isS?n:-n;
                tb.innerHTML+=`<tr class="border-b border-gray-100">
                    <td class="p-3 text-xs text-gray-600">${formatDateTime(t['Tanggal'])}</td>
                    <td class="p-3"><span class="text-[10px] font-bold uppercase ${isS?'text-success':'text-danger'}">${t['Jenis Transaksi']}</span><br><span class="text-xs truncate block">${t['Keterangan']}</span></td>
                    <td class="p-3 text-right text-success text-sm">${isS?formatRupiah(n):'-'}</td><td class="p-3 text-right text-danger text-sm">${!isS?formatRupiah(n):'-'}</td><td class="p-3 text-right font-bold text-sm bg-gray-50">${formatRupiah(sld)}</td></tr>`;
            });
        };

        window.toggleTheme = () => { let h = document.documentElement; h.classList.toggle('dark'); localStorage.setItem('theme', h.classList.contains('dark')?'dark':'light'); };
    </script>
</body>
</html>
